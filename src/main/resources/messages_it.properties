# Features Section
index.feature.badge=Privilegi per i Residenti
index.feature.title=Sistema di Servizi di Alto Livello <br />Standard Resort a 5 Stelle
index.feature.desc=Ogni passo è un'esperienza di vita perfetta. SmartApt soddisfa appieno ogni esigenza di vita, lavoro e svago proprio a due passi da casa.
index.feature.1.title=Piscina a Sfioro nel Cielo
index.feature.1.desc=Goditi una vista panoramica mozzafiato della città dalla Sky Pool a standard olimpico, insieme a un'area piscina dedicata ai bambini.
index.feature.2.title=Parco Ecologico di 2ha
index.feature.2.desc=Spazi verdi freschi, sentieri ombreggiati e un lago artificiale paesaggistico offrono un relax assoluto immersi nella natura.
index.feature.3.title=Palestra e Spa di Lusso
index.feature.3.desc=Palestra con le attrezzature più avanzate al mondo, sala Yoga con vista panoramica e un'area Spa specializzata nel recupero energetico.
index.feature.4.title=Centro Commerciale Multilivello
index.feature.4.desc=Il podio di 4 piani riunisce centinaia di marchi dello shopping, supermercati, ristoranti di cucina asiatica-europea e un vivace centro di intrattenimento.
index.feature.5.title=Sicurezza Multilivello 24/7
index.feature.5.desc=Sistema di telecamere di sorveglianza AI, tessere magnetiche per ascensori e pattugliamento continuo della sicurezza garantiscono l'assoluta incolumità per la vostra famiglia.
index.feature.6.title=App di Gestione Smart Home
index.feature.6.desc=Controlla i dispositivi elettrici, paga le bollette e prenota i servizi (BBQ, Tennis) direttamente sull'App esclusiva dell'edificio.

