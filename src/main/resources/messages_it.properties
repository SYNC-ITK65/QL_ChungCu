# Policies Section
index.policy.badge=Offerte incredibili questo mese
index.policy.title=Politica di Vendita <br /> & Piano di Pagamento
index.policy.desc=Possedere un appartamento a SmartApt non è mai stato così facile grazie a un'eccellente leva finanziaria e a un piano di pagamenti dilazionato, che riduce la pressione sull'acquirente.
index.policy.1.title=Sconto fino all'8%
index.policy.1.desc=Applicabile ai clienti che effettuano il pagamento anticipato del 95% del valore dell'appartamento al momento della firma del contratto di compravendita.
index.policy.2.title=Finanziamento bancario fino al 70%
index.policy.2.desc=Periodo di grazia per la quota capitale e tasso d'interesse allo 0% per 24 mesi fino alla consegna della casa.
index.policy.3.title=Pacchetto arredamento Smart Home in omaggio
index.policy.3.desc=Include un pacchetto di sistema di controllo intelligente del valore di 100 milioni di VND per i primi 50 clienti che prenotano.

