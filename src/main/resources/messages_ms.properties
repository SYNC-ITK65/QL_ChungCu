# Features Section
index.feature.badge=Hak Istimewa Penduduk
index.feature.title=Sistem Kemudahan Terunggul <br />Standard Resort 5 Bintang
index.feature.desc=Setiap langkah adalah pengalaman hidup yang sempurna. SmartApt memenuhi sepenuhnya semua keperluan hidup, bekerja dan hiburan tepat di depan pintu anda.
index.feature.1.title=Kolam Renang Infiniti Langit
index.feature.1.desc=Nikmati pemandangan panorama bandar yang luar biasa dari Sky Pool bertaraf Olimpik, berserta kawasan kolam renang khas untuk kanak-kanak.
index.feature.2.title=Taman Ekologi 2ha
index.feature.2.desc=Ruang hijau yang menyegarkan, laluan pejalan kaki yang redup, dan tasik landskap buatan yang memberikan ketenangan mutlak di tengah alam semula jadi.
index.feature.3.title=Gim & Spa Mewah
index.feature.3.desc=Bilik senaman dengan peralatan paling moden di dunia, bilik Yoga dengan pemandangan Panorama dan kawasan Spa pemulihan tenaga khas.
index.feature.4.title=Pusat Membeli-belah Berbilang Tingkat
index.feature.4.desc=Podium 4 tingkat yang menghimpunkan beratus-ratus jenama membeli-belah, pasar raya, restoran masakan Asia-Eropah dan kawasan hiburan yang meriah.
index.feature.5.title=Keselamatan Berbilang Lapisan 24/7
index.feature.5.desc=Sistem kamera pengawasan AI, kad akses lif mengikut tingkat, dan rondaan pengawal keselamatan yang berterusan memastikan keselamatan mutlak untuk keluarga anda.
index.feature.6.title=Aplikasi Pengurusan Rumah Pintar
index.feature.6.desc=Kawal peralatan elektrik, bayar bil, dan tempah kemudahan (BBQ, Tenis) terus melalui aplikasi eksklusif bangunan ini.

