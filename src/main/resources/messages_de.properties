# Features Section
index.feature.badge=Privilegien für Bewohner
index.feature.title=Erstklassige Annehmlichkeiten <br />5-Sterne-Resort-Standard
index.feature.desc=Jeder Schritt ist ein perfektes Lebenserlebnis. SmartApt erfüllt alle Bedürfnisse zum Wohnen, Arbeiten und Entspannen direkt vor der Haustür.
index.feature.1.title=Sky-Infinity-Pool
index.feature.1.desc=Genießen Sie den ultimativen Panoramablick auf die Stadt vom Sky Pool nach olympischem Standard, zusammen mit einem speziellen Kinderbeckenbereich.
index.feature.2.title=2ha Ökopark
index.feature.2.desc=Grüne Räume, schattige Gehwege und künstliche Landschaftsseen bieten absolute Entspannung inmitten der Natur.
index.feature.3.title=Premium Gym & Spa
index.feature.3.desc=Fitnessstudio mit weltweit modernster Ausstattung, Yoga-Raum mit Panoramablick und ein spezieller Spa-Bereich zur Regeneration.
index.feature.4.title=Mehrstöckiges Einkaufszentrum
index.feature.4.desc=Der 4-stöckige Sockel beherbergt hunderte von Einkaufsmarken, Supermärkte, asiatisch-europäische Restaurants und ein belebtes Unterhaltungszentrum.
index.feature.5.title=24/7 Mehrschichtige Sicherheit
index.feature.5.desc=KI-Kamera-Überwachungssystem, Keycards für den Aufzug und ständige Sicherheitspatrouillen garantieren die absolute Sicherheit Ihrer Familie.
index.feature.6.title=Smart Home Management App
index.feature.6.desc=Steuern Sie Elektrogeräte, bezahlen Sie Rechnungen und buchen Sie Annehmlichkeiten (BBQ, Tennis) direkt über die exklusive App des Gebäudes.

