# Features Section
index.feature.badge=Hak Istimewa Penghuni
index.feature.title=Sistem Fasilitas Kelas Atas <br />Standar Resor Bintang 5
index.feature.desc=Setiap langkah adalah pengalaman hidup yang sempurna. SmartApt memenuhi semua kebutuhan hidup, bekerja, dan hiburan tepat di depan pintu Anda.
index.feature.1.title=Kolam Renang Infinity Langit
index.feature.1.desc=Nikmati pemandangan panorama kota yang luar biasa dari Sky Pool berstandar Olimpiade, lengkap dengan area kolam renang khusus anak-anak.
index.feature.2.title=Taman Ekologi 2ha
index.feature.2.desc=Ruang terbuka hijau yang sejuk, jalur pejalan kaki yang rindang, dan danau lanskap buatan memberikan ketenangan mutlak di tengah alam.
index.feature.3.title=Gym & Spa Premium
index.feature.3.desc=Ruang kebugaran dengan peralatan tercanggih di dunia, ruang Yoga dengan pemandangan Panorama, dan area Spa pemulihan energi khusus.
index.feature.4.title=Pusat Perbelanjaan Multi-Lantai
index.feature.4.desc=Podium 4 lantai yang menyatukan ratusan merek belanja, supermarket, restoran kuliner Asia-Eropa, dan area hiburan yang ramai.
index.feature.5.title=Keamanan Berlapis 24/7
index.feature.5.desc=Sistem kamera AI pengawas, kartu akses lift, petugas keamanan yang berpatroli terus-menerus memastikan keamanan mutlak bagi keluarga Anda.
index.feature.6.title=Aplikasi Manajemen Smart Home
index.feature.6.desc=Kontrol perangkat listrik, bayar tagihan, pesan fasilitas (BBQ, Tenis) langsung di aplikasi eksklusif gedung.

