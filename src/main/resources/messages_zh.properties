# Features Section
index.feature.badge=居民特权
index.feature.title=顶级设施系统 <br />五星级度假村标准
index.feature.desc=每一步都是完美的生活体验。SmartApt 满足家门口的所有生活、工作和娱乐需求。
index.feature.1.title=空中无边际泳池
index.feature.1.desc=从奥林匹克标准的空中泳池尽享绝佳的城市全景，并设有儿童专用泳池区。
index.feature.2.title=2公顷生态公园
index.feature.2.desc=绿意盎然的空间、树影婆娑的步道、人工景观湖，在大自然中带来绝对的放松。
index.feature.3.title=高级健身房与水疗中心
index.feature.3.desc=配备世界最先进设备的健身房、全景视野的瑜伽室以及专业的能量恢复水疗区。
index.feature.4.title=多层购物中心
index.feature.4.desc=4层裙楼汇聚了数百个购物品牌、超市、亚欧美食餐厅和繁华的娱乐区。
index.feature.5.title=24/7 多层安保系统
index.feature.5.desc=AI监控摄像头系统、电梯分层磁卡、持续巡逻安保，确保您的家庭绝对安全。
index.feature.6.title=智能家居管理应用程序
index.feature.6.desc=可直接在建筑专属App上控制电气设备、支付账单、预约设施使用（烧烤、网球）。

