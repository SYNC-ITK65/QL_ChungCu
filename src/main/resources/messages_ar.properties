# Features Section
index.feature.badge=امتيازات المقيمين
index.feature.title=نظام مرافق متميز <br />بمعايير منتجع 5 نجوم
index.feature.desc=كل خطوة هي تجربة معيشية مثالية. يلبي SmartApt تمامًا جميع احتياجات العيش والعمل والترفيه عند عتبة دارك مباشرة.
index.feature.1.title=حمام سباحة إنفينيتي سماوي
index.feature.1.desc=استمتع بإطلالات بانورامية رائعة على المدينة من مسبح Sky Pool بمعايير أولمبية، بالإضافة إلى منطقة مسبح مخصصة للأطفال.
index.feature.2.title=حديقة بيئية بمساحة 2 هكتار
index.feature.2.desc=مساحات خضراء منعشة، ومسارات للمشي مظللة بالأشجار، وبحيرة صناعية توفر راحة مطلقة وسط الطبيعة.
index.feature.3.title=صالة ألعاب رياضية وسبا فاخر
index.feature.3.desc=صالة رياضية بأحدث المعدات في العالم، وغرفة يوغا بإطلالة بانورامية، ومنطقة سبا متخصصة لاستعادة الطاقة.
index.feature.4.title=مركز تجاري متعدد الطوابق
index.feature.4.desc=تجمع القاعدة المكونة من 4 طوابق مئات العلامات التجارية للتسوق، ومحلات السوبر ماركت، والمطاعم الآسيوية والأوروبية، ومنطقة ترفيهية حيوية.
index.feature.5.title=أمن متعدد الطبقات على مدار الساعة طوال أيام الأسبوع
index.feature.5.desc=نظام مراقبة بكاميرات الذكاء الاصطناعي، وبطاقات دخول المصاعد حسب الطوابق، وحراسة أمنية مستمرة لضمان الأمان التام لعائلتك.
index.feature.6.title=تطبيق إدارة المنزل الذكي
index.feature.6.desc=تحكم في الأجهزة الكهربائية، وادفع الفواتير، واحجز المرافق (شواء، تنس) مباشرة عبر التطبيق الحصري للمبنى.

