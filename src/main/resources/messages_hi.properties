# Features Section
index.feature.badge=निवासियों के विशेषाधिकार
index.feature.title=शीर्ष स्तरीय सुविधा प्रणाली <br />5-सितारा रिज़ॉर्ट मानक
index.feature.desc=हर कदम एक संपूर्ण जीवन का अनुभव है। स्मार्टएप्ट घर के दरवाजे पर रहने, काम करने और मनोरंजन की सभी जरूरतों को पूरी तरह से पूरा करता है।
index.feature.1.title=आकाश में इन्फिनिटी पूल
index.feature.1.desc=ओलंपिक मानक स्काई पूल से शहर के शानदार मनोरम दृश्यों का आनंद लें, साथ ही बच्चों के लिए एक अलग पूल क्षेत्र भी है।
index.feature.2.title=2 हेक्टेयर पारिस्थितिक पार्क
index.feature.2.desc=ठंडी हरी जगह, पेड़ों से घिरी पैदल गलियां, कृत्रिम परिदृश्य झीलें प्रकृति के बीच पूर्ण विश्राम प्रदान करती हैं।
index.feature.3.title=प्रीमियम जिम और स्पा
index.feature.3.desc=दुनिया के सबसे उन्नत उपकरणों वाला जिम, पैनोरमा व्यू वाला योगा रूम और ऊर्जा रिकवरी के लिए विशेष स्पा क्षेत्र।
index.feature.4.title=बहु-स्तरीय शॉपिंग सेंटर
index.feature.4.desc=4 मंजिला बेस ब्लॉक सैकड़ों शॉपिंग ब्रांडों, सुपरमार्केटों, एशियाई-यूरोपीय रेस्तरां और हलचल भरे मनोरंजन क्षेत्रों को एक साथ लाता है।
index.feature.5.title=24/7 बहु-स्तरीय सुरक्षा
index.feature.5.desc=AI कैमरा निगरानी प्रणाली, लिफ्ट के लिए एक्सेस कार्ड, और निरंतर सुरक्षा गश्त आपके परिवार की पूर्ण सुरक्षा सुनिश्चित करते हैं।
index.feature.6.title=स्मार्ट होम प्रबंधन ऐप
index.feature.6.desc=इमारत के विशेष ऐप पर सीधे बिजली के उपकरणों को नियंत्रित करें, बिलों का भुगतान करें और सुविधाओं (BBQ, टेनिस) के लिए समय आरक्षित करें।

