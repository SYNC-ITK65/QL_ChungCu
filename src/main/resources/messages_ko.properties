# Features Section
index.feature.badge=입주민 특권
index.feature.title=최상급 편의 시설 시스템 <br />5성급 리조트 표준
index.feature.desc=발걸음마다 완벽한 삶의 경험이 펼쳐집니다. SmartApt는 집 바로 앞에서 생활, 업무, 여가에 대한 모든 요구를 완벽하게 충족시킵니다.
index.feature.1.title=스카이 인피니티 풀
index.feature.1.desc=올림픽 규격의 스카이 풀에서 최고의 도시 전경을 즐기며, 어린이를 위한 전용 수영장도 마련되어 있습니다.
index.feature.2.title=2ha 규모의 생태 공원
index.feature.2.desc=푸르른 녹지 공간, 나무 그늘이 드리워진 산책로, 인공 경관 호수가 자연 속에서 완벽한 휴식을 선사합니다.
index.feature.3.title=고급 짐 & 스파
index.feature.3.desc=세계 최신 설비를 갖춘 피트니스 센터, 파노라마 뷰의 요가 룸, 그리고 특별한 에너지 회복을 위한 스파 구역을 갖추고 있습니다.
index.feature.4.title=다층 쇼핑몰
index.feature.4.desc=4층 규모의 포디움에는 수백 개의 쇼핑 브랜드, 슈퍼마켓, 아시아-유럽 레스토랑, 그리고 활기찬 엔터테인먼트 구역이 모여 있습니다.
index.feature.5.title=24/7 다중 보안 시스템
index.feature.5.desc=AI 감시 카메라 시스템, 엘리베이터 층별 카드키, 지속적인 보안 순찰을 통해 가족의 절대적인 안전을 보장합니다.
index.feature.6.title=스마트 홈 관리 애플리케이션
index.feature.6.desc=건물 전용 앱에서 직접 가전 제품 제어, 청구서 결제, 편의 시설(BBQ, 테니스) 예약이 가능합니다.

