# Features Section
index.feature.badge=Đặc Quyền Cư Dân
index.feature.title=Hệ Thống Tiện Ích Đỉnh Cao <br />Chuẩn Resort 5 Sao
index.feature.desc=Mỗi bước chân là một trải nghiệm sống hoàn mỹ. SmartApt đáp ứng trọn vẹn mọi nhu cầu sống, làm việc và giải trí ngay thềm nhà.
index.feature.1.title=Hồ Bơi Vô Cực Trên Không
index.feature.1.desc=Tận hưởng tầm nhìn toàn cảnh thành phố cực đỉnh từ Sky Pool tiêu chuẩn Olympic, cùng khu bể bơi dành riêng cho trẻ em.
index.feature.2.title=Công Viên Sinh Thái 2ha
index.feature.2.desc=Không gian xanh mát, đường dạo bộ rợp bóng cây, hồ cảnh quan nhân tạo mang lại sự thư thái tuyệt đối giữa thiên nhiên.
index.feature.3.title=Gym & Spa Cao Cấp
index.feature.3.desc=Phòng tập thiết bị tân tiến nhất thế giới, phòng Yoga tầm nhìn Panorama và khu vực Spa phục hồi năng lượng chuyên biệt.
index.feature.4.title=Trung Tâm Thương Mại Đa Tầng
index.feature.4.desc=Khối đế 4 tầng quy tụ hàng trăm thương hiệu mua sắm, siêu thị, nhà hàng ẩm thực Á-Âu và khu vui chơi giải trí sầm uất.
index.feature.5.title=An Ninh Đa Lớp 24/7
index.feature.5.desc=Hệ thống camera AI giám sát, thẻ từ phân tầng thang máy, bảo vệ tuần tra liên tục đảm bảo an toàn tuyệt đối cho gia đình bạn.
index.feature.6.title=Ứng Dụng Quản Lý Smart Home
index.feature.6.desc=Điều khiển thiết bị điện, thanh toán hóa đơn, đặt lịch sử dụng tiện ích (BBQ, Tennis) ngay trên App độc quyền của tòa nhà.

