<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<body>
    <div th:fragment="scripts">
        <!-- jQuery -->
        <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
        <!-- DataTables JS & Bootstrap 5 integration -->
        <link rel="stylesheet" type="text/css"
            href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css" />
        <script type="text/javascript" src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
        <script type="text/javascript" src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>

        <style>
            .dataTables_wrapper .dataTables_paginate {
                margin-top: 15px;
            }

            .dataTables_wrapper .dataTables_length select {
                padding: 4px;
                border-radius: 4px;
            }

            .dataTables_wrapper .dataTables_filter input {
                padding: 4px;
                border-radius: 4px;
                border: 1px solid #ccc;
            }
        </style>

        <script>
            $(document).ready(function () {
                // Apply DataTable to all tables except those with class no-paging
                $('table.table').each(function () {
                    if ($(this).hasClass('no-paging')) { return; }
                    if ($.fn.DataTable.isDataTable(this)) { return; }

                    const lengthValues = [5, 10, 20, 50, -1];
                    const lengthLabels = [5, 10, 20, 50, "Tất cả"];

                    $(this).DataTable({
                        "language": {
                            "lengthMenu": [[#{pagi.hien_thi}]] + " _MENU_ " + [[#{pagi.dong}]],
                            "zeroRecords": [[#{pagi.chua_co_du_lieu}]],
                            "info": [[#{pagi.hien_thi_info}]],
                            "infoEmpty": [[#{pagi.khong_co_hien_thi}]],
                            "infoFiltered": "([[#{pagi.loc_tu}]] _MAX_ [[#{pagi.muc}]])",
                            "search": [[#{pagi.loc_nhanh}]],
                            "paginate": {
                                "first": [[#{pagi.dau}]],
                                "last": [[#{pagi.cuoi}]],
                                "next": [[#{pagi.sau}]],
                                "previous": [[#{pagi.truoc}]]
                            }
                        },
                        "pageLength": 10,
                        "lengthMenu": [lengthValues, [5, 10, 20, 50, [[#{pagi.tat_ca}]] ]],
                        "ordering": false
                    });
                });
            });
        </script>
    </div>
</body>

</html>
