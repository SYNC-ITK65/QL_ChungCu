<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<body>
    <div th:fragment="scripts">
        <!-- jQuery -->
        <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
        <!-- DataTables JS & Bootstrap 5 integration -->
        <link rel="stylesheet" type="text/css"
            href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css" />
        <script type="text/javascript" src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
        <script type="text/javascript" src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>

        <style>
            /* Style for DataTables components in Dark Mode */
            .dataTables_wrapper {
                color: #94A3B8 !important;
            }

            /* Style the table itself */
            table.table {
                border-collapse: collapse !important;
                width: 100% !important;
                background-color: #161B26 !important;
                border: 1px solid #242B3D !important;
                border-radius: 1rem !important;
                overflow: hidden !important;
            }

            table.table thead th {
                background-color: #0B0F17 !important;
                color: #94A3B8 !important;
                font-weight: 700 !important;
                text-transform: uppercase !important;
                font-size: 10px !important;
                letter-spacing: 0.05em !important;
                border-bottom: 1px solid #242B3D !important;
                padding: 14px 16px !important;
            }

            table.table tbody td {
                background-color: #161B26 !important;
                color: #E2E8F0 !important;
                border-bottom: 1px solid #242B3D !important;
                padding: 12px 16px !important;
                font-size: 12px !important;
                transition: background-color 0.15s ease !important;
            }

            table.table tbody tr:hover td {
                background-color: rgba(30, 41, 59, 0.4) !important;
            }

            /* DataTables filters and page length controls */
            .dataTables_wrapper .dataTables_length {
                margin-bottom: 1rem !important;
                color: #94A3B8 !important;
                font-size: 12px !important;
                font-weight: 500 !important;
            }

            .dataTables_wrapper .dataTables_length select {
                background-color: #0B0F17 !important;
                border: 1px solid #242B3D !important;
                color: #E2E8F0 !important;
                border-radius: 0.5rem !important;
                padding: 6px 12px !important;
                margin: 0 4px !important;
                font-size: 12px !important;
                font-weight: 600 !important;
                outline: none !important;
            }

            .dataTables_wrapper .dataTables_length select:focus {
                border-color: #0ea5e9 !important;
            }

            .dataTables_wrapper .dataTables_filter {
                margin-bottom: 1rem !important;
                color: #94A3B8 !important;
                font-size: 12px !important;
                font-weight: 500 !important;
            }

            .dataTables_wrapper .dataTables_filter input {
                background-color: #0B0F17 !important;
                border: 1px solid #242B3D !important;
                color: #E2E8F0 !important;
                border-radius: 0.75rem !important;
                padding: 6px 12px !important;
                margin-left: 8px !important;
                font-size: 12px !important;
                outline: none !important;
                width: 200px !important;
                transition: all 0.15s ease !important;
            }

            .dataTables_wrapper .dataTables_filter input:focus {
                border-color: #0ea5e9 !important;
                box-shadow: 0 0 0 1px rgba(14, 165, 233, 0.2) !important;
            }

            /* Info status text */
            .dataTables_wrapper .dataTables_info {
                margin-top: 1rem !important;
                color: #64748B !important;
                font-size: 11px !important;
                font-weight: 500 !important;
            }

            /* Pagination controls */
            .dataTables_wrapper .dataTables_paginate {
                margin-top: 1rem !important;
            }

            .dataTables_wrapper .dataTables_paginate .paginate_button {
                background: transparent !important;
                border: 1px solid #242B3D !important;
                color: #94A3B8 !important;
                border-radius: 0.75rem !important;
                padding: 6px 12px !important;
                margin: 0 2px !important;
                font-size: 11px !important;
                font-weight: 600 !important;
                cursor: pointer !important;
                transition: all 0.15s ease !important;
            }

            .dataTables_wrapper .dataTables_paginate .paginate_button:hover {
                background-color: #1e293b !important;
                border-color: #334155 !important;
                color: #F1F5F9 !important;
            }

            .dataTables_wrapper .dataTables_paginate .paginate_button.current,
            .dataTables_wrapper .dataTables_paginate .paginate_button.current:hover {
                background: rgba(14, 165, 233, 0.1) !important;
                border-color: rgba(14, 165, 233, 0.25) !important;
                color: #0ea5e9 !important;
            }

            .dataTables_wrapper .dataTables_paginate .paginate_button.disabled,
            .dataTables_wrapper .dataTables_paginate .paginate_button.disabled:hover {
                opacity: 0.35 !important;
                cursor: default !important;
            }
        </style>

        <script th:inline="javascript">
            $(document).ready(function () {
                // Apply DataTable to all tables except those with class no-paging
                $('table.table').each(function () {
                    if ($(this).hasClass('no-paging')) { return; }
                    if ($.fn.DataTable.isDataTable(this)) { return; }

                    const lengthValues = [5, 10, 20, 50, -1];
                    
                    $(this).DataTable({
                        "language": {
                            "lengthMenu": [[#{pagi.hien_thi}]] + " _MENU_ " + [[#{pagi.dong}]],
                            "zeroRecords": [[#{pagi.chua_co_du_lieu}]],
                            "info": [[#{pagi.hien_thi_info}]],
                            "infoEmpty": [[#{pagi.khong_co_hien_thi}]],
                            "infoFiltered": "([[#{pagi.loc_tu}]] _MAX_ [[#{pagi.muc}]])",
                            "search": [[#{pagi.loc_nhanh}]],
                            "paginate": {
                                "first": [[#{pagi.dau}]],
                                "last": [[#{pagi.cuoi}]],
                                "next": [[#{pagi.sau}]],
                                "previous": [[#{pagi.truoc}]]
                            }
                        },
                        "pageLength": 10,
                        "lengthMenu": [lengthValues, [5, 10, 20, 50, [[#{pagi.tat_ca}]] ]],
                        "ordering": false
                    });
                });
            });
        </script>
    </div>
</body>

</html>
