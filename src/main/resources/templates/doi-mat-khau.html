<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{mk.tieude}">Đổi Mật Khẩu</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
        }

        .card {
            border: none;
            border-radius: 12px;
            transition: transform 0.2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #0d6efd 0%, #0a58ca 100%);
            border: none;
            padding: 10px 20px;
            font-weight: 600;
        }

        .form-label {
            font-weight: 500;
            color: #495057;
        }

        .form-control {
            border-radius: 8px;
            padding: 10px 15px;
        }

        .form-control:focus {
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.15);
        }
    </style>
</head>

<body>
<div class="d-flex">
    <!-- Sidebar dynamically chosen based on Role -->
    <th:block th:if="${session.nguoiDungDangNhap.vaiTro == 1 or session.nguoiDungDangNhap.vaiTro == 2}">
        <div th:replace="~{fragments/sidebar :: menu-trai}"></div>
    </th:block>
    <th:block th:if="${session.nguoiDungDangNhap.vaiTro == 3}">
        <div th:replace="~{fragments/sidebar_cudan :: menu-cudan}"></div>
    </th:block>
    <!-- Main Content -->
    <div class="flex-grow-1 p-5">
        <div class="container" style="max-width: 600px;">
            <div class="d-flex align-items-center mb-4">
                <h2 class="mb-0" th:text="#{mk.tieude}">🔐 Đổi Mật Khẩu</h2>
            </div>
            
            <div class="card shadow-sm p-4">
                <p class="text-muted mb-4" th:text="#{mk.mo_ta}">Vui lòng điền đầy đủ các thông tin bên dưới để cập nhật mật khẩu mới cho tài khoản của bạn.</p>

                <!-- Alerts -->
                <div th:if="${error}" class="alert alert-danger d-flex align-items-center" role="alert">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-exclamation-triangle-fill me-2" viewBox="0 0 16 16">
                        <path d="M8.982 1.566a1.13 1.13 0 0 0-1.96 0L.165 13.233c-.457.778.091 1.767.98 1.767h13.713c.889 0 1.438-.99.98-1.767L8.982 1.566zM8 5c.535 0 .954.462.9.995l-.35 3.507a.552.552 0 0 1-1.1 0L7.1 5.995A.905.905 0 0 1 8 5zm.002 6a1 1 0 1 1 0 2 1 1 0 0 1 0-2z"/>
                    </svg>
                    <span th:text="${error}"></span>
                </div>
                <div th:if="${success}" class="alert alert-success d-flex align-items-center" role="alert">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-check-circle-fill me-2" viewBox="0 0 16 16">
                        <path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0zm-3.97-3.03a.75.75 0 0 0-1.08.022L7.477 9.417 5.384 7.323a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-.01-1.05z"/>
                    </svg>
                    <span th:text="${success}"></span>
                </div>

                <form th:action="@{/user/doi-mat-khau}" method="POST">
                    <div class="mb-3">
                        <label for="oldPassword" class="form-label" th:text="#{mk.pass_cu}">Mật khẩu hiện tại</label>
                        <input type="password" class="form-control" id="oldPassword" name="oldPassword" required th:placeholder="#{mk.pass_cu_goi_y}">
                    </div>
                    <div class="mb-3">
                        <label for="newPassword" class="form-label" th:text="#{mk.pass_moi}">Mật khẩu mới</label>
                        <input type="password" class="form-control" id="newPassword" name="newPassword" required th:placeholder="#{mk.pass_moi_goi_y}">
                        <div class="form-text" th:text="#{mk.pass_moi_hint}">Mật khẩu nên chứa ít nhất 8 ký tự, bao gồm cả chữ và số.</div>
                    </div>
                    <div class="mb-4">
                        <label for="confirmPassword" class="form-label" th:text="#{mk.xac_nhan}">Xác nhận mật khẩu mới</label>
                        <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" required th:placeholder="#{mk.xac_nhan_goi_y}">
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary" th:text="#{mk.nut_cap_nhat}">🔄 Cập nhật mật khẩu</button>
                    </div>
                </form>
            </div>

            <div class="mt-4 text-center">
                <a href="javascript:history.back()" class="text-decoration-none text-secondary small" th:text="#{mk.nut_quay_lai}">← Quay lại trang trước</a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
