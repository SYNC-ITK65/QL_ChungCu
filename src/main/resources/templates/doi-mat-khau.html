<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{mk.tieude}">Đổi Mật Khẩu</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts - Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- SweetAlert2 CDN -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            700: '#0369a1',
                            900: '#0c4a6e',
                        },
                        darkbg: '#0B0F17',
                        darkcard: '#161B26',
                        darkborder: '#242B3D'
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0B0F17;
            color: #E2E8F0;
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="min-h-screen flex bg-darkbg text-slate-200 antialiased font-sans">
    <!-- Sidebar dynamically chosen based on Role -->
    <th:block th:if="${session.nguoiDungDangNhap.vaiTro == 1 or session.nguoiDungDangNhap.vaiTro == 2}">
        <div th:replace="~{fragments/sidebar :: menu-trai}"></div>
    </th:block>
    <th:block th:if="${session.nguoiDungDangNhap.vaiTro == 3}">
        <div th:replace="~{fragments/sidebar_cudan :: menu-cudan}"></div>
    </th:block>

    <!-- Main Content -->
    <main class="flex-grow p-6 md:p-8 overflow-y-auto w-full flex flex-col items-center">
        <!-- Header -->
        <div class="w-full max-w-3xl flex items-center justify-between gap-4 mb-8">
            <div>
                <h1 class="text-2xl font-bold text-white tracking-tight" th:text="#{mk.tieude}">
                    Đổi Mật Khẩu
                </h1>
                <p class="text-sm text-slate-400 mt-1" th:text="#{mk.mo_ta}">Vui lòng điền đầy đủ các thông tin bên dưới
                    để cập nhật mật khẩu mới cho tài khoản của bạn.</p>
            </div>
            <a href="javascript:history.back()"
                class="px-4 py-2 bg-slate-800 hover:bg-slate-700 active:bg-slate-900 text-slate-300 text-xs font-semibold rounded-xl transition flex items-center gap-1.5 shadow-sm">
                <i data-lucide="arrow-left" class="w-4 h-4"></i>
                <span th:text="#{chung.quay_lai}">Quay Lại</span>
            </a>
        </div>

        <!-- Form Card -->
        <div class="w-full max-w-3xl bg-darkcard border border-darkborder rounded-2xl p-6 md:p-8 shadow-xl">
            <form th:action="@{/user/doi-mat-khau}" method="POST" class="space-y-6">
                <!-- Mật khẩu hiện tại -->
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2"
                        th:text="#{mk.pass_cu}">Mật khẩu hiện tại</label>
                    <input type="password" id="oldPassword" name="oldPassword" required
                        th:placeholder="#{mk.pass_cu_goi_y}"
                        class="w-full bg-darkbg border border-darkborder rounded-xl px-4 py-3 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-brand-500 transition">
                </div>

                <!-- Mật khẩu mới -->
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2"
                        th:text="#{mk.pass_moi}">Mật khẩu mới</label>
                    <input type="password" id="newPassword" name="newPassword" required
                        th:placeholder="#{mk.pass_moi_goi_y}"
                        class="w-full bg-darkbg border border-darkborder rounded-xl px-4 py-3 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-brand-500 transition">
                    <p class="text-[11px] text-slate-500 mt-1.5" th:text="#{mk.pass_moi_hint}">Mật khẩu nên chứa ít nhất
                        8 ký tự, bao gồm cả chữ và số.</p>
                </div>

                <!-- Xác nhận mật khẩu mới -->
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2"
                        th:text="#{mk.xac_nhan}">Xác nhận mật khẩu mới</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required
                        th:placeholder="#{mk.xac_nhan_goi_y}"
                        class="w-full bg-darkbg border border-darkborder rounded-xl px-4 py-3 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-brand-500 transition">
                </div>

                <!-- Buttons -->
                <div class="flex items-center gap-3 pt-6 border-t border-darkborder justify-end">
                    <a href="javascript:history.back()"
                        class="px-6 py-3 bg-slate-800 hover:bg-slate-700 active:bg-slate-900 text-slate-300 text-xs font-semibold rounded-xl transition"
                        th:text="#{chung.quay_lai}">Quay Lại</a>
                    <button type="submit"
                        class="px-6 py-3 bg-brand-500 hover:bg-brand-400 active:bg-brand-600 text-white text-xs font-bold rounded-xl transition flex items-center gap-2 shadow-lg shadow-brand-500/10">
                        <i data-lucide="check" class="w-4 h-4"></i>
                        <span th:text="#{mk.nut_cap_nhat}">Cập nhật mật khẩu</span>
                    </button>
                </div>
            </form>
        </div>
    </main>

    <!-- JS dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:inline="javascript">
        document.addEventListener('DOMContentLoaded', function () {
            // Initialize Lucide Icons
            lucide.createIcons();

            var thongBaoThanhCong = /*[[${success}]]*/ null;
            var thongBaoLoi = /*[[${error}]]*/ null;

            const swalDarkConfig = {
                background: '#161B26',
                color: '#E2E8F0',
                confirmButtonColor: '#0ea5e9',
                cancelButtonColor: '#334155'
            };

            if (thongBaoThanhCong) {
                Swal.fire({ ...swalDarkConfig, icon: 'success', title: 'Thành công!', text: thongBaoThanhCong, toast: true, position: 'top-end', showConfirmButton: false, timer: 4000, timerProgressBar: true });
            }
            if (thongBaoLoi) {
                Swal.fire({ ...swalDarkConfig, icon: 'error', title: 'Lỗi!', text: thongBaoLoi, toast: true, position: 'top-end', showConfirmButton: false, timer: 5000, timerProgressBar: true });
            }
        });
    </script>
</body>

</html>
