<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{mk.tieude}">Đổi Mật Khẩu</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts - Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            700: '#0369a1',
                            900: '#0c4a6e',
                        },
                        darkbg: '#0B0F17',
                        darkcard: '#161B26',
                        darkborder: '#242B3D'
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0B0F17;
            color: #E2E8F0;
            font-family: 'Inter', sans-serif;
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #111827;
        }
        ::-webkit-scrollbar-thumb {
            background: #374151;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #4B5563;
        }
    </style>
</head>

<body class="bg-darkbg text-slate-200 antialiased font-sans min-h-screen">
<div class="flex min-h-screen bg-darkbg">
    <!-- Sidebar dynamically chosen based on Role -->
    <th:block th:if="${session.nguoiDungDangNhap.vaiTro == 1 or session.nguoiDungDangNhap.vaiTro == 2}">
        <div th:replace="~{fragments/sidebar :: menu-trai}"></div>
    </th:block>
    <th:block th:if="${session.nguoiDungDangNhap.vaiTro == 3}">
        <div th:replace="~{fragments/sidebar_cudan :: menu-cudan}"></div>
    </th:block>
    
    <!-- Main Content -->
    <div class="flex-1 overflow-y-auto p-4 md:p-8 lg:p-12 flex flex-col justify-start">
        <div class="max-w-xl w-full mx-auto space-y-6">
            
            <!-- Header section -->
            <div class="flex items-center gap-3.5 pb-4 border-b border-darkborder">
                <div class="bg-brand-500 text-white p-2.5 rounded-xl flex items-center justify-center shadow-lg shadow-brand-500/20">
                    <i data-lucide="key-round" class="w-5 h-5"></i>
                </div>
                <div>
                    <h2 class="text-base font-bold text-white tracking-wide" th:text="#{mk.tieude}">🔐 Đổi Mật Khẩu</h2>
                    <p class="text-[10px] text-slate-400 font-medium mt-0.5" th:text="#{mk.mo_ta}">Vui lòng điền đầy đủ các thông tin bên dưới để cập nhật mật khẩu mới cho tài khoản của bạn.</p>
                </div>
            </div>
            
            <div class="bg-darkcard border border-darkborder rounded-2xl p-6 space-y-5 shadow-xl relative overflow-hidden">
                <!-- Glow effect -->
                <div class="absolute -right-20 -top-20 w-40 h-40 bg-brand-500/5 rounded-full blur-2xl"></div>

                <!-- Error Alert -->
                <div th:if="${error}" class="flex items-start gap-2.5 p-3.5 bg-red-500/10 border border-red-500/20 text-red-400 rounded-xl text-xs" role="alert">
                    <i data-lucide="alert-circle" class="w-4 h-4 shrink-0 mt-0.5"></i>
                    <div>
                        <span class="font-bold">Lỗi xảy ra:</span>
                        <p class="mt-0.5 text-[11px] text-red-300" th:text="${error}">Vui lòng kiểm tra lại thông tin nhập.</p>
                    </div>
                </div>

                <!-- Success Alert -->
                <div th:if="${success}" class="flex items-start gap-2.5 p-3.5 bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 rounded-xl text-xs" role="alert">
                    <i data-lucide="check-circle" class="w-4 h-4 shrink-0 mt-0.5"></i>
                    <div>
                        <span class="font-bold">Thành công:</span>
                        <p class="mt-0.5 text-[11px] text-emerald-300" th:text="${success}">Mật khẩu của bạn đã được cập nhật thành công.</p>
                    </div>
                </div>

                <form th:action="@{/user/doi-mat-khau}" method="POST" class="space-y-4 relative z-10">
                    <div class="space-y-1.5">
                        <label for="oldPassword" class="text-xs font-semibold text-slate-300" th:text="#{mk.pass_cu}">Mật khẩu hiện tại</label>
                        <div class="relative">
                            <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-500"><i data-lucide="lock" class="w-4 h-4"></i></span>
                            <input type="password" class="w-full bg-darkbg border border-darkborder rounded-xl py-2 pl-10 pr-4 text-xs text-white placeholder-slate-600 focus:outline-none focus:border-brand-500 transition" id="oldPassword" name="oldPassword" required th:placeholder="#{mk.pass_cu_goi_y}">
                        </div>
                    </div>
                    
                    <div class="space-y-1.5">
                        <label for="newPassword" class="text-xs font-semibold text-slate-300" th:text="#{mk.pass_moi}">Mật khẩu mới</label>
                        <div class="relative">
                            <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-500"><i data-lucide="shield-check" class="w-4 h-4"></i></span>
                            <input type="password" class="w-full bg-darkbg border border-darkborder rounded-xl py-2 pl-10 pr-4 text-xs text-white placeholder-slate-600 focus:outline-none focus:border-brand-500 transition" id="newPassword" name="newPassword" required th:placeholder="#{mk.pass_moi_goi_y}">
                        </div>
                        <div class="text-[10px] text-slate-500 font-medium pl-1 leading-normal" th:text="#{mk.pass_moi_hint}">Mật khẩu nên chứa ít nhất 8 ký tự, bao gồm cả chữ và số.</div>
                    </div>
                    
                    <div class="space-y-1.5">
                        <label for="confirmPassword" class="text-xs font-semibold text-slate-300" th:text="#{mk.xac_nhan}">Xác nhận mật khẩu mới</label>
                        <div class="relative">
                            <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-500"><i data-lucide="shield-alert" class="w-4 h-4"></i></span>
                            <input type="password" class="w-full bg-darkbg border border-darkborder rounded-xl py-2 pl-10 pr-4 text-xs text-white placeholder-slate-600 focus:outline-none focus:border-brand-500 transition" id="confirmPassword" name="confirmPassword" required th:placeholder="#{mk.xac_nhan_goi_y}">
                        </div>
                    </div>

                    <button type="submit" class="w-full py-2.5 bg-brand-500 hover:bg-brand-600 text-white rounded-xl font-bold transition shadow-lg shadow-brand-500/20 text-xs flex items-center justify-center gap-2">
                        <i data-lucide="refresh-cw" class="w-4 h-4"></i> <span th:text="#{mk.nut_cap_nhat}">🔄 Cập nhật mật khẩu</span>
                    </button>
                </form>
            </div>

            <div class="text-center pt-2">
                <a href="javascript:history.back()" class="inline-flex items-center gap-1.5 text-slate-400 hover:text-slate-200 transition text-xs font-semibold" th:text="#{mk.nut_quay_lai}">
                    <i data-lucide="arrow-left" class="w-3.5 h-3.5"></i> Quay lại trang trước
                </a>
            </div>
            
        </div>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        lucide.createIcons();
    });
</script>
</body>

</html>
