<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{tb.ui.thong_tin_cua_toi}">Thông tin của tôi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex">

<div th:replace="~{fragments/sidebar_cudan :: menu-cudan}"></div>

<div class="container p-5">
    <h2 class="mb-4" th:text="#{tb.ui.thong_tin_ca_nhan_ca}">Thông tin cá nhân &amp; Căn hộ</h2>

    <div class="row">
        <div class="col-md-6">
            <div class="card shadow-sm mb-4">
                <div class="card-header bg-dark text-white">
                    <h5 class="mb-0" th:text="#{tb.ui.thong_tin_cu_dan}">Thông tin Cư Dân</h5>
                </div>
                <div class="card-body">
                    <p><strong th:text="#{tb.ui.ho_ten}">Họ Tên:</strong> <span th:text="${cuDan.hoTen}"></span></p>
                    <p><strong th:text="#{tb.ui.so_dien_thoai}">Số Điện Thoại:</strong> <span th:text="${cuDan.soDienThoai}"></span></p>
                    <p><strong th:text="#{chung.cccd}">CCCD:</strong> <span th:text="${cuDan.cccd}"></span></p>
                    <p><strong th:text="#{tb.ui.vai_tro}">Vai trò:</strong> <span th:text="${cuDan.moiQuanHe}"></span></p>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card shadow-sm border-primary">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0" th:text="#{side.user.nhom_tt}">Thông tin Căn Hộ</h5>
                </div>
                <div class="card-body" th:if="${cuDan.canHo != null}">
                    <h4 class="text-primary"><span th:text="#{tb.ui.phong}" th:remove="tag">Phòng </span><span th:text="${cuDan.canHo.maCanHo}"></span></h4>
                    <p><strong th:text="#{ch.chitiet.tang}">Tầng:</strong> <span th:text="${cuDan.canHo.tang}"></span></p>
                    <p><strong th:text="#{ch.chitiet.dien_tich}">Diện tích:</strong> <span th:text="|${cuDan.canHo.dienTich} #{chung.don_vi_m2}|"></span></p>
                    <p><strong th:text="#{ch.chitiet.loai_can_ho}">Loại căn hộ:</strong> <span th:text="${cuDan.canHo.loai}"></span></p>
                </div>
                <div class="card-body text-danger" th:if="${cuDan.canHo == null}" th:text="#{tb.ui.ban_chua_duoc_phan_b}">
                    Bạn chưa được phân bổ vào căn hộ nào. Vui lòng liên hệ Ban Quản Lý.
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
