<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{side.user.nhom_tt}">Thông tin căn hộ</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts - Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            700: '#0369a1',
                            900: '#0c4a6e',
                        },
                        darkbg: '#0B0F17',
                        darkcard: '#161B26',
                        darkborder: '#242B3D'
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0B0F17;
            color: #E2E8F0;
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="min-h-screen flex bg-darkbg text-slate-200 antialiased font-sans">
    <!-- Resident Sidebar -->
    <div th:replace="fragments/sidebar_cudan :: menu-cudan"></div>

    <!-- Main Content -->
    <main class="flex-grow p-6 md:p-8 overflow-y-auto w-full">
        <!-- Header -->
        <div class="mb-8">
            <h1 class="text-2xl font-bold text-white tracking-tight flex items-center gap-2" th:text="#{ch.chitiet.thong_tin_can_ho_cu}">
                🏢 Thông tin căn hộ của tôi
            </h1>
            <p class="text-sm text-slate-400 mt-1">Hồ sơ thông số kỹ thuật chi tiết của căn hộ bạn đang cư trú</p>
        </div>

        <!-- If apartment exists -->
        <div th:if="${canHo != null}" class="max-w-2xl bg-darkcard border border-darkborder rounded-2xl overflow-hidden shadow-xl p-6 md:p-8">
            
            <div class="flex items-center justify-between pb-4 border-b border-darkborder mb-6">
                <h2 class="text-lg font-bold text-white flex items-center gap-2">
                    <i data-lucide="home" class="w-5 h-5 text-brand-400"></i>
                    <span th:text="#{tb.ui.phong} + ' ' + ${canHo.maCanHo}">Mã Căn Hộ</span>
                </h2>
                <span class="px-2.5 py-0.5 rounded text-xs font-semibold bg-emerald-500/10 text-emerald-400 border border-emerald-500/20" 
                      th:text="${canHo.trangThaiHienThi != null ? #messages.msg(canHo.trangThaiHienThi) : canHo.trangThai}"></span>
            </div>

            <!-- Image View -->
            <div th:if="${canHo.hinhAnh != null}" class="mb-6 rounded-2xl overflow-hidden border border-darkborder max-w-md mx-auto aspect-video shadow-lg">
                <img th:src="${canHo.hinhAnh}" alt="Ảnh căn hộ" class="w-full h-full object-cover">
            </div>

            <!-- Info details -->
            <div class="space-y-4 text-sm mt-6">
                <div class="flex items-center justify-between py-2 border-b border-darkborder/50">
                    <span class="text-slate-400 font-medium" th:text="#{ch.chitiet.tang}">Tầng:</span>
                    <span class="text-white font-semibold" th:text="${canHo.tang}">-</span>
                </div>
                <div class="flex items-center justify-between py-2 border-b border-darkborder/50">
                    <span class="text-slate-400 font-medium" th:text="#{ch.chitiet.dien_tich}">Diện tích:</span>
                    <span class="text-white font-semibold" th:text="${canHo.dienTich} + ' ' + #{chung.don_vi_m2}">-</span>
                </div>
                <div class="flex items-center justify-between py-2 border-b border-darkborder/50">
                    <span class="text-slate-400 font-medium" th:text="#{ch.chitiet.loai_can_ho}">Loại căn hộ:</span>
                    <span class="text-white font-semibold" 
                          th:text="${canHo.loaiHienThi != null ? #messages.msg(canHo.loaiHienThi) : canHo.loai}">-</span>
                </div>
            </div>
        </div>

        <!-- If apartment not registered -->
        <div th:if="${canHo == null}" 
             class="max-w-xl p-4 bg-amber-500/10 border border-amber-500/20 text-amber-400 rounded-xl text-sm flex items-center gap-2 shadow-lg" 
             th:text="#{ch.chitiet.ban_hien_chua_duoc_d}">
            Bạn hiện chưa được đăng ký vào căn hộ nào. Vui lòng liên hệ Ban Quản Lý.
        </div>
    </main>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();
    </script>
</body>

</html>
