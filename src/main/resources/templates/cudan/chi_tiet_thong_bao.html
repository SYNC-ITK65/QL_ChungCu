<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title th:text="${thongBao.tieuDe}"></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        .markdown-content img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin: 1rem 0;
        }

        .markdown-content h1,
        .markdown-content h2,
        .markdown-content h3 {
            margin-top: 1.5rem;
            margin-bottom: 1rem;
            font-weight: bold;
        }

        .markdown-content p {
            line-height: 1.6;
            margin-bottom: 1rem;
        }

        .markdown-content blockquote {
            border-left: 4px solid #0d6efd;
            padding-left: 1rem;
            color: #6c757d;
            background-color: #f8f9fa;
            padding: 10px;
            border-radius: 4px;
        }

        .back-btn {
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            font-weight: 500;
            color: #6c757d;
            transition: color 0.2s;
        }

        .back-btn:hover {
            color: #0d6efd;
        }
    </style>
</head>

<body class="d-flex bg-light">

    <div th:replace="~{fragments/sidebar_cudan :: menu-cudan}"></div>

    <div class="container p-5">
        <div class="mb-4">
            <!-- Nút quay lại dựa theo loại -->
            <a th:if="${thongBao.loai == 1}" th:href="@{/cudan/thong-bao/bang-tin}" class="back-btn mb-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                    class="bi bi-arrow-left me-1" viewBox="0 0 16 16">
                    <path fill-rule="evenodd"
                        d="M15 8a.5.5 0 0 0-.5-.5H2.707l3.147-3.146a.5.5 0 1 0-.708-.708l-4 4a.5.5 0 0 0 0 .708l4 4a.5.5 0 0 0 .708-.708L2.707 8.5H14.5A.5.5 0 0 0 15 8z" />
                </svg> <span th:text="#{user.quay_lai_tin_tuc}">Quay lại Bảng tin chung</span>
            </a>
            <a th:if="${thongBao.loai == 2}" th:href="@{/cudan/thong-bao/cam-nang}" class="back-btn mb-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                    class="bi bi-arrow-left me-1" viewBox="0 0 16 16">
                    <path fill-rule="evenodd"
                        d="M15 8a.5.5 0 0 0-.5-.5H2.707l3.147-3.146a.5.5 0 1 0-.708-.708l-4 4a.5.5 0 0 0 0 .708l4 4a.5.5 0 0 0 .708-.708L2.707 8.5H14.5A.5.5 0 0 0 15 8z" />
                </svg> <span th:text="#{user.quay_lai_cam_nang}">Quay lại Cẩm nang</span>
            </a>
        </div>

        <div class="card shadow-sm border-0 rounded-4">
            <div class="card-body p-5">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <span th:if="${thongBao.loai == 1}" class="badge bg-info text-dark rounded-pill px-3 py-2" th:text="#{tb.loai.tin_tuc}">Bảng tin
                        chung</span>
                    <span th:if="${thongBao.loai == 2}" class="badge bg-success rounded-pill px-3 py-2" th:text="#{tb.loai.cam_nang}">Cẩm nang</span>
                    <span class="text-muted"><i class="bi bi-calendar3 me-1"></i> <span
                            th:text="${#temporals.format(thongBao.ngayDang, 'dd/MM/yyyy HH:mm')}"></span></span>
                </div>

                <h1 class="fw-bold text-dark mb-4 pb-3 border-bottom" th:text="${thongBao.tieuDe}"></h1>

                <!-- Hiển thị nội dung HTML trực tiếp -->
                <div class="rich-text-content" th:utext="${thongBao.noiDung}"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
