<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${thongBao.tieuDe}"></title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts - Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            background-color: #0B0F17;
            color: #cbd5e1;
            font-family: 'Inter', sans-serif;
        }

        /* Styling for Rich Text/Summernote Content inside Dark Theme */
        .rich-text-content img {
            max-width: 100%;
            height: auto;
            border-radius: 12px;
            margin: 1.5rem 0;
            border: 1px solid #242B3D;
        }

        .rich-text-content h1,
        .rich-text-content h2,
        .rich-text-content h3,
        .rich-text-content h4 {
            color: #ffffff;
            margin-top: 1.75rem;
            margin-bottom: 1rem;
            font-weight: 700;
        }

        .rich-text-content h1 { font-size: 1.5rem; }
        .rich-text-content h2 { font-size: 1.35rem; }
        .rich-text-content h3 { font-size: 1.2rem; }

        .rich-text-content p {
            line-height: 1.75;
            margin-bottom: 1.25rem;
            color: #cbd5e1;
        }

        .rich-text-content blockquote {
            border-left: 4px solid #0ea5e9;
            padding: 0.75rem 1rem;
            color: #94a3b8;
            background-color: #0B0F17;
            border-radius: 0.5rem;
            margin: 1.5rem 0;
        }

        .rich-text-content ul, .rich-text-content ol {
            margin-bottom: 1.25rem;
            padding-left: 1.5rem;
            color: #cbd5e1;
        }

        .rich-text-content ul {
            list-style-type: disc;
        }

        .rich-text-content ol {
            list-style-type: decimal;
        }
        
        .rich-text-content a {
            color: #0ea5e9;
            text-decoration: underline;
        }
        
        .rich-text-content a:hover {
            color: #38bdf8;
        }
    </style>
</head>

<body class="min-h-screen flex bg-darkbg text-slate-200 antialiased font-sans">
    <!-- Resident Sidebar -->
    <div th:replace="fragments/sidebar_cudan :: menu-cudan"></div>

    <!-- Main Content -->
    <main class="flex-grow p-6 md:p-8 overflow-y-auto w-full flex flex-col items-center">
        <div class="w-full max-w-4xl">
            <!-- Back Button Navigation -->
            <div class="mb-6">
                <!-- Back to newsboard -->
                <a th:if="${thongBao.loai == 1}" th:href="@{/cudan/thong-bao/bang-tin}" 
                   class="inline-flex items-center gap-1.5 text-xs text-slate-400 hover:text-brand-400 transition font-medium">
                    <i data-lucide="arrow-left" class="w-4 h-4"></i>
                    <span th:text="#{user.quay_lai_tin_tuc}">Quay lại Bảng tin chung</span>
                </a>
                <!-- Back to handbook -->
                <a th:if="${thongBao.loai == 2}" th:href="@{/cudan/thong-bao/cam-nang}" 
                   class="inline-flex items-center gap-1.5 text-xs text-slate-400 hover:text-brand-400 transition font-medium">
                    <i data-lucide="arrow-left" class="w-4 h-4"></i>
                    <span th:text="#{user.quay_lai_cam_nang}">Quay lại Cẩm nang</span>
                </a>
            </div>

            <!-- Article Details Card -->
            <div class="bg-darkcard border border-darkborder rounded-2xl p-6 md:p-10 shadow-2xl">
                <!-- Badges & Date -->
                <div class="flex items-center justify-between gap-4 mb-6 pb-4 border-b border-darkborder">
                    <div>
                        <span th:if="${thongBao.loai == 1}" class="px-2.5 py-1 text-[10px] font-bold rounded-lg bg-sky-500/10 text-sky-400 border border-sky-500/20" th:text="#{tb.loai.tin_tuc}">Bảng tin chung</span>
                        <span th:if="${thongBao.loai == 2}" class="px-2.5 py-1 text-[10px] font-bold rounded-lg bg-emerald-500/10 text-emerald-400 border border-emerald-500/20" th:text="#{tb.loai.cam_nang}">Cẩm nang</span>
                    </div>
                    <span class="text-xs text-slate-500 flex items-center gap-1.5">
                        <i data-lucide="calendar" class="w-3.5 h-3.5"></i>
                        <span th:text="${#temporals.format(thongBao.ngayDang, 'dd/MM/yyyy HH:mm')}"></span>
                    </span>
                </div>

                <!-- Article Title -->
                <h1 class="text-2xl md:text-3xl font-extrabold text-white tracking-tight mb-8 leading-tight" 
                    th:text="${thongBao.tieuDe}"></h1>

                <!-- Article Rendered Content -->
                <div class="rich-text-content" th:utext="${thongBao.noiDung}"></div>
            </div>
        </div>
    </main>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();
    </script>
</body>

</html>
