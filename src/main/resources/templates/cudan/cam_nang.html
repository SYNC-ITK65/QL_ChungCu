<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${tieuDeTrang}"></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .news-card {
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        .news-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1) !important;
            color: inherit;
        }
        .news-date {
            font-size: 0.85rem;
            color: #6c757d;
        }
        .news-excerpt {
            color: #495057;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>
<body class="d-flex bg-light">

<div th:replace="~{fragments/sidebar_cudan :: menu-cudan}"></div>

<div class="container p-5">
    <div class="d-flex align-items-center mb-4 pb-2 border-bottom border-success border-3">
        <h2 class="text-success fw-bold m-0" th:text="${tieuDeTrang}"></h2>
    </div>

    <div class="row row-cols-1 row-cols-md-3 g-4" th:if="${not #lists.isEmpty(danhSach)}">
        <div class="col" th:each="tb : ${danhSach}">
            <a th:href="@{/cudan/thong-bao/chi-tiet/{id}(id=${tb.id})}" class="card h-100 shadow-sm border-0 news-card rounded-4">
                <div class="card-body p-4 text-center">
                    <div class="mb-3 text-success">
                        <!-- placeholder cho icon -->
                        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="currentColor" class="bi bi-book" viewBox="0 0 16 16">
                          <path d="M1 2.828c.885-.37 2.154-.769 3.388-.893 1.33-.134 2.458.156 3.138.311.31.07.575.16.76.24v9.98c-.184-.08-.45-.17-.76-.24-1.33-.134-2.458-.156-3.138-.311-1.234-.124-2.503.273-3.388.893V2.828zm13 0V12.8c-.885-.62-2.154-1.017-3.388-.893-1.33.134-2.458.156-3.138.311C7.575 12.39 7.31 12.48 7.126 12.56V2.58c.184-.08.45-.17.76-.24 1.33-.134 2.458-.156 3.138-.311 1.234-.124 2.503.273 3.388.893z"/>
                          <path d="M8 1.783C7.015.936 5.587.81 4.287.94c-1.514.153-3.042.672-3.994 1.105A.5.5 0 0 0 0 2.5v11a.5.5 0 0 0 .707.455c.882-.4 2.303-.881 3.68-1.02 1.409-.142 2.59.087 3.223.233.15.034.288.07.4.116.112-.046.25-.082.4-.116.633-.146 1.814-.375 3.223-.233 1.377.139 2.798.62 3.68 1.02A.5.5 0 0 0 16 13.5v-11a.5.5 0 0 0-.293-.455c-.952-.433-2.48-.952-3.994-1.105C10.413.809 8.985.936 8 1.783z"/>
                        </svg>
                    </div>
                    <h5 class="card-title fw-bold text-dark mb-2" th:text="${tb.tieuDe}"></h5>
                    <div class="news-date mb-3">
                        <span th:text="${#temporals.format(tb.ngayDang, 'dd/MM/yyyy')}"></span>
                    </div>
                    <div class="card-text news-excerpt" th:text="${tb.noiDung.replaceAll('<[^>]*>', '')}"></div>
                </div>
            </a>
        </div>
    </div>
    
    <div th:if="${#lists.isEmpty(danhSach)}" class="text-center py-5">
        <div class="text-muted fs-5">Hiện chưa có bài viết nào trong chuyên mục này.</div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
