<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{${tieuDeTrangKey}}"></title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts - Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            700: '#0369a1',
                            900: '#0c4a6e',
                        },
                        darkbg: '#0B0F17',
                        darkcard: '#161B26',
                        darkborder: '#242B3D'
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0B0F17;
            color: #E2E8F0;
            font-family: 'Inter', sans-serif;
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #111827;
        }
        ::-webkit-scrollbar-thumb {
            background: #374151;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #4B5563;
        }
    </style>
</head>

<body class="min-h-screen flex bg-darkbg text-slate-200 antialiased font-sans">
    <!-- Resident Sidebar -->
    <div th:replace="fragments/sidebar_cudan :: menu-cudan"></div>

    <!-- Main Content -->
    <main class="flex-grow p-6 md:p-8 overflow-y-auto w-full">
        <!-- Header -->
        <div class="mb-8 border-b border-darkborder pb-4 flex items-center justify-between gap-4">
            <div>
                <h1 class="text-2xl font-bold text-white tracking-tight" th:text="#{${tieuDeTrangKey}}">Cẩm nang</h1>
                <p class="text-sm text-slate-400 mt-1">Hướng dẫn sinh hoạt, nội quy chung cư và cẩm nang khẩn cấp cho cư dân</p>
            </div>
        </div>

        <!-- Handbook list grid -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 max-w-6xl" th:if="${not #lists.isEmpty(danhSach)}">
            <div th:each="tb : ${danhSach}">
                <a th:href="@{/cudan/thong-bao/chi-tiet/{id}(id=${tb.id})}"
                   class="bg-darkcard border border-darkborder hover:border-brand-500/30 rounded-2xl p-6 shadow-sm hover:shadow-xl hover:-translate-y-1 transition duration-200 flex flex-col justify-between text-center h-full group cursor-pointer">
                    <div>
                        <!-- Icon -->
                        <div class="w-14 h-14 bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 rounded-full flex items-center justify-center mx-auto mb-4 group-hover:scale-110 transition duration-200 shadow-md">
                            <i data-lucide="book-open" class="w-6 h-6"></i>
                        </div>
                        
                        <!-- Title -->
                        <h3 class="text-base font-bold text-white group-hover:text-brand-400 transition line-clamp-2 mb-2 leading-snug" th:text="${tb.tieuDe}"></h3>
                        
                        <!-- Date -->
                        <div class="text-[11px] text-slate-500 mb-4 flex items-center justify-center gap-1.5">
                            <i data-lucide="calendar" class="w-3.5 h-3.5"></i>
                            <span th:text="${#temporals.format(tb.ngayDang, 'dd/MM/yyyy')}"></span>
                        </div>

                        <!-- Excerpt -->
                        <p class="text-xs text-slate-400 line-clamp-3 leading-relaxed" 
                           th:text="${tb.noiDung.replaceAll('<[^>]*>', '')}"></p>
                    </div>

                    <!-- Details Link -->
                    <div class="mt-6 pt-4 border-t border-darkborder/50 flex items-center justify-center text-xs text-brand-500 font-semibold group-hover:text-brand-400 gap-1.5">
                        <span>Đọc cẩm nang</span>
                        <i data-lucide="arrow-right" class="w-4 h-4 transform group-hover:translate-x-1 transition"></i>
                    </div>
                </a>
            </div>
        </div>

        <!-- Empty Placeholder -->
        <div th:if="${#lists.isEmpty(danhSach)}" class="text-center py-16 bg-darkcard border border-darkborder border-dashed rounded-2xl max-w-6xl">
            <div class="w-16 h-16 bg-slate-800/50 rounded-full flex items-center justify-center mx-auto mb-4 border border-darkborder">
                <i data-lucide="book-open" class="w-6 h-6 text-slate-500"></i>
            </div>
            <p class="text-slate-400 text-sm font-medium" th:text="#{user.bt.trong}">Hiện chưa có bài viết nào trong chuyên mục này.</p>
        </div>

        <!-- Pagination fragment invocation -->
        <div th:replace="~{fragments/pagination :: paging('/cudan/thong-bao/cam-nang', '')}" class="max-w-6xl mt-8"></div>
    </main>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();
    </script>
</body>

</html>
