<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${tieuDeTrang}"></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .news-card {
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        .news-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1) !important;
            color: inherit;
        }
        .news-date {
            font-size: 0.85rem;
            color: #6c757d;
        }
        .news-excerpt {
            color: #495057;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>
<body class="d-flex bg-light">

<div th:replace="~{fragments/sidebar_cudan :: menu-cudan}"></div>

<div class="container p-5">
    <div class="d-flex align-items-center mb-4 pb-2 border-bottom border-primary border-3">
        <h2 class="text-primary fw-bold m-0" th:text="${tieuDeTrang}"></h2>
    </div>

    <div class="row row-cols-1 row-cols-md-2 g-4" th:if="${not #lists.isEmpty(danhSach)}">
        <div class="col" th:each="tb : ${danhSach}">
            <a th:href="@{/cudan/thong-bao/chi-tiet/{id}(id=${tb.id})}" class="card h-100 shadow-sm border-0 news-card rounded-4">
                <div class="card-body p-4">
                    <span class="badge bg-info text-dark mb-2 rounded-pill px-3" th:text="${tb.loai}"></span>
                    <h5 class="card-title fw-bold text-dark mb-2" th:text="${tb.tieuDe}"></h5>
                    <div class="news-date mb-3">
                        <i class="bi bi-calendar-event me-1"></i>
                        <span th:text="${#temporals.format(tb.ngayDang, 'dd/MM/yyyy HH:mm')}"></span>
                    </div>
                    <div class="card-text news-excerpt" th:text="${tb.noiDung}"></div>
                </div>
            </a>
        </div>
    </div>
    
    <div th:if="${#lists.isEmpty(danhSach)}" class="text-center py-5">
        <div class="text-muted fs-5">Hiện chưa có bài viết nào trong chuyên mục này.</div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
