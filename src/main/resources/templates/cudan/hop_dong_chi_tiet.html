<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{hd.chitiet.chi_tiet_hop_dong_cu}">Chi tiết hợp đồng của tôi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex">
<div th:replace="~{fragments/sidebar_cudan :: menu-cudan}"></div>

<div class="container p-5">
    <h2 class="mb-4" th:text="#{hd.chitiet.chi_tiet_hop_dong_cu}">Chi tiết Hợp đồng của tôi</h2>

    <div class="card shadow-sm" th:if="${hopDong != null}">
        <div class="card-header bg-primary text-white">
            <h5 class="mb-0"><span th:text="#{hd.chitiet.hop_dong}" th:remove="tag">Hợp đồng #</span><span th:text="${hopDong.id}"></span></h5>
        </div>
        <div class="card-body">
            <p><strong th:text="#{hd.detail.loai}">Loại hợp đồng:</strong> <span th:text="${hopDong.loaiHopDong}"></span></p>
            <p><strong th:text="#{hd.detail.can_ho}">Căn hộ:</strong> <span th:text="${hopDong.canHo != null ? hopDong.canHo.maCanHo : ''}"></span></p>
            <p><strong th:text="#{hd.detail.ben_cho_thue}">Bên cho thuê:</strong> <span th:text="${hopDong.benChoThue != null ? hopDong.benChoThue : ''}"></span></p>
            <p><strong th:text="#{hd.detail.ben_thue}">Bên thuê:</strong> <span th:text="${hopDong.benThue != null ? hopDong.benThue : ''}"></span></p>
            <p><strong th:text="#{hd.detail.ngay_bat_dau}">Ngày bắt đầu:</strong>
                <span th:text="${hopDong.ngayBatDau != null ? #temporals.format(hopDong.ngayBatDau, 'dd/MM/yyyy') : ''}"></span>
            </p>
            <p><strong th:text="#{hd.detail.ngay_ket_thuc}">Ngày kết thúc:</strong>
                <span th:if="${hopDong.ngayKetThuc != null}" th:text="${#temporals.format(hopDong.ngayKetThuc, 'dd/MM/yyyy')}"></span>
                <span th:unless="${hopDong.ngayKetThuc != null}" th:text="#{chung.khong_thoi_han}"></span>
            </p>
            <p><strong th:text="#{hd.detail.tien_thue}">Tiền thuê:</strong>
                <span th:text="${hopDong.tienThue != null} ? |${#numbers.formatDecimal(hopDong.tienThue, 0, 'COMMA', 0, 'POINT')} #{chung.don_vi_vnd}| : |0 #{chung.don_vi_vnd}|"></span>
            </p>
            <p><strong th:text="#{hd.detail.tien_coc}">Tiền cọc:</strong>
                <span th:text="${hopDong.tienCoc != null} ? |${#numbers.formatDecimal(hopDong.tienCoc, 0, 'COMMA', 0, 'POINT')} #{chung.don_vi_vnd}| : |0 #{chung.don_vi_vnd}|"></span>
            </p>
            <p><strong th:text="#{hd.detail.trang_thai}">Trạng thái:</strong> 
                <span th:if="${hopDong.trangThai == 'ACTIVE'}" class="badge bg-success" th:text="#{hd.trang_thai.active}">Còn hạn</span>
                <span th:if="${hopDong.trangThai == 'EXPIRED'}" class="badge bg-danger" th:text="#{hd.trang_thai.expired}">Hết hạn</span>
                <span th:if="${hopDong.trangThai == 'TERMINATED'}" class="badge bg-secondary" th:text="#{hd.trang_thai.terminated}">Thanh lý</span>
                <span th:if="${hopDong.trangThai == 'DRAFT'}" class="badge bg-warning" th:text="#{hd.trang_thai.draft}">Nháp</span>
                <span th:if="${hopDong.trangThai != 'ACTIVE' and hopDong.trangThai != 'EXPIRED' and hopDong.trangThai != 'TERMINATED' and hopDong.trangThai != 'DRAFT'}" th:text="${hopDong.trangThai}"></span>
            </p>
        </div>
    </div>

    <div class="alert alert-warning" th:if="${hopDong == null}" th:text="#{hd.chitiet.khong_tim_thay_hop_d}">
        Không tìm thấy hợp đồng phù hợp.
    </div>
</div>
</body>
</html>
