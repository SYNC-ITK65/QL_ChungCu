<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chi tiết hợp đồng của tôi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex">
<div th:replace="~{fragments/sidebar_cudan :: menu-cudan}"></div>

<div class="container p-5">
    <h2 class="mb-4">Chi tiết Hợp đồng của tôi</h2>

    <div class="card shadow-sm" th:if="${hopDong != null}">
        <div class="card-header bg-primary text-white">
            <h5 class="mb-0">Hợp đồng #<span th:text="${hopDong.id}"></span></h5>
        </div>
        <div class="card-body">
            <p><strong>Loại hợp đồng:</strong> <span th:text="${hopDong.loaiHopDong}"></span></p>
            <p><strong>Căn hộ:</strong> <span th:text="${hopDong.canHo != null ? hopDong.canHo.maCanHo : ''}"></span></p>
            <p><strong>Bên cho thuê:</strong> <span th:text="${hopDong.benChoThue != null ? hopDong.benChoThue : ''}"></span></p>
            <p><strong>Bên thuê:</strong> <span th:text="${hopDong.benThue != null ? hopDong.benThue : ''}"></span></p>
            <p><strong>Ngày bắt đầu:</strong>
                <span th:text="${hopDong.ngayBatDau != null ? #temporals.format(hopDong.ngayBatDau, 'dd/MM/yyyy') : ''}"></span>
            </p>
            <p><strong>Ngày kết thúc:</strong>
                <span th:text="${hopDong.ngayKetThuc != null ? #temporals.format(hopDong.ngayKetThuc, 'dd/MM/yyyy') : 'Không thời hạn'}"></span>
            </p>
            <p><strong>Tiền thuê:</strong>
                <span th:text="${hopDong.tienThue != null ? #numbers.formatDecimal(hopDong.tienThue, 0, 'COMMA', 0, 'POINT') + ' VNĐ' : '0 VNĐ'}"></span>
            </p>
            <p><strong>Tiền cọc:</strong>
                <span th:text="${hopDong.tienCoc != null ? #numbers.formatDecimal(hopDong.tienCoc, 0, 'COMMA', 0, 'POINT') + ' VNĐ' : '0 VNĐ'}"></span>
            </p>
            <p><strong>Trạng thái:</strong> <span th:text="${hopDong.trangThai}"></span></p>
        </div>
    </div>

    <div class="alert alert-warning" th:if="${hopDong == null}">
        Không tìm thấy hợp đồng phù hợp.
    </div>
</div>
</body>
</html>
