?<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{pa.form.gui_phan_anh_moi}">Gửi phản ánh mới</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts - Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            700: '#0369a1',
                            900: '#0c4a6e',
                        },
                        darkbg: '#0B0F17',
                        darkcard: '#161B26',
                        darkborder: '#242B3D'
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0B0F17;
            color: #E2E8F0;
            font-family: 'Inter', sans-serif;
        }
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #111827;
        }
        ::-webkit-scrollbar-thumb {
            background: #374151;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #4B5563;
        }
        /* Custom file input styling */
        input[type="file"]::file-selector-button {
            background-color: #1f2937;
            color: #e5e7eb;
            border: 1px solid #374151;
            border-radius: 0.5rem;
            padding: 0.375rem 0.75rem;
            margin-right: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.75rem;
            font-weight: 600;
        }
        input[type="file"]::file-selector-button:hover {
            background-color: #374151;
        }
    </style>
</head>
<body class="min-h-screen flex bg-darkbg text-slate-200 antialiased font-sans">

    <!-- Global Sidebar -->
    <div th:replace="~{fragments/sidebar_cudan :: menu-cudan}"></div>

    <!-- Main Content -->
    <main class="flex-grow min-w-0 p-6 md:p-8 overflow-y-auto max-w-7xl mx-auto w-full">
            
            <!-- Page Header -->
            <div class="flex flex-col md:flex-row md:items-center justify-between mb-6 gap-4">
                <div>
                    <h2 class="text-xl md:text-2xl font-bold text-white flex items-center gap-2">
                        <i data-lucide="send" class="w-6 h-6 text-brand-500"></i>
                        <span th:text="#{pa.form.gui_phan_anh_yeu_cau}">Gửi phản ánh / Yêu cầu mới</span>
                    </h2>
                    <p class="text-xs text-slate-400 mt-1" th:text="#{pa.form.gui_phan_anh_den_ban}">Gửi phản ánh đến Ban Quản Lý (Vd: hư hỏng điện nước, vệ sinh, v.v.)</p>
                </div>
                <div class="flex gap-2">
                    <a th:href="@{/cudan/phan-anh}" class="px-4 py-2 bg-transparent hover:bg-slate-800 text-slate-300 border border-slate-700 rounded-xl text-xs font-medium transition flex items-center gap-2">
                        <i data-lucide="corner-up-left" class="w-4 h-4"></i> <span th:text="#{dv.form.huy_bo}">Hủy bỏ</span>
                    </a>
                </div>
            </div>

            <!-- Error Notification -->
            <div th:if="${error}" class="mb-6 flex items-center justify-between p-4 bg-red-500/10 border border-red-500/20 text-red-400 rounded-xl text-sm font-medium shadow-lg shadow-black/20">
                <div class="flex items-center gap-2">
                    <i data-lucide="alert-circle" class="w-5 h-5"></i>
                    <strong th:text="${error}"></strong>
                </div>
                <button onclick="this.parentElement.remove()" class="text-red-400 hover:text-red-300"><i data-lucide="x" class="w-4 h-4"></i></button>
            </div>

            <!-- Form Card -->
            <div class="bg-darkcard rounded-3xl border border-darkborder overflow-hidden shadow-lg shadow-black/20">
                <div class="p-6 md:p-8">
                    <form th:action="@{/cudan/phan-anh/luu}" th:object="${phanAnh}" method="post" enctype="multipart/form-data" class="space-y-6" onsubmit="this.querySelector('button[type=submit]').disabled = true;">
                        
                        <div class="space-y-2">
                            <label for="tieuDe" class="text-sm font-semibold text-slate-300 flex items-center gap-1.5">
                                <i data-lucide="type" class="w-4 h-4 text-brand-400"></i> <span th:text="#{tb.form.tieude}">Tiêu đề</span>
                            </label>
                            <input type="text" id="tieuDe" th:field="*{tieuDe}" th:placeholder="#{pa.form.vd_sua_chua_voi_nuoc}" placeholder="VD: Sửa chữa vòi nước..." 
                                   class="w-full bg-darkbg border rounded-xl py-3 px-4 text-sm text-white placeholder-slate-600 focus:outline-none transition"
                                   th:classappend="${#fields.hasErrors('tieuDe')} ? 'border-red-500 focus:border-red-500 shadow-[0_0_0_1px_rgba(239,68,68,0.2)]' : 'border-darkborder focus:border-brand-500 focus:shadow-[0_0_0_1px_rgba(14,165,233,0.2)]'">
                            <div class="text-xs text-red-400 font-medium flex items-center gap-1 mt-1" th:if="${#fields.hasErrors('tieuDe')}">
                                <i data-lucide="alert-triangle" class="w-3.5 h-3.5"></i> <span th:errors="*{tieuDe}"></span>
                            </div>
                        </div>

                        <div class="space-y-2">
                            <label for="noiDung" class="text-sm font-semibold text-slate-300 flex items-center gap-1.5">
                                <i data-lucide="align-left" class="w-4 h-4 text-brand-400"></i> <span th:text="#{pa.form.noi_dung_chi_tiet}">Nội dung chi tiết</span>
                            </label>
                            <textarea id="noiDung" th:field="*{noiDung}" rows="6" th:placeholder="#{pa.form.mo_ta_cu_the_van_de}" placeholder="Mô tả cụ thể vấn đề bạn đang gặp phải..." 
                                      class="w-full bg-darkbg border rounded-xl py-3 px-4 text-sm text-white placeholder-slate-600 focus:outline-none transition resize-none"
                                      th:classappend="${#fields.hasErrors('noiDung')} ? 'border-red-500 focus:border-red-500 shadow-[0_0_0_1px_rgba(239,68,68,0.2)]' : 'border-darkborder focus:border-brand-500 focus:shadow-[0_0_0_1px_rgba(14,165,233,0.2)]'"></textarea>
                            <div class="text-xs text-red-400 font-medium flex items-center gap-1 mt-1" th:if="${#fields.hasErrors('noiDung')}">
                                <i data-lucide="alert-triangle" class="w-3.5 h-3.5"></i> <span th:errors="*{noiDung}"></span>
                            </div>
                        </div>

                        <div class="space-y-2">
                            <label for="fileImage" class="text-sm font-semibold text-slate-300 flex items-center gap-1.5">
                                <i data-lucide="image" class="w-4 h-4 text-brand-400"></i> <span th:text="#{pa.form.hinh_anh_dinh_kem}">Hình ảnh đính kèm (nếu có)</span>
                            </label>
                            <div class="relative bg-darkbg border border-dashed rounded-xl p-4 transition group hover:bg-slate-800/30" th:classappend="${#fields.hasErrors('hinhAnh')} ? 'border-red-500' : 'border-slate-700 hover:border-brand-500'">
                                <input type="file" id="fileImage" name="fileImage" accept="image/*" 
                                       class="w-full text-sm text-slate-400 focus:outline-none file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-brand-500/10 file:text-brand-400 hover:file:bg-brand-500/20 file:transition file:cursor-pointer cursor-pointer">
                            </div>
                            <div class="text-xs text-red-400 font-medium flex items-center gap-1 mt-1" th:if="${#fields.hasErrors('hinhAnh')}">
                                <i data-lucide="alert-triangle" class="w-3.5 h-3.5"></i> <span th:errors="*{hinhAnh}"></span>
                            </div>
                            <p class="text-xs text-slate-500 mt-1.5 flex items-center gap-1">
                                <i data-lucide="info" class="w-3.5 h-3.5"></i> <span th:text="#{pa.form.hinh_anh_dinh_kem_help}">Chọn ảnh mô tả chi tiết vấn đề phản ánh (giới hạn 2MB).</span>
                            </p>
                        </div>

                        <div class="pt-6 border-t border-darkborder flex flex-col sm:flex-row gap-3">
                            <button type="submit" class="flex-1 py-3 px-4 bg-brand-500 hover:bg-brand-600 text-white rounded-xl text-sm font-bold transition shadow-lg shadow-brand-500/25 flex items-center justify-center gap-2 group">
                                <i data-lucide="rocket" class="w-5 h-5 group-hover:-translate-y-0.5 group-hover:translate-x-0.5 transition-transform"></i>
                                <span th:text="#{pa.form.gui_phan_anh}">Gửi phản ánh</span>
                            </button>
                            <a th:href="@{/cudan/phan-anh}" class="py-3 px-6 bg-transparent hover:bg-slate-800 text-slate-300 border border-slate-700 rounded-xl text-sm font-bold transition text-center flex items-center justify-center">
                                <span th:text="#{dv.form.huy_bo}">Hủy bỏ</span>
                            </a>
                        </div>
                    </form>
                </div>
            </div>
            
        </main>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            if (typeof lucide !== 'undefined') {
                lucide.createIcons();
            }
        });
    </script>
</body>
</html>
