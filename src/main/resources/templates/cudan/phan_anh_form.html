<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Gửi phản ánh mới</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="d-flex">
        <div th:replace="~{fragments/sidebar_cudan :: menu-cudan}"></div>

        <div class="container-fluid p-4">
            <div class="mb-4">
                <h2>Gửi phản ánh / Yêu cầu mới</h2>
                <p class="text-muted">Gửi phản ánh đến Ban Quản Lý (Vd: hư hỏng điện nước, vệ sinh, v.v.)</p>
            </div>

            <div class="card shadow-sm" style="max-width: 700px;">
                <div class="card-body">
                    <form th:action="@{/cudan/phan-anh/luu}" th:object="${phanAnh}" method="post">
                        <div class="mb-3">
                            <label for="tieuDe" class="form-label fw-bold">Tiêu đề</label>
                            <input type="text" class="form-control" id="tieuDe" th:field="*{tieuDe}" required
                                placeholder="Vd: Sửa chữa vòi nước phòng tắm">
                        </div>

                        <div class="mb-4">
                            <label for="noiDung" class="form-label fw-bold">Nội dung chi tiết</label>
                            <textarea class="form-control" id="noiDung" th:field="*{noiDung}" rows="6" required
                                placeholder="Mô tả cụ thể vấn đề bạn gặp phải..."></textarea>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary px-4">🚀 Gửi phản ánh</button>
                            <a th:href="@{/cudan/phan-anh}" class="btn btn-outline-secondary">Hủy bỏ</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
