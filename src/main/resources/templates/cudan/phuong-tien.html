<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Phương Tiện Của Tôi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="d-flex">

    <div th:replace="~{fragments/sidebar_cudan :: menu-cudan}"></div>

    <div class="container-fluid p-4">
        <div class="bg-white p-4 shadow rounded">
            <h2 class="text-success border-bottom pb-3 mb-4">🛵 Quản Lý Xe Của Căn Hộ</h2>

            <div th:if="${thongBaoThanhCong}" class="alert alert-success alert-dismissible fade show" role="alert">
                <strong th:text="${thongBaoThanhCong}"></strong>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${thongBaoLoi}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <strong th:text="${thongBaoLoi}"></strong>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="row">
                <div class="col-md-4 border-end">
                    <h4>Gửi yêu cầu đăng ký xe</h4>
                    <form th:action="@{/cudan/phuong-tien/luu}" th:object="${xeMoi}" method="post">

                        <div class="mb-3">
                            <label class="form-label">Biển số xe:</label>
                            <input type="text" th:field="*{bienSoXe}" class="form-control" required placeholder="VD: 59A-123.45">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Loại xe:</label>
                            <select th:field="*{loaiXe}" class="form-select">
                                <option value="Xe máy">Xe máy</option>
                                <option value="Ô tô">Ô tô</option>
                                <option value="Xe đạp">Xe đạp</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Màu sắc:</label>
                            <input type="text" th:field="*{mauXe}" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-success w-100">Gửi yêu cầu đăng ký</button>
                        <small class="text-muted mt-2 d-block">* Xe sau khi đăng ký cần chờ BQL duyệt mới được tính hợp lệ.</small>
                    </form>
                </div>

                <div class="col-md-8">
                    <h4>Xe của căn hộ bạn</h4>
                    <table class="table table-hover mt-3 no-paging">
                        <thead class="table-success">
                        <tr>
                            <th>Biển Số</th>
                            <th>Loại Xe</th>
                            <th>Màu Xe</th>
                            <th>Trạng Thái</th>
                            <th>Thao tác</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="xe : ${danhSachXe}">
                            <td class="fw-bold" th:text="${xe.bienSoXe}"></td>
                            <td th:text="${xe.loaiXe}"></td>
                            <td th:text="${xe.mauXe}"></td>
                            <td>
                                <span th:if="${xe.trangThai == null || #strings.isEmpty(xe.trangThai) || xe.trangThai == 'Chờ duyệt' || xe.trangThai == 'Đăng ký mới'}" class="badge bg-warning text-dark">⏳ Đang chờ BQL duyệt</span>
                                <span th:if="${xe.trangThai == 'Đã duyệt'}" class="badge bg-success">✅ Đã duyệt</span>
                                <span th:if="${xe.trangThai == 'Từ chối'}" class="badge bg-danger">❌ Từ chối</span>
                                <span th:if="${xe.trangThai == 'Hủy duyệt'}" class="badge bg-secondary">🚫 Hủy duyệt</span>
                                <span th:if="${xe.trangThai != null && xe.trangThai != 'Chờ duyệt' && xe.trangThai != 'Đăng ký mới' && xe.trangThai != 'Đã duyệt' && xe.trangThai != 'Từ chối' && xe.trangThai != 'Hủy duyệt'}"
                                      class="badge bg-dark"
                                      th:text="${xe.trangThai}">Trạng thái khác</span>
                            </td>
                            <td>
                                <a th:href="@{/cudan/phuong-tien/xoa/{id}(id=${xe.id})}"
                                   class="btn btn-sm btn-outline-danger"
                                   onclick="return confirm('Bạn có chắc muốn hủy đăng ký xe này?');">Hủy/Xóa</a>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>


    <!-- Dùng fragment Datatable chung -->
    <div th:replace="~{fragments/datatable :: scripts}"></div>
</body>
</html>
