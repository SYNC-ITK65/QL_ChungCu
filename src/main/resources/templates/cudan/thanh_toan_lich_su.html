<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{tt.ui.lich_su_thanh_toan_c}">Lịch sử thanh toán của tôi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: { 500: '#0ea5e9', 400: '#38bdf8', 600: '#0284c7' },
                        darkbg: '#0B0F17', darkcard: '#161B26', darkborder: '#242B3D'
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0B0F17; color: #E2E8F0; font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: #111827; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; }
    </style>
</head>
<body class="min-h-screen flex bg-darkbg text-slate-200 antialiased font-sans">
    <div th:replace="fragments/sidebar_cudan :: menu-cudan"></div>

    <main class="flex-grow p-6 md:p-8 overflow-y-auto w-full">
        <!-- Header -->
        <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-8">
            <div>
                <h1 class="text-2xl font-bold text-white tracking-tight" th:text="#{tt.ui.lich_su_thanh_toan_c}">Lịch Sử Thanh Toán</h1>
                <p class="text-sm text-slate-400 mt-1">Các giao dịch thanh toán hóa đơn của bạn</p>
            </div>
            <a th:href="@{/cudan/hoa-don}"
               class="px-4 py-2 bg-slate-800 hover:bg-slate-700 border border-darkborder text-slate-300 text-xs font-semibold rounded-xl transition flex items-center gap-1.5">
                <i data-lucide="wallet" class="w-4 h-4 text-brand-400"></i>
                <span>Hóa đơn của tôi</span>
            </a>
        </div>

        <!-- Table -->
        <div class="bg-darkcard border border-darkborder rounded-2xl overflow-hidden shadow-sm">
            <div class="overflow-x-auto">
                <table class="w-full border-collapse text-left text-xs text-slate-300 no-paging">
                    <thead>
                        <tr class="bg-darkbg/50 border-b border-darkborder">
                            <th class="p-4 font-bold text-slate-400 uppercase tracking-wider" th:text="#{tt.ui.ma_giao_dich}">Mã GD</th>
                            <th class="p-4 font-bold text-slate-400 uppercase tracking-wider" th:text="#{hdon.ui.ma_hoa_don}">Mã HĐ</th>
                            <th class="p-4 font-bold text-slate-400 uppercase tracking-wider" th:text="#{tt.form.ngay_thanh_toan}">Ngày Thanh Toán</th>
                            <th class="p-4 font-bold text-slate-400 uppercase tracking-wider" th:text="#{tt.ds.so_tien}">Số Tiền</th>
                            <th class="p-4 font-bold text-slate-400 uppercase tracking-wider" th:text="#{tt.ds.phuong_thuc}">Phương Thức</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-darkborder">
                        <tr th:each="tt : ${danhSachThanhToan}" class="hover:bg-slate-800/20 transition">
                            <td class="p-4 font-semibold text-white" th:text="${tt.id}">1</td>
                            <td class="p-4 font-semibold text-brand-400"
                                th:text="|#{hdon.ds.ma_hd}-${tt.hoaDon != null ? tt.hoaDon.id : ''}|">HD-1</td>
                            <td class="p-4"
                                th:text="${tt.ngayThanhToan != null ? #temporals.format(tt.ngayThanhToan, 'dd/MM/yyyy') : ''}">13/04/2026</td>
                            <td class="p-4 font-bold text-emerald-400"
                                th:text="${tt.soTien != null} ? |${#numbers.formatDecimal(tt.soTien, 0, 'COMMA', 0, 'POINT')} #{chung.don_vi_vnd}| : |0 #{chung.don_vi_vnd}|">1,000,000 VNĐ</td>
                            <td class="p-4">
                                <span class="px-2 py-0.5 rounded text-xs font-semibold bg-sky-500/10 text-sky-400 border border-sky-500/20"
                                      th:text="${tt.phuongThuc != null ? tt.phuongThuc : ''}">Chuyển khoản</span>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(danhSachThanhToan)}">
                            <td colspan="5" class="p-12 text-center">
                                <div class="flex flex-col items-center gap-3 text-slate-500">
                                    <i data-lucide="inbox" class="w-10 h-10"></i>
                                    <p class="font-semibold" th:text="#{tt.ui.ban_chua_co_giao_dic}">Bạn chưa có giao dịch thanh toán nào.</p>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <div th:replace="~{fragments/datatable :: scripts}"></div>
    <script>
        document.addEventListener('DOMContentLoaded', function () { lucide.createIcons(); });
    </script>
</body>
</html>
