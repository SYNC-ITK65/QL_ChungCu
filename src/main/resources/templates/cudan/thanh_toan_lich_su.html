<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lịch sử thanh toán của tôi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex">
<div th:replace="~{fragments/sidebar_cudan :: menu-cudan}"></div>

<div class="container p-4">
    <h2 class="mb-4">Lịch sử thanh toán của tôi</h2>

    <div class="card shadow-sm">
        <div class="card-body">
            <table class="table table-striped table-hover border">
                <thead class="table-dark">
                <tr>
                    <th>Mã giao dịch</th>
                    <th>Mã hóa đơn</th>
                    <th>Ngày thanh toán</th>
                    <th>Số tiền</th>
                    <th>Phương thức</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="tt : ${danhSachThanhToan}">
                    <td th:text="${tt.id}">1</td>
                    <td th:text="'HD-' + ${tt.hoaDon != null ? tt.hoaDon.id : ''}">HD-1</td>
                    <td th:text="${tt.ngayThanhToan != null ? #temporals.format(tt.ngayThanhToan, 'dd/MM/yyyy') : ''}">13/04/2026</td>
                    <td class="text-success fw-bold"
                        th:text="${tt.soTien != null ? #numbers.formatDecimal(tt.soTien, 0, 'COMMA', 0, 'POINT') + ' VNĐ' : '0 VNĐ'}">
                        1,000,000 VNĐ
                    </td>
                    <td>
                        <span class="badge bg-info text-dark" th:text="${tt.phuongThuc != null ? tt.phuongThuc : ''}">Chuyển khoản</span>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(danhSachThanhToan)}">
                    <td colspan="5" class="text-center text-muted">Bạn chưa có giao dịch thanh toán nào.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
