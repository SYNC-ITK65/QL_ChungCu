<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{hdon.ds.hoa_don_cua_toi}">Hóa Đơn Của Tôi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = { darkMode:'class', theme:{ extend:{ fontFamily:{sans:['Inter','sans-serif']}, colors:{brand:{500:'#0ea5e9',400:'#38bdf8',600:'#0284c7'},darkbg:'#0B0F17',darkcard:'#161B26',darkborder:'#242B3D'} } } }
    </script>
    <style>body{background-color:#0B0F17;color:#E2E8F0;font-family:'Inter',sans-serif;} ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#111827}::-webkit-scrollbar-thumb{background:#374151;border-radius:3px}</style>
</head>
<body class="min-h-screen flex bg-darkbg text-slate-200 antialiased font-sans">
    <div th:replace="fragments/sidebar_cudan :: menu-cudan"></div>

    <main class="flex-grow p-6 md:p-8 overflow-y-auto w-full max-w-7xl mx-auto">
        <!-- Header -->
        <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-8 max-w-7xl mx-auto">
            <div>
                <h1 class="text-2xl font-bold text-white tracking-tight" th:text="#{hdon.ds.hoa_don_cua_toi1}">Hóa Đơn Của Tôi</h1>
                <p class="text-sm text-slate-400 mt-1">
                    <span th:text="#{hd.detail.can_ho}">Căn hộ:</span>
                    <span class="font-semibold text-brand-400" th:text="${cuDan.canHo.maCanHo}">P.3508</span>
                </p>
            </div>
        </div>

        <!-- Thẻ thống kê -->
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-8 max-w-7xl mx-auto">
            <div class="bg-darkcard border border-rose-500/20 rounded-2xl p-5 shadow-sm">
                <p class="text-xs font-semibold text-rose-400 uppercase tracking-wider mb-2" th:text="#{hdon.chitiet.chua_thanh_toan}">Chưa Thanh Toán</p>
                <p class="text-3xl font-extrabold text-rose-400" th:text="${soHoaDonChuaDong}">0</p>
            </div>
            <div class="bg-darkcard border border-amber-500/20 rounded-2xl p-5 shadow-sm">
                <p class="text-xs font-semibold text-amber-400 uppercase tracking-wider mb-2" th:text="#{hdon.ds.tong_tien_con_no}">Tổng Tiền Còn Nợ</p>
                <p class="text-xl font-extrabold text-amber-400"
                   th:text="|${#numbers.formatDecimal(tongTienNo, 0, 'COMMA', 0, 'POINT')} #{chung.don_vi_vnd_symbol}|">0 ₫</p>
            </div>
            <div class="bg-darkcard border border-emerald-500/20 rounded-2xl p-5 shadow-sm">
                <p class="text-xs font-semibold text-emerald-400 uppercase tracking-wider mb-2" th:text="#{hdon.chitiet.da_thanh_toan}">Đã Thanh Toán</p>
                <p class="text-3xl font-extrabold text-emerald-400" th:text="${soHoaDonDaDong}">0</p>
            </div>
        </div>

        <!-- Bộ lọc tab -->
        <div class="flex items-center gap-1.5 mb-6 max-w-7xl mx-auto">
            <a href="/cudan/hoa-don"
               th:classappend="${trangThaiFilter == null or trangThaiFilter == ''} ? 'bg-brand-500/10 text-brand-400 border-brand-500/20 font-bold' : 'bg-darkcard text-slate-400 border-darkborder hover:text-slate-200 hover:bg-slate-800/40'"
               class="px-4 py-2 border rounded-xl text-xs transition"
               th:text="#{hdon.ds.tat_ca}">Tất cả</a>
            <a href="/cudan/hoa-don/loc?trangThai=chua-dong"
               th:classappend="${trangThaiFilter == 'chua-dong'} ? 'bg-rose-500/10 text-rose-400 border-rose-500/20 font-bold' : 'bg-darkcard text-slate-400 border-darkborder hover:text-slate-200 hover:bg-slate-800/40'"
               class="px-4 py-2 border rounded-xl text-xs transition"
               th:text="#{hdon.ds.trang_thai_chua_dong}">Chưa đóng</a>
            <a href="/cudan/hoa-don/loc?trangThai=da-dong"
               th:classappend="${trangThaiFilter == 'da-dong'} ? 'bg-emerald-500/10 text-emerald-400 border-emerald-500/20 font-bold' : 'bg-darkcard text-slate-400 border-darkborder hover:text-slate-200 hover:bg-slate-800/40'"
               class="px-4 py-2 border rounded-xl text-xs transition"
               th:text="#{hdon.ds.trang_thai_da_dong}">Đã đóng</a>
        </div>

        <!-- Table -->
        <div class="bg-darkcard border border-darkborder rounded-2xl overflow-hidden shadow-sm max-w-7xl mx-auto">
            <!-- Có dữ liệu -->
            <div th:if="${danhSachHoaDon.size() > 0}">
                <div class="overflow-x-auto">
                    <table class="w-full border-collapse text-left text-xs text-slate-300 no-paging">
                        <thead>
                            <tr class="bg-darkbg/50 border-b border-darkborder">
                                <th class="p-4 font-bold text-slate-400 uppercase tracking-wider" th:text="#{hdon.ds.ma_hd}">Mã HĐ</th>
                                <th class="p-4 font-bold text-slate-400 uppercase tracking-wider" th:text="#{hdon.form.ngay_phat_hanh}">Ngày Phát Hành</th>
                                <th class="p-4 font-bold text-slate-400 uppercase tracking-wider" th:text="#{hdon.ds.han_dong}">Hạn Đóng</th>
                                <th class="p-4 font-bold text-slate-400 uppercase tracking-wider" th:text="#{tt.ds.so_tien}">Số Tiền</th>
                                <th class="p-4 font-bold text-slate-400 uppercase tracking-wider" th:text="#{hdon.ds.bang_trang_thai}">Trạng Thái</th>
                                <th class="p-4 font-bold text-slate-400 uppercase tracking-wider text-right"></th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-darkborder">
                            <tr th:each="hd : ${danhSachHoaDon}" class="hover:bg-slate-800/20 transition">
                                <td class="p-4 font-bold text-brand-400">
                                    #<span th:text="#{hdon.ds.ma_hd}"></span>-<span th:text="${hd.id}"></span>
                                </td>
                                <td class="p-4" th:text="${#temporals.format(hd.ngayPhatHanh, 'dd/MM/yyyy')}"></td>
                                <td class="p-4" th:text="${#temporals.format(hd.ngayDenHan, 'dd/MM/yyyy')}"></td>
                                <td class="p-4 font-semibold text-white"
                                    th:text="|${#numbers.formatDecimal(hd.tongTien, 0, 'COMMA', 0, 'POINT')} #{chung.don_vi_vnd_symbol}|"></td>
                                <td class="p-4">
                                    <span th:if="${hd.trangThaiThanhToan == 'Chưa đóng'}"
                                          class="px-2 py-0.5 rounded text-xs font-semibold bg-amber-500/10 text-amber-400 border border-amber-500/20"
                                          th:text="#{hdon.chitiet.chua_dong}">⏳ Chưa đóng</span>
                                    <span th:if="${hd.trangThaiThanhToan == 'Đã đóng'}"
                                          class="px-2 py-0.5 rounded text-xs font-semibold bg-emerald-500/10 text-emerald-400 border border-emerald-500/20"
                                          th:text="#{hdon.chitiet.da_dong}">✓ Đã đóng</span>
                                    <span th:if="${hd.trangThaiThanhToan == 'Chờ duyệt'}"
                                          class="px-2 py-0.5 rounded text-xs font-semibold bg-sky-500/10 text-sky-400 border border-sky-500/20"
                                          th:text="#{pt.ui.cho_duyet}">⏳ Chờ duyệt</span>
                                </td>
                                <td class="p-4 text-right">
                                    <a th:href="'/cudan/hoa-don/chi-tiet/' + ${hd.id}"
                                       class="px-2.5 py-1 bg-brand-500/10 hover:bg-brand-500/20 text-brand-400 border border-brand-500/20 text-[11px] font-semibold rounded-lg transition"
                                       th:text="#{hdon.ds.nut_xem}">Xem</a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Không có dữ liệu -->
            <div th:if="${danhSachHoaDon.size() == 0}" class="p-12 text-center">
                <div class="flex flex-col items-center gap-3 text-slate-500">
                    <i data-lucide="inbox" class="w-12 h-12"></i>
                    <p class="font-semibold text-sm" th:text="#{hdon.ds.khong_co_hoa_don_nao}">Không có hóa đơn nào</p>
                    <p class="text-xs" th:text="#{hdon.ds.hien_tai_chua_co_hoa}">Hiện tại chưa có hóa đơn trong danh mục này.</p>
                </div>
            </div>
        </div>

        <!-- Phân trang -->
        <div class="mt-3 max-w-7xl mx-auto" th:with="hoaDonQuery=${trangThaiFilter != null and !#strings.isEmpty(trangThaiFilter) ? 'trangThai=' + trangThaiFilter : ''}"
             th:replace="~{fragments/pagination :: paging('/cudan/hoa-don', ${hoaDonQuery})}">
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <div th:replace="~{fragments/datatable :: scripts}"></div>
    <script>document.addEventListener('DOMContentLoaded', function () { lucide.createIcons(); });</script>
</body>
</html>
