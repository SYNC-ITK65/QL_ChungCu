<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{hdon.ds.hoa_don_cua_toi}">Hóa Đơn Của Tôi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background: #f8f9fa; }

        .stat-card {
            border: none;
            border-radius: 12px;
            padding: 20px 24px;
        }
        .stat-card .stat-num {
            font-size: 2rem;
            font-weight: 700;
            line-height: 1.1;
        }
        .stat-card .stat-label {
            font-size: 0.78rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .5px;
            opacity: .75;
        }

        .filter-tabs .nav-link {
            color: #6c757d;
            border-radius: 8px;
            padding: 6px 16px;
            font-size: 0.875rem;
            font-weight: 500;
        }
        .filter-tabs .nav-link.active {
            background: #0d6efd;
            color: #fff;
        }
        .filter-tabs .nav-link:not(.active):hover {
            background: #e9ecef;
            color: #212529;
        }

        .invoice-table th {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .5px;
            color: #6c757d;
            border-bottom-width: 1px;
            padding: 12px 16px;
        }
        .invoice-table td {
            padding: 14px 16px;
            vertical-align: middle;
            font-size: 0.9rem;
        }
        .invoice-table tbody tr:hover { background: #f8f9fa; }

        .badge-unpaid {
            background: #fff3cd;
            color: #856404;
            font-weight: 600;
            font-size: 0.775rem;
            padding: 5px 10px;
            border-radius: 20px;
        }
        .badge-paid {
            background: #d1e7dd;
            color: #0a3622;
            font-weight: 600;
            font-size: 0.775rem;
            padding: 5px 10px;
            border-radius: 20px;
        }

        .invoice-id { font-weight: 700; color: #0d6efd; }

        .empty-box {
            padding: 60px 20px;
            text-align: center;
            color: #adb5bd;
        }
        .empty-box i { font-size: 3rem; margin-bottom: 12px; display: block; }
    </style>
</head>
<body class="d-flex">

<div th:replace="~{fragments/sidebar_cudan :: menu-cudan}"></div>

<div class="flex-grow-1 p-4" style="max-width: 1000px;">

    <!-- Tiêu đề trang -->
    <div class="d-flex align-items-center gap-3 mb-4">
        <div>
            <h4 class="mb-0 fw-bold" th:text="#{hdon.ds.hoa_don_cua_toi1}">💰 Hóa Đơn Của Tôi</h4>
            <small class="text-muted"><span th:text="#{hd.detail.can_ho}" th:remove="tag">
                Căn hộ:
                </span><span class="fw-semibold text-primary" th:text="${cuDan.canHo.maCanHo}"></span>
            </small>
        </div>
    </div>

    <!-- Thẻ thống kê -->
    <div class="row g-3 mb-4">
        <div class="col-md-4">
            <div class="stat-card bg-white shadow-sm">
                <div class="stat-label text-danger mb-1" th:text="#{hdon.chitiet.chua_thanh_toan}">Chưa Thanh Toán</div>
                <div class="stat-num text-danger" th:text="${soHoaDonChuaDong}">0</div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="stat-card bg-white shadow-sm">
                <div class="stat-label text-secondary mb-1" th:text="#{hdon.ds.tong_tien_con_no}">Tổng Tiền Còn Nợ</div>
                <div class="stat-num text-danger" style="font-size:1.4rem;" th:text="|${#numbers.formatDecimal(tongTienNo, 0, 'COMMA', 0, 'POINT')} #{chung.don_vi_vnd_symbol}|">0 ₫</div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="stat-card bg-white shadow-sm">
                <div class="stat-label text-success mb-1" th:text="#{hdon.chitiet.da_thanh_toan}">Đã Thanh Toán</div>
                <div class="stat-num text-success" th:text="${soHoaDonDaDong}">0</div>
            </div>
        </div>
    </div>

    <!-- Bộ lọc -->
    <div class="d-flex align-items-center gap-2 mb-3">
        <ul class="nav filter-tabs gap-1 mb-0">
            <li class="nav-item">
                <a class="nav-link" href="/cudan/hoa-don" th:classappend="${trangThaiFilter == null or trangThaiFilter == '' ? ' active' : ''}" th:text="#{hdon.ds.tat_ca}">
                    Tất cả
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="/cudan/hoa-don/loc?trangThai=chua-dong" th:classappend="${trangThaiFilter == 'chua-dong' ? ' active' : ''}" th:text="#{hdon.ds.trang_thai_chua_dong}">
                    Chưa đóng
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="/cudan/hoa-don/loc?trangThai=da-dong" th:classappend="${trangThaiFilter == 'da-dong' ? ' active' : ''}" th:text="#{hdon.ds.trang_thai_da_dong}">
                    Đã đóng
                </a>
            </li>
        </ul>
    </div>

    <!-- Bảng hóa đơn -->
    <div class="card shadow-sm border-0 rounded-3">
        <div class="card-body p-0">
            <!-- Có dữ liệu -->
            <div th:if="${danhSachHoaDon.size() > 0}">
                <table class="table invoice-table mb-0">
                    <thead class="table-light">
                    <tr>
                        <th th:text="#{hdon.ds.ma_hd}">Mã HĐ</th>
                        <th th:text="#{hdon.form.ngay_phat_hanh}">Ngày Phát Hành</th>
                        <th th:text="#{hdon.ds.han_dong}">Hạn Đóng</th>
                        <th th:text="#{tt.ds.so_tien}">Số Tiền</th>
                        <th th:text="#{hdon.ds.bang_trang_thai}">Trạng Thái</th>
                        <th></th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="hd : ${danhSachHoaDon}">
                        <td>
                            <span class="invoice-id">#<span th:text="#{hdon.ds.ma_hd}" th:remove="tag"></span>-<span th:text="${hd.id}"></span></span>
                        </td>
                        <td th:text="${#temporals.format(hd.ngayPhatHanh, 'dd/MM/yyyy')}"></td>
                        <td th:text="${#temporals.format(hd.ngayDenHan, 'dd/MM/yyyy')}"></td>
                        <td class="fw-semibold" th:text="|${#numbers.formatDecimal(hd.tongTien, 0, 'COMMA', 0, 'POINT')} #{chung.don_vi_vnd_symbol}|"></td>
                        <td>
                                <span th:if="${hd.trangThaiThanhToan == 'Chưa đóng'}" class="badge-unpaid" th:text="#{hdon.chitiet.chua_dong}">
                                    ⏳ Chưa đóng
                                </span>
                            <span th:if="${hd.trangThaiThanhToan == 'Đã đóng'}" class="badge-paid" th:text="#{hdon.chitiet.da_dong}">
                                    ✓ Đã đóng
                                </span>
                            <span th:if="${hd.trangThaiThanhToan == 'Chờ duyệt'}" class="badge" style="background: #cfe2ff; color: #084298; font-weight: 600; font-size: 0.775rem; padding: 5px 10px; border-radius: 20px;" th:text="#{pt.ui.cho_duyet}">
                                    ⏳ Chờ duyệt
                                </span>
                        </td>
                        <td>
                            <a th:href="'/cudan/hoa-don/chi-tiet/' + ${hd.id}" class="btn btn-sm btn-outline-primary">
                                <i class="bi bi-eye"></i> <span th:text="#{hdon.ds.nut_xem}" th:remove="tag">Xem</span>
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <!-- Không có dữ liệu -->
            <div th:if="${danhSachHoaDon.size() == 0}" class="empty-box">
                <i class="bi bi-inbox"></i>
                <p class="mb-0 fw-semibold" th:text="#{hdon.ds.khong_co_hoa_don_nao}">Không có hóa đơn nào</p>
                <small th:text="#{hdon.ds.hien_tai_chua_co_hoa}">Hiện tại chưa có hóa đơn trong danh mục này.</small>
            </div>
        </div>
    </div>

    <!-- Phân trang -->
    <div class="mt-3" th:with="hoaDonQuery=${trangThaiFilter != null and !#strings.isEmpty(trangThaiFilter) ? 'trangThai=' + trangThaiFilter : ''}" th:replace="~{fragments/pagination :: paging('/cudan/hoa-don', ${hoaDonQuery})}">
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<div th:replace="~{fragments/datatable :: scripts}"></div>
</body>
</html>
