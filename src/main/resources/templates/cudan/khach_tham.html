<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký Khách Thăm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="d-flex">
    <div th:replace="fragments/sidebar_cudan :: menu-cudan"></div>

    <div class="main-content p-4 w-100 bg-light">
        <h2 class="mb-4">📝 Quản Lý Đăng Ký Khách Thăm</h2>

        <div th:if="${thongBaoThanhCong}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${thongBaoThanhCong}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        <div th:if="${thongBaoLoi}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${thongBaoLoi}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="row">
            <div class="col-md-4">
                <div class="card shadow-sm mb-4">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0">Đăng ký khách mới</h5>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/cudan/khach-tham/luu}" method="post">
                            <div class="mb-3">
                                <label class="form-label fw-bold">Tên khách thăm <span class="text-danger">*</span></label>
                                <input type="text" name="tenKhach" class="form-control" placeholder="Nhập tên khách..." required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">CMND/CCCD <span class="text-danger">*</span></label>
                                <input type="text" name="cmnd" class="form-control" placeholder="Nhập số CMND/CCCD..." required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Biển số xe</label>
                                <input type="text" name="bienSoXe" class="form-control" placeholder="VD: 59X1-123.45">
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Thời gian dự kiến đến <span class="text-danger">*</span></label>
                                <input type="datetime-local" name="thoiGianDuKien" class="form-control" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 fw-bold">Gửi đăng ký</button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-md-8">
                <div class="card shadow-sm mb-4">
                    <div class="card-header bg-secondary text-white">
                        <h5 class="mb-0">Lịch sử đăng ký khách thăm</h5>
                    </div>
                    <div class="card-body p-0">
                        <table class="table table-hover table-bordered mb-0 text-center align-middle">
                            <thead class="table-light">
                            <tr>
                                <th>Tên khách</th>
                                <th>CMND/CCCD</th>
                                <th>Biển số xe</th>
                                <th>TG Dự kiến đến</th>
                                <th>Trạng thái</th>
                                <th>Hành động</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="khach : ${lichSuKhach}">
                                <td th:text="${khach.tenKhach}"></td>
                                <td th:text="${khach.cmnd}"></td>
                                <td th:text="${khach.bienSoXe}"></td>
                                <td th:text="${#temporals.format(khach.thoiGianDuKien, 'dd-MM-yyyy HH:mm')}"></td>

                                <td>
                    <span class="badge"
                          th:classappend="${khach.trangThai == 'Đã duyệt' ? 'bg-success' : (khach.trangThai == 'Không duyệt' ? 'bg-danger' : 'bg-warning text-dark')}"
                          th:text="${khach.trangThai}"></span>
                                </td>

                                <td>
                                    <th:block th:if="${khach.trangThai == 'Chờ duyệt'}">
                                        <button type="button" class="btn btn-sm btn-primary fw-bold px-2 mb-1" data-bs-toggle="modal" th:data-bs-target="'#modalSuaKhach' + ${khach.id}">Sửa</button>
                                        <a th:href="@{/cudan/khach-tham/xoa/{id}(id=${khach.id})}" class="btn btn-sm btn-danger fw-bold px-2 mb-1" onclick="return confirm('Bạn có chắc chắn muốn hủy đăng ký khách thăm này không?');">Hủy</a>
                                    </th:block>
                                </td>

                                <th:block th:if="${khach.trangThai == 'Chờ duyệt'}">
                                    <div class="modal fade" th:id="'modalSuaKhach' + ${khach.id}" tabindex="-1" aria-hidden="true">
                                        <div class="modal-dialog">
                                            <form th:action="@{/cudan/khach-tham/sua}" method="post">
                                                <div class="modal-content">
                                                    <div class="modal-header bg-primary text-white">
                                                        <h5 class="modal-title">Sửa thông tin khách thăm</h5>
                                                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                                                    </div>
                                                    <div class="modal-body text-start">
                                                        <input type="hidden" name="id" th:value="${khach.id}">

                                                        <div class="mb-3">
                                                            <label class="form-label fw-bold">Tên khách</label>
                                                            <input type="text" name="tenKhach" class="form-control" th:value="${khach.tenKhach}" required>
                                                        </div>

                                                        <div class="mb-3">
                                                            <label class="form-label fw-bold">CMND/CCCD</label>
                                                            <input type="text" name="cmnd" class="form-control" th:value="${khach.cmnd}" required>
                                                        </div>

                                                        <div class="mb-3">
                                                            <label class="form-label fw-bold">Biển số xe</label>
                                                            <input type="text" name="bienSoXe" class="form-control" th:value="${khach.bienSoXe}">
                                                        </div>

                                                        <div class="mb-3">
                                                            <label class="form-label fw-bold">Thời gian dự kiến đến</label>
                                                            <input type="datetime-local" name="thoiGianDuKien" class="form-control" th:value="${khach.thoiGianDuKien}" required>
                                                        </div>
                                                    </div>
                                                    <div class="modal-footer">
                                                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
                                                        <button type="submit" class="btn btn-primary">Lưu thay đổi</button>
                                                    </div>
                                                </div>
                                            </form>
                                        </div>
                                    </div>
                                </th:block>
                            </tr>
                            <tr th:if="${#lists.isEmpty(lichSuKhach)}">
                                <td colspan="6" class="text-center text-muted py-3">Chưa có dữ liệu đăng ký khách thăm nào.</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
