<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Báo Cáo Khách Thăm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="d-flex">
    <div th:replace="fragments/sidebar_cudan :: menu-cudan"></div>
    <div class="main-content p-4 w-100 bg-light">
        <h2 class="mb-4">👥 Báo Cáo Khách Thăm</h2>
        <div th:if="${thongBaoThanhCong}" class="alert alert-success shadow-sm" th:text="${thongBaoThanhCong}"></div>
        <div class="row">
            <div class="col-md-4">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-primary text-white"><h5 class="mb-0">Đăng ký mới</h5></div>
                    <div class="card-body">
                        <form th:action="@{/cudan/khach-tham/luu}" method="post">
                            <div class="mb-3"><label class="form-label fw-bold">Tên khách / Người thân:</label><input type="text" name="tenKhach" class="form-control" required></div>
                            <div class="mb-3"><label class="form-label fw-bold">Số CMND / CCCD:</label><input type="text" name="cmnd" class="form-control"></div>
                            <div class="mb-3"><label class="form-label fw-bold">Biển số xe:</label><input type="text" name="bienSoXe" class="form-control"></div>
                            <div class="mb-3"><label class="form-label fw-bold">Thời gian dự kiến đến:</label><input type="datetime-local" name="thoiGianDuKien" class="form-control" required></div>
                            <button type="submit" class="btn btn-primary w-100">Gửi BQL</button>
                        </form>
                    </div>
                </div>
            </div>
            <div class="col-md-8">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-white"><h5 class="mb-0 text-dark">Lịch sử đăng ký</h5></div>
                    <div class="card-body p-0">
                        <table class="table table-hover table-striped mb-0 text-center">
                            <thead class="table-light"><tr><th>Tên Khách</th><th>Biển Xe</th><th>TG Đến</th><th>Trạng thái</th></tr></thead>
                            <tbody>
                            <tr th:each="k : ${lichSuKhach}">
                                <td th:text="${k.tenKhach}"></td><td th:text="${k.bienSoXe}"></td><td th:text="${#temporals.format(k.thoiGianDuKien, 'dd-MM HH:mm')}"></td>
                                <td><span class="badge" th:classappend="${k.trangThai == 'Đã duyệt' ? 'bg-success' : (k.trangThai == 'Không duyệt' ? 'bg-danger' : 'bg-warning text-dark')}" th:text="${k.trangThai}"></span></td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
