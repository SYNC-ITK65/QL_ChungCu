<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title th:text="#{pa.ds.phan_anh_cua_toi}">Phản ánh của tôi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
<div class="d-flex">
    <div th:replace="~{fragments/sidebar_cudan :: menu-cudan}"></div>

    <div class="container-fluid p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 th:text="#{pa.ds.phan_anh_yeu_cau_cua}">Phản ánh &amp; Yêu cầu của tôi</h2>
            <a th:href="@{/cudan/phan-anh/gui-moi}" class="btn btn-primary" th:text="#{pa.ds.gui_phan_anh_moi}">➕ Gửi phản ánh mới</a>
        </div>

        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <strong th:text="${success}"></strong>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <strong th:text="${error}"></strong>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="card shadow-sm">

            <div class="card shadow-sm">
                <div class="card-body">
                    <table class="table table-hover mt-3 no-paging">
                        <thead class="table-light">
                        <tr>
                            <th th:text="#{pa.ds.ngay_gui}">Ngày gửi</th>
                            <th th:text="#{tb.form.tieude}">Tiêu đề</th>
                            <th th:text="#{hdon.ds.bang_trang_thai}">Trạng thái</th>
                            <th th:text="#{pa.ds.phan_hoi_cua_bql}">Phản hồi của BQL</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="pa : ${phanAnhs}">
                            <td th:text="${#temporals.format(pa.ngayGui, 'dd/MM/yyyy HH:mm')}"></td>
                            <td>
                                <strong th:text="${pa.tieuDe}"></strong>
                                <br>
                                <small class="text-muted" th:text="${pa.noiDung}"></small>
                                <div th:if="${pa.hinhAnh != null}" class="mt-2">
                                    <a th:href="${pa.hinhAnh}" target="_blank">
                                        <img th:src="${pa.hinhAnh}" alt="Ảnh phản ánh" style="max-height: 80px; max-width: 150px; border-radius: 4px; object-fit: cover; border: 1px solid #dee2e6;"/>
                                    </a>
                                </div>
                            </td>
                            <td>
                                    <span th:classappend="${pa.trangThai == 'Đã xong' ? 'badge bg-success' : (pa.trangThai == 'Đang xử lý' ? 'badge bg-warning text-dark' : 'badge bg-secondary')}">
                                        <th:block th:if="${pa.trangThai == 'Chờ xử lý'}" th:text="#{pa.form.cho_xu_ly}">Chờ xử lý</th:block>
                                        <th:block th:if="${pa.trangThai == 'Đang xử lý'}" th:text="#{pa.form.dang_xu_ly}">Đang xử lý</th:block>
                                        <th:block th:if="${pa.trangThai == 'Đã xong'}" th:text="#{pa.form.da_xong}">Đã xong</th:block>
                                    </span>
                            </td>
                            <td>
                                <div th:if="${pa.phanHoi != null}">
                                    <p class="mb-1" th:text="${pa.phanHoi}"></p>
                                    <small class="text-muted italic">
                                        📅 <span th:text="${#temporals.format(pa.ngayPhanHoi, 'dd/MM/yyyy HH:mm')}"></span>
                                    </small>
                                </div>
                                <span th:if="${pa.phanHoi == null}" class="text-muted small"><em th:text="#{pa.ds.dang_cho_phan_hoi}">Đang chờ phản
                                            hồi...</em></span>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(phanAnhs)}">
                            <td colspan="4" class="text-center py-4 text-muted" th:text="#{pa.ds.ban_chua_gui_phan_an}">Bạn chưa gửi phản ánh nào.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Dùng fragment Datatable chung -->
    <div th:replace="~{fragments/datatable :: scripts}"></div>
</div></body>

</html>
