<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{pa.ds.phan_anh_cua_toi}">Phản ánh của tôi</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts - Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            700: '#0369a1',
                            900: '#0c4a6e',
                        },
                        darkbg: '#0B0F17',
                        darkcard: '#161B26',
                        darkborder: '#242B3D'
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0B0F17;
            color: #E2E8F0;
            font-family: 'Inter', sans-serif;
        }
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #111827;
        }
        ::-webkit-scrollbar-thumb {
            background: #374151;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #4B5563;
        }
    </style>
</head>
<body class="min-h-screen flex bg-darkbg text-slate-200 antialiased font-sans">

    <!-- Global Sidebar -->
    <div th:replace="~{fragments/sidebar_cudan :: menu-cudan}"></div>

    <!-- Main Content -->
    <main class="flex-grow min-w-0 p-6 md:p-8 overflow-y-auto max-w-7xl mx-auto w-full">
            
            <!-- Page Header -->
            <div class="flex flex-col md:flex-row md:items-center justify-between mb-6 gap-4">
                <div>
                    <h2 class="text-xl md:text-2xl font-bold text-white flex items-center gap-2">
                        <i data-lucide="message-square" class="w-6 h-6 text-brand-500"></i>
                        <span th:text="#{pa.ds.phan_anh_yeu_cau_cua}">Phản ánh &amp; Yêu cầu của tôi</span>
                    </h2>
                    <p class="text-xs text-slate-400 mt-1" th:text="#{cudan.phan_anh.list.subtitle}">Lịch sử các phản ánh và yêu cầu bạn đã gửi</p>
                </div>
                <div class="flex gap-2">
                    <a th:href="@{/cudan/phan-anh/gui-moi}" class="px-4 py-2.5 bg-brand-500 hover:bg-brand-600 text-white rounded-xl text-sm font-bold transition shadow-lg shadow-brand-500/25 flex items-center gap-2">
                        <i data-lucide="plus-circle" class="w-4.5 h-4.5"></i> <span th:text="#{pa.ds.gui_phan_anh_moi}">Gửi phản ánh mới</span>
                    </a>
                </div>
            </div>

            <!-- Notifications -->
            <div th:if="${success}" class="mb-6 flex items-center justify-between p-4 bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 rounded-xl text-sm font-medium shadow-lg shadow-black/20">
                <div class="flex items-center gap-2">
                    <i data-lucide="check-circle" class="w-5 h-5"></i>
                    <strong th:text="${success}"></strong>
                </div>
                <button onclick="this.parentElement.remove()" class="text-emerald-400 hover:text-emerald-300"><i data-lucide="x" class="w-4 h-4"></i></button>
            </div>
            
            <div th:if="${error}" class="mb-6 flex items-center justify-between p-4 bg-red-500/10 border border-red-500/20 text-red-400 rounded-xl text-sm font-medium shadow-lg shadow-black/20">
                <div class="flex items-center gap-2">
                    <i data-lucide="alert-circle" class="w-5 h-5"></i>
                    <strong th:text="${error}"></strong>
                </div>
                <button onclick="this.parentElement.remove()" class="text-red-400 hover:text-red-300"><i data-lucide="x" class="w-4 h-4"></i></button>
            </div>

            <!-- List Card -->
            <div class="bg-darkcard rounded-3xl border border-darkborder overflow-hidden shadow-lg shadow-black/20 flex flex-col h-full mb-32">
                <div class="p-5 border-b border-darkborder bg-[#111622] flex items-center justify-between">
                    <h3 class="text-sm font-bold text-white flex items-center gap-2">
                        <i data-lucide="list" class="w-4.5 h-4.5 text-brand-400"></i>
                        <span th:text="#{pa.ds.phan_anh_cua_toi}">Danh sách phản ánh</span>
                    </h3>
                </div>
                
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-xs whitespace-nowrap">
                        <thead class="bg-[#111622] text-slate-400 border-b border-darkborder uppercase tracking-wider text-[10px] font-semibold">
                            <tr>
                                <th class="px-5 py-3" th:text="#{pa.ds.ngay_gui}">Ngày gửi</th>
                                <th class="px-5 py-3" th:text="#{tb.form.tieude}">Tiêu đề</th>
                                <th class="px-5 py-3" th:text="#{hdon.ds.bang_trang_thai}">Trạng thái</th>
                                <th class="px-5 py-3 min-w-[200px]" th:text="#{pa.ds.phan_hoi_cua_bql}">Phản hồi của BQL</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-darkborder text-slate-300">
                            <tr th:each="pa : ${phanAnhs}" class="hover:bg-slate-800/30 transition">
                                <td class="px-5 py-4 align-top text-slate-400 font-mono" th:text="${#temporals.format(pa.ngayGui, 'dd/MM/yyyy HH:mm')}"></td>
                                <td class="px-5 py-4 align-top whitespace-normal">
                                    <strong class="text-sm text-white block mb-1" th:text="${pa.tieuDe}"></strong>
                                    <p class="text-xs text-slate-400 line-clamp-2" th:text="${pa.noiDung}"></p>
                                    <div th:if="${pa.hinhAnh != null}" class="mt-3">
                                        <a th:href="${pa.hinhAnh}" target="_blank" class="inline-block rounded-lg overflow-hidden border border-slate-700 hover:border-brand-500 transition group relative">
                                            <img th:src="${pa.hinhAnh}" alt="Ảnh phản ánh" class="w-24 h-16 object-cover"/>
                                            <div class="absolute inset-0 bg-black/50 opacity-0 group-hover:opacity-100 flex items-center justify-center transition">
                                                <i data-lucide="external-link" class="w-4 h-4 text-white"></i>
                                            </div>
                                        </a>
                                    </div>
                                </td>
                                <td class="px-5 py-4 align-top">
                                    <span th:if="${pa.trangThai == 'Chờ xử lý'}" class="px-2.5 py-1 rounded-md text-[10px] font-bold bg-amber-500/10 text-amber-400 border border-amber-500/20" th:text="#{pa.form.cho_xu_ly}">Chờ xử lý</span>
                                    <span th:if="${pa.trangThai == 'Đang xử lý'}" class="px-2.5 py-1 rounded-md text-[10px] font-bold bg-sky-500/10 text-sky-400 border border-sky-500/20" th:text="#{pa.form.dang_xu_ly}">Đang xử lý</span>
                                    <span th:if="${pa.trangThai == 'Đã xong'}" class="px-2.5 py-1 rounded-md text-[10px] font-bold bg-emerald-500/10 text-emerald-400 border border-emerald-500/20" th:text="#{pa.form.da_xong}">Đã xong</span>
                                    <span th:if="${pa.trangThai != 'Chờ xử lý' &amp;&amp; pa.trangThai != 'Đang xử lý' &amp;&amp; pa.trangThai != 'Đã xong'}" class="px-2.5 py-1 rounded-md text-[10px] font-bold bg-slate-800 text-slate-300 border border-slate-700" th:text="${pa.trangThai}"></span>
                                </td>
                                <td class="px-5 py-4 align-top whitespace-normal">
                                    <div th:if="${pa.phanHoi != null}" class="bg-slate-900/50 rounded-xl p-3 border border-slate-800">
                                        <p class="text-xs text-slate-300 mb-2" th:text="${pa.phanHoi}"></p>
                                        <div class="flex items-center gap-1.5 text-[10px] text-slate-500">
                                            <i data-lucide="clock" class="w-3 h-3"></i>
                                            <span th:text="${#temporals.format(pa.ngayPhanHoi, 'dd/MM/yyyy HH:mm')}"></span>
                                        </div>
                                    </div>
                                    <span th:if="${pa.phanHoi == null}" class="inline-flex items-center gap-1.5 text-xs text-slate-500 italic bg-slate-800/50 px-3 py-1.5 rounded-lg">
                                        <i data-lucide="hourglass" class="w-3.5 h-3.5"></i> <em th:text="#{pa.ds.dang_cho_phan_hoi}">Đang chờ phản hồi...</em>
                                    </span>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(phanAnhs)}">
                                <td colspan="4" class="px-5 py-12 text-center text-slate-500">
                                    <div class="flex flex-col items-center justify-center gap-2">
                                        <i data-lucide="inbox" class="w-10 h-10 text-slate-600 mb-2"></i>
                                        <span class="text-sm font-medium" th:text="#{pa.ds.ban_chua_gui_phan_an}">Bạn chưa gửi phản ánh nào.</span>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>

    <!-- Script chung -->
    <div th:replace="~{fragments/datatable :: scripts}"></div>
    
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            if (typeof lucide !== 'undefined') {
                lucide.createIcons();
            }
        });
    </script>
</body>
</html>
