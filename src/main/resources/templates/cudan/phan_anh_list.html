<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Phản ánh của tôi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
<div class="d-flex">
    <div th:replace="~{fragments/sidebar_cudan :: menu-cudan}"></div>

    <div class="container-fluid p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Phản ánh & Yêu cầu của tôi</h2>
            <a th:href="@{/cudan/phan-anh/gui-moi}" class="btn btn-primary">➕ Gửi phản ánh mới</a>
        </div>

        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <strong th:text="${success}"></strong>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <strong th:text="${error}"></strong>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="card shadow-sm">

            <div class="card shadow-sm">
                <div class="card-body">
                    <table class="table table-hover mt-3">
                        <thead class="table-light">
                        <tr>
                            <th>Ngày gửi</th>
                            <th>Tiêu đề</th>
                            <th>Trạng thái</th>
                            <th>Phản hồi của BQL</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="pa : ${phanAnhs}">
                            <td th:text="${#temporals.format(pa.ngayGui, 'dd/MM/yyyy HH:mm')}"></td>
                            <td>
                                <strong th:text="${pa.tieuDe}"></strong>
                                <br>
                                <small class="text-muted" th:text="${pa.noiDung}"></small>
                            </td>
                            <td>
                                    <span th:text="${pa.trangThai}"
                                          th:classappend="${pa.trangThai == 'Đã xong' ? 'badge bg-success' : (pa.trangThai == 'Đang xử lý' ? 'badge bg-warning text-dark' : 'badge bg-secondary')}">
                                    </span>
                            </td>
                            <td>
                                <div th:if="${pa.phanHoi != null}">
                                    <p class="mb-1" th:text="${pa.phanHoi}"></p>
                                    <small class="text-muted italic">
                                        📅 <span
                                            th:text="${#temporals.format(pa.ngayPhanHoi, 'dd/MM/yyyy HH:mm')}"></span>
                                    </small>
                                </div>
                                <span th:if="${pa.phanHoi == null}" class="text-muted small"><em>Đang chờ phản
                                            hồi...</em></span>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(phanAnhs)}">
                            <td colspan="4" class="text-center py-4 text-muted">Bạn chưa gửi phản ánh nào.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Dùng fragment Datatable chung -->
    <div th:replace="~{fragments/datatable :: scripts}"></div>
</body>

</html>
