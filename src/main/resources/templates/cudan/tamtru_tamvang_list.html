<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{tttv.ds.danh_sach_tam_tru_ta}">Danh sách Tạm trú / Tạm vắng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .main-content {
            min-height: 100vh;
        }
        .badge-tamtru { background-color: #0d6efd; }
        .badge-tamvang { background-color: #6c757d; }
    </style>
</head>
<body>
<div class="d-flex">
    <div th:replace="~{fragments/sidebar_cudan :: menu-cudan}"></div>

    <div class="main-content p-4 w-100 bg-light">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="mb-0" th:text="#{tttv.ds.danh_sach_tam_tru_t}">🏠 Danh Sách Tạm Trú / Tạm Vắng</h2>
            <a th:href="@{/cudan/tamtru-tamvang/form}" class="btn btn-primary fw-bold shadow-sm" th:text="#{tttv.ds.dang_ky_moi}">
                ➕ Đăng ký mới
            </a>
        </div>

        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="card shadow-sm border-0">
            <div class="card-header bg-white py-3">
                <h5 class="mb-0 text-secondary" th:text="#{tttv.ds.lich_su_dang_ky_cua}">Lịch sử đăng ký của tôi</h5>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0 text-center no-paging">
                        <thead class="table-light">
                        <tr>
                            <th class="py-3" th:text="#{hd.ds.bang_loai}">Loại</th>
                            <th th:text="#{tttv.ds.thoi_gian_ap_dung}">Thời gian áp dụng</th>
                            <th th:text="#{tttv.ds.ly_do_thong_tin_khac}">Lý do &amp; Thông tin khách</th>
                            <th th:text="#{hdon.ds.bang_trang_thai}">Trạng thái</th>
                            <th th:text="#{dv.ds.thao_tac}">Thao tác</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="don : ${listTamTruTamVang}">
                            <td>
                                    <span class="badge rounded-pill px-3 py-2" th:classappend="${don.loai == 'Tạm trú' ? 'badge-tamtru' : 'badge-tamvang'}" th:text="${don.loai}"></span>
                            </td>
                            <td>
                                <div class="fw-bold" th:text="${don.ngayBatDau}"></div>
                                <div class="text-muted small" th:text="#{tttv.ds.den}">đến</div>
                                <div class="fw-bold" th:text="${don.ngayKetThuc}"></div>
                            </td>
                            <td class="text-start px-4">
                                <div th:text="${don.lyDo}"></div>
                                <small th:if="${don.hoTenKhach != null &amp;&amp; don.hoTenKhach != ''}" class="text-primary"><span th:text="#{tttv.ds.khach}" th:remove="tag">
                                    👤 Khách: </span><span th:text="${don.hoTenKhach}"></span>
                                </small>
                            </td>
                            <td>
                                    <span class="badge py-2 px-3" th:classappend="${don.trangThaiDuyet == 'Đã duyệt' ? 'bg-success' :
                                                        (don.trangThaiDuyet == 'Từ chối' ? 'bg-danger' :
                                                        (don.trangThaiDuyet == 'Chờ duyệt' ? 'bg-warning text-dark' : 'bg-dark'))}" th:text="${don.trangThaiDuyet}"></span>

                                <div th:if="${don.lyDoTuChoi != null}" class="mt-2 small text-danger italic">
                                    <i class="bi bi-info-circle"></i> <span th:text="${don.lyDoTuChoi}"></span>
                                </div>
                            </td>
                            <td>
                                <a th:if="${don.trangThaiDuyet == 'Chờ duyệt'}" th:href="@{/cudan/tamtru-tamvang/edit/{id}(id=${don.id})}" class="btn btn-sm btn-outline-primary mb-1" th:text="#{hdon.ds.nut_sua}">Sửa</a>

                                <form th:if="${don.trangThaiDuyet == 'Chờ duyệt'}" th:action="@{/cudan/tamtru-tamvang/delete/{id}(id=${don.id})}" method="post" class="d-inline">
                                    <button type="submit" class="btn btn-sm btn-danger mb-1" th:onclick="|return confirm('#{tttv.ds.xac_nhan_huy_don}')|" th:text="#{hdon.form.nut_huy}">Hủy</button>
                                </form>

                                <form th:if="${don.trangThaiDuyet == 'Đã duyệt'}" th:action="@{/cudan/tamtru-tamvang/ket-thuc/{id}(id=${don.id})}" method="post" class="d-inline">
                                    <button type="submit" class="btn btn-sm btn-outline-success mb-1" th:onclick="|return confirm('#{tttv.ds.xac_nhan_ket_thuc}')|" th:text="#{tttv.ds.ket_thuc}">Kết thúc</button>
                                </form>

                                <span th:if="${don.trangThaiDuyet == 'Đã hoàn thành'}" class="text-muted small">
                                        ✔️ Xong
                                    </span>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(listTamTruTamVang)}">
                            <td colspan="5" class="text-center py-5 text-muted">
                                <div class="mb-2">📭</div><span th:text="#{tttv.ds.ban_chua_co_du_lieu}" th:remove="tag">
                                Bạn chưa có dữ liệu đăng ký nào.
                            </span></td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Dùng fragment Datatable chung -->
    <div th:replace="~{fragments/datatable :: scripts}"></div>
</body>
</html>
