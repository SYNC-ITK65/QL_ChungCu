<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Bình chọn</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>.option-box:hover { background-color: #f1f8ff; cursor: pointer; }</style>
</head>
<body>
<div class="d-flex">
  <div th:replace="fragments/sidebar_cudan :: menu-cudan"></div>
  <div class="content p-4 w-100">
    <a th:href="@{/cudan/khao-sat}" class="btn btn-light mb-3">← Quay lại</a>

    <div th:if="${msg}" class="alert alert-success" th:text="${msg}"></div>
    <div th:if="${err}" class="alert alert-danger" th:text="${err}"></div>

    <div class="card shadow-sm border-0">
      <div class="card-body p-4">
        <h3 class="fw-bold text-primary mb-3" th:text="${khaoSat.tieuDe}"></h3>
        <p class="text-secondary" th:text="${khaoSat.moTa}"></p>
        <hr>

        <div th:if="${khaoSat.trangThaiHienTai == 'ĐANG MỞ'}">
          <form th:action="@{/cudan/khao-sat/vote}" method="POST">
            <input type="hidden" name="khaoSatId" th:value="${khaoSat.id}">
            <div th:each="lc : ${khaoSat.danhSachLuaChon}" class="option-box form-check p-3 border rounded mb-2">
              <input class="form-check-input ms-1 me-3" type="radio" name="luaChonId"
                     th:id="'lc'+${lc.id}" th:value="${lc.id}" required
                     th:checked="${lichSu != null and lichSu.luaChonDaNgan.id == lc.id}">
              <label class="form-check-label w-100 fw-semibold" th:for="'lc'+${lc.id}" th:text="${lc.noiDungLuaChon}"></label>
            </div>
            <button type="submit" class="btn btn-primary mt-3 px-4" th:text="${lichSu == null ? 'Gửi Bình Chọn' : 'Sửa Bình Chọn'}"></button>
          </form>
        </div>

        <div th:if="${khaoSat.trangThaiHienTai == 'ĐÃ ĐÓNG'}">
          <h5 class="text-danger mb-4"><i class="fas fa-lock"></i> Khảo sát đã kết thúc</h5>
          <div th:each="lc : ${khaoSat.danhSachLuaChon}" class="mb-3">
            <div class="d-flex justify-content-between">
                            <span th:class="${lichSu != null and lichSu.luaChonDaNgan.id == lc.id ? 'fw-bold text-success' : ''}">
                                [[${lc.noiDungLuaChon}]] <span th:if="${lichSu != null and lichSu.luaChonDaNgan.id == lc.id}">(Bạn đã chọn)</span>
                            </span>
              <span th:text="${khaoSat.tongSoVote == 0 ? '0%' : (#numbers.formatDecimal(lc.soLuotBinhChon * 100.0 / khaoSat.tongSoVote, 1, 1) + '%')}"></span>
            </div>
            <div class="progress" style="height: 15px;">
              <div class="progress-bar bg-primary" th:style="'width: ' + ${khaoSat.tongSoVote == 0 ? 0 : (lc.soLuotBinhChon * 100.0 / khaoSat.tongSoVote)} + '%'"></div>
            </div>
          </div>
        </div>

        <div th:if="${khaoSat.trangThaiHienTai == 'SẮP MỞ'}" class="alert alert-warning">
          Khảo sát chưa bắt đầu. Vui lòng quay lại sau!
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
