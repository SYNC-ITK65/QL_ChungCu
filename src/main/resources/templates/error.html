<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Có lỗi xảy ra | Hệ thống quản lý chung cư</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .error-card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            max-width: 500px;
            width: 100%;
        }
        .error-icon {
            font-size: 4rem;
            color: #dc3545;
        }
        .error-status {
            font-size: 1.5rem;
            font-weight: 700;
            color: #6c757d;
        }
    </style>
</head>
<body>
    <div class="container p-4">
        <div class="card error-card mx-auto text-center p-4">
            <div class="card-body">
                <div class="error-icon mb-3">⚠️</div>
                <h1 class="card-title text-danger fw-bold mb-2">Đã Xảy Ra Lỗi!</h1>
                <div class="error-status mb-4" th:text="'Mã lỗi: ' + ${status}">Mã lỗi: 500</div>
                <p class="card-text text-secondary mb-4 fs-5" th:text="${message}">Đã xảy ra lỗi ngoài ý muốn trên hệ thống.</p>
                <div class="d-grid gap-2">
                    <button onclick="history.back()" class="btn btn-primary btn-lg rounded-pill">Quay Lại</button>
                    <a th:href="@{/}" class="btn btn-outline-secondary rounded-pill">Về Trang Chủ</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
