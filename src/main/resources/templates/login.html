<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Đăng Nhập Hệ Thống</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">
    <div class="card shadow p-4" style="width: 400px;">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h3 class="text-primary mb-0" th:text="#{login.chao_mung}">🏢 Quản Lý Chung Cư</h3>
            <div class="d-flex gap-1">
                <a href="javascript:void(0)" onclick="changeLang('vi')" class="btn btn-sm p-0" style="font-size: 1.2rem;" title="Tiếng Việt">🇻🇳</a>
                <a href="javascript:void(0)" onclick="changeLang('en')" class="btn btn-sm p-0" style="font-size: 1.2rem;" title="English">🇺🇸</a>
            </div>
        </div>
        <script>
            function changeLang(lang) {
                var url = new URL(window.location.href);
                url.searchParams.set('lang', lang);
                window.location.href = url.toString();
            }
        </script>

        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <form th:action="@{/login}" method="POST">
            <div class="mb-3">
                <label class="form-label" th:text="#{login.ten_dang_nhap}">Tên đăng nhập</label>
                <input type="text" name="tenDangNhap" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label" th:text="#{login.mat_khau}">Mật khẩu</label>
                <input type="password" name="matKhau" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100" th:text="#{login.nut_dang_nhap}">Đăng Nhập</button>
        </form>
    </div>
</body>

</html>
