<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Duyệt Yêu Cầu</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body>
<div class="d-flex">
  <div th:replace="fragments/sidebar :: menu-trai"></div>

  <div class="main-content p-4 w-100 bg-light">
    <h2 class="mb-4">📋 Quản Lý Yêu Cầu Lễ Tân</h2>

    <!-- Form Tìm kiếm & Lọc -->
    <div class="card mb-4 shadow-sm">
        <div class="card-body">
            <form th:action="@{/admin/duyet-yeu-cau}" method="GET" class="row g-3">
                <div class="col-md-5">
                    <label class="form-label fw-bold">Tìm kiếm khách</label>
                    <input type="text" name="tuKhoa" class="form-control" th:value="${tuKhoa}" 
                           placeholder="Nhập tên khách hoặc CMND/CCCD...">
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-bold">Trạng thái</label>
                    <select name="trangThai" class="form-select">
                        <option value="">-- Tất cả trạng thái --</option>
                        <option value="Chờ duyệt" th:selected="${trangThai == 'Chờ duyệt'}">Chờ duyệt</option>
                        <option value="Đã duyệt" th:selected="${trangThai == 'Đã duyệt'}">Đã duyệt</option>
                        <option value="Không duyệt" th:selected="${trangThai == 'Không duyệt'}">Không duyệt</option>
                    </select>
                </div>
                <div class="col-md-3 d-flex align-items-end">
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-search"></i> Lọc yêu cầu
                    </button>
                </div>
            </form>
        </div>
    </div>

    <div class="card shadow-sm mb-4">
      <div class="card-header bg-primary text-white"><h5 class="mb-0">Danh Sách Khách Thăm</h5></div>
      <div class="card-body p-0">
        <table class="table table-hover table-bordered mb-0 text-center align-middle no-paging">
          <thead class="table-light">
          <tr>
            <th>Cư dân</th>
            <th>Khách</th>
            <th>TG Đến</th>
            <th>Trạng thái</th>
            <th>TG Duyệt</th>
            <th>Hành động</th>
          </tr>
          </thead>
          <tbody>
          <tr th:each="k : ${listKhach}">
            <td th:text="${k.cuDan.hoTen}"></td>
            <td th:text="${k.tenKhach}"></td>
            <td th:text="${#temporals.format(k.thoiGianDuKien, 'dd-MM HH:mm')}"></td>

            <td>
              <span class="badge"
                    th:classappend="${k.trangThai == 'Đã duyệt' ? 'bg-success' : (k.trangThai == 'Không duyệt' ? 'bg-danger' : 'bg-warning text-dark')}"
                    th:text="${k.trangThai}"></span>
            </td>

            <td th:text="${k.thoiGianDuyet != null ? #temporals.format(k.thoiGianDuyet, 'dd-MM-yyyy HH:mm') : '-'}"></td>

            <td>
              <th:block th:if="${k.trangThai == 'Chờ duyệt'}">
                <a th:href="@{/admin/duyet-yeu-cau/khach-tham/{id}/duyet(id=${k.id})}" class="btn btn-sm btn-success fw-bold px-3">Duyệt</a>
                <a th:href="@{/admin/duyet-yeu-cau/khach-tham/{id}/khong-duyet(id=${k.id})}" class="btn btn-sm btn-danger fw-bold px-2">Từ chối</a>
              </th:block>

              <th:block th:if="${k.trangThai != 'Chờ duyệt'}">
                <a th:href="@{/admin/duyet-yeu-cau/khach-tham/{id}/cho-duyet(id=${k.id})}"
                   onclick="return confirm('Bạn có chắc chắn muốn hoàn tác yêu cầu này về trạng thái Chờ duyệt để chỉnh sửa không?');"
                   class="btn btn-sm btn-outline-secondary fw-bold px-2">↺ Hoàn tác</a>
              </th:block>
            </td>
          </tr>
          <tr th:if="${#lists.isEmpty(listKhach)}">
             <td colspan="6" class="text-center py-4 text-muted">Không tìm thấy yêu cầu nào phù hợp.</td>
          </tr>
          </tbody>
        </table>
        <div class="p-3">
          <div th:replace="~{fragments/pagination :: paging('/admin/duyet-yeu-cau', 'tuKhoa=' + (${tuKhoa} ?: '') + '&trangThai=' + (${trangThai} ?: ''))}"></div>
        </div>
      </div>
    </div>

  </div>
</div>

    <!-- Dùng fragment Datatable chung -->
    <div th:replace="~{fragments/datatable :: scripts}"></div>
</body>
</html>
