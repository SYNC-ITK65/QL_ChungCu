<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Duyệt Yêu Cầu</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="d-flex">
  <div th:replace="fragments/sidebar :: menu-trai"></div>
  <div class="main-content p-4 w-100 bg-light">
    <h2 class="mb-4">📋 Quản Lý Yêu Cầu Cư Dân</h2>
    <div class="row">
      <div class="col-md-6">
        <div class="card shadow-sm mb-4">
          <div class="card-header bg-primary text-white"><h5 class="mb-0">Dịch Vụ Cần Duyệt</h5></div>
          <div class="card-body p-0">
            <table class="table table-hover mb-0 text-center">
              <thead class="table-light"><tr><th>Cư dân</th><th>Dịch vụ</th><th>Ngày đặt</th><th>Hành động</th></tr></thead>
              <tbody>
              <tr th:each="dv : ${listDichVuCho}">
                <td th:text="${dv.cuDan.hoTen}"></td><td th:text="${dv.dichVu.ten}"></td><td th:text="${dv.ngayDat}"></td>
                <td>
                  <a th:href="@{/admin/duyet-yeu-cau/dich-vu/{id}/duyet(id=${dv.id})}" class="btn btn-sm btn-success text-white fw-bold px-3">Duyệt</a>
                  <a th:href="@{/admin/duyet-yeu-cau/dich-vu/{id}/khong-duyet(id=${dv.id})}" class="btn btn-sm btn-danger text-white fw-bold px-2">Từ chối</a>
                </td>
              </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
      <div class="col-md-6">
        <div class="card shadow-sm mb-4">
          <div class="card-header bg-success text-white"><h5 class="mb-0">Khách Thăm Cần Duyệt</h5></div>
          <div class="card-body p-0">
            <table class="table table-hover mb-0 text-center">
              <thead class="table-light"><tr><th>Cư dân</th><th>Khách</th><th>TG Đến</th><th>Hành động</th></tr></thead>
              <tbody>
              <tr th:each="k : ${listKhachCho}">
                <td th:text="${k.cuDan.hoTen}"></td><td th:text="${k.tenKhach}"></td><td th:text="${#temporals.format(k.thoiGianDuKien, 'dd-MM HH:mm')}"></td>
                <td>
                  <a th:href="@{/admin/duyet-yeu-cau/khach-tham/{id}/duyet(id=${k.id})}" class="btn btn-sm btn-success text-white fw-bold px-3">Duyệt</a>
                  <a th:href="@{/admin/duyet-yeu-cau/khach-tham/{id}/khong-duyet(id=${k.id})}" class="btn btn-sm btn-danger text-white fw-bold px-2">Từ chối</a>
                </td>
              </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <button class="btn btn-secondary mb-3" onclick="toggleLichSu()">🕒 Hiện/Ẩn Lịch Sử Duyệt</button>
    <div id="lichSuArea" style="display: none;">
      <div class="card shadow-sm mb-4">
        <div class="card-header bg-secondary text-white"><h5 class="mb-0">Lịch Sử Đã Xử Lý</h5></div>
        <div class="card-body">
          <h6 class="text-primary mt-2">👉 Dịch Vụ Đã Xử Lý</h6>
          <table class="table table-bordered text-center table-sm">
            <thead class="table-light"><tr><th>Cư dân</th><th>Dịch vụ</th><th>Trạng thái</th><th>Người duyệt lúc</th></tr></thead>
            <tbody>
            <tr th:each="dv : ${listDichVuLS}">
              <td th:text="${dv.cuDan.hoTen}"></td><td th:text="${dv.dichVu.ten}"></td>
              <td><span class="badge" th:classappend="${dv.trangThai == 'Đã duyệt' ? 'bg-success' : 'bg-danger'}" th:text="${dv.trangThai}"></span></td>
              <td th:text="${dv.thoiGianDuyet != null ? #temporals.format(dv.thoiGianDuyet, 'dd-MM-yyyy HH:mm:ss') : 'N/A'}"></td>
            </tr>
            </tbody>
          </table>
          <h6 class="text-success mt-4">👉 Khách Thăm Đã Xử Lý</h6>
          <table class="table table-bordered text-center table-sm">
            <thead class="table-light"><tr><th>Cư dân</th><th>Khách</th><th>Trạng thái</th><th>Người duyệt lúc</th></tr></thead>
            <tbody>
            <tr th:each="k : ${listKhachLS}">
              <td th:text="${k.cuDan.hoTen}"></td><td th:text="${k.tenKhach}"></td>
              <td><span class="badge" th:classappend="${k.trangThai == 'Đã duyệt' ? 'bg-success' : 'bg-danger'}" th:text="${k.trangThai}"></span></td>
              <td th:text="${k.thoiGianDuyet != null ? #temporals.format(k.thoiGianDuyet, 'dd-MM-yyyy HH:mm:ss') : 'N/A'}"></td>
            </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
  function toggleLichSu() {
      var x = document.getElementById("lichSuArea");
      x.style.display = (x.style.display === "none") ? "block" : "none";
  }
</script>
</body>
</html>
