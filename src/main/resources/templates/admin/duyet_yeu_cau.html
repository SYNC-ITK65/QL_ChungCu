<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title th:text="#{duyet.ui.duyet_yeu_cau}">Duyệt Yêu Cầu</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body>
<div class="d-flex">
  <div th:replace="fragments/sidebar :: menu-trai"></div>

  <div class="main-content p-4 w-100 bg-light">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0" th:text="#{duyet.ui.quan_ly_yeu_cau_le}">📋 Quản Lý Yêu Cầu Lễ Tân</h2>
        <div class="d-flex gap-2">
            <a th:href="@{/admin/duyet-yeu-cau/xuat-excel(tuKhoa=${tuKhoa}, trangThai=${trangThai})}" class="btn btn-success fw-bold">
                <i class="fas fa-file-excel"></i> <span th:text="#{chung.xuat_excel}">Xuất Excel</span>
            </a>
        </div>
    </div>

    <!-- Form Tìm kiếm & Lọc -->
    <div class="card mb-4 shadow-sm">
        <div class="card-body">
            <form th:action="@{/admin/duyet-yeu-cau}" method="GET" class="row g-3">
                <div class="col-md-5">
                    <label class="form-label fw-bold" th:text="#{duyet.ui.tim_kiem_khach}">Tìm kiếm khách</label>
                    <input type="text" name="tuKhoa" class="form-control" th:value="${tuKhoa}" placeholder="Nhập tên khách hoặc CMND/CCCD..." th:placeholder="#{duyet.ui.nhap_ten_khach_hoac}">
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-bold" th:text="#{hdon.ds.bang_trang_thai}">Trạng thái</label>
                    <select name="trangThai" class="form-select">
                        <option value="" th:text="#{duyet.ui.tat_ca_trang_thai}">-- Tất cả trạng thái --</option>
                        <option value="Chờ duyệt" th:selected="${trangThai == 'Chờ duyệt'}" th:text="#{dv.ds.cho_duyet}">Chờ duyệt</option>
                        <option value="Đã duyệt" th:selected="${trangThai == 'Đã duyệt'}" th:text="#{dv.ds.da_duyet}">Đã duyệt</option>
                        <option value="Không duyệt" th:selected="${trangThai == 'Không duyệt'}" th:text="#{duyet.ui.khong_duyet}">Không duyệt</option>
                    </select>
                </div>
                <div class="col-md-3 d-flex align-items-end">
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-search"></i><span th:text="#{duyet.ui.loc_yeu_cau}" th:remove="tag"> Lọc yêu cầu
                    </span></button>
                </div>
            </form>
        </div>
    </div>

    <div class="card shadow-sm mb-4">
      <div class="card-header bg-primary text-white"><h5 class="mb-0" th:text="#{duyet.ui.danh_sach_khach_tham}">Danh Sách Khách Thăm</h5></div>
      <div class="card-body p-0">

        <table class="table table-hover table-bordered mb-0 text-center align-middle no-paging">
          <thead class="table-light">
          <tr>
            <th th:text="#{hd.form.cu_dan_label}">Cư dân</th>
            <th th:text="#{duyet.ui.khach}">Khách</th>
            <th th:text="#{duyet.ui.tg_den}">TG Đến</th>
            <th th:text="#{duyet.ui.tg_di}">TG Đi</th>
            <th th:text="#{hdon.ds.bang_trang_thai}">Trạng thái</th>
            <th th:text="#{duyet.ui.tg_duyet}">TG Duyệt</th>
            <th th:text="#{hdon.ds.bang_hanh_dong}">Hành động</th>
          </tr>
          </thead>
          <tbody>
          <tr th:each="k : ${listKhach}">
            <td th:text="${k.cuDan.hoTen}"></td>
            <td th:text="${k.tenKhach}"></td>
            <td th:text="${#temporals.format(k.thoiGianDuKien, 'dd-MM HH:mm')}"></td>
            <td th:text="${k.ngayDi != null ? #temporals.format(k.ngayDi, 'dd-MM HH:mm') : '-'}"></td>

            <td>
              <span class="badge" th:classappend="${k.trangThai == 'Đã duyệt' ? 'bg-success' : (k.trangThai == 'Không duyệt' ? 'bg-danger' : 'bg-warning text-dark')}">
                  <th:block th:if="${k.trangThai == 'Chờ duyệt'}" th:text="#{dv.ds.cho_duyet}">Chờ duyệt</th:block>
                  <th:block th:if="${k.trangThai == 'Đã duyệt'}" th:text="#{dv.ds.da_duyet}">Đã duyệt</th:block>
                  <th:block th:if="${k.trangThai == 'Không duyệt'}" th:text="#{duyet.ui.khong_duyet}">Không duyệt</th:block>
              </span>
            </td>

            <td th:text="${k.thoiGianDuyet != null ? #temporals.format(k.thoiGianDuyet, 'dd-MM-yyyy HH:mm') : '-'}"></td>

            <td>
              <th:block th:if="${k.trangThai == 'Chờ duyệt'}">
                <a th:href="@{/admin/duyet-yeu-cau/khach-tham/{id}/duyet(id=${k.id})}" class="btn btn-sm btn-success fw-bold px-3" th:text="#{dv.ds.duyet}">Duyệt</a>
                <a th:href="@{/admin/duyet-yeu-cau/khach-tham/{id}/khong-duyet(id=${k.id})}" class="btn btn-sm btn-danger fw-bold px-2" th:text="#{dv.ds.tu_choi}">Từ chối</a>
              </th:block>

              <th:block th:if="${k.trangThai != 'Chờ duyệt'}">
                <a th:href="@{/admin/duyet-yeu-cau/khach-tham/{id}/cho-duyet(id=${k.id})}" th:onclick="|return confirm('#{duyet.ui.xac_nhan_hoan_tac}')|" class="btn btn-sm btn-outline-secondary fw-bold px-2" th:text="#{duyet.ui.hoan_tac}">↺ Hoàn tác</a>
              </th:block>
            </td>
          </tr>
          <tr th:if="${#lists.isEmpty(listKhach)}">
             <td colspan="7" class="text-center py-4 text-muted" th:text="#{duyet.ui.khong_tim_thay_yeu_c}">Không tìm thấy yêu cầu nào phù hợp.</td>
          </tr>
          </tbody>
        </table>
        <div class="p-3">
            <div th:replace="~{fragments/pagination :: paging('/admin/duyet-yeu-cau', ${queryString})}"></div>
        </div>
      </div>
    </div>

  </div>
</div>

    <!-- Dùng fragment Datatable chung -->
    <div th:replace="~{fragments/datatable :: scripts}"></div>
</body>
</html>
