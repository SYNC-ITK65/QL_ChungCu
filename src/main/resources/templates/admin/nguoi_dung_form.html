<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${nguoiDung.id != null} ? #{nd.form.sua_tieude} : #{nd.form.them_tieude}">Thêm mới người dùng</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts - Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            700: '#0369a1',
                            900: '#0c4a6e',
                        },
                        darkbg: '#0B0F17',
                        darkcard: '#161B26',
                        darkborder: '#242B3D'
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0B0F17;
            color: #E2E8F0;
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="min-h-screen flex bg-darkbg text-slate-200 antialiased font-sans">
    <!-- Sidebar -->
    <div th:replace="fragments/sidebar :: menu-trai"></div>

    <!-- Main Content -->
    <main class="flex-grow p-6 md:p-8 overflow-y-auto w-full flex flex-col items-start">
        <!-- Header -->
        <div class="w-full max-w-2xl flex items-center justify-between gap-4 mb-8">
            <div>
                <h1 class="text-2xl font-bold text-white tracking-tight" 
                    th:text="${nguoiDung.id != null} ? #{nd.form.sua_tieude} : #{nd.form.them_tieude}">
                    Thêm mới người dùng
                </h1>
                <p class="text-sm text-slate-400 mt-1">Điền đầy đủ thông tin tài khoản để cập nhật hệ thống</p>
            </div>
            <a th:href="@{/admin/nguoi-dung}" 
               class="px-4 py-2 bg-slate-800 hover:bg-slate-700 active:bg-slate-900 text-slate-300 text-xs font-semibold rounded-xl transition flex items-center gap-1.5 shadow-sm">
                <i data-lucide="arrow-left" class="w-4 h-4"></i>
                <span th:text="#{cd.form.quay_lai}">Quay lại danh sách</span>
            </a>
        </div>

        <!-- Alert Message -->
        <div th:if="${errorMessage}" class="w-full max-w-2xl mb-6 p-4 bg-rose-500/10 border border-rose-500/20 text-rose-400 rounded-2xl flex items-center gap-3 shadow-lg" role="alert">
            <i data-lucide="alert-circle" class="w-5 h-5 flex-shrink-0"></i>
            <span class="text-sm font-medium" th:text="${errorMessage}"></span>
        </div>

        <!-- Form Card -->
        <div class="w-full max-w-2xl bg-darkcard border border-darkborder rounded-2xl p-6 md:p-8 shadow-xl">
            <form th:action="@{/admin/nguoi-dung/luu}" th:object="${nguoiDung}" method="post" class="space-y-6">
                <input type="hidden" th:field="*{id}">
                
                <!-- Họ Tên -->
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2" th:text="#{cd.form.ten}">Họ Tên</label>
                    <input type="text" th:field="*{hoTen}" required
                           class="w-full bg-darkbg border border-darkborder rounded-xl px-4 py-3 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-brand-500 transition">
                    <div class="text-rose-400 text-xs mt-1.5 flex items-center gap-1" th:if="${#fields.hasErrors('hoTen')}">
                        <i data-lucide="alert-circle" class="w-3.5 h-3.5"></i>
                        <span th:errors="*{hoTen}"></span>
                    </div>
                </div>

                <!-- Tên Đăng Nhập -->
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2" th:text="#{login.ten_dang_nhap}">Tên đăng nhập</label>
                    <input type="text" th:field="*{tenDangNhap}" required
                           class="w-full bg-darkbg border border-darkborder rounded-xl px-4 py-3 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-brand-500 transition">
                    <div class="text-rose-400 text-xs mt-1.5 flex items-center gap-1" th:if="${#fields.hasErrors('tenDangNhap')}">
                        <i data-lucide="alert-circle" class="w-3.5 h-3.5"></i>
                        <span th:errors="*{tenDangNhap}"></span>
                    </div>
                </div>

                <!-- Email -->
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2" th:text="#{cd.form.email}">Email</label>
                    <input type="email" th:field="*{email}" required
                           class="w-full bg-darkbg border border-darkborder rounded-xl px-4 py-3 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-brand-500 transition">
                    <div class="text-rose-400 text-xs mt-1.5 flex items-center gap-1" th:if="${#fields.hasErrors('email')}">
                        <i data-lucide="alert-circle" class="w-3.5 h-3.5"></i>
                        <span th:errors="*{email}"></span>
                    </div>
                </div>

                <!-- Số Điện Thoại -->
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2" th:text="#{cd.form.sdt}">Số điện thoại</label>
                    <input type="text" th:field="*{soDienThoai}" required
                           class="w-full bg-darkbg border border-darkborder rounded-xl px-4 py-3 text-sm font-mono text-white placeholder-slate-500 focus:outline-none focus:border-brand-500 transition">
                    <div class="text-rose-400 text-xs mt-1.5 flex items-center gap-1" th:if="${#fields.hasErrors('soDienThoai')}">
                        <i data-lucide="alert-circle" class="w-3.5 h-3.5"></i>
                        <span th:errors="*{soDienThoai}"></span>
                    </div>
                </div>

                <!-- Vai Trò -->
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2" th:text="#{nd.form.vai_tro}">Vai trò</label>
                    <select th:field="*{vaiTro}" 
                            class="w-full bg-darkbg border border-darkborder rounded-xl px-3 py-3 text-sm text-white focus:outline-none focus:border-brand-500 transition cursor-pointer">
                        <option value="1" th:text="#{nd.form.admin}">Admin</option>
                        <option value="2" th:text="#{nd.form.quan_ly}">Quản lý</option>
                        <option value="4" th:text="#{nd.form.le_tan}">Lễ tân</option>
                        <option value="5" th:text="#{nd.form.bao_ve}">Bảo vệ</option>
                    </select>
                    <div class="text-rose-400 text-xs mt-1.5 flex items-center gap-1" th:if="${#fields.hasErrors('vaiTro')}">
                        <i data-lucide="alert-circle" class="w-3.5 h-3.5"></i>
                        <span th:errors="*{vaiTro}"></span>
                    </div>
                </div>

                <!-- Submit -->
                <div class="pt-4 border-t border-darkborder flex justify-end">
                    <button type="submit" 
                            class="px-6 py-3 bg-brand-500 hover:bg-brand-400 active:bg-brand-600 text-white text-xs font-bold rounded-xl transition flex items-center gap-2 shadow-lg shadow-brand-500/10">
                        <i data-lucide="save" class="w-4 h-4"></i>
                        <span th:text="#{chung.luu}">Lưu thông tin</span>
                    </button>
                </div>
            </form>
        </div>
    </main>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();
    </script>
</body>

</html>
