<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title th:text="${nguoiDung.id != null} ? #{nd.form.sua_tieude} : #{nd.form.them_tieude}">Thêm mới người dùng
    </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="d-flex">
        <div th:replace="~{fragments/sidebar :: menu-trai}"></div>
        <div class="flex-grow-1 p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 th:text="${nguoiDung.id != null} ? #{nd.form.sua_tieude} : #{nd.form.them_tieude}">Thêm mới người
                    dùng</h2>
                <a th:href="@{/admin/nguoi-dung}" class="btn btn-secondary" th:text="#{cd.form.quay_lai}">Quay lại danh
                    sách</a>
            </div>

            <!-- Hiển thị thông báo lỗi nếu có -->
            <div th:if="${errorMessage}" class="alert alert-danger" role="alert">
                <span th:text="${errorMessage}"></span>
            </div>

            <form th:action="@{/admin/nguoi-dung/luu}" th:object="${nguoiDung}" method="post">
                <input type="hidden" th:field="*{id}">
                <div class="mb-3">
                    <label class="form-label" th:text="#{cd.form.ten}">Họ Tên</label>
                    <input type="text" th:field="*{hoTen}" class="form-control" required>
                    <div class="text-danger mt-1" th:if="${#fields.hasErrors('hoTen')}" th:errors="*{hoTen}"></div>
                </div>
                <div class="mb-3">
                    <label class="form-label" th:text="#{login.ten_dang_nhap}">Tên đăng nhập</label>
                    <input type="text" th:field="*{tenDangNhap}" class="form-control" required>
                    <div class="text-danger mt-1" th:if="${#fields.hasErrors('tenDangNhap')}"
                        th:errors="*{tenDangNhap}"></div>
                </div>


                <div class="mb-3">
                    <label class="form-label" th:text="#{cd.form.email}">Email</label>
                    <input type="email" th:field="*{email}" class="form-control" required>
                    <div class="text-danger mt-1" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                </div>
                <div class="mb-3">
                    <label class="form-label" th:text="#{cd.form.sdt}">Số điện thoại</label>
                    <input type="text" th:field="*{soDienThoai}" class="form-control" required>
                    <div class="text-danger mt-1" th:if="${#fields.hasErrors('soDienThoai')}"
                        th:errors="*{soDienThoai}"></div>
                </div>
                <div class="mb-3">
                    <label class="form-label" th:text="#{nd.form.vai_tro}">Vai trò</label>
                    <select th:field="*{vaiTro}" class="form-select">
                        <option value="1" th:text="#{nd.form.admin}">Admin</option>
                        <option value="2" th:text="#{nd.form.quan_ly}">Quản lý</option>
                        <option value="4" th:text="#{nd.form.le_tan}">Lễ tân</option>
                        <option value="5" th:text="#{nd.form.bao_ve}">Bảo vệ</option>
                    </select>
                    <div class="text-danger mt-1" th:if="${#fields.hasErrors('vaiTro')}" th:errors="*{vaiTro}"></div>
                </div>

                <button type="submit" class="btn btn-primary" th:text="#{chung.luu}">Lưu thông tin</button>
            </form>
        </div>
    </div>
</body>

</html>
