<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title th:text="${nguoiDung.id != null} ? 'Cập nhật người dùng' : 'Thêm mới người dùng'">Thêm mới người dùng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="d-flex">
        <div th:replace="~{fragments/sidebar :: menu-trai}"></div>
        <div class="flex-grow-1 p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 th:text="${nguoiDung.id != null} ? 'Cập nhật người dùng' : 'Thêm mới người dùng'">Thêm mới người dùng</h2>
                <a th:href="@{/admin/nguoi-dung}" class="btn btn-secondary">Quay lại danh sách</a>
            </div>

            <!-- Hiển thị thông báo lỗi nếu có -->
            <div th:if="${errorMessage}" class="alert alert-danger" role="alert">
                <span th:text="${errorMessage}"></span>
            </div>

            <form th:action="@{/admin/nguoi-dung/luu}" th:object="${nguoiDung}" method="post">
                <input type="hidden" th:field="*{id}">
                <div class="mb-3">
                    <label class="form-label">Họ Tên</label>
                    <input type="text" th:field="*{hoTen}" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Tên đăng nhập</label>
                    <input type="text" th:field="*{tenDangNhap}" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Mật khẩu</label>
                    <input type="password" th:field="*{matKhauMaHoa}" class="form-control"
                           th:required="${nguoiDung.id == null}"
                           th:placeholder="${nguoiDung.id != null} ? 'Để trống nếu không đổi mật khẩu' : 'Nhập mật khẩu'">
                    <small th:if="${nguoiDung.id != null}" class="text-muted">Để trống nếu không muốn thay đổi mật khẩu</small>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" th:field="*{email}" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Số điện thoại</label>
                    <input type="text" th:field="*{soDienThoai}" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Vai trò</label>
                    <select th:field="*{vaiTro}" class="form-select">
                        <option value="1">Admin</option>
                        <option value="2">Nhân viên</option>
                    </select>
                </div>

                <button type="submit" class="btn btn-primary">Lưu thông tin</button>
            </form>
        </div>
    </div>
</body>

</html>
