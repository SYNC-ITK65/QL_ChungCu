<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{nd.ds.danh_sach_nguoi_dung}">Danh sách Người dùng</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts - Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            700: '#0369a1',
                            900: '#0c4a6e',
                        },
                        darkbg: '#0B0F17',
                        darkcard: '#161B26',
                        darkborder: '#242B3D'
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0B0F17;
            color: #E2E8F0;
            font-family: 'Inter', sans-serif;
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #111827;
        }
        ::-webkit-scrollbar-thumb {
            background: #374151;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #4B5563;
        }
    </style>
</head>

<body class="min-h-screen flex bg-darkbg text-slate-200 antialiased font-sans">
    <!-- Sidebar -->
    <div th:replace="~{fragments/sidebar :: menu-trai}"></div>

    <!-- Main Content -->
    <main class="flex-grow min-w-0 p-6 md:p-8 overflow-y-auto max-w-7xl mx-auto w-full">
        <!-- Title and Top Actions -->
        <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-8">
            <div>
                <h1 class="text-2xl font-bold text-white tracking-tight" th:text="#{nd.ds.danh_sach_nguoi_dung}">Danh sách Người dùng</h1>
                <p class="text-sm text-slate-400 mt-1" th:text="#{admin.nguoidung.list.subtitle}">Quản lý và cấp tài khoản cho người dùng hệ thống</p>
            </div>
            <div class="flex items-center gap-2.5">
                <a th:href="@{/admin/nguoi-dung/xuat-excel}" 
                   class="px-4 py-2 bg-emerald-600 hover:bg-emerald-500 active:bg-emerald-700 text-white text-xs font-semibold rounded-xl transition flex items-center gap-1.5 shadow-lg shadow-emerald-600/10">
                    <i data-lucide="file-output" class="w-4 h-4"></i>
                    <span th:text="#{chung.xuat_excel}">Xuất Excel</span>
                </a>
                <a th:href="@{/admin/nguoi-dung/tao-moi}" 
                   class="px-4 py-2 bg-brand-500 hover:bg-brand-400 active:bg-brand-600 text-white text-xs font-semibold rounded-xl transition flex items-center gap-1.5 shadow-lg shadow-brand-500/10">
                    <i data-lucide="plus" class="w-4 h-4"></i>
                    <span th:text="#{nd.ds.them_nguoi_dung_moi}">Thêm người dùng mới</span>
                </a>
            </div>
        </div>

        <!-- Alert messages -->
        <div th:if="${errorMessage}" class="mb-6 p-4 bg-rose-500/10 border border-rose-500/20 text-rose-400 rounded-2xl flex items-center gap-3 shadow-lg" role="alert">
            <i data-lucide="alert-circle" class="w-5 h-5 flex-shrink-0"></i>
            <span class="text-sm font-medium" th:text="${errorMessage}"></span>
        </div>
        <div th:if="${successMessage}" class="mb-6 p-4 bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 rounded-2xl flex items-center gap-3 shadow-lg" role="alert">
            <i data-lucide="check-circle" class="w-5 h-5 flex-shrink-0"></i>
            <span class="text-sm font-medium" th:text="${successMessage}"></span>
        </div>

        <!-- Filter Card -->
        <div class="bg-darkcard border border-darkborder rounded-2xl p-6 shadow-sm mb-8">
            <h3 class="text-sm font-bold text-white mb-4 flex items-center gap-2">
                <i data-lucide="search" class="w-4 h-4 text-brand-400"></i>
                <span th:text="#{nd.ds.tim_kiem_nguoi_dung}">Tìm kiếm người dùng</span>
            </h3>
            <form method="GET" th:action="@{/admin/nguoi-dung}" class="grid grid-cols-1 md:grid-cols-12 gap-4">
                <div class="md:col-span-6">
                    <label class="block text-xs font-semibold text-slate-400 mb-1.5 uppercase tracking-wider" th:text="#{cd.ds.tu_khoa}">Từ khóa</label>
                    <input type="text" class="w-full bg-darkbg border border-darkborder rounded-xl px-4 py-2.5 text-xs text-white placeholder-slate-500 focus:outline-none focus:border-brand-500 transition" 
                           name="tuKhoa" th:value="${tuKhoa}" placeholder="Tìm theo họ tên, email, SĐT, tên đăng nhập..." th:placeholder="#{nd.ds.tim_theo_ho_ten_emai}">
                </div>
                <div class="md:col-span-3">
                    <label class="block text-xs font-semibold text-slate-400 mb-1.5 uppercase tracking-wider" th:text="#{nd.form.vai_tro}">Vai trò</label>
                    <select class="w-full bg-darkbg border border-darkborder rounded-xl px-3 py-2.5 text-xs text-slate-200 focus:outline-none focus:border-brand-500 transition cursor-pointer" 
                            name="vaiTro">
                        <option value="" th:selected="${vaiTro == null}" th:text="#{hdon.ds.loc_trang_thai_tat_ca}">-- Tất cả --</option>
                        <option value="1" th:selected="${vaiTro == 1}" th:text="#{nd.form.admin}">Admin</option>
                        <option value="2" th:selected="${vaiTro == 2}" th:text="#{nd.form.quan_ly}">Quản lý</option>
                        <option value="3" th:selected="${vaiTro == 3}" th:text="#{hd.form.cu_dan_label}">Cư dân</option>
                        <option value="4" th:selected="${vaiTro == 4}" th:text="#{nd.form.le_tan}">Lễ tân</option>
                        <option value="5" th:selected="${vaiTro == 5}" th:text="#{nd.form.bao_ve}">Bảo vệ</option>
                    </select>
                </div>
                <div class="md:col-span-3 flex items-end gap-2">
                    <button type="submit" 
                            class="flex-grow py-2.5 bg-brand-500 hover:bg-brand-400 active:bg-brand-600 text-white text-xs font-bold rounded-xl transition flex items-center justify-center gap-1.5 shadow-lg shadow-brand-500/10">
                        <i data-lucide="filter" class="w-4 h-4"></i>
                        <span th:text="#{hdon.ds.nut_tim_kiem}">Tìm kiếm</span>
                    </button>
                    <a th:href="@{/admin/nguoi-dung}" 
                       class="py-2.5 px-4 bg-slate-800 hover:bg-slate-700 active:bg-slate-900 text-slate-300 text-xs font-semibold rounded-xl transition flex items-center justify-center gap-1">
                        <i data-lucide="rotate-ccw" class="w-4 h-4"></i>
                        <span th:text="#{nd.ds.dat_lai}">Đặt lại</span>
                    </a>
                </div>
            </form>
        </div>

        <!-- Table View -->
        <div class="bg-darkcard border border-darkborder rounded-2xl overflow-hidden shadow-sm">
            <div class="overflow-x-auto">
                <table class="table w-full border-collapse text-left text-xs text-slate-300 no-paging">
                    <thead>
                        <tr class="bg-darkbg/50 border-b border-darkborder">
                            <th class="p-4 font-bold text-slate-400 uppercase tracking-wider">ID</th>
                            <th class="p-4 font-bold text-slate-400 uppercase tracking-wider" th:text="#{cd.form.ten}">Họ tên</th>
                            <th class="p-4 font-bold text-slate-400 uppercase tracking-wider" th:text="#{cd.form.email}">Email</th>
                            <th class="p-4 font-bold text-slate-400 uppercase tracking-wider" th:text="#{cd.form.sdt}">Số điện thoại</th>
                            <th class="p-4 font-bold text-slate-400 uppercase tracking-wider" th:text="#{nd.form.vai_tro}">Vai trò</th>
                            <th class="p-4 font-bold text-slate-400 uppercase tracking-wider text-right" th:text="#{hdon.ds.bang_hanh_dong}">Hành động</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-darkborder">
                        <tr th:each="nd : ${danhSachNguoiDung}" class="hover:bg-slate-800/20 transition">
                            <td class="p-4 font-semibold text-white" th:text="${nd.id}"></td>
                            <td class="p-4 font-medium text-white" th:text="${nd.hoTen}"></td>
                            <td class="p-4" th:text="${nd.email}"></td>
                            <td class="p-4 font-mono" th:text="${nd.soDienThoai}"></td>
                            <td class="p-4">
                                <span th:if="${nd.vaiTro == 1}" class="px-2.5 py-1 text-[10px] font-bold rounded-lg bg-rose-500/10 text-rose-400 border border-rose-500/20 whitespace-nowrap" th:text="#{nd.form.admin}">Admin</span>
                                <span th:if="${nd.vaiTro == 2}" class="px-2.5 py-1 text-[10px] font-bold rounded-lg bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 whitespace-nowrap" th:text="#{nd.form.quan_ly}">Quản lý</span>
                                <span th:if="${nd.vaiTro == 3}" class="px-2.5 py-1 text-[10px] font-bold rounded-lg bg-sky-500/10 text-sky-400 border border-sky-500/20 whitespace-nowrap" th:text="#{hd.form.cu_dan_label}">Cư dân</span>
                                <span th:if="${nd.vaiTro == 4}" class="px-2.5 py-1 text-[10px] font-bold rounded-lg bg-amber-500/10 text-amber-400 border border-amber-500/20 whitespace-nowrap" th:text="#{nd.form.le_tan}">Lễ tân</span>
                                <span th:if="${nd.vaiTro == 5}" class="px-2.5 py-1 text-[10px] font-bold rounded-lg bg-slate-500/10 text-slate-400 border border-slate-500/20 whitespace-nowrap" th:text="#{nd.form.bao_ve}">Bảo vệ</span>
                            </td>
                            <td class="p-4 text-right">
                                <!-- Chỉ hiện nút Sửa/Xóa cho Admin (1), Quản lý (2), Lễ tân (4), Bảo vệ (5) -->
                                <th:block th:if="${nd.vaiTro != 3}">
                                    <div class="inline-flex items-center gap-1.5">
                                        <a th:href="@{/admin/nguoi-dung/reset-mat-khau/{id}(id=${nd.id})}" 
                                           class="px-2.5 py-1 bg-emerald-500/10 hover:bg-emerald-500/20 text-emerald-400 border border-emerald-500/20 text-[11px] font-semibold rounded-lg transition" 
                                           th:onclick="|return confirm('#{nd.msg.reset_mat_khau_confirm}')|" th:text="#{nd.ds.nut_reset_mk}">Reset MK</a>
                                        <a th:href="@{/admin/nguoi-dung/sua/{id}(id=${nd.id})}" 
                                           class="px-2.5 py-1 bg-amber-500/10 hover:bg-amber-500/20 text-amber-400 border border-amber-500/20 text-[11px] font-semibold rounded-lg transition" 
                                           th:text="#{hdon.ds.nut_sua}">Sửa</a>
                                        <a th:href="@{/admin/nguoi-dung/xoa/{id}(id=${nd.id})}" 
                                           class="px-2.5 py-1 bg-rose-500/10 hover:bg-rose-500/20 text-rose-400 border border-rose-500/20 text-[11px] font-semibold rounded-lg transition" 
                                           th:onclick="|return confirm('#{chung.xac_nhan_xoa}')|" th:text="#{hd.ds.nut_xoa}">Xóa</a>
                                    </div>
                                </th:block>
                                <!-- Cư dân (vaiTro = 3): Hiển thị link chuyển sang module Quản lý cư dân -->
                                <th:block th:if="${nd.vaiTro == 3}">
                                    <div class="inline-flex items-center gap-1.5">
                                        <a th:href="@{/admin/nguoi-dung/reset-mat-khau/{id}(id=${nd.id})}" 
                                           class="px-2.5 py-1 bg-emerald-500/10 hover:bg-emerald-500/20 text-emerald-400 border border-emerald-500/20 text-[11px] font-semibold rounded-lg transition" 
                                           th:onclick="|return confirm('#{nd.msg.reset_mat_khau_confirm}')|" th:text="#{nd.ds.nut_reset_mk}">Reset MK</a>
                                        <a th:href="@{/admin/cu-dan/sua/{id}(id=${nd.id})}" 
                                           class="px-3 py-1 bg-sky-500/10 hover:bg-sky-500/20 text-sky-400 border border-sky-500/20 text-[11px] font-semibold rounded-lg transition inline-flex items-center gap-1 whitespace-nowrap" 
                                           th:text="#{nd.ds.quan_ly_tai_cu_dan}">
                                            Quản lý tại Cư dân
                                        </a>
                                    </div>
                                </th:block>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(danhSachNguoiDung)}">
                            <td colspan="6" class="p-8 text-center text-slate-500" th:text="#{nd.ds.chua_co_nguoi_dung_n}">Chưa có người dùng nào trong hệ thống!</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Pagination fragment invocation -->
        <div th:replace="~{fragments/pagination :: paging('/admin/nguoi-dung', 'tuKhoa=' + (${tuKhoa} ?: '') + '&amp;vaiTro=' + (${vaiTro} ?: ''))}"></div>
    </main>

    <!-- Global datatable script includes (keeps table css overrides active) -->
    <div th:replace="~{fragments/datatable :: scripts}"></div>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();
    </script>
</body>

</html>
