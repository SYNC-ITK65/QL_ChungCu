<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Danh sách Người dùng</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body>
    <div class="container mt-4">
        <h2 class="mb-4">Danh sách Người dùng</h2>

        <!-- Nút Thêm mới -->
        <a th:href="@{/admin/nguoi-dung/tao-moi}" class="">+ Thêm người dùng mới</a>

        <table class="">
            <thead class="">
                <tr>
                    <th>ID</th>
                    <th>Họ tên</th>
                    <th>Tên đăng nhập</th>
                    <th>Email</th>
                    <th>Số điện thoại</th>
                    <th>Vai trò</th>
                    <th>Hành động</th>
                </tr>
            </thead>
            <tbody>
                <!-- Vòng lặp để lấy dữ liệu từ Service -->
                <tr th:each="nd : ${danhSachNguoiDung}">
                    <td th:text="${nd.id}"></td>
                    <td th:text="${nd.hoTen}"></td>
                    <td th:text="${nd.tenDangNhap}"></td>
                    <td th:text="${nd.email}"></td>
                    <td th:text="${nd.soDienThoai}"></td>
                    <td th:text="${nd.vaiTro == 1 ? 'Admin' : nd.vaiTro == 2 ? 'Chủ hộ' : 'Người thuê'}">
                    </td>
                    <td>
                        <!-- Nút Sửa -->
                        <a th:href="@{/admin/nguoi-dung/sua/{id}(id=${nd.id})}" class="">Sửa</a>
                        <!-- Nút Xóa (Tạm thời chưa code logic xóa) -->
                        <a href="#" class="">Xóa</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</body>

</html>
