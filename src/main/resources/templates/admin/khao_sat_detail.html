<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title th:text="#{ks.chitiet.chi_tiet_khao_sat}">Chi tiết Khảo sát</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
<div class="d-flex">
  <div th:replace="~{fragments/sidebar :: menu-trai}"></div>

  <div class="content p-4 w-100">
    <a th:href="@{/admin/khao-sat}" class="btn btn-light mb-3" th:text="#{ks.chitiet.tro_ve_danh_sach}">← Trở về danh sách</a>

    <div class="d-flex justify-content-end mb-3 gap-2">
      <a th:if="${khaoSat.trangThaiHienTai == 'ĐANG MỞ'}" th:href="@{/admin/khao-sat/ket-thuc/{id}(id=${khaoSat.id})}" class="btn btn-warning" th:onclick="|return confirm('#{ks.chitiet.xac_nhan_dong}')|">
        <i class="fas fa-stop-circle"></i><span th:text="#{ks.chitiet.ket_thuc_som}" th:remove="tag"> Kết thúc sớm
      </span></a>

      <a th:if="${khaoSat.trangThaiHienTai != 'ĐÃ ĐÓNG'}" th:href="@{/admin/khao-sat/sua/{id}(id=${khaoSat.id})}" class="btn btn-primary">
        <i class="fas fa-edit"></i><span th:text="#{ks.chitiet.chinh_sua}" th:remove="tag"> Chỉnh sửa
      </span></a>

      <a th:if="${khaoSat.tongSoVote == 0 and khaoSat.trangThaiHienTai != 'ĐÃ ĐÓNG'}" th:href="@{/admin/khao-sat/xoa/{id}(id=${khaoSat.id})}" class="btn btn-danger" th:onclick="|return confirm('#{ks.chitiet.xac_nhan_xoa_vinh_vien}')|">
        <i class="fas fa-trash"></i><span th:text="#{hd.ds.nut_xoa}" th:remove="tag"> Xóa
      </span></a>
    </div>

    <div class="card shadow-sm mb-4 border-0">
      <div class="card-body">
        <h3 class="fw-bold text-primary" th:text="${khaoSat.tieuDe}"></h3>
        <p class="text-secondary" th:text="${khaoSat.moTa}"></p>
        <hr>
        <h5 class="fw-bold mb-3"><i class="fas fa-chart-bar"></i> <span th:text="#{ks.chitiet.ket_qua_thong_ke}">KẾT QUẢ THỐNG KÊ</span> (<span th:text="#{ks.chitiet.tong}">Tổng</span>: [[${khaoSat.tongSoVote}]] <span th:text="#{ks.chitiet.vote}">vote</span>)</h5>

        <div th:each="lc : ${khaoSat.danhSachLuaChon}" th:if="${lc != null}" class="mb-3">
          <div class="d-flex justify-content-between mb-1 fw-semibold">
            <span th:text="${lc.noiDungLuaChon}"></span>
            <span th:text="${khaoSat.tongSoVote == 0 ? '0%' : (#numbers.formatDecimal((lc.soLuotBinhChon ?: 0) * 100.0 / khaoSat.tongSoVote, 1, 1) + '%')}"></span>
          </div>
          <div class="progress" style="height: 20px;">
            <div class="progress-bar bg-success" th:style="'width: ' + ${khaoSat.tongSoVote == 0 ? 0 : ((lc.soLuotBinhChon ?: 0) * 100.0 / khaoSat.tongSoVote)} + '%'" th:text="|${lc.soLuotBinhChon ?: 0} #{ks.chitiet.luot}|"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="card shadow-sm border-0">
      <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
        <h5 class="fw-bold mb-0"><i class="fas fa-history"></i> <span th:text="#{ks.chitiet.lich_su_binh_chon}" th:remove="tag">LỊCH SỬ BÌNH CHỌN</span></h5>
        <a th:href="@{/admin/khao-sat/chi-tiet/{id}/xuat-excel(id=${khaoSat.id}, tuKhoa=${tuKhoa}, luaChonId=${luaChonId})}" class="btn btn-success btn-sm fw-bold">
          <i class="fas fa-file-excel"></i> <span th:text="#{chung.xuat_excel}">Xuất Excel</span>
        </a>
      </div>
      <div class="card-body">

        <form th:action="@{/admin/khao-sat/chi-tiet/{id}(id=${khaoSat.id})}" method="get" class="row g-2 mb-3 bg-light p-3 rounded">
          <div class="col-md-5">
            <input type="text" name="tuKhoa" th:value="${tuKhoa}" class="form-control" placeholder="🔍 Nhập Tên cư dân hoặc Mã Căn Hộ...">
          </div>
          <div class="col-md-4">
            <select name="luaChonId" class="form-select">
              <option value="">-- Tất cả phương án đã chọn --</option>
              <option th:each="lc : ${khaoSat.danhSachLuaChon}"
                      th:value="${lc.id}"
                      th:text="${lc.noiDungLuaChon}"
                      th:selected="${lc.id == luaChonId}"></option>
            </select>
          </div>
          <div class="col-md-3 d-flex gap-2">
            <button type="submit" class="btn btn-primary fw-bold w-100"><i class="fas fa-filter"></i> Lọc</button>
            <a th:href="@{/admin/khao-sat/chi-tiet/{id}(id=${khaoSat.id})}" class="btn btn-secondary text-nowrap"><i class="fas fa-sync"></i> Bỏ lọc</a>
          </div>
        </form>

        <div class="table-responsive">
          <table class="table table-striped table-hover align-middle mb-0 no-paging">
            <thead class="table-dark">
            <tr>
              <th class="ps-4" th:text="#{ks.chitiet.ho_ten_cu_dan}">Họ tên Cư dân</th>
              <th th:text="#{hdon.form.can_ho}">Mã Căn Hộ (Phòng)</th>
              <th th:text="#{ks.chitiet.phuong_an_da_chon}">Phương án đã chọn</th>
              <th th:text="#{ks.chitiet.thoi_gian_vote}">Thời gian Vote</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(lichSuList)}">
              <td colspan="4" class="text-center text-danger fw-bold py-4">Không tìm thấy dữ liệu phù hợp.</td>
            </tr>
            <tr th:each="ls : ${lichSuList}">
              <td class="ps-4 fw-bold text-primary" th:text="${ls.cuDan?.hoTen}"></td>
              <td class="fw-bold" th:text="${ls.cuDan?.canHo != null ? ls.cuDan.canHo.id : 'Trống'}"></td>
              <td>
                <span class="badge bg-success fs-6"><i class="fas fa-check-circle"></i> [[${ls.luaChonDaNgan?.noiDungLuaChon}]]</span>
              </td>
              <td th:text="${ls.thoiGianVote != null ? #temporals.format(ls.thoiGianVote, 'dd/MM/yyyy HH:mm') : 'N/A'}"></td>
            </tr>
            </tbody>
          </table>
        </div>

        <div class="mt-3">
          <div th:replace="~{fragments/pagination :: paging('/admin/khao-sat/chi-tiet/' + ${khaoSat.id}, '')}"></div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
