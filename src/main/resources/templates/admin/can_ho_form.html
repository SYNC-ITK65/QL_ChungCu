<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title th:text="${canHo.id == null ? #messages.msg('admin.canho.form.addTitle') : #messages.msg('admin.canho.form.editTitle')}">Thêm Căn Hộ Mới</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="d-flex">
        <div th:replace="~{fragments/sidebar :: menu-trai}"></div>

        <div class="flex-grow-1 p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 th:text="${canHo.id == null ? #messages.msg('admin.canho.form.addTitle') : #messages.msg('admin.canho.form.editTitle')}">Thêm Căn Hộ Mới</h2>
                <a th:href="@{/admin/can-ho}" class="btn btn-secondary" th:text="#{chung.quay_lai}">Quay Lại</a>
            </div>

            <div class="card shadow border-0">
                <div class="card-body">
                    <form th:action="@{/admin/can-ho/luu}" th:object="${canHo}" method="POST">
                        <input type="hidden" th:field="*{id}" />
                        <div class="mb-3">
                            <label class="form-label" th:text="#{ch.form.ma}">Mã Căn Hộ</label>
                            <input type="text" class="form-control" th:field="*{maCanHo}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label" th:text="#{ch.form.dt}">Diện Tích (m²)</label>
                            <input type="number" step="0.1" class="form-control" th:field="*{dienTich}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label" th:text="#{ch.form.tang}">Tầng</label>
                            <input type="number" class="form-control" th:field="*{tang}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label" th:text="#{ch.form.loai}">Loại</label>
                            <input type="text" class="form-control" th:field="*{loai}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label" th:text="#{ch.form.trang_thai}">Trạng Thái</label>
                            <select class="form-select" th:field="*{trangThai}">
                                <option value="Trống" th:text="#{ch.tt.trong}">Trống</option>
                                <option value="Đã có chủ" th:text="#{ch.tt.da_ban_giao}">Đã có chủ</option>
                            </select>
                        </div>

                        <button type="submit" class="btn btn-primary" th:text="#{ch.form.nut_luu}">Lưu Căn Hộ</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
