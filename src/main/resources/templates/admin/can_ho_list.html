<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title th:text="#{ch.ds.tieude}">Danh sách căn hộ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="d-flex">
        <div th:replace="~{fragments/sidebar :: menu-trai}"></div>
        <div class="flex-grow-1 p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 th:text="#{ch.ds.tieude}">Danh sách căn hộ</h2>
                <div class="d-flex gap-2">
                    <a th:href="@{/admin/can-ho/xuat-excel}" class="btn btn-success" th:text="#{chung.xuat_excel}">Xuất
                        Excel</a>
                    <a th:href="@{/admin/can-ho/tao-moi}" class="btn btn-primary" th:text="#{ch.ds.nut_them}">+ Thêm căn
                        hộ</a>
                </div>
            </div>

            <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
                <span th:text="${successMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
            <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <span th:text="${errorMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>

            <!-- Form tìm kiếm -->
            <div class="card mb-4">
                <div class="card-body">
                    <form method="GET" th:action="@{/admin/can-ho}" class="row g-3">
                        <div class="col-md-2">
                            <label class="form-label" th:text="#{ch.ds.loc_trang_thai}">Trạng thái</label>
                            <select name="trangThai" class="form-select">
                                <option value="" th:text="#{chung.tat_ca}">-- Tất cả --</option>
                                <option value="Trống" th:selected="${trangThai == 'Trống'}" th:text="#{ch.tt.trong}">
                                    Trống</option>
                                <option value="Đã bàn giao" th:selected="${trangThai == 'Đã bàn giao'}"
                                    th:text="#{ch.tt.da_ban_giao}">Đã bàn giao</option>
                                <option value="Đang sửa chữa" th:selected="${trangThai == 'Đang sửa chữa'}"
                                    th:text="#{ch.tt.sua_chua}">Đang sửa chữa</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label" th:text="#{ch.ds.loc_dt}">Diện tích (m²)</label>
                            <input type="number" step="0.01" name="dienTich" th:value="${dienTich}" class="form-control"
                                th:placeholder="#{ch.ds.loc_dt_goi_y}">
                        </div>
                        <div class="col-md-2">
                            <label class="form-label" th:text="#{ch.ds.loc_tang}">Tầng</label>
                            <input type="number" name="tang" th:value="${tang}" class="form-control"
                                th:placeholder="#{ch.ds.loc_tang_goi_y}">
                        </div>
                        <div class="col-md-3 d-flex align-items-end">
                            <button type="submit" class="btn btn-primary me-2" th:text="#{chung.tim}">Tìm kiếm</button>
                            <a th:href="@{/admin/can-ho}" class="btn btn-secondary" th:text="#{chung.dat_lai}">Đặt
                                lại</a>
                        </div>
                    </form>
                </div>
            </div>

            <table class="table table-striped table-hover border no-paging">
                <thead class="table-dark">
                    <tr>
                        <th th:text="#{chung.id}">ID</th>
                        <th th:text="#{ch.ds.bang_ma}">Mã Căn Hộ</th>
                        <th th:text="#{ch.ds.bang_dt}">Diện Tích</th>
                        <th th:text="#{ch.ds.bang_tang}">Tầng</th>
                        <th th:text="#{ch.ds.bang_loai}">Loại</th>
                        <th th:text="#{chung.trang_thai}">Trạng Thái</th>
                        <th th:text="#{chung.hanh_dong}">Hành Động</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="ch : ${danhSachCanHo}">
                        <td th:text="${ch.id}">1</td>
                        <td th:text="${ch.maCanHo}">A1-01</td>
                        <td th:text="|${ch.dienTich} #{chung.don_vi_m2}|">100 m²</td>
                        <td th:text="${ch.tang}">1</td>
                        <td th:text="${ch.loai}">1</td>
                        <td th:text="${ch.trangThai}">Trống</td>
                        <td>
                            <a th:href="@{/admin/cu-dan(canHoId=${ch.id})}" class="btn btn-sm btn-info text-dark"
                                th:text="#{ch.ds.loc_cudan}">Lọc Cư Dân</a>
                            <a th:href="@{/admin/can-ho/sua/{id}(id=${ch.id})}" class="btn btn-sm btn-warning"
                                th:text="#{chung.sua}">Sửa</a>
                            <a th:href="@{/admin/can-ho/xoa/{id}(id=${ch.id})}" class="btn btn-sm btn-danger"
                                th:onclick="|return confirm('#{chung.xac_nhan_xoa}')|" th:text="#{chung.xoa}">Xóa</a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(danhSachCanHo)}">
                        <td colspan="7" class="text-center text-muted" th:text="#{ch.ds.trong}">Chưa có căn hộ nào trong
                            hệ thống!</td>
                    </tr>
                </tbody>
            </table>

            <div class="d-flex justify-content-between align-items-center mt-3">
                <form method="GET" th:action="@{/admin/can-ho}" class="d-flex align-items-center gap-2">
                    <input type="hidden" name="trangThai" th:value="${trangThai}" />
                    <input type="hidden" name="dienTich" th:value="${dienTich}" />
                    <input type="hidden" name="tang" th:value="${tang}" />
                    <input type="hidden" name="page" value="0" />
                    <label class="form-label mb-0" th:text="#{pagi.hien_thi}">Hiển thị</label>
                    <select name="size" class="form-select form-select-sm w-auto" onchange="this.form.submit()">
                        <option value="5"  th:selected="${size == 5}"  th:text="|5 #{pagi.dong}|">5 dòng</option>
                        <option value="10" th:selected="${size == 10}" th:text="|10 #{pagi.dong}|">10 dòng</option>
                        <option value="20" th:selected="${size == 20}" th:text="|20 #{pagi.dong}|">20 dòng</option>
                        <option value="50" th:selected="${size == 50}" th:text="|50 #{pagi.dong}|">50 dòng</option>
                    </select>
                </form>
            </div>

            <!-- Pagination -->
            <nav th:if="${totalPages > 0}" aria-label="Page navigation" class="mt-4">
                <ul class="pagination justify-content-center">
                    <li class="page-item" th:classappend="${currentPage == 0 ? 'disabled' : ''}">
                        <a class="page-link"
                            th:href="@{/admin/can-ho(page=${currentPage - 1}, trangThai=${trangThai}, dienTich=${dienTich}, tang=${tang}, size=${size})}"
                            th:text="#{pagi.truoc}">Trước</a>
                    </li>

                    <th:block th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
                        <!-- Vị trí đầu tiên -->
                        <li th:if="${i == 0}" class="page-item" th:classappend="${currentPage == i ? 'active' : ''}">
                            <a class="page-link"
                                th:href="@{/admin/can-ho(page=${i}, trangThai=${trangThai}, dienTich=${dienTich}, tang=${tang}, size=${size})}"
                                th:text="${i + 1}">1</a>
                        </li>

                        <!-- Dấu 3 chấm bên trái -->
                        <li th:if="${i == 1 and currentPage > 3}" class="page-item disabled">
                            <span class="page-link">...</span>
                        </li>

                        <!-- Các trang hiển thị xung quanh trang hiện tại -->
                        <li th:if="${i > 0 and i < totalPages - 1 and i >= currentPage - 2 and i <= currentPage + 2}"
                            class="page-item" th:classappend="${currentPage == i ? 'active' : ''}">
                            <a class="page-link"
                                th:href="@{/admin/can-ho(page=${i}, trangThai=${trangThai}, dienTich=${dienTich}, tang=${tang}, size=${size})}"
                                th:text="${i + 1}">1</a>
                        </li>

                        <!-- Dấu 3 chấm bên phải -->
                        <li th:if="${i == totalPages - 2 and currentPage < totalPages - 4}" class="page-item disabled">
                            <span class="page-link">...</span>
                        </li>

                        <!-- Vị trí cuối cùng -->
                        <li th:if="${i == totalPages - 1 and totalPages > 1}" class="page-item"
                            th:classappend="${currentPage == i ? 'active' : ''}">
                            <a class="page-link"
                                th:href="@{/admin/can-ho(page=${i}, trangThai=${trangThai}, dienTich=${dienTich}, tang=${tang}, size=${size})}"
                                th:text="${i + 1}">1</a>
                        </li>
                    </th:block>

                    <li class="page-item" th:classappend="${currentPage == totalPages - 1 ? 'disabled' : ''}">
                        <a class="page-link"
                            th:href="@{/admin/can-ho(page=${currentPage + 1}, trangThai=${trangThai}, dienTich=${dienTich}, tang=${tang}, size=${size})}"
                            th:text="#{pagi.sau}">Sau</a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</body>

</html>
