<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div th:replace="~{fragments/sidebar :: menu-trai}"></div>
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Danh sách căn hộ</h2>
        <div class="d-flex gap-2">
            <a th:href="@{/admin/can-ho/xuat-excel}" class="btn btn-success">Xuất Excel</a>
            <a th:href="@{/admin/can-ho/tao-moi}" class="btn btn-primary">+ Thêm căn hộ</a>
        </div>
    </div>

    <!-- Form tìm kiếm -->
    <div class="card mb-4">
        <div class="card-body">
            <form method="GET" th:action="@{/admin/can-ho}" class="row g-3">
                <div class="col-md-3">
                    <label class="form-label">Trạng thái</label>
                    <select name="trangThai" class="form-select">
                        <option value="">-- Tất cả --</option>
                        <option value="Trống" th:selected="${trangThai == 'Trống'}">Trống</option>
                        <option value="Đã bàn giao" th:selected="${trangThai == 'Đã bàn giao'}">Đã bàn giao</option>
                        <option value="Đang sửa chữa" th:selected="${trangThai == 'Đang sửa chữa'}">Đang sửa chữa</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Diện tích (m²)</label>
                    <input type="number" step="0.01" name="dienTich" th:value="${dienTich}" class="form-control" placeholder="Tìm theo diện tích">
                </div>
                <div class="col-md-3">
                    <label class="form-label">Tầng</label>
                    <input type="number" name="tang" th:value="${tang}" class="form-control" placeholder="Tìm theo tầng">
                </div>
                <div class="col-md-3 d-flex align-items-end">
                    <button type="submit" class="btn btn-primary me-2">Tìm kiếm</button>
                    <a th:href="@{/admin/can-ho}" class="btn btn-secondary">Đặt lại</a>
                </div>
            </form>
        </div>
    </div>

    <table class="table table-striped table-hover border">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Mã Căn Hộ</th>
                <th>Diện Tích</th>
                <th>Tầng</th>
                <th>Loại</th>
                <th>Trạng Thái</th>
                <th>Hành Động</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="ch : ${danhSachCanHo}">
                <td th:text="${ch.id}">1</td>
                <td th:text="${ch.maCanHo}">A1-01</td>
                <td th:text="${ch.dienTich + ' m²'}">100 m²</td>
                <td th:text="${ch.tang}">1</td>
                <td th:text="${ch.loai}">1</td>
                <td th:text="${ch.trangThai}">Trống</td>
                <td>
                    <a th:href="@{/admin/cu-dan(canHoId=${ch.id})}" class="btn btn-sm btn-info text-dark">Lọc Cư Dân</a>
                    <a th:href="@{/admin/can-ho/sua/{id}(id=${ch.id})}" class="btn btn-sm btn-warning">Sửa</a>
                    <a th:href="@{/admin/can-ho/xoa/{id}(id=${ch.id})}" class="btn btn-sm btn-danger"
                        onclick="return confirm('Xóa căn hộ này? Thao tác không thể hoàn tác!');">Xóa</a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(danhSachCanHo)}">
                <td colspan="6" class="text-center text-muted">Chưa có căn hộ nào trong hệ thống!</td>
            </tr>
        </tbody>
    </table>

    <!-- Pagination -->
    <nav th:if="${totalPages > 0}" aria-label="Page navigation" class="mt-4">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${currentPage == 0 ? 'disabled' : ''}">
                <a class="page-link" th:href="@{/admin/can-ho(page=${currentPage - 1}, trangThai=${trangThai}, dienTich=${dienTich}, tang=${tang})}">Trước</a>
            </li>
            
            <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                th:classappend="${currentPage == i ? 'active' : ''}">
                <a class="page-link" th:href="@{/admin/can-ho(page=${i}, trangThai=${trangThai}, dienTich=${dienTich}, tang=${tang})}" th:text="${i + 1}">1</a>
            </li>
            
            <li class="page-item" th:classappend="${currentPage == totalPages - 1 ? 'disabled' : ''}">
                <a class="page-link" th:href="@{/admin/can-ho(page=${currentPage + 1}, trangThai=${trangThai}, dienTich=${dienTich}, tang=${tang})}">Sau</a>
            </li>
        </ul>
    </nav>

</body>

</html>
