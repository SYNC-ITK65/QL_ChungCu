?<!DOCTYPE html>
<html lang="vi" class="dark" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{dv.form.thong_tin_dich_vu}">Thông tin Dịch vụ</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts - Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            700: '#0369a1',
                            900: '#0c4a6e',
                        },
                        darkbg: '#0B0F17',
                        darkcard: '#161B26',
                        darkborder: '#242B3D'
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0B0F17;
            color: #E2E8F0;
            font-family: 'Inter', sans-serif;
        }
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #111827;
        }
        ::-webkit-scrollbar-thumb {
            background: #374151;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #4B5563;
        }
        select {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 0.75rem center;
            background-repeat: no-repeat;
            background-size: 1.5em 1.5em;
        }
    </style>
</head>
<body class="min-h-screen flex bg-darkbg overflow-x-hidden antialiased">

    <!-- Global Sidebar -->
    <div th:replace="~{fragments/sidebar :: menu-trai}"></div>

    <!-- MAIN CONTENT AREA -->
    <div class="flex-1 flex flex-col min-h-screen">
        
        <!-- TOP HEADER BAR FOR MOBILE -->
        <header class="bg-darkcard border-b border-darkborder py-3 px-4 flex items-center justify-between lg:hidden sticky top-0 z-30">
            <div class="flex items-center space-x-3">
                <button onclick="toggleMobileSidebar()" class="text-slate-400 hover:text-white p-1 rounded-lg">
                    <i data-lucide="menu" class="w-6 h-6"></i>
                </button>
                <span class="text-xs font-bold text-white tracking-widest uppercase" th:text="#{dv.form.thong_tin_dich_vu}">Thông tin Dịch vụ</span>
            </div>
        </header>

        <!-- MAIN SCROLLABLE WRAPPER -->
        <main class="flex-grow p-4 md:p-6 lg:p-8 w-full max-w-4xl mx-auto flex flex-col justify-start">
            
            <!-- Page Header -->
            <div class="flex flex-col md:flex-row md:items-center justify-between mb-6 gap-4">
                <div>
                    <h2 class="text-xl md:text-2xl font-bold text-white flex items-center gap-2">
                        <i data-lucide="settings-2" class="w-6 h-6 text-brand-500"></i>
                        <span th:text="${dichVu.id == null} ? #{dv.form.them_tieude} : #{dv.form.sua_tieude}">Thêm Dịch Vụ Mới</span>
                    </h2>
                    <p class="text-xs text-slate-400 mt-1" th:text="#{dv.form.thong_tin_dich_vu}">Cập nhật thông tin chi tiết dịch vụ nội khu</p>
                </div>
                <div class="flex gap-2">
                    <a th:href="@{/admin/dich-vu}" class="px-4 py-2 bg-transparent hover:bg-slate-800 text-slate-300 border border-slate-700 rounded-xl text-xs font-medium transition flex items-center gap-2">
                        <i data-lucide="corner-up-left" class="w-4 h-4"></i> <span th:text="#{dv.form.huy_bo}">Hủy Bỏ</span>
                    </a>
                </div>
            </div>

            <!-- Form Card -->
            <div class="bg-darkcard rounded-3xl border border-darkborder p-6 md:p-8 shadow-lg shadow-black/20">
                <form th:action="@{/admin/dich-vu/luu}" th:object="${dichVu}" method="post" class="space-y-6">
                    <input type="hidden" th:field="*{id}">

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-2">
                            <label class="text-sm font-semibold text-slate-300 flex items-center gap-1.5">
                                <i data-lucide="tag" class="w-4 h-4 text-slate-500"></i> <span th:text="#{dv.form.ten_dich_vu}">Tên Dịch Vụ</span> <span class="text-red-400">*</span>
                            </label>
                            <input type="text" th:field="*{ten}" required th:placeholder="#{dv.form.vi_du_tien_nuoc}" placeholder="Ví dụ: Tiền nước" class="w-full bg-darkbg border border-darkborder rounded-xl py-2.5 px-4 text-sm text-white placeholder-slate-600 focus:outline-none focus:border-brand-500 transition">
                        </div>
                        
                        <div class="space-y-2">
                            <label class="text-sm font-semibold text-slate-300 flex items-center gap-1.5">
                                <i data-lucide="layers" class="w-4 h-4 text-slate-500"></i> <span th:text="#{dv.form.loai_dich_vu}">Loại Dịch Vụ</span> <span class="text-red-400">*</span>
                            </label>
                            <select th:field="*{loai}" class="w-full bg-darkbg border border-darkborder rounded-xl py-2.5 px-4 text-sm text-white focus:outline-none focus:border-brand-500 transition appearance-none cursor-pointer">
                                <option value="Cơ bản" th:text="#{dv.form.co_ban_dien_nuoc}">Cơ bản (Điện/Nước)</option>
                                <option value="Cố định" th:text="#{dv.form.co_dinh_quan_ly_phi}">Cố định (Quản lý/Phí rác)</option>
                                <option value="Tự chọn" th:text="#{dv.form.tu_chon_be_boi_gym}">Tự chọn (Bể bơi/Gym)</option>
                            </select>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-2">
                            <label class="text-sm font-semibold text-slate-300 flex items-center gap-1.5">
                                <i data-lucide="banknote" class="w-4 h-4 text-slate-500"></i> <span th:text="#{dv.form.don_gia}">Đơn Giá</span> <span class="text-red-400">*</span>
                            </label>
                            <input type="number" step="0.01" th:field="*{donGia}" required placeholder="0.00" class="w-full bg-darkbg border border-darkborder rounded-xl py-2.5 px-4 text-sm text-emerald-400 font-medium placeholder-slate-600 focus:outline-none focus:border-brand-500 transition">
                        </div>
                        
                        <div class="space-y-2">
                            <label class="text-sm font-semibold text-slate-300 flex items-center gap-1.5">
                                <i data-lucide="scale" class="w-4 h-4 text-slate-500"></i> <span th:text="#{dv.form.don_vi_tinh}">Đơn Vị Tính</span> <span class="text-red-400">*</span>
                            </label>
                            <input type="text" th:field="*{donViTinh}" required th:placeholder="#{dv.form.vi_du_kwh_m3_thang}" placeholder="Ví dụ: kWh, m3, Tháng" class="w-full bg-darkbg border border-darkborder rounded-xl py-2.5 px-4 text-sm text-white placeholder-slate-600 focus:outline-none focus:border-brand-500 transition">
                        </div>
                    </div>

                    <div class="space-y-2">
                        <label class="text-sm font-semibold text-slate-300 flex items-center gap-1.5">
                            <i data-lucide="align-left" class="w-4 h-4 text-slate-500"></i> <span th:text="#{dv.form.mo_ta_chi_tiet}">Mô Tả Chi Tiết</span>
                        </label>
                        <textarea th:field="*{moTa}" rows="4" th:placeholder="#{dv.form.nhap_ghi_chu_them_ve}" placeholder="Nhập ghi chú thêm về dịch vụ..." class="w-full bg-darkbg border border-darkborder rounded-xl py-3 px-4 text-sm text-white placeholder-slate-600 focus:outline-none focus:border-brand-500 transition resize-none"></textarea>
                    </div>

                    <div class="pt-4 flex flex-col sm:flex-row gap-3 border-t border-darkborder">
                        <button type="submit" class="flex-1 py-3 bg-brand-500 hover:bg-brand-600 text-white rounded-xl text-sm font-bold transition shadow-lg shadow-brand-500/25 flex items-center justify-center gap-2">
                            <i data-lucide="save" class="w-5 h-5"></i> <span th:text="#{dv.form.luu_dich_vu}">Lưu Dịch Vụ</span>
                        </button>
                        <a th:href="@{/admin/dich-vu}" class="flex-1 py-3 bg-slate-800 hover:bg-slate-700 text-slate-200 border border-slate-700 rounded-xl text-sm font-bold transition flex items-center justify-center gap-2 text-center">
                            <i data-lucide="x" class="w-5 h-5"></i> <span th:text="#{dv.form.huy_bo}">Hủy Bỏ</span>
                        </a>
                    </div>
                </form>
            </div>
            
        </main>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            if (typeof lucide !== 'undefined') {
                lucide.createIcons();
            }
        });
    </script>
</body>
</html>
