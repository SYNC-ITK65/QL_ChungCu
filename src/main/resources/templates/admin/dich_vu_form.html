<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thông tin Dịch vụ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="d-flex">
    <div th:replace="~{fragments/sidebar :: menu-trai}"></div>

    <div class="container-fluid p-4">
        <h2 th:text="${dichVu.id == null ? 'Thêm Dịch Vụ Mới' : 'Cập Nhật Dịch Vụ'}">Thêm Dịch Vụ Mới</h2>
        <hr>

        <form th:action="@{/admin/dich-vu/luu}" th:object="${dichVu}" method="post" style="max-width: 700px;">
            <input type="hidden" th:field="*{id}">

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Tên Dịch Vụ</label>
                    <input type="text" class="form-control" th:field="*{ten}" placeholder="Ví dụ: Tiền nước" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Loại Dịch Vụ</label>
                    <select class="form-select" th:field="*{loai}">
                        <option value="Cơ bản">Cơ bản (Điện/Nước)</option>
                        <option value="Cố định">Cố định (Quản lý/Phí rác)</option>
                        <option value="Tự chọn">Tự chọn (Bể bơi/Gym)</option>
                    </select>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Đơn Giá</label>
                    <input type="number" step="0.01" class="form-control" th:field="*{donGia}" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Đơn Vị Tính</label>
                    <input type="text" class="form-control" th:field="*{donViTinh}" placeholder="Ví dụ: kWh, m3, Tháng" required>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Mô Tả Chi Tiết</label>
                <textarea class="form-control" th:field="*{moTa}" rows="3" placeholder="Nhập ghi chú thêm về dịch vụ..."></textarea>
            </div>

            <div class="mt-4">
                <button type="submit" class="btn btn-success px-4">Lưu Dịch Vụ</button>
                <a th:href="@{/admin/dich-vu}" class="btn btn-secondary px-4">Hủy Bỏ</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
