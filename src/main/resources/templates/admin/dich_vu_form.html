<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{dv.form.thong_tin_dich_vu}">Thông tin Dịch vụ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="d-flex">
    <div th:replace="~{fragments/sidebar :: menu-trai}"></div>

    <div class="container-fluid p-4">
        <h2 th:text="${dichVu.id == null} ? #{dv.form.them_tieude} : #{dv.form.sua_tieude}">Thêm Dịch Vụ Mới</h2>
        <hr>

        <form th:action="@{/admin/dich-vu/luu}" th:object="${dichVu}" method="post" style="max-width: 700px;">
            <input type="hidden" th:field="*{id}">

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label" th:text="#{dv.form.ten_dich_vu}">Tên Dịch Vụ</label>
                    <input type="text" class="form-control" th:field="*{ten}" placeholder="Ví dụ: Tiền nước" required th:placeholder="#{dv.form.vi_du_tien_nuoc}">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label" th:text="#{dv.form.loai_dich_vu}">Loại Dịch Vụ</label>
                    <select class="form-select" th:field="*{loai}">
                        <option value="Cơ bản" th:text="#{dv.form.co_ban_dien_nuoc}">Cơ bản (Điện/Nước)</option>
                        <option value="Cố định" th:text="#{dv.form.co_dinh_quan_ly_phi}">Cố định (Quản lý/Phí rác)</option>
                        <option value="Tự chọn" th:text="#{dv.form.tu_chon_be_boi_gym}">Tự chọn (Bể bơi/Gym)</option>
                    </select>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label" th:text="#{dv.form.don_gia}">Đơn Giá</label>
                    <input type="number" step="0.01" class="form-control" th:field="*{donGia}" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label" th:text="#{dv.form.don_vi_tinh}">Đơn Vị Tính</label>
                    <input type="text" class="form-control" th:field="*{donViTinh}" placeholder="Ví dụ: kWh, m3, Tháng" required th:placeholder="#{dv.form.vi_du_kwh_m3_thang}">
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label" th:text="#{dv.form.mo_ta_chi_tiet}">Mô Tả Chi Tiết</label>
                <textarea class="form-control" th:field="*{moTa}" rows="3" placeholder="Nhập ghi chú thêm về dịch vụ..." th:placeholder="#{dv.form.nhap_ghi_chu_them_ve}"></textarea>
            </div>

            <div class="mt-4">
                <button type="submit" class="btn btn-success px-4" th:text="#{dv.form.luu_dich_vu}">Lưu Dịch Vụ</button>
                <a th:href="@{/admin/dich-vu}" class="btn btn-secondary px-4" th:text="#{dv.form.huy_bo}">Hủy Bỏ</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
