<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lịch Sử Thanh Toán</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex overflow-hidden" style="height: 100vh;">
    <div th:replace="~{fragments/sidebar :: menu-trai}"></div>

    <div class="flex-grow-1 p-4 overflow-auto">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-clock-history me-2"></i>Lịch Sử Giao Dịch / Thanh Toán</h2>
        </div>

        <!-- Form tìm kiếm -->
        <div class="card mb-4">
            <div class="card-header bg-light">
                <h6 class="mb-0">🔍 Tìm kiếm giao dịch</h6>
            </div>
            <div class="card-body">
                <form th:action="@{/admin/thanh-toan/lich-su}" method="get" class="row g-3">
                    <div class="col-md-3">
                        <label class="form-label">Mã căn hộ</label>
                        <input type="text" class="form-control" name="maCanHo" th:value="${maCanHo}" placeholder="Nhập mã căn hộ...">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Phương thức</label>
                        <select class="form-select" name="phuongThuc">
                            <option value="" th:selected="${phuongThuc == null or phuongThuc == ''}">-- Tất cả --</option>
                            <option value="Tiền mặt" th:selected="${phuongThuc == 'Tiền mặt'}">Tiền mặt</option>
                            <option value="Chuyển khoản" th:selected="${phuongThuc == 'Chuyển khoản'}">Chuyển khoản</option>
                            <option value="Chuyển khoản QR" th:selected="${phuongThuc == 'Chuyển khoản QR'}">Chuyển khoản QR</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Từ ngày</label>
                        <input type="date" class="form-control" name="tuNgay" th:value="${tuNgay}">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Đến ngày</label>
                        <input type="date" class="form-control" name="denNgay" th:value="${denNgay}">
                    </div>
                    <div class="col-md-2 d-flex align-items-end">
                        <button type="submit" class="btn btn-primary w-100">Tìm kiếm</button>
                    </div>
                </form>
                <div class="mt-2">
                    <a th:href="@{/admin/thanh-toan/lich-su}" class="btn btn-sm btn-secondary">↻ Xóa bộ lọc</a>
                </div>
            </div>
        </div>

        <table class="table table-striped table-hover border no-paging">
            <thead class="table-dark">
            <tr>
                <th>Mã GD</th>
                <th>Mã Hóa Đơn</th>
                <th>Căn Hộ</th>
                <th>Ngày Thanh Toán</th>
                <th>Số Tiền</th>
                <th>Phương Thức</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="tt : ${danhSachThanhToan}">
                <td th:text="${tt.id}">1</td>
                <td th:text="'HD-' + ${tt.hoaDon?.id}">HD-1</td>
                <td th:text="${tt.hoaDon?.canHo?.maCanHo ?: 'Chưa rõ'}">A1-01</td>
                <td th:text="${tt.ngayThanhToan != null ? #temporals.format(tt.ngayThanhToan, 'dd/MM/yyyy') : ''}">20/10/2026</td>
                <td class="text-success fw-bold" th:text="${tt.soTien != null ? #numbers.formatDecimal(tt.soTien, 0, 'COMMA', 0, 'POINT') + ' VNĐ' : '0 VNĐ'}">500,000 VNĐ</td>
                <td>
                    <span class="badge bg-info text-dark" th:text="${tt.phuongThuc}">Chuyển khoản</span>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(danhSachThanhToan)}">
                <td colspan="6" class="text-center text-muted">Chưa có giao dịch thanh toán nào.</td>
            </tr>
            </tbody>
        </table>
        <!-- Phân trang -->
        <div class="d-flex justify-content-between align-items-center mt-3" th:if="${totalPages > 0}">
            <form method="GET" th:action="@{/admin/thanh-toan/lich-su}" class="d-flex align-items-center gap-2">
                <input type="hidden" name="maCanHo" th:value="${maCanHo}" />
                <input type="hidden" name="phuongThuc" th:value="${phuongThuc}" />
                <input type="hidden" name="tuNgay" th:value="${tuNgay}" />
                <input type="hidden" name="denNgay" th:value="${denNgay}" />
                <input type="hidden" name="page" value="0" />
                <label class="form-label mb-0">Hiển thị</label>
                <select name="size" class="form-select form-select-sm w-auto" onchange="this.form.submit()">
                    <option value="5" th:selected="${size == 5}">5 dòng</option>
                    <option value="10" th:selected="${size == 10}">10 dòng</option>
                    <option value="20" th:selected="${size == 20}">20 dòng</option>
                    <option value="50" th:selected="${size == 50}">50 dòng</option>
                </select>
            </form>
            <div th:if="${totalPages > 1}">
                <nav>
                    <ul class="pagination pagination-sm mb-0">
                        <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                            <a class="page-link" th:href="@{/admin/thanh-toan/lich-su(page=0, size=${size}, maCanHo=${maCanHo}, phuongThuc=${phuongThuc}, tuNgay=${tuNgay}, denNgay=${denNgay})}">Đầu</a>
                        </li>
                        <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                            <a class="page-link" th:href="@{/admin/thanh-toan/lich-su(page=${currentPage - 1}, size=${size}, maCanHo=${maCanHo}, phuongThuc=${phuongThuc}, tuNgay=${tuNgay}, denNgay=${denNgay})}">Trước</a>
                        </li>
                        <li class="page-item active">
                            <span class="page-link" th:text="${currentPage + 1} + '/' + ${totalPages}"></span>
                        </li>
                        <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                            <a class="page-link" th:href="@{/admin/thanh-toan/lich-su(page=${currentPage + 1}, size=${size}, maCanHo=${maCanHo}, phuongThuc=${phuongThuc}, tuNgay=${tuNgay}, denNgay=${denNgay})}">Sau</a>
                        </li>
                        <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                            <a class="page-link" th:href="@{/admin/thanh-toan/lich-su(page=${totalPages - 1}, size=${size}, maCanHo=${maCanHo}, phuongThuc=${phuongThuc}, tuNgay=${tuNgay}, denNgay=${denNgay})}">Cuối</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>
</div>

    <!-- Dùng fragment Datatable chung -->
    <div th:replace="~{fragments/datatable :: scripts}"></div>
</body>
</html>
