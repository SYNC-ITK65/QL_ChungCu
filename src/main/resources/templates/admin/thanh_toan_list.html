<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{tt.ds.lich_su_thanh_toan}">Lịch Sử Thanh Toán</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: { 500: '#0ea5e9', 400: '#38bdf8', 600: '#0284c7' },
                        darkbg: '#0B0F17', darkcard: '#161B26', darkborder: '#242B3D'
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0B0F17; color: #E2E8F0; font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #111827; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; }
    </style>
</head>
<body class="min-h-screen flex bg-darkbg text-slate-200 antialiased font-sans">
    <div th:replace="fragments/sidebar :: menu-trai"></div>

    <main class="flex-grow p-6 md:p-8 overflow-y-auto w-full max-w-7xl mx-auto">
        <!-- Header -->
        <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-8">
            <div>
                <h1 class="text-2xl font-bold text-white tracking-tight" th:text="#{tt.ds.lich_su_giao_dich_th}">Lịch Sử Giao Dịch / Thanh Toán</h1>
                <p class="text-sm text-slate-400 mt-1" th:text="#{admin.thanhtoan.list.subtitle}">Toàn bộ giao dịch thanh toán hóa đơn trong hệ thống</p>
            </div>
            <a th:href="@{/admin/hoa-don}"
               class="px-4 py-2 bg-slate-800 hover:bg-slate-700 border border-darkborder text-slate-300 text-xs font-semibold rounded-xl transition flex items-center gap-1.5">
                <i data-lucide="receipt" class="w-4 h-4 text-brand-400"></i>
                <span>Quản lý Hóa Đơn</span>
            </a>
        </div>

        <!-- Filter -->
        <div class="bg-darkcard border border-darkborder rounded-2xl p-6 shadow-sm mb-8">
            <h3 class="text-sm font-bold text-white mb-4 flex items-center gap-2">
                <i data-lucide="filter" class="w-4 h-4 text-brand-400"></i>
                <span th:text="#{tt.ds.tim_kiem_giao_dich}">Tìm kiếm giao dịch</span>
            </h3>
            <form th:action="@{/admin/thanh-toan/lich-su}" method="get" class="grid grid-cols-1 md:grid-cols-12 gap-4">
                <div class="md:col-span-3">
                    <label class="block text-xs font-semibold text-slate-400 mb-1.5 uppercase tracking-wider" th:text="#{hdon.ds.loc_ma_can}">Mã căn hộ</label>
                    <input type="text" name="maCanHo" th:value="${maCanHo}" th:placeholder="#{hdon.ds.loc_ma_can_goi_y}"
                           class="w-full bg-darkbg border border-darkborder rounded-xl px-4 py-2.5 text-xs text-white placeholder-slate-500 focus:outline-none focus:border-brand-500 transition">
                </div>
                <div class="md:col-span-3">
                    <label class="block text-xs font-semibold text-slate-400 mb-1.5 uppercase tracking-wider" th:text="#{tt.ds.phuong_thuc}">Phương thức</label>
                    <select name="phuongThuc"
                            class="w-full bg-darkbg border border-darkborder rounded-xl px-3 py-2.5 text-xs text-slate-200 focus:outline-none focus:border-brand-500 transition cursor-pointer">
                        <option value="" th:selected="${phuongThuc == null or phuongThuc == ''}" th:text="#{hdon.ds.loc_trang_thai_tat_ca}">-- Tất cả --</option>
                        <option value="Tiền mặt" th:selected="${phuongThuc == 'Tiền mặt'}" th:text="#{tt.form.tien_mat}">Tiền mặt</option>
                        <option value="Chuyển khoản" th:selected="${phuongThuc == 'Chuyển khoản'}" th:text="#{tt.ds.chuyen_khoan}">Chuyển khoản</option>
                        <option value="Chuyển khoản QR" th:selected="${phuongThuc == 'Chuyển khoản QR'}" th:text="#{tt.form.chuyen_khoan_qr}">Chuyển khoản QR</option>
                    </select>
                </div>
                <div class="md:col-span-2">
                    <label class="block text-xs font-semibold text-slate-400 mb-1.5 uppercase tracking-wider" th:text="#{tt.ds.tu_ngay}">Từ ngày</label>
                    <input type="date" name="tuNgay" th:value="${tuNgay}"
                           class="w-full bg-darkbg border border-darkborder rounded-xl px-4 py-2.5 text-xs text-white focus:outline-none focus:border-brand-500 transition">
                </div>
                <div class="md:col-span-2">
                    <label class="block text-xs font-semibold text-slate-400 mb-1.5 uppercase tracking-wider" th:text="#{tt.ds.den_ngay}">Đến ngày</label>
                    <input type="date" name="denNgay" th:value="${denNgay}"
                           class="w-full bg-darkbg border border-darkborder rounded-xl px-4 py-2.5 text-xs text-white focus:outline-none focus:border-brand-500 transition">
                </div>
                <div class="md:col-span-2 flex items-end gap-2">
                    <button type="submit"
                            class="flex-grow py-2.5 bg-brand-500 hover:bg-brand-400 text-white text-xs font-bold rounded-xl transition flex items-center justify-center gap-1.5">
                        <i data-lucide="search" class="w-4 h-4"></i>
                        <span th:text="#{hdon.ds.nut_tim_kiem}">Tìm kiếm</span>
                    </button>
                    <a th:href="@{/admin/thanh-toan/lich-su}"
                       class="py-2.5 px-3 bg-slate-800 hover:bg-slate-700 text-slate-300 text-xs font-semibold rounded-xl transition flex items-center justify-center">
                        <i data-lucide="rotate-ccw" class="w-4 h-4"></i>
                    </a>
                </div>
            </form>
        </div>

        <!-- Table -->
        <div class="bg-darkcard border border-darkborder rounded-2xl overflow-hidden shadow-sm">
            <div class="overflow-x-auto">
                <table class="w-full border-collapse text-left text-xs text-slate-300 no-paging">
                    <thead>
                        <tr class="bg-darkbg/50 border-b border-darkborder">
                            <th class="p-4 font-bold text-slate-400 uppercase tracking-wider" th:text="#{tt.ds.ma_gd}">Mã GD</th>
                            <th class="p-4 font-bold text-slate-400 uppercase tracking-wider" th:text="#{hdon.ui.ma_hoa_don}">Mã Hóa Đơn</th>
                            <th class="p-4 font-bold text-slate-400 uppercase tracking-wider" th:text="#{hdon.form.can_ho}">Căn Hộ</th>
                            <th class="p-4 font-bold text-slate-400 uppercase tracking-wider" th:text="#{tt.form.ngay_thanh_toan}">Ngày Thanh Toán</th>
                            <th class="p-4 font-bold text-slate-400 uppercase tracking-wider" th:text="#{tt.ds.so_tien}">Số Tiền</th>
                            <th class="p-4 font-bold text-slate-400 uppercase tracking-wider" th:text="#{tt.ds.phuong_thuc}">Phương Thức</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-darkborder">
                        <tr th:each="tt : ${danhSachThanhToan}" class="hover:bg-slate-800/20 transition">
                            <td class="p-4 font-semibold text-white" th:text="${tt.id}">1</td>
                            <td class="p-4 font-semibold text-brand-400" th:text="'HD-' + ${tt.hoaDon?.id}">HD-1</td>
                            <td class="p-4 font-bold text-white" th:text="${tt.hoaDon?.canHo?.maCanHo ?: 'Chưa rõ'}">A1-01</td>
                            <td class="p-4" th:text="${tt.ngayThanhToan != null ? #temporals.format(tt.ngayThanhToan, 'dd/MM/yyyy') : ''}">20/10/2026</td>
                            <td class="p-4 font-bold text-emerald-400"
                                th:text="${tt.soTien != null ? #numbers.formatDecimal(tt.soTien, 0, 'COMMA', 0, 'POINT') + ' VNĐ' : '0 VNĐ'}">500,000 VNĐ</td>
                            <td class="p-4">
                                <span class="px-2 py-0.5 rounded text-xs font-semibold bg-sky-500/10 text-sky-400 border border-sky-500/20"
                                      th:text="${tt.phuongThuc}">Chuyển khoản</span>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(danhSachThanhToan)}">
                            <td colspan="6" class="p-8 text-center text-slate-500" th:text="#{tt.ds.chua_co_giao_dich_th}">Chưa có giao dịch thanh toán nào.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Phân trang -->
        <div th:if="${totalPages > 0}" class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mt-6">
            <form method="GET" th:action="@{/admin/thanh-toan/lich-su}" class="flex items-center gap-2">
                <input type="hidden" name="maCanHo" th:value="${maCanHo}">
                <input type="hidden" name="phuongThuc" th:value="${phuongThuc}">
                <input type="hidden" name="tuNgay" th:value="${tuNgay}">
                <input type="hidden" name="denNgay" th:value="${denNgay}">
                <input type="hidden" name="page" value="0">
                <label class="text-xs text-slate-400" th:text="#{pagi.hien_thi}">Hiển thị</label>
                <select name="size" onchange="this.form.submit()"
                        class="bg-darkbg border border-darkborder rounded-lg px-2 py-1.5 text-xs text-white focus:outline-none focus:border-brand-500 cursor-pointer">
                    <option value="5"  th:selected="${size == 5}"  th:text="#{hd.ds.5_dong}">5 dòng</option>
                    <option value="10" th:selected="${size == 10}" th:text="#{hd.ds.10_dong}">10 dòng</option>
                    <option value="20" th:selected="${size == 20}" th:text="#{hd.ds.20_dong}">20 dòng</option>
                    <option value="50" th:selected="${size == 50}" th:text="#{hd.ds.50_dong}">50 dòng</option>
                </select>
            </form>
            <div th:if="${totalPages > 1}" class="flex items-center gap-1.5 text-xs">
                <a th:href="@{/admin/thanh-toan/lich-su(page=0,size=${size},maCanHo=${maCanHo},phuongThuc=${phuongThuc},tuNgay=${tuNgay},denNgay=${denNgay})}"
                   th:classappend="${currentPage == 0} ? 'opacity-40 pointer-events-none' : ''"
                   class="px-3 py-1.5 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-lg transition" th:text="#{hd.ds.dau}">Đầu</a>
                <a th:href="@{/admin/thanh-toan/lich-su(page=${currentPage - 1},size=${size},maCanHo=${maCanHo},phuongThuc=${phuongThuc},tuNgay=${tuNgay},denNgay=${denNgay})}"
                   th:classappend="${currentPage == 0} ? 'opacity-40 pointer-events-none' : ''"
                   class="px-3 py-1.5 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-lg transition" th:text="#{pagi.truoc}">Trước</a>
                <span class="px-3 py-1.5 bg-brand-500/10 text-brand-400 border border-brand-500/20 rounded-lg font-bold"
                      th:text="${currentPage + 1} + '/' + ${totalPages}">1/5</span>
                <a th:href="@{/admin/thanh-toan/lich-su(page=${currentPage + 1},size=${size},maCanHo=${maCanHo},phuongThuc=${phuongThuc},tuNgay=${tuNgay},denNgay=${denNgay})}"
                   th:classappend="${currentPage == totalPages - 1} ? 'opacity-40 pointer-events-none' : ''"
                   class="px-3 py-1.5 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-lg transition">Sau</a>
                <a th:href="@{/admin/thanh-toan/lich-su(page=${totalPages - 1},size=${size},maCanHo=${maCanHo},phuongThuc=${phuongThuc},tuNgay=${tuNgay},denNgay=${denNgay})}"
                   th:classappend="${currentPage == totalPages - 1} ? 'opacity-40 pointer-events-none' : ''"
                   class="px-3 py-1.5 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-lg transition" th:text="#{hd.ds.cuoi}">Cuối</a>
            </div>
        </div>
    </main>

    <div th:replace="~{fragments/datatable :: scripts}"></div>
    <script>
        document.addEventListener('DOMContentLoaded', function () { lucide.createIcons(); });
    </script>
</body>
</html>
