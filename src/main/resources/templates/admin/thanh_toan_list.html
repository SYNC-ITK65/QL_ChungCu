<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lịch Sử Thanh Toán</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="d-flex">
    <div th:replace="~{fragments/sidebar :: menu-trai}"></div>

    <div class="container-fluid p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Lịch Sử Giao Dịch / Thanh Toán</h2>
        </div>

        <table class="table table-striped table-hover border no-paging">
            <thead class="table-dark">
            <tr>
                <th>Mã GD</th>
                <th>Mã Hóa Đơn</th>
                <th>Căn Hộ</th>
                <th>Ngày Thanh Toán</th>
                <th>Số Tiền</th>
                <th>Phương Thức</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="tt : ${danhSachThanhToan}">
                <td th:text="${tt.id}">1</td>
                <td th:text="'HD-' + ${tt.hoaDon?.id}">HD-1</td>
                <td th:text="${tt.hoaDon?.canHo?.maCanHo ?: 'Chưa rõ'}">A1-01</td>
                <td th:text="${tt.ngayThanhToan != null ? #temporals.format(tt.ngayThanhToan, 'dd/MM/yyyy') : ''}">20/10/2026</td>
                <td class="text-success fw-bold" th:text="${tt.soTien != null ? #numbers.formatDecimal(tt.soTien, 0, 'COMMA', 0, 'POINT') + ' VNĐ' : '0 VNĐ'}">500,000 VNĐ</td>
                <td>
                    <span class="badge bg-info text-dark" th:text="${tt.phuongThuc}">Chuyển khoản</span>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(danhSachThanhToan)}">
                <td colspan="6" class="text-center text-muted">Chưa có giao dịch thanh toán nào.</td>
            </tr>
            </tbody>
        </table>
        <div th:replace="~{fragments/pagination :: paging('/admin/thanh-toan/lich-su', '')}"></div>
    </div>
</div>

    <!-- Dùng fragment Datatable chung -->
    <div th:replace="~{fragments/datatable :: scripts}"></div>
</body>
</html>
