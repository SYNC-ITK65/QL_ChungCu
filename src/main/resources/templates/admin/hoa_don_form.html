<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>Tạo Hóa Đơn Mới</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
    </style>
</head>
<body>
<div class="d-flex">
    <div th:replace="~{fragments/sidebar :: menu-trai}"></div>

    <div class="container-fluid p-4">
        <h2>Tạo Hóa Đơn Mới</h2>
        <hr>

        <form th:action="@{/admin/hoa-don/luu}" method="post" style="max-width: 600px;" id="invoiceForm">

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Ngày Phát Hành</label>
                    <input type="date" class="form-control" name="ngayPhatHanh" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Ngày Đến Hạn</label>
                    <input type="date" class="form-control" name="ngayDenHan" required>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Chọn Căn Hộ</label>
                <select class="form-select" name="canHoId" required>
                    <option value="" disabled selected>-- Chọn căn hộ cần xuất hóa đơn --</option>
                    <option th:each="ch : ${danhSachCanHo}"
                            th:value="${ch.id}"
                            th:text="${ch.maCanHo} + ' (' + ${ch.trangThai} + ')'">
                    </option>
                </select>
            </div>

            <button type="button" class="btn btn-success" onclick="submitForm()">Tính tiền & Lưu Hóa Đơn</button>
            <a th:href="@{/admin/hoa-don}" class="btn btn-secondary">Hủy</a>
        </form>

    <script>
        function submitForm() {
            console.log('Submit button clicked');
            const form = document.getElementById('invoiceForm');
            console.log('Form element:', form);
            console.log('Form action:', form.action);
            console.log('Form data:');
            
            const formData = new FormData(form);
            for (let [key, value] of formData.entries()) {
                console.log(key + ': ' + value);
            }
            
            form.submit();
        }
    </script>
    </div>
</div>
</body>
</html>
