<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title th:text="#{hdon.form.them_tieude}">Tạo Hóa Đơn Mới</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
    </style>
    <script>
        // Tự động điền ngày hiện tại khi trang load
        document.addEventListener('DOMContentLoaded', function() {
            const today = new Date().toISOString().split('T')[0];
            const ngayPhatHanhInput = document.querySelector('input[name="ngayPhatHanh"]');
            if (ngayPhatHanhInput) {
                ngayPhatHanhInput.value = today;
            }
        });
    </script>
</head>
<body>
<div class="d-flex">
    <div th:replace="~{fragments/sidebar :: menu-trai}"></div>

    <div class="container-fluid p-4">
        <h2 th:text="#{hdon.form.them_tieude}">Tạo Hóa Đơn Mới</h2>
        <hr>

        <!-- Hiển thị lỗi nếu có -->
        <div th:if="${errorMessage}" class="alert alert-danger" role="alert">
            <strong th:text="#{chung.loi}">Lỗi:</strong>
            <div th:utext="${#strings.replace(errorMessage, '&#10;', '&lt;br&gt;')}"></div>
        </div>

        <form th:action="@{/admin/hoa-don/luu}" method="post" style="max-width: 600px;" id="invoiceForm">

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label" th:text="#{hdon.form.ngay_phat_hanh}">Ngày Phát Hành</label>
                    <input type="date" class="form-control" name="ngayPhatHanh" required readonly>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label" th:text="#{hdon.form.han_thanh_toan}">Hạn thanh toán</label>
                    <select class="form-select" name="soNgay" required>
                        <option value="7" th:text="#{hdon.form.han_7_ngay}">7 ngày</option>
                        <option value="14" th:text="#{hdon.form.han_14_ngay}">14 ngày</option>
                        <option value="30" th:text="#{hdon.form.han_30_ngay}">30 ngày</option>
                    </select>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label" th:text="#{hdon.form.can_ho}">Chọn Căn Hộ</label>
                <select class="form-select" name="canHoId" required>
                    <option value="" disabled selected th:text="#{hdon.form.can_ho_chon}">-- Chọn căn hộ cần xuất hóa đơn --</option>
                    <option th:each="ch : ${danhSachCanHo}"
                            th:value="${ch.id}"
                            th:text="${ch.maCanHo} + ' (' + (${ch.trangThaiHienThi != null ? #messages.msg(ch.trangThaiHienThi) : ch.trangThai}) + ')'">
                    </option>
                </select>
            </div>

            <button type="submit" class="btn btn-success" th:text="#{hdon.form.nut_luu}">Tính tiền & Lưu Hóa Đơn</button>
            <a th:href="@{/admin/hoa-don}" class="btn btn-secondary" th:text="#{hdon.form.nut_huy}">Hủy</a>
        </form>
    </div>
</div>
</body>
</html>
