<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Tạo Hóa Đơn Mới</title>
    <link href="https://cdn.jsdelivr.net/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="d-flex">
    <div th:replace="~{fragments/sidebar :: menu-trai}"></div>

    <div class="container-fluid p-4">
        <h2>Tạo Hóa Đơn Mới</h2>
        <hr>

        <form th:action="@{/admin/hoa-don/luu}" th:object="${hoaDon}" method="post" style="max-width: 600px;">

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Ngày Phát Hành</label>
                    <input type="date" class="form-control" th:field="*{ngayPhatHanh}" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Ngày Đến Hạn</label>
                    <input type="date" class="form-control" th:field="*{ngayDenHan}" required>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Chọn Căn Hộ</label>
                <select class="form-select" name="canHoId" required>
                    <option value="" disabled selected>-- Chọn căn hộ cần xuất hóa đơn --</option>
                    <option th:each="ch : ${danhSachCanHo}"
                            th:value="${ch.id}"
                            th:text="${ch.maCanHo} + ' (' + ${ch.trangThai} + ')'">
                    </option>
                </select>
            </div>

            <button type="submit" class="btn btn-success">Tính tiền & Lưu Hóa Đơn</button>
            <a th:href="@{/admin/hoa-don}" class="btn btn-secondary">Hủy</a>
        </form>
    </div>
</div>
</body>
</html>
