<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Tạo Hóa Đơn</title>
    <link href="https://cdn.jsdelivr.net/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="d-flex">
    <div th:replace="~{fragments/sidebar :: menu-trai}"></div>

    <div class="container-fluid p-4">
        <h2>Tạo Hóa Đơn Mới</h2>
        <hr>
        <form th:action="@{/admin/hoa-don/luu}" th:object="${hoaDon}" method="post" style="max-width: 600px;">
            <div class="mb-3">
                <label class="form-label">Tháng/Năm (VD: 10/2026)</label>
                <input type="text" class="form-control" th:field="*{thangNam}" required>
            </div>

            <div class="mb-3">
                <label class="form-label">ID Căn Hộ</label>
                <input type="number" class="form-control" name="canHoId" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Chỉ số Điện tiêu thụ (kWh)</label>
                <input type="number" class="form-control" name="soDien" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Chỉ số Nước tiêu thụ (m3)</label>
                <input type="number" class="form-control" name="soNuoc" required>
            </div>

            <button type="submit" class="btn btn-success">Tính tiền & Lưu</button>
            <a th:href="@{/admin/hoa-don}" class="btn btn-secondary">Hủy</a>
        </form>
    </div>
</div>
</body>
</html>
