<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{pt.ui.quan_ly_bai_xe}">Quản Lý Bãi Xe</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts - Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            700: '#0369a1',
                            900: '#0c4a6e',
                        },
                        darkbg: '#0B0F17',
                        darkcard: '#161B26',
                        darkborder: '#242B3D'
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0B0F17;
            color: #E2E8F0;
            font-family: 'Inter', sans-serif;
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #111827;
        }

        ::-webkit-scrollbar-thumb {
            background: #374151;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #4B5563;
        }

        select.custom-select {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 0.75rem center;
            background-repeat: no-repeat;
            background-size: 1.5em 1.5em;
        }
    </style>
</head>

<body class="min-h-screen flex bg-darkbg text-slate-200 antialiased font-sans">

    <!-- Global Sidebar -->
    <div th:replace="~{fragments/sidebar :: menu-trai}"></div>

    <!-- Main Content -->
    <main class="flex-grow min-w-0 p-6 md:p-8 overflow-y-auto max-w-7xl mx-auto w-full">

        <!-- Notifications -->
        <div th:if="${thongBaoThanhCong}"
            class="mb-6 flex items-center justify-between p-4 bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 rounded-xl text-sm font-medium">
            <div class="flex items-center gap-2">
                <i data-lucide="check-circle" class="w-5 h-5"></i>
                <strong th:text="${thongBaoThanhCong}"></strong>
            </div>
            <button onclick="this.parentElement.remove()" class="text-emerald-400 hover:text-emerald-300"><i
                    data-lucide="x" class="w-4 h-4"></i></button>
        </div>

        <div th:if="${thongBaoLoi}"
            class="mb-6 flex items-center justify-between p-4 bg-red-500/10 border border-red-500/20 text-red-400 rounded-xl text-sm font-medium">
            <div class="flex items-center gap-2">
                <i data-lucide="alert-circle" class="w-5 h-5"></i>
                <strong th:text="${thongBaoLoi}"></strong>
            </div>
            <button onclick="this.parentElement.remove()" class="text-red-400 hover:text-red-300"><i data-lucide="x"
                    class="w-4 h-4"></i></button>
        </div>

        <!-- Page Header -->
        <div class="flex flex-col md:flex-row md:items-center justify-between mb-6 gap-4">
            <div>
                <h2 class="text-xl md:text-2xl font-bold text-white flex items-center gap-2">
                    <i data-lucide="car-front" class="w-6 h-6 text-brand-500"></i>
                    <span th:text="#{pt.ui.quan_ly_bai_xe_admi}">Quản Lý Bãi Xe (Admin)</span>
                </h2>
                <p class="text-xs text-slate-400 mt-1" th:text="#{admin.phuongtien.list.subtitle}">Danh sách xe trong
                    hầm</p>
            </div>
            <div class="flex gap-2">
                <a th:href="@{/admin/phuong-tien/xuat-excel(tuKhoa=${tuKhoa}, trangThai=${trangThai}, loaiXe=${loaiXe})}"
                    class="px-4 py-2 bg-emerald-500 hover:bg-emerald-600 text-white rounded-xl text-xs font-medium transition shadow-lg shadow-emerald-500/20 flex items-center gap-2">
                    <i data-lucide="file-spreadsheet" class="w-4 h-4"></i> <span th:text="#{chung.xuat_excel}">Xuất
                        Excel</span>
                </a>
            </div>
        </div>

        <!-- Search and Filter Form -->
        <div class="bg-darkcard p-5 rounded-2xl border border-darkborder mb-6 shadow-lg shadow-black/20">
            <form method="get" action="/admin/phuong-tien" class="grid grid-cols-1 md:grid-cols-12 gap-4">
                <div class="md:col-span-4 space-y-1.5">
                    <label class="text-xs font-semibold text-slate-300" th:text="#{hdon.ds.tim_kiem_label}">Tìm
                        kiếm</label>
                    <div class="relative">
                        <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-500"><i data-lucide="search"
                                class="w-4 h-4"></i></span>
                        <input type="text" name="tuKhoa" th:value="${tuKhoa}" th:placeholder="#{pt.ui.tim_kiem_goi_y}"
                            placeholder="Nhập biển số xe hoặc mã phòng..."
                            class="w-full bg-darkbg border border-darkborder rounded-xl py-2.5 pl-10 pr-4 text-xs text-white placeholder-slate-600 focus:outline-none focus:border-brand-500 transition">
                    </div>
                </div>
                <div class="md:col-span-3 space-y-1.5">
                    <label class="text-xs font-semibold text-slate-300" th:text="#{hdon.ds.bang_trang_thai}">Trạng
                        thái</label>
                    <select name="trangThai"
                        class="w-full bg-darkbg border border-darkborder rounded-xl py-2.5 px-3.5 text-xs text-white focus:outline-none focus:border-brand-500 transition appearance-none cursor-pointer custom-select">
                        <option value="" th:text="#{duyet.ui.tat_ca_trang_thai}">-- Tất cả trạng thái --</option>
                        <option value="Chờ duyệt" th:selected="${trangThai == 'Chờ duyệt'}"
                            th:text="#{pt.ui.cho_duyet}">Chờ duyệt</option>
                        <option value="Đã duyệt" th:selected="${trangThai == 'Đã duyệt'}" th:text="#{pt.ui.da_duyet}">Đã
                            duyệt</option>
                        <option value="Từ chối" th:selected="${trangThai == 'Từ chối'}" th:text="#{pt.ui.tu_choi}">Từ
                            chối</option>
                    </select>
                </div>
                <div class="md:col-span-3 space-y-1.5">
                    <label class="text-xs font-semibold text-slate-300" th:text="#{hdon.chitiet.loai_xe}">Loại
                        xe</label>
                    <select name="loaiXe"
                        class="w-full bg-darkbg border border-darkborder rounded-xl py-2.5 px-3.5 text-xs text-white focus:outline-none focus:border-brand-500 transition appearance-none cursor-pointer custom-select">
                        <option value="" th:text="#{pt.ui.tat_ca_loai_xe}">-- Tất cả loại xe --</option>
                        <option value="Ô tô" th:selected="${loaiXe == 'Ô tô'}" th:text="#{pt.ui.o_to}">Ô tô</option>
                        <option value="Xe máy" th:selected="${loaiXe == 'Xe máy'}" th:text="#{pt.ui.xe_may}">Xe máy
                        </option>
                        <option value="Xe điện" th:selected="${loaiXe == 'Xe điện'}" th:text="#{pt.ui.xe_dien}">Xe điện
                        </option>
                        <option value="Xe đạp" th:selected="${loaiXe == 'Xe đạp'}" th:text="#{pt.ui.xe_dap}">Xe đạp
                        </option>
                    </select>
                </div>
                <div class="md:col-span-2 flex items-end">
                    <button type="submit"
                        class="w-full py-2.5 bg-brand-500 hover:bg-brand-600 text-white rounded-xl text-xs font-medium transition shadow-lg shadow-brand-500/25 flex items-center justify-center gap-2">
                        <i data-lucide="search" class="w-4 h-4"></i> <span th:text="#{hdon.ds.nut_tim_kiem}">Tìm
                            kiếm</span>
                    </button>
                </div>
            </form>
        </div>

        <!-- Table Card -->
        <div
            class="bg-darkcard rounded-2xl border border-darkborder overflow-hidden flex-grow flex flex-col shadow-lg shadow-black/20">
            <div class="p-4 border-b border-darkborder flex items-center justify-between bg-[#111622]">
                <h3 class="text-sm font-bold text-white flex items-center gap-2">
                    <i data-lucide="list" class="w-4.5 h-4.5 text-brand-400"></i>
                    <span th:text="#{pt.ui.danh_sach_xe_trong_h}">Danh sách xe trong hầm</span>
                </h3>
            </div>

            <div class="overflow-x-auto flex-grow">
                <table class="w-full text-left text-xs whitespace-nowrap">
                    <thead
                        class="bg-[#111622] text-slate-400 border-b border-darkborder uppercase tracking-wider text-[10px] font-semibold">
                        <tr>
                            <th class="px-4 py-3" th:text="#{pt.ui.id_xe}">ID Xe</th>
                            <th class="px-4 py-3" th:text="#{pt.ui.ma_ch}">Mã CH</th>
                            <th class="px-4 py-3" th:text="#{hdon.chitiet.bien_so}">Biển Số</th>
                            <th class="px-4 py-3" th:text="#{hdon.chitiet.loai_xe}">Loại Xe</th>
                            <th class="px-4 py-3" th:text="#{pt.ui.mau_xe}">Màu Xe</th>
                            <th class="px-4 py-3" th:text="#{pt.ui.hinh_anh}">Hình ảnh</th>
                            <th class="px-4 py-3" th:text="#{hdon.ds.bang_trang_thai}">Trạng Thái</th>
                            <th class="px-4 py-3 text-center" th:text="#{dv.ds.thao_tac}">Thao tác</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-darkborder text-slate-300">
                        <tr th:each="xe : ${danhSachXe}" class="hover:bg-slate-800/30 transition">
                            <td class="px-4 py-3 font-mono text-slate-400" th:text="${xe.id}"></td>
                            <td class="px-4 py-3 font-medium text-brand-400"
                                th:text="${xe.canHo != null} ? ${xe.canHo.maCanHo} : #{chung.trong}"></td>
                            <td class="px-4 py-3 font-bold text-white uppercase tracking-wider"
                                th:text="${xe.bienSoXe}"></td>
                            <td class="px-4 py-3">
                                <span
                                    class="px-2 py-1 rounded-md text-[10px] bg-slate-800 text-slate-300 border border-slate-700"
                                    th:text="${xe.loaiXe == 'Ô tô' ? #messages.msg('pt.ui.o_to') : (xe.loaiXe == 'Xe máy' ? #messages.msg('pt.ui.xe_may') : (xe.loaiXe == 'Xe điện' ? #messages.msg('pt.ui.xe_dien') : (xe.loaiXe == 'Xe đạp' ? #messages.msg('pt.ui.xe_dap') : xe.loaiXe)))}"></span>
                            </td>
                            <td class="px-4 py-3 text-slate-400" th:text="${xe.mauXe}"></td>
                            <td class="px-4 py-3">
                                <a th:if="${xe.hinhAnh != null}" th:href="${xe.hinhAnh}" target="_blank"
                                    class="block w-12 h-8 rounded-md overflow-hidden border border-slate-700 hover:border-brand-500 transition">
                                    <img th:src="${xe.hinhAnh}" alt="Ảnh xe" class="w-full h-full object-cover" />
                                </a>
                                <span th:if="${xe.hinhAnh == null}" class="text-[10px] text-slate-500 italic"
                                    th:text="#{pt.ui.khong_co_anh}">Không có ảnh</span>
                            </td>
                            <td class="px-4 py-3">
                                <span
                                    th:if="${xe.trangThai == null || #strings.isEmpty(xe.trangThai) || xe.trangThai == 'Chờ duyệt' || xe.trangThai == 'Đăng ký mới'}"
                                    class="px-2.5 py-1 rounded-md text-[10px] font-bold bg-amber-500/10 text-amber-400 border border-amber-500/20"
                                    th:text="#{pt.ui.cho_duyet}">⏳ Chờ duyệt</span>
                                <span th:if="${xe.trangThai == 'Đã duyệt'}"
                                    class="px-2.5 py-1 rounded-md text-[10px] font-bold bg-emerald-500/10 text-emerald-400 border border-emerald-500/20"
                                    th:text="#{pt.ui.da_duyet}">✅ Đã duyệt</span>
                                <span th:if="${xe.trangThai == 'Từ chối'}"
                                    class="px-2.5 py-1 rounded-md text-[10px] font-bold bg-red-500/10 text-red-400 border border-red-500/20"
                                    th:text="#{pt.ui.tu_choi}">❌ Từ chối</span>
                            </td>
                            <td class="px-4 py-3 text-center">
                                <div class="flex items-center justify-center gap-1.5 flex-wrap">
                                    <th:block
                                        th:if="${xe.trangThai == null || #strings.isEmpty(xe.trangThai) || xe.trangThai == 'Chờ duyệt' || xe.trangThai == 'Đăng ký mới'}">
                                        <a th:href="@{/admin/phuong-tien/duyet/{id}(id=${xe.id})}"
                                            class="px-2.5 py-1.5 bg-emerald-500/10 hover:bg-emerald-500/20 text-emerald-400 border border-emerald-500/20 rounded-lg text-xs font-semibold transition flex items-center gap-1"
                                            th:title="#{pt.ui.nut_duyet}">
                                            <i data-lucide="check" class="w-3.5 h-3.5"></i> <span
                                                th:text="#{pt.ui.nut_duyet}" class="hidden xl:inline">Duyệt</span>
                                        </a>
                                        <a th:href="@{/admin/phuong-tien/tu-choi/{id}(id=${xe.id})}"
                                            th:onclick="|return confirm('#{pt.ui.xac_nhan_tu_choi}')|"
                                            class="px-2.5 py-1.5 bg-amber-500/10 hover:bg-amber-500/20 text-amber-500 border border-amber-500/20 rounded-lg text-xs font-semibold transition flex items-center gap-1"
                                            th:title="#{pt.ui.nut_tu_choi}">
                                            <i data-lucide="x" class="w-3.5 h-3.5"></i> <span
                                                th:text="#{pt.ui.nut_tu_choi}" class="hidden xl:inline">Từ chối</span>
                                        </a>
                                    </th:block>

                                    <th:block th:if="${xe.trangThai == 'Đã duyệt' || xe.trangThai == 'Từ chối'}">
                                        <a th:href="@{/admin/phuong-tien/sua/{id}(id=${xe.id})}"
                                            th:onclick="|return confirm('#{pt.ui.xac_nhan_hoan_tac}')|"
                                            class="px-2.5 py-1.5 bg-slate-700 hover:bg-slate-600 text-slate-300 border border-slate-600 rounded-lg text-xs font-semibold transition flex items-center gap-1"
                                            th:title="#{pt.ui.nut_hoan_tac}">
                                            <i data-lucide="rotate-ccw" class="w-3.5 h-3.5"></i> <span
                                                th:text="#{pt.ui.nut_hoan_tac}" class="hidden xl:inline">Hoàn tác</span>
                                        </a>
                                    </th:block>

                                    <a th:href="@{/admin/phuong-tien/xoa/{id}(id=${xe.id})}"
                                        th:onclick="|return confirm('#{pt.ui.xac_nhan_xoa_xe}')|"
                                        class="px-2.5 py-1.5 bg-red-500/10 hover:bg-red-500/20 text-red-400 border border-red-500/20 rounded-lg text-xs font-semibold transition flex items-center gap-1"
                                        th:title="#{hd.ds.nut_xoa}">
                                        <i data-lucide="trash-2" class="w-3.5 h-3.5"></i> <span
                                            th:text="#{hd.ds.nut_xoa}" class="hidden xl:inline">Xóa</span>
                                    </a>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(danhSachXe)}">
                            <td colspan="8" class="px-4 py-8 text-center text-slate-500">
                                <div class="flex flex-col items-center justify-center gap-2">
                                    <i data-lucide="car" class="w-8 h-8 text-slate-600 mb-1"></i>
                                    <span th:text="#{pt.ui.khong_co_du_lieu}">Không có dữ liệu bãi xe.</span>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="p-4 border-t border-darkborder bg-[#111622]">
                <div
                    th:replace="~{fragments/pagination :: paging('/admin/phuong-tien', 'tuKhoa=' + (${tuKhoa} ?: '') + '&trangThai=' + (${trangThai} ?: '') + '&loaiXe=' + (${loaiXe} ?: ''))}">
                </div>
            </div>
        </div>

    </main>

    <!-- Script chung -->
    <div th:replace="~{fragments/datatable :: scripts}"></div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            if (typeof lucide !== 'undefined') {
                lucide.createIcons();
            }
        });
    </script>
</body>

</html>
