<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{pt.ui.quan_ly_bai_xe}">Quản Lý Bãi Xe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="d-flex">

    <div th:replace="~{fragments/sidebar :: menu-trai}"></div>

    <div class="flex-grow-1 p-4">
        <div class="bg-white p-4 shadow rounded">
            <h2 class="text-primary border-bottom pb-3 mb-4" th:text="#{pt.ui.quan_ly_bai_xe_admi}">🚗 Quản Lý Bãi Xe (Admin)</h2>
            <div th:if="${thongBaoThanhCong}" class="alert alert-success alert-dismissible fade show" role="alert">
                <strong th:text="${thongBaoThanhCong}"></strong>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div th:if="${thongBaoLoi}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <strong th:text="${thongBaoLoi}"></strong>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="row">
                <div class="col-md-12">
                    <h4 th:text="#{pt.ui.danh_sach_xe_trong_h}">Danh sách xe trong hầm</h4>
                    <form method="get" action="/admin/phuong-tien" class="row g-3 mb-4">
                        <div class="col-md-4">
                            <input type="text" name="tuKhoa" class="form-control" th:value="${tuKhoa}"
                                   placeholder="Nhập biển số xe hoặc mã phòng (VD: 29A, A1-05)...">
                        </div>

                        <div class="col-md-3">
                            <select name="trangThai" class="form-select">
                                <option value="">-- Tất cả trạng thái --</option>
                                <option value="Chờ duyệt" th:selected="${trangThai == 'Chờ duyệt'}">Chờ duyệt</option>
                                <option value="Đã duyệt" th:selected="${trangThai == 'Đã duyệt'}">Đã duyệt</option>
                                <option value="Từ chối" th:selected="${trangThai == 'Từ chối'}">Từ chối</option>
                            </select>
                        </div>

                        <div class="col-md-3">
                            <select name="loaiXe" class="form-select">
                                <option value="">-- Tất cả loại xe --</option>
                                <option value="Ô tô" th:selected="${loaiXe == 'Ô tô'}">Ô tô</option>
                                <option value="Xe máy" th:selected="${loaiXe == 'Xe máy'}">Xe máy</option>
                                <option value="Xe điện" th:selected="${loaiXe == 'Xe điện'}">Xe điện</option>
                                <option value="Xe đạp" th:selected="${loaiXe == 'Xe đạp'}">Xe đạp</option>
                            </select>
                        </div>

                        <div class="col-md-2">
                            <button type="submit" class="btn btn-primary w-100">
                                <i class="fas fa-search"></i> Tìm kiếm
                            </button>
                        </div>
                    </form>
                    <table class="table table-hover mt-3 no-paging">
                        <thead class="table-dark">
                        <tr>
                            <th>ID Xe</th>
                            <th th:text="#{pt.ui.ma_ch}">Mã CH</th>
                            <th th:text="#{hdon.chitiet.bien_so}">Biển Số</th>
                            <th th:text="#{hdon.chitiet.loai_xe}">Loại Xe</th>
                            <th th:text="#{pt.ui.mau_xe}">Màu Xe</th>
                            <th th:text="#{hdon.ds.bang_trang_thai}">Trạng Thái</th>
                            <th th:text="#{dv.ds.thao_tac}">Thao tác</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="xe : ${danhSachXe}">
                            <td th:text="${xe.id}"></td>
                            <td class="fw-bold" th:text="${xe.canHo != null} ? ${xe.canHo.id} : #{chung.trong}"></td>
                            <td th:text="${xe.bienSoXe}"></td>
                            <td th:text="${xe.loaiXe}"></td>
                            <td th:text="${xe.mauXe}"></td>

                            <td>
                                <span th:if="${xe.trangThai == null || #strings.isEmpty(xe.trangThai) || xe.trangThai == 'Chờ duyệt' || xe.trangThai == 'Đăng ký mới'}" class="badge bg-warning text-dark" th:text="#{pt.ui.cho_duyet}">⏳ Chờ duyệt</span>
                                <span th:if="${xe.trangThai == 'Đã duyệt'}" class="badge bg-success" th:text="#{pt.ui.da_duyet}">✅ Đã duyệt</span>
                                <span th:if="${xe.trangThai == 'Từ chối'}" class="badge bg-danger" th:text="#{pt.ui.tu_choi}">❌ Từ chối</span>
                                <span th:if="${xe.trangThai == 'Hủy duyệt'}" class="badge bg-secondary" th:text="#{pt.ui.huy_duyet}">🚫 Hủy duyệt</span>
                                <span th:if="${xe.trangThai != null &amp;&amp; xe.trangThai != 'Chờ duyệt' &amp;&amp; xe.trangThai != 'Đăng ký mới' &amp;&amp; xe.trangThai != 'Đã duyệt' &amp;&amp; xe.trangThai != 'Từ chối' &amp;&amp; xe.trangThai != 'Hủy duyệt'}" class="badge bg-dark" th:text="${xe.trangThai}">Trạng thái khác</span>
                            </td>

                            <td>
                                <a th:if="${xe.trangThai == null || #strings.isEmpty(xe.trangThai) || xe.trangThai != 'Đã duyệt'}" th:href="@{/admin/phuong-tien/duyet/{id}(id=${xe.id})}" class="btn btn-sm btn-success mb-1" th:text="#{dv.ds.duyet}">Duyệt</a>
                                <a th:if="${xe.trangThai == null || #strings.isEmpty(xe.trangThai) || xe.trangThai != 'Đã duyệt'}" th:href="@{/admin/phuong-tien/tu-choi/{id}(id=${xe.id})}" class="btn btn-sm btn-warning mb-1" th:onclick="|return confirm('#{pt.ui.xac_nhan_tu_choi}')|" th:text="#{dv.ds.tu_choi}">Từ chối</a>
                                <a th:if="${xe.trangThai == 'Đã duyệt'}" th:href="@{/admin/phuong-tien/huy-duyet/{id}(id=${xe.id})}" class="btn btn-sm btn-secondary mb-1" th:onclick="|return confirm('#{pt.ui.xac_nhan_huy_duyet}')|" th:text="#{dv.ds.huy_duyet}">Hủy duyệt</a>
                                <a th:if="${xe.trangThai == 'Đã duyệt' || xe.trangThai == 'Từ chối' || xe.trangThai == 'Hủy duyệt'}" th:href="@{/admin/phuong-tien/sua/{id}(id=${xe.id})}" class="btn btn-sm btn-primary mb-1" th:text="#{hdon.ds.nut_sua}">Sửa</a>

                                <a th:href="@{/admin/phuong-tien/xoa/{id}(id=${xe.id})}" class="btn btn-sm btn-outline-danger mb-1" th:onclick="|return confirm('#{pt.ui.xac_nhan_xoa_xe}')|" th:text="#{hd.ds.nut_xoa}">Xóa</a>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                    <div th:replace="~{fragments/pagination :: paging('/admin/phuong-tien', 'tuKhoa=' + (${tuKhoa} ?: '') + '&trangThai=' + (${trangThai} ?: '') + '&loaiXe=' + (${loaiXe} ?: ''))}"></div>
                </div>
            </div>
        </div>
    </div>
</div>


    <!-- Dùng fragment Datatable chung -->
    <div th:replace="~{fragments/datatable :: scripts}"></div>
</body>
</html>
