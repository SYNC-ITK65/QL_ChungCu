<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản Lý Bãi Xe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="d-flex">

    <div th:replace="~{fragments/sidebar :: menu-trai}"></div>

    <div class="container-fluid p-4">
        <div class="bg-white p-4 shadow rounded">
            <h2 class="text-primary border-bottom pb-3 mb-4">🚗 Quản Lý Bãi Xe (Admin)</h2>
            <div th:if="${thongBaoThanhCong}" class="alert alert-success alert-dismissible fade show" role="alert">
                <strong th:text="${thongBaoThanhCong}"></strong>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div th:if="${thongBaoLoi}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <strong th:text="${thongBaoLoi}"></strong>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="row">
                <div class="col-md-12">
                    <h4>Danh sách xe trong hầm</h4>
                    <table class="table table-hover mt-3">
                        <thead class="table-dark">
                        <tr>
                            <th>ID Xe</th>
                            <th>Mã CH</th>
                            <th>Biển Số</th>
                            <th>Loại Xe</th>
                            <th>Màu Xe</th>
                            <th>Trạng Thái</th> <th>Thao tác</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="xe : ${danhSachXe}">
                            <td th:text="${xe.id}"></td>
                            <td class="fw-bold" th:text="${xe.canHo != null ? xe.canHo.id : 'Trống'}"></td>
                            <td th:text="${xe.bienSoXe}"></td>
                            <td th:text="${xe.loaiXe}"></td>
                            <td th:text="${xe.mauXe}"></td>

                            <td>
                                <span th:if="${xe.trangThai == null || #strings.isEmpty(xe.trangThai) || xe.trangThai == 'Chờ duyệt' || xe.trangThai == 'Đăng ký mới'}" class="badge bg-warning text-dark">⏳ Chờ duyệt</span>
                                <span th:if="${xe.trangThai == 'Đã duyệt'}" class="badge bg-success">✅ Đã duyệt</span>
                                <span th:if="${xe.trangThai == 'Từ chối'}" class="badge bg-danger">❌ Từ chối</span>
                                <span th:if="${xe.trangThai == 'Hủy duyệt'}" class="badge bg-secondary">🚫 Hủy duyệt</span>
                                <span th:if="${xe.trangThai != null && xe.trangThai != 'Chờ duyệt' && xe.trangThai != 'Đăng ký mới' && xe.trangThai != 'Đã duyệt' && xe.trangThai != 'Từ chối' && xe.trangThai != 'Hủy duyệt'}"
                                      class="badge bg-dark"
                                      th:text="${xe.trangThai}">Trạng thái khác</span>
                            </td>

                            <td>
                                <a th:if="${xe.trangThai == null || #strings.isEmpty(xe.trangThai) || xe.trangThai != 'Đã duyệt'}"
                                   th:href="@{/admin/phuong-tien/duyet/{id}(id=${xe.id})}"
                                   class="btn btn-sm btn-success mb-1">Duyệt</a>
                                <a th:if="${xe.trangThai == null || #strings.isEmpty(xe.trangThai) || xe.trangThai != 'Đã duyệt'}"
                                   th:href="@{/admin/phuong-tien/tu-choi/{id}(id=${xe.id})}"
                                   class="btn btn-sm btn-warning mb-1"
                                   onclick="return confirm('Bạn có chắc muốn từ chối đăng ký xe này?');">Từ chối</a>
                                <a th:if="${xe.trangThai == 'Đã duyệt'}"
                                   th:href="@{/admin/phuong-tien/huy-duyet/{id}(id=${xe.id})}"
                                   class="btn btn-sm btn-secondary mb-1"
                                   onclick="return confirm('Bạn có chắc muốn hủy duyệt xe này?');">Hủy duyệt</a>
                                <a th:if="${xe.trangThai == 'Đã duyệt' || xe.trangThai == 'Từ chối' || xe.trangThai == 'Hủy duyệt'}"
                                   th:href="@{/admin/phuong-tien/sua/{id}(id=${xe.id})}"
                                   class="btn btn-sm btn-primary mb-1">Sửa</a>

                                <a th:href="@{/admin/phuong-tien/xoa/{id}(id=${xe.id})}"
                                   class="btn btn-sm btn-outline-danger mb-1"
                                   onclick="return confirm('Bạn có chắc muốn xóa xe này?');">Xóa</a>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
