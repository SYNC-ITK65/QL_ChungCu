<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản Lý Bãi Xe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="d-flex">

    <div th:replace="~{fragments/sidebar :: menu-trai}"></div>

    <div class="container-fluid p-4">
        <div class="bg-white p-4 shadow rounded">
            <h2 class="text-primary border-bottom pb-3 mb-4">🚗 Quản Lý Bãi Xe</h2>
            <div th:if="${thongBaoThanhCong}" class="alert alert-success alert-dismissible fade show" role="alert">
                <strong th:text="${thongBaoThanhCong}"></strong>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div th:if="${thongBaoLoi}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <strong th:text="${thongBaoLoi}"></strong>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div class="row">

                <div class="col-md-4 border-end">
                    <h4>Đăng ký xe mới</h4>

                    <form th:action="@{/admin/phuong-tien/luu}" th:object="${xeMoi}" method="post">
                        <div class="mb-3">
                            <label class="form-label text-danger fw-bold">Mã ID Căn Hộ (Chủ xe):</label>
                            <input type="number" th:field="*{canHo.id}" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Biển số xe:</label>
                            <input type="text" th:field="*{bienSoXe}" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Loại xe:</label>
                            <select th:field="*{loaiXe}" class="form-select">
                                <option value="Xe máy">Xe máy</option>
                                <option value="Ô tô">Ô tô</option>
                                <option value="Xe tăng">Xe tăng</option>
                                <option value="Xe lăn">Xe lăn</option>
                                <option value="Xe đạp">Xe đạp</option>
                                <option value="Máy bay">Máy bay</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Màu xe:</label>
                            <input type="text" th:field="*{mauXe}" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Đăng ký ngay</button>
                    </form>
                </div>

                <div class="col-md-8">
                    <h4>Danh sách xe trong hầm</h4>
                    <table class="table table-hover mt-3">
                        <thead class="table-dark">
                        <tr>
                            <th>ID Xe</th>
                            <th>Mã Căn Hộ</th>
                            <th>Biển Số</th>
                            <th>Loại Xe</th>
                            <th>Màu Xe</th>
                            <th>Thao tác</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="xe : ${danhSachXe}">
                            <td th:text="${xe.id}"></td>
                            <td class="fw-bold" th:text="${xe.canHo != null ? xe.canHo.id : 'Trống'}"></td>
                            <td th:text="${xe.bienSoXe}"></td>
                            <td th:text="${xe.loaiXe}"></td>
                            <td th:text="${xe.mauXe}"></td>
                            <td>
                                <a th:href="@{/admin/phuong-tien/xoa/{id}(id=${xe.id})}"
                                   class="btn btn-sm btn-outline-danger"
                                   onclick="return confirm('Bạn có chắc muốn xóa xe này?');">Xóa</a>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
