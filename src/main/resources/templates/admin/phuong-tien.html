<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{pt.ui.quan_ly_bai_xe}">Quản Lý Bãi Xe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="d-flex">

    <div th:replace="~{fragments/sidebar :: menu-trai}"></div>

    <div class="flex-grow-1 p-4">
        <div class="bg-white p-4 shadow rounded">
            <div class="d-flex justify-content-between align-items-center border-bottom pb-3 mb-4">
                <h2 class="text-primary mb-0" th:text="#{pt.ui.quan_ly_bai_xe_admi}">🚗 Quản Lý Bãi Xe (Admin)</h2>
                <a th:href="@{/admin/phuong-tien/xuat-excel(tuKhoa=${tuKhoa}, trangThai=${trangThai}, loaiXe=${loaiXe})}" class="btn btn-success fw-bold">
                    <i class="fas fa-file-excel"></i> <span th:text="#{chung.xuat_excel}">Xuất Excel</span>
                </a>
            </div>
            <div th:if="${thongBaoThanhCong}" class="alert alert-success alert-dismissible fade show" role="alert">
                <strong th:text="${thongBaoThanhCong}"></strong>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div th:if="${thongBaoLoi}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <strong th:text="${thongBaoLoi}"></strong>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="row">
                <div class="col-md-12">
                    <h4 th:text="#{pt.ui.danh_sach_xe_trong_h}">Danh sách xe trong hầm</h4>
                    <form method="get" action="/admin/phuong-tien" class="row g-3 mb-4">
                        <div class="col-md-4">
                            <input type="text" name="tuKhoa" class="form-control" th:value="${tuKhoa}"
                                   th:placeholder="#{pt.ui.tim_kiem_goi_y}" placeholder="Nhập biển số xe hoặc mã phòng (VD: 29A, A1-05)...">
                        </div>

                        <div class="col-md-3">
                            <select name="trangThai" class="form-select">
                                <option value="" th:text="#{duyet.ui.tat_ca_trang_thai}">-- Tất cả trạng thái --</option>
                                <option value="Chờ duyệt" th:selected="${trangThai == 'Chờ duyệt'}" th:text="#{pt.ui.cho_duyet}">Chờ duyệt</option>
                                <option value="Đã duyệt" th:selected="${trangThai == 'Đã duyệt'}" th:text="#{pt.ui.da_duyet}">Đã duyệt</option>
                                <option value="Từ chối" th:selected="${trangThai == 'Từ chối'}" th:text="#{pt.ui.tu_choi}">Từ chối</option>
                            </select>
                        </div>

                        <div class="col-md-3">
                            <select name="loaiXe" class="form-select">
                                <option value="" th:text="#{pt.ui.tat_ca_loai_xe}">-- Tất cả loại xe --</option>
                                <option value="Ô tô" th:selected="${loaiXe == 'Ô tô'}" th:text="#{pt.ui.o_to}">Ô tô</option>
                                <option value="Xe máy" th:selected="${loaiXe == 'Xe máy'}" th:text="#{pt.ui.xe_may}">Xe máy</option>
                                <option value="Xe điện" th:selected="${loaiXe == 'Xe điện'}" th:text="#{pt.ui.xe_dien}">Xe điện</option>
                                <option value="Xe đạp" th:selected="${loaiXe == 'Xe đạp'}" th:text="#{pt.ui.xe_dap}">Xe đạp</option>
                            </select>
                        </div>

                        <div class="col-md-2">
                            <button type="submit" class="btn btn-primary w-100">
                                <i class="fas fa-search"></i> <span th:text="#{hdon.ds.nut_tim_kiem}" th:remove="tag">Tìm kiếm</span>
                            </button>
                        </div>
                    </form>
                    <table class="table table-hover mt-3 no-paging">
                        <thead class="table-dark">
                        <tr>
                            <th>ID Xe</th>
                            <th th:text="#{pt.ui.ma_ch}">Mã CH</th>
                            <th th:text="#{hdon.chitiet.bien_so}">Biển Số</th>
                            <th th:text="#{hdon.chitiet.loai_xe}">Loại Xe</th>
                            <th th:text="#{pt.ui.mau_xe}">Màu Xe</th>
                            <th th:text="#{hdon.ds.bang_trang_thai}">Trạng Thái</th>
                            <th th:text="#{dv.ds.thao_tac}">Thao tác</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="xe : ${danhSachXe}">
                            <td th:text="${xe.id}"></td>
                            <td class="fw-bold" th:text="${xe.canHo != null} ? ${xe.canHo.id} : #{chung.trong}"></td>
                            <td th:text="${xe.bienSoXe}"></td>
                            <td th:text="${xe.loaiXe}"></td>
                            <td th:text="${xe.mauXe}"></td>

                            <td>
                                <span th:if="${xe.trangThai == null || #strings.isEmpty(xe.trangThai) || xe.trangThai == 'Chờ duyệt' || xe.trangThai == 'Đăng ký mới'}" class="badge bg-warning text-dark" th:text="#{pt.ui.cho_duyet}">⏳ Chờ duyệt</span>
                                <span th:if="${xe.trangThai == 'Đã duyệt'}" class="badge bg-success" th:text="#{pt.ui.da_duyet}">✅ Đã duyệt</span>
                                <span th:if="${xe.trangThai == 'Từ chối'}" class="badge bg-danger" th:text="#{pt.ui.tu_choi}">❌ Từ chối</span>
                            </td>

                            <td>
                                <th:block th:if="${xe.trangThai == null || #strings.isEmpty(xe.trangThai) || xe.trangThai == 'Chờ duyệt' || xe.trangThai == 'Đăng ký mới'}">
                                    <a th:href="@{/admin/phuong-tien/duyet/{id}(id=${xe.id})}" class="btn btn-sm btn-success mb-1" th:text="#{pt.ui.nut_duyet}">Duyệt</a>
                                    <a th:href="@{/admin/phuong-tien/tu-choi/{id}(id=${xe.id})}" class="btn btn-sm btn-warning mb-1" th:onclick="|return confirm('#{pt.ui.xac_nhan_tu_choi}')|" th:text="#{pt.ui.nut_tu_choi}">Từ chối</a>
                                </th:block>

                                <th:block th:if="${xe.trangThai == 'Đã duyệt' || xe.trangThai == 'Từ chối'}">
                                    <a th:href="@{/admin/phuong-tien/sua/{id}(id=${xe.id})}" class="btn btn-sm btn-secondary mb-1" th:onclick="|return confirm('#{pt.ui.xac_nhan_hoan_tac}')|" th:text="#{pt.ui.nut_hoan_tac}">⏳ Hoàn tác</a>
                                </th:block>

                                <a th:href="@{/admin/phuong-tien/xoa/{id}(id=${xe.id})}" class="btn btn-sm btn-outline-danger mb-1" th:onclick="|return confirm('#{pt.ui.xac_nhan_xoa_xe}')|" th:text="#{hd.ds.nut_xoa}">Xóa</a>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                    <div th:replace="~{fragments/pagination :: paging('/admin/phuong-tien', 'tuKhoa=' + (${tuKhoa} ?: '') + '&trangThai=' + (${trangThai} ?: '') + '&loaiXe=' + (${loaiXe} ?: ''))}"></div>
                </div>
            </div>
        </div>
    </div>
</div>


    <!-- Dùng fragment Datatable chung -->
    <div th:replace="~{fragments/datatable :: scripts}"></div>
</body>
</html>
