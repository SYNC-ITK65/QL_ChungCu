<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Form Thông báo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div th:replace="~{fragments/sidebar :: menu-trai}"></div>

    <div class="card shadow-sm mt-3 mb-4">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0" th:text="${thongBao.id == null ? 'Thêm Thông báo / Cẩm nang mới' : 'Cập nhật Thông báo / Cẩm nang'}"></h4>
        </div>
        <div class="card-body">
            <form th:action="@{/admin/thong-bao/luu}" th:object="${thongBao}" method="post">
                <input type="hidden" th:field="*{id}">

                <div class="row">
                    <div class="col-md-9">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Tiêu đề</label>
                            <input type="text" class="form-control form-control-lg" th:field="*{tieuDe}" required placeholder="Nhập tiêu đề thông báo...">
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Loại bài viết</label>
                            <select class="form-select" th:field="*{loai}">
                                <option value="1">📢 Bảng tin chung</option>
                                <option value="2">📚 Cẩm nang cư dân</option>
                            </select>
                        </div>
                    </div>
                </div>
                
                <div class="row mb-2">
                    <div class="col-md-4">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Đối tượng nhận thông báo</label>
                            <select class="form-select" th:field="*{doiTuongGui}" id="doiTuongGui" onchange="toggleDoiTuongInput()">
                                <option value="ALL">Gửi cho tất cả (Mặc định)</option>
                                <option value="HO_GIA_DINH">Gửi theo một hộ cụ thể</option>
                                <option value="NHIEU_HO">Gửi theo nhiều hộ</option>
                                <option value="TANG">Gửi theo tầng</option>
                            </select>
                        </div>
                    </div>
                    <div class="col-md-8" id="khungDoiTuong" style="display: none;">
                        <div class="mb-3">
                            <label class="form-label fw-bold text-primary" id="nhanDoiTuong">Phân cách các hộ/tầng bằng dấu phẩy</label>
                            <input type="text" class="form-control form-control-lg" th:field="*{giaTriDoiTuong}" id="giaTriDoiTuong" placeholder="Ví dụ: P101, P102 hoặc Tầng 1, Tầng 2">
                        </div>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Nội dung chi tiết (Nhập mã HTML)</label>
                    <textarea class="form-control font-monospace" th:field="*{noiDung}" rows="15" placeholder="<h2>Tiêu đề HTML</h2><p>Nội dung văn bản</p>"></textarea>
                </div>

                <div class="card bg-light mb-3">
                    <div class="card-body py-2">
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary px-4">
                                <i class="bi bi-save me-1"></i> Lưu bài viết
                            </button>
                            <a th:href="@{/admin/thong-bao}" class="btn btn-outline-secondary">
                                <i class="bi bi-x-circle me-1"></i> Hủy bỏ
                            </a>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- Bootstrap & TinyMCE -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script>
        function toggleDoiTuongInput() {
            var selectObj = document.getElementById("doiTuongGui").value;
            var inputContainer = document.getElementById("khungDoiTuong");
            var labelObj = document.getElementById("nhanDoiTuong");
            var inputField = document.getElementById("giaTriDoiTuong");

            // Xử lý null khi backend trả ra entity mới
            if (!selectObj) selectObj = "ALL";

            if (selectObj === "ALL") {
                inputContainer.style.display = "none";
                inputField.removeAttribute("required");
            } else {
                inputContainer.style.display = "block";
                inputField.setAttribute("required", "required");
                
                if (selectObj === "HO_GIA_DINH") {
                    labelObj.innerText = "Mã hộ gia đình nhận thông báo";
                    inputField.placeholder = "Nhập mã căn hộ (VD: C201)";
                } else if (selectObj === "NHIEU_HO") {
                    labelObj.innerText = "Danh sách mã hộ (Phân cách bằng dấu phẩy)";
                    inputField.placeholder = "Nhập các căn hộ (VD: C201, C202, D101)";
                } else if (selectObj === "TANG") {
                    labelObj.innerText = "Danh sách tầng (Phân cách bằng dấu phẩy)";
                    inputField.placeholder = "Nhập số tầng (VD: 2, 5, 10)";
                }
            }
        }

        // Tự động kích hoạt khi load trang để phục hồi dữ liệu lúc xem/sửa
        document.addEventListener("DOMContentLoaded", function() {
            toggleDoiTuongInput();
        });
    </script>

</body>

</html>
