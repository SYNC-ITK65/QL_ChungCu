<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title th:text="#{tb.form.tieude}">Form Thông báo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- Summernote Lite CSS -->
    <link href="https://cdn.jsdelivr.net/npm/summernote@0.8.20/dist/summernote-lite.min.css" rel="stylesheet">
</head>

<body>
    <div class="d-flex">
        <div th:replace="~{fragments/sidebar :: menu-trai}"></div>

        <div class="flex-grow-1 p-4">
            <div class="card shadow-sm mb-4">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0" th:text="${thongBao.id == null ? #messages.msg('admin.thongbao.form.addTitle') : #messages.msg('admin.thongbao.form.editTitle')}"></h4>
                </div>
                <div class="card-body">
                    <form th:action="@{/admin/thong-bao/luu}" th:object="${thongBao}" method="post">
                        <input type="hidden" th:field="*{id}">

                        <div class="row">
                            <div class="col-md-9">
                                <div class="mb-3">
                                    <label class="form-label fw-bold" th:text="#{tb.form.tieude}">Tiêu đề</label>
                                    <input type="text" class="form-control form-control-lg" th:field="*{tieuDe}" required th:placeholder="#{tb.form.tieude_goi_y}">
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="mb-3">
                                    <label class="form-label fw-bold" th:text="#{tb.form.loai}">Loại bài viết</label>
                                    <select class="form-select" th:field="*{loai}">
                                        <option value="1" th:text="#{tb.loai.tin_tuc}">📢 Bảng tin chung</option>
                                        <option value="2" th:text="#{tb.loai.cam_nang}">📚 Cẩm nang cư dân</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                        
                        <div class="row mb-2">
                            <div class="col-md-4">
                                <div class="mb-3">
                                    <label class="form-label fw-bold" th:text="#{tb.form.doi_tuong}">Đối tượng nhận thông báo</label>
                                    <select class="form-select" th:field="*{doiTuongGui}" id="doiTuongGui" onchange="toggleDoiTuongInput()">
                                        <option value="ALL" th:text="#{tb.dt.tat_ca}">Gửi cho tất cả (Mặc định)</option>
                                        <option value="HO_GIA_DINH" th:text="#{tb.dt.ho_dan}">Gửi theo một hộ cụ thể</option>
                                        <option value="NHIEU_HO" th:text="#{tb.dt.nhieu_ho}">Gửi theo nhiều hộ</option>
                                        <option value="TANG" th:text="#{tb.dt.tang}">Gửi theo tầng</option>
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-8" id="khungDoiTuong" style="display: none;">
                                <div class="mb-3">
                                    <label class="form-label fw-bold text-primary" id="nhanDoiTuong" th:text="#{tb.form.ds_tang}">Phân cách các hộ/tầng bằng dấu phẩy</label>
                                    <input type="hidden" id="giaTriDoiTuongText" th:field="*{giaTriDoiTuong}">
                                    
                                    <!-- Container for apartment selection -->
                                    <div id="canHoSelectContainer" style="display: none;">
                                        <select class="form-select" id="chonCanHo" multiple="multiple" style="width: 100%;">
                                            <option th:each="ch : ${danhSachCanHo}" 
                                                    th:value="${ch.maCanHo}" 
                                                    th:text="${ch.maCanHo} + ' (' + ${ch.trangThai} + ')'">
                                            </option>
                                        </select>
                                    </div>
                                    
                                    <!-- Container for floor text input -->
                                    <div id="tangInputContainer" style="display: none;">
                                        <input type="text" class="form-control form-control-lg" id="nhapTang" th:placeholder="#{tb.form.ds_tang_goi_y}">
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold" th:text="#{tb.form.noi_dung}">Nội dung chi tiết</label>
                            <textarea class="form-control" th:field="*{noiDung}" id="noiDung" rows="15"></textarea>
                        </div>

                        <div class="card bg-light mb-3">
                            <div class="card-body py-2">
                                <div class="d-flex gap-2">
                                    <button type="submit" class="btn btn-primary px-4">
                                        <i class="bi bi-save me-1"></i> <span th:text="#{tb.form.nut_luu}">Lưu bài viết</span>
                                    </button>
                                    <a th:href="@{/admin/thong-bao}" class="btn btn-outline-secondary">
                                        <i class="bi bi-x-circle me-1"></i> <span th:text="#{chung.huy}">Hủy bỏ</span>
                                    </a>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- jQuery & Select2 -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

    <!-- Summernote Lite JS -->
    <script src="https://cdn.jsdelivr.net/npm/summernote@0.8.20/dist/summernote-lite.min.js"></script>

    <script>
        $(document).ready(function() {
            // Khởi tạo Summernote WYSIWYG trên textarea #noiDung
            $('#noiDung').summernote({
                height: 300,
                placeholder: 'Soạn thảo nội dung...',
                tabsize: 2,
                toolbar: [
                    ['style', ['style']],
                    ['font', ['bold', 'underline', 'italic', 'clear']],
                    ['fontname', ['fontname']],
                    ['fontsize', ['fontsize']],
                    ['color', ['color']],
                    ['para', ['ul', 'ol', 'paragraph']],
                    ['table', ['table']],
                    ['insert', ['link', 'picture', 'hr']],
                    ['view', ['fullscreen', 'codeview', 'help']]
                ]
            });

            // Khởi tạo Select2 cho chọn căn hộ
            $('#chonCanHo').select2({
                placeholder: "Chọn căn hộ",
                allowClear: true,
                width: '100%'
            });

            // Update hidden input when select changes
            $('#chonCanHo').on('change', function() {
                var vals = $(this).val();
                $('#giaTriDoiTuongText').val(vals ? vals.join(', ') : '');
            });

            // Update hidden input when tang text changes
            $('#nhapTang').on('input', function() {
                $('#giaTriDoiTuongText').val($(this).val());
            });

            // Initialize values dynamically based on old value if editing
            initOldValues();
        });

        function toggleDoiTuongInput() {
            var selectObj = document.getElementById("doiTuongGui").value;
            var inputContainer = document.getElementById("khungDoiTuong");
            var labelObj = document.getElementById("nhanDoiTuong");
            
            var canHoContainer = document.getElementById("canHoSelectContainer");
            var tangContainer = document.getElementById("tangInputContainer");
            var txtInput = document.getElementById("giaTriDoiTuongText");

            if (!selectObj) selectObj = "ALL";

            if (selectObj === "ALL") {
                inputContainer.style.display = "none";
                txtInput.removeAttribute("required");
                $('#chonCanHo').removeAttr("required");
                $('#nhapTang').removeAttr("required");
                // Clear state when swapping
                txtInput.value = "";
                $('#chonCanHo').val(null).trigger('change');
                $('#nhapTang').val("");
            } else {
                inputContainer.style.display = "block";
                
                if (selectObj === "HO_GIA_DINH" || selectObj === "NHIEU_HO") {
                    labelObj.innerText = selectObj === "HO_GIA_DINH" ? "Chọn 1 hộ gia đình nhận thông báo" : "Chọn nhiều hộ gia đình";
                    canHoContainer.style.display = "block";
                    tangContainer.style.display = "none";
                    $('#chonCanHo').attr("required", "required");
                    $('#nhapTang').removeAttr("required");
                    
                    if (selectObj === "HO_GIA_DINH") {
                        $('#chonCanHo').select2({ maximumSelectionLength: 1, width: '100%' });
                    } else {
                        $('#chonCanHo').select2({ maximumSelectionLength: 0, width: '100%' });
                    }
                    
                    // Trigger change to sync values
                    var vals = $('#chonCanHo').val();
                    txtInput.value = vals ? vals.join(', ') : '';
                } else if (selectObj === "TANG") {
                    labelObj.innerText = "Danh sách tầng (Phân cách bằng dấu phẩy)";
                    canHoContainer.style.display = "none";
                    tangContainer.style.display = "block";
                    $('#nhapTang').attr("required", "required");
                    $('#chonCanHo').removeAttr("required");
                    
                    // Trigger sync
                    txtInput.value = $('#nhapTang').val();
                }
            }
        }

        function initOldValues() {
            var selectObj = document.getElementById("doiTuongGui").value;
            var txtInput = document.getElementById("giaTriDoiTuongText").value;
            
            if (txtInput) {
                if (selectObj === "HO_GIA_DINH" || selectObj === "NHIEU_HO") {
                    var selectedArray = txtInput.split(',').map(item => item.trim());
                    $('#chonCanHo').val(selectedArray).trigger('change');
                } else if (selectObj === "TANG") {
                    $('#nhapTang').val(txtInput);
                }
            }
        }

        document.addEventListener("DOMContentLoaded", function() {
            setTimeout(toggleDoiTuongInput, 100);
        });
    </script>

</body>

</html>
