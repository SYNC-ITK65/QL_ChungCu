<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{tb.form.tieude}">Form Thông báo</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts - Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Summernote Lite CSS -->
    <link href="https://cdn.jsdelivr.net/npm/summernote@0.8.20/dist/summernote-lite.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            700: '#0369a1',
                            900: '#0c4a6e',
                        },
                        darkbg: '#0B0F17',
                        darkcard: '#161B26',
                        darkborder: '#242B3D'
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0B0F17;
            color: #E2E8F0;
            font-family: 'Inter', sans-serif;
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #111827;
        }
        ::-webkit-scrollbar-thumb {
            background: #374151;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #4B5563;
        }

        /* Select2 Dark Mode overrides */
        .select2-container--default .select2-selection--multiple {
            background-color: #0B0F17 !important;
            border: 1px solid #242B3D !important;
            border-radius: 0.75rem !important;
            min-height: 42px !important;
            padding: 2px 6px !important;
        }
        .select2-container--default .select2-selection--multiple .select2-selection__choice {
            background-color: #161B26 !important;
            border: 1px solid #242B3D !important;
            color: #E2E8F0 !important;
            border-radius: 0.5rem !important;
            padding: 2px 8px !important;
            font-size: 11px !important;
            margin-top: 4px !important;
        }
        .select2-container--default .select2-selection--multiple .select2-selection__choice__remove {
            color: #ef4444 !important;
            margin-right: 6px !important;
        }
        .select2-dropdown {
            background-color: #161B26 !important;
            border: 1px solid #242B3D !important;
            color: #E2E8F0 !important;
            border-radius: 0.75rem !important;
            overflow: hidden !important;
        }
        .select2-container--default .select2-results__option--highlighted[aria-selected] {
            background-color: #0ea5e9 !important;
        }
        .select2-container--default .select2-results__option[aria-selected=true] {
            background-color: #242B3D !important;
        }
        .select2-container--default .select2-search--inline .select2-search__field {
            color: white !important;
            font-size: 12px !important;
        }

        /* Summernote Dark Mode adjustments */
        .note-editor.note-frame {
            border: 1px solid #242B3D !important;
            background-color: #161B26 !important;
            color: #E2E8F0 !important;
            border-radius: 0.75rem !important;
            overflow: hidden !important;
        }
        .note-editor.note-frame .note-statusbar {
            background-color: #0B0F17 !important;
            border-top: 1px solid #242B3D !important;
        }
        .note-editor.note-frame .note-editing-area {
            background-color: #0B0F17 !important;
            color: #E2E8F0 !important;
        }
        .note-editor.note-frame .note-editable {
            background-color: #0B0F17 !important;
            color: #E2E8F0 !important;
        }
        .note-editor.note-frame .note-placeholder {
            color: #4B5563 !important;
        }
        .note-toolbar {
            background-color: #0B0F17 !important;
            border-bottom: 1px solid #242B3D !important;
            color: #E2E8F0 !important;
        }
        .note-btn {
            background-color: #161B26 !important;
            border: 1px solid #242B3D !important;
            color: #CBD5E1 !important;
        }
        .note-btn:hover {
            background-color: #242B3D !important;
            color: #ffffff !important;
        }
        .note-dropdown-menu {
            background-color: #161B26 !important;
            border: 1px solid #242B3D !important;
            color: #E2E8F0 !important;
        }
        .note-dropdown-item {
            color: #E2E8F0 !important;
            background-color: transparent !important;
        }
        .note-dropdown-item:hover {
            background-color: #242B3D !important;
            color: #ffffff !important;
        }
        .note-modal-content {
            background-color: #161B26 !important;
            color: #E2E8F0 !important;
            border: 1px solid #242B3D !important;
            border-radius: 0.75rem !important;
        }
        .note-modal-header {
            border-bottom: 1px solid #242B3D !important;
            color: #ffffff !important;
        }
        .note-modal-footer {
            border-top: 1px solid #242B3D !important;
        }
        .note-modal-title {
            color: #ffffff !important;
        }
        .note-form-label {
            color: #94A3B8 !important;
        }
        .note-input {
            background-color: #0B0F17 !important;
            border: 1px solid #242B3D !important;
            color: #ffffff !important;
            border-radius: 0.5rem !important;
        }
    </style>
</head>

<body class="min-h-screen flex bg-darkbg text-slate-200 antialiased font-sans">
    <!-- Sidebar -->
    <div th:replace="fragments/sidebar :: menu-trai"></div>

    <!-- Main Content -->
    <main class="flex-grow p-6 md:p-8 overflow-y-auto w-full flex flex-col items-center">
        <!-- Header -->
        <div class="w-full max-w-5xl flex items-center justify-between gap-4 mb-8">
            <div>
                <h1 class="text-2xl font-bold text-white tracking-tight" 
                    th:text="${thongBao.id == null} ? #{tb.form.them_tieude} : #{tb.form.sua_tieude}">
                    Form Thông báo
                </h1>
                <p class="text-sm text-slate-400 mt-1" th:text="#{admin.thongbao.form.subtitle}">Soạn thảo bài viết, tin tức chung hoặc cẩm nang cư dân</p>
            </div>
            <a th:href="@{/admin/thong-bao}" 
               class="px-4 py-2 bg-slate-800 hover:bg-slate-700 active:bg-slate-900 text-slate-300 text-xs font-semibold rounded-xl transition flex items-center gap-1.5 shadow-sm">
                <i data-lucide="arrow-left" class="w-4 h-4"></i>
                <span th:text="#{chung.huy}">Hủy bỏ</span>
            </a>
        </div>

        <!-- Alert Message -->
        <div th:if="${errorMessage}" class="w-full max-w-5xl mb-6 p-4 bg-rose-500/10 border border-rose-500/20 text-rose-400 rounded-2xl flex items-center gap-3 shadow-lg" role="alert">
            <i data-lucide="alert-circle" class="w-5 h-5 flex-shrink-0"></i>
            <span class="text-sm font-medium" th:text="${errorMessage}"></span>
        </div>

        <!-- Form Card -->
        <div class="w-full max-w-5xl bg-darkcard border border-darkborder rounded-2xl p-6 md:p-8 shadow-xl">
            <form th:action="@{/admin/thong-bao/luu}" th:object="${thongBao}" method="post" class="space-y-6">
                <input type="hidden" th:field="*{id}">

                <div class="grid grid-cols-1 md:grid-cols-12 gap-6">
                    <!-- Tiêu đề -->
                    <div class="md:col-span-8">
                        <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2" th:text="#{tb.form.tieude}">Tiêu đề</label>
                        <input type="text" th:field="*{tieuDe}" required th:placeholder="#{tb.form.tieude_goi_y}"
                               class="w-full bg-darkbg border border-darkborder rounded-xl px-4 py-3 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-brand-500 transition">
                        <div class="text-rose-400 text-xs mt-1.5 flex items-center gap-1" th:if="${#fields.hasErrors('tieuDe')}">
                            <i data-lucide="alert-circle" class="w-3.5 h-3.5 flex-shrink-0"></i>
                            <span th:errors="*{tieuDe}"></span>
                        </div>
                    </div>

                    <!-- Loại bài viết -->
                    <div class="md:col-span-4">
                        <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2" th:text="#{tb.form.loai}">Loại bài viết</label>
                        <select th:field="*{loai}" 
                                class="w-full bg-darkbg border border-darkborder rounded-xl px-3 py-3 text-sm text-white focus:outline-none focus:border-brand-500 transition cursor-pointer">
                            <option value="1" th:text="#{tb.loai.tin_tuc}">📢 Bảng tin chung</option>
                            <option value="2" th:text="#{tb.loai.cam_nang}">📚 Cẩm nang cư dân</option>
                        </select>
                        <div class="text-rose-400 text-xs mt-1.5 flex items-center gap-1" th:if="${#fields.hasErrors('loai')}">
                            <i data-lucide="alert-circle" class="w-3.5 h-3.5 flex-shrink-0"></i>
                            <span th:errors="*{loai}"></span>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-12 gap-6">
                    <!-- Đối tượng -->
                    <div class="md:col-span-4">
                        <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2" th:text="#{tb.form.doi_tuong}">Đối tượng nhận thông báo</label>
                        <select th:field="*{doiTuongGui}" id="doiTuongGui" onchange="toggleDoiTuongInput()"
                                class="w-full bg-darkbg border border-darkborder rounded-xl px-3 py-3 text-sm text-white focus:outline-none focus:border-brand-500 transition cursor-pointer">
                            <option value="ALL" th:text="#{tb.dt.tat_ca}">Gửi cho tất cả (Mặc định)</option>
                            <option value="HO_GIA_DINH" th:text="#{tb.dt.ho_dan}">Gửi theo một hộ cụ thể</option>
                            <option value="NHIEU_HO" th:text="#{tb.dt.nhieu_ho}">Gửi theo nhiều hộ</option>
                            <option value="TANG" th:text="#{tb.dt.tang}">Gửi theo tầng</option>
                        </select>
                        <div class="text-rose-400 text-xs mt-1.5 flex items-center gap-1" th:if="${#fields.hasErrors('doiTuongGui')}">
                            <i data-lucide="alert-circle" class="w-3.5 h-3.5 flex-shrink-0"></i>
                            <span th:errors="*{doiTuongGui}"></span>
                        </div>
                    </div>

                    <!-- Khung Đối tượng cụ thể (Ẩn/Hiện) -->
                    <div class="md:col-span-8 hidden" id="khungDoiTuong">
                        <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2 text-brand-400" id="nhanDoiTuong" th:text="#{tb.form.ds_tang}">Phân cách các hộ/tầng bằng dấu phẩy</label>
                        <input type="hidden" id="giaTriDoiTuongText" th:field="*{giaTriDoiTuong}">

                        <!-- Select apartment (Select2 multiple) -->
                        <div id="canHoSelectContainer" class="hidden">
                            <select id="chonCanHo" multiple="multiple" class="w-full">
                                <option th:each="ch : ${danhSachCanHo}" 
                                        th:value="${ch.maCanHo}" 
                                        th:text="${ch.maCanHo} + ' (' + (${ch.trangThaiHienThi != null ? #messages.msg(ch.trangThaiHienThi) : ch.trangThai}) + ')'">
                                </option>
                            </select>
                        </div>
                        
                        <!-- Input for floors -->
                        <div id="tangInputContainer" class="hidden">
                            <input type="text" class="w-full bg-darkbg border border-darkborder rounded-xl px-4 py-3 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-brand-500 transition" 
                                   id="nhapTang" th:placeholder="#{tb.form.ds_tang_goi_y}">
                        </div>
                    </div>
                </div>

                <!-- Nội dung chi tiết (Summernote WYSIWYG) -->
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2" th:text="#{tb.form.noi_dung}">Nội dung chi tiết</label>
                    <textarea th:field="*{noiDung}" id="noiDung" class="w-full" rows="15"></textarea>
                    <div class="text-rose-400 text-xs mt-1.5 flex items-center gap-1" th:if="${#fields.hasErrors('noiDung')}">
                        <i data-lucide="alert-circle" class="w-3.5 h-3.5 flex-shrink-0"></i>
                        <span th:errors="*{noiDung}"></span>
                    </div>
                </div>

                <!-- Action Buttons -->
                <div class="flex items-center gap-3 pt-6 border-t border-darkborder justify-end">
                    <a th:href="@{/admin/thong-bao}" class="px-6 py-3 bg-slate-800 hover:bg-slate-700 active:bg-slate-900 text-slate-300 text-xs font-semibold rounded-xl transition" th:text="#{chung.huy}">Hủy bỏ</a>
                    <button type="submit" 
                            class="px-6 py-3 bg-brand-500 hover:bg-brand-400 active:bg-brand-600 text-white text-xs font-bold rounded-xl transition flex items-center gap-2 shadow-lg shadow-brand-500/10">
                        <i data-lucide="save" class="w-4 h-4"></i>
                        <span th:text="#{tb.form.nut_luu}">Lưu bài viết</span>
                    </button>
                </div>
            </form>
        </div>
    </main>

    <!-- jQuery & Select2 Scripts -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <!-- Summernote Lite JS -->
    <script src="https://cdn.jsdelivr.net/npm/summernote@0.8.20/dist/summernote-lite.min.js"></script>

    <script th:inline="javascript">
        $(document).ready(function() {
            // Initialize Lucide Icons
            lucide.createIcons();

            // Initialize Summernote WYSIWYG
            $('#noiDung').summernote({
                height: 350,
                placeholder: [[#{tb.form.soan_thao_noi_dung}]],
                tabsize: 2,
                toolbar: [
                    ['style', ['style']],
                    ['font', ['bold', 'underline', 'italic', 'clear']],
                    ['fontname', ['fontname']],
                    ['fontsize', ['fontsize']],
                    ['color', ['color']],
                    ['para', ['ul', 'ol', 'paragraph']],
                    ['table', ['table']],
                    ['insert', ['link', 'picture', 'hr']],
                    ['view', ['fullscreen', 'codeview', 'help']]
                ]
            });

            // Initialize Select2
            $('#chonCanHo').select2({
                placeholder: [[#{tb.form.chon_can_ho}]],
                allowClear: true,
                width: '100%'
            });

            // Sync Select2 values to hidden input
            $('#chonCanHo').on('change', function() {
                var vals = $(this).val();
                $('#giaTriDoiTuongText').val(vals ? vals.join(', ') : '');
            });

            // Sync floor input value to hidden input
            $('#nhapTang').on('input', function() {
                $('#giaTriDoiTuongText').val($(this).val());
            });

            // Init values if editing
            initOldValues();
        });

        function toggleDoiTuongInput() {
            var selectObj = document.getElementById("doiTuongGui").value;
            var inputContainer = document.getElementById("khungDoiTuong");
            var labelObj = document.getElementById("nhanDoiTuong");
            
            var canHoContainer = document.getElementById("canHoSelectContainer");
            var tangContainer = document.getElementById("tangInputContainer");
            var txtInput = document.getElementById("giaTriDoiTuongText");

            if (!selectObj) selectObj = "ALL";

            if (selectObj === "ALL") {
                inputContainer.classList.add("hidden");
                txtInput.value = "";
                $('#chonCanHo').val(null).trigger('change');
                $('#nhapTang').val("");
            } else {
                inputContainer.classList.remove("hidden");
                
                if (selectObj === "HO_GIA_DINH" || selectObj === "NHIEU_HO") {
                    labelObj.innerText = selectObj === "HO_GIA_DINH" ? [[#{tb.form.chon_1_ho_gia_dinh}]] : [[#{tb.form.chon_nhieu_ho_gia_dinh}]];
                    canHoContainer.classList.remove("hidden");
                    tangContainer.classList.add("hidden");
                    
                    if (selectObj === "HO_GIA_DINH") {
                        $('#chonCanHo').select2({ maximumSelectionLength: 1, width: '100%' });
                    } else {
                        $('#chonCanHo').select2({ maximumSelectionLength: 0, width: '100%' });
                    }
                    
                    var vals = $('#chonCanHo').val();
                    txtInput.value = vals ? vals.join(', ') : '';
                } else if (selectObj === "TANG") {
                    labelObj.innerText = [[#{tb.form.ds_tang_nhan}]];
                    canHoContainer.classList.add("hidden");
                    tangContainer.classList.remove("hidden");
                    txtInput.value = $('#nhapTang').val();
                }
            }
        }

        function initOldValues() {
            var selectObj = document.getElementById("doiTuongGui").value;
            var txtInput = document.getElementById("giaTriDoiTuongText").value;
            
            if (txtInput) {
                if (selectObj === "HO_GIA_DINH" || selectObj === "NHIEU_HO") {
                    var selectedArray = txtInput.split(',').map(item => item.trim());
                    $('#chonCanHo').val(selectedArray).trigger('change');
                } else if (selectObj === "TANG") {
                    $('#nhapTang').val(txtInput);
                }
            }
        }

        document.addEventListener("DOMContentLoaded", function() {
            setTimeout(toggleDoiTuongInput, 100);
            
            $('form').on('submit', function(e) {
                var selectObj = $("#doiTuongGui").val();
                const swalDarkConfig = {
                    background: '#161B26',
                    color: '#E2E8F0',
                    confirmButtonColor: '#0ea5e9'
                };

                if (selectObj === "HO_GIA_DINH" || selectObj === "NHIEU_HO") {
                    var vals = $('#chonCanHo').val();
                    if (!vals || vals.length === 0) {
                        e.preventDefault();
                        Swal.fire({ ...swalDarkConfig, icon: 'warning', title: 'Thiếu thông tin', text: 'Vui lòng chọn ít nhất 1 căn hộ!' });
                    }
                } else if (selectObj === "TANG") {
                    var val = $('#nhapTang').val();
                    if (!val || val.trim() === '') {
                        e.preventDefault();
                        Swal.fire({ ...swalDarkConfig, icon: 'warning', title: 'Thiếu thông tin', text: 'Vui lòng nhập tầng!' });
                    }
                }
            });
        });
    </script>
</body>

</html>
