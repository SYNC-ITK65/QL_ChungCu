<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <title th:text="#{pa.form.xu_ly_phan_anh}">Xử lý Phản ánh</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
  <div class="d-flex">
    <div th:replace="~{fragments/sidebar :: menu-trai}"></div>

    <div class="container-fluid p-4">
      <h2 th:text="#{pa.form.xu_ly_phan_anh}">Xử lý Phản ánh</h2>
      <form th:action="@{/admin/phan-anh/save}" th:object="${phanAnh}" method="post" class="mt-4" style="max-width: 600px;">

        <input type="hidden" th:field="*{id}">

        <div class="mb-3">
          <label class="form-label" th:text="#{pa.form.can_ho_phan_anh}">Căn hộ phản ánh</label>
          <input type="text" class="form-control bg-light" th:value="${phanAnh.canHo.maCanHo}" readonly>
        </div>

        <div class="mb-3">
          <label class="form-label" th:text="#{tb.form.tieude}">Tiêu đề</label>
          <input type="text" class="form-control bg-light" th:value="${phanAnh.tieuDe}" readonly>
        </div>

        <div class="mb-3">
          <label class="form-label" th:text="#{pa.form.noi_dung_chi_tiet}">Nội dung chi tiết</label>
          <textarea class="form-control bg-light" rows="4" th:text="${phanAnh.noiDung}" readonly></textarea>
        </div>

        <div class="mb-3" th:if="${phanAnh.hinhAnh != null}">
          <label class="form-label">Hình ảnh đính kèm</label>
          <div>
            <a th:href="${phanAnh.hinhAnh}" target="_blank">
              <img th:src="${phanAnh.hinhAnh}" alt="Ảnh đính kèm" class="img-thumbnail" style="max-height: 250px; border: 1px solid #dee2e6; border-radius: 4px;"/>
            </a>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label text-danger fw-bold" th:text="#{pa.form.cap_nhat_trang_thai}">Cập nhật Trạng thái xử lý</label>
          <select th:field="*{trangThai}" class="form-select border-danger">
            <option value="Chờ xử lý" th:text="#{pa.form.cho_xu_ly}">Chờ xử lý</option>
            <option value="Đang xử lý" th:text="#{pa.form.dang_xu_ly_da_cu_tho}">Đang xử lý (Đã cử thợ)</option>
            <option value="Đã xong" th:text="#{pa.form.da_xong_hoan_thanh}">Đã xong (Hoàn thành)</option>
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label fw-bold" th:text="#{pa.form.phan_hoi_cua_ban_qua}">Phản hồi của Ban Quản Lý</label>
          <textarea th:field="*{phanHoi}" class="form-control" rows="4" placeholder="Nhập nội dung phản hồi cho cư dân..." th:placeholder="#{pa.form.nhap_noi_dung_phan_h}"></textarea>
        </div>

        <div class="mb-3" th:if="${phanAnh.ngayPhanHoi != null}">
          <small class="text-muted"><span th:text="#{pa.form.ngay_phan_hoi}" th:remove="tag">Ngày phản hồi: </span><span th:text="${#temporals.format(phanAnh.ngayPhanHoi, 'dd/MM/yyyy HH:mm')}"></span></small>
        </div>

        <button type="submit" class="btn btn-success" th:text="#{pa.form.cap_nhat_trang_thai1}">Cập nhật trạng thái</button>
        <a th:href="@{/admin/phan-anh}" class="btn btn-secondary" th:text="#{hd.form.quay_lai}">Quay lại</a>
      </form>
    </div>
  </div>
</body>

</html>
