<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <title>Xử lý Phản ánh</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
  <div class="d-flex">
    <div th:replace="~{fragments/sidebar :: menu-trai}"></div>

    <div class="container-fluid p-4">
      <h2>Xử lý Phản ánh</h2>
      <form th:action="@{/admin/phan-anh/save}" th:object="${phanAnh}" method="post" class="mt-4"
        style="max-width: 600px;">

        <input type="hidden" th:field="*{id}">

        <div class="mb-3">
          <label class="form-label">Căn hộ phản ánh</label>
          <input type="text" class="form-control bg-light" th:value="${phanAnh.canHo.maCanHo}" readonly>
        </div>

        <div class="mb-3">
          <label class="form-label">Tiêu đề</label>
          <input type="text" class="form-control bg-light" th:value="${phanAnh.tieuDe}" readonly>
        </div>

        <div class="mb-3">
          <label class="form-label">Nội dung chi tiết</label>
          <textarea class="form-control bg-light" rows="4" th:text="${phanAnh.noiDung}" readonly></textarea>
        </div>

        <div class="mb-3">
          <label class="form-label text-danger fw-bold">Cập nhật Trạng thái xử lý</label>
          <select th:field="*{trangThai}" class="form-select border-danger">
            <option value="Chờ xử lý">Chờ xử lý</option>
            <option value="Đang xử lý">Đang xử lý (Đã cử thợ)</option>
            <option value="Đã xong">Đã xong (Hoàn thành)</option>
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label fw-bold">Phản hồi của Ban Quản Lý</label>
          <textarea th:field="*{phanHoi}" class="form-control" rows="4"
            placeholder="Nhập nội dung phản hồi cho cư dân..."></textarea>
        </div>

        <div class="mb-3" th:if="${phanAnh.ngayPhanHoi != null}">
          <small class="text-muted">Ngày phản hồi: <span
              th:text="${#temporals.format(phanAnh.ngayPhanHoi, 'dd/MM/yyyy HH:mm')}"></span></small>
        </div>

        <button type="submit" class="btn btn-success">Cập nhật trạng thái</button>
        <a th:href="@{/admin/phan-anh}" class="btn btn-secondary">Quay lại</a>
      </form>
    </div>
  </div>
</body>

</html>
