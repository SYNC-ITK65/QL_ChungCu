<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title th:text="#{side.admin.yeu_cau_dich_vu}">Yêu cầu Dịch vụ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>

<body>
    <div class="d-flex">
        <div th:replace="~{fragments/sidebar :: menu-trai}"></div>

        <div class="flex-grow-1 p-4">
            <div th:if="${thongBaoThanhCong}" class="alert alert-success alert-dismissible fade show" role="alert">
                <span th:text="${thongBaoThanhCong}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${thongBaoLoi}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <span th:text="${thongBaoLoi}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 th:text="#{dv.ds.danh_sach_yeu_cau_da}">Danh sách yêu cầu đăng ký dịch vụ từ cư dân</h2>
                <div class="d-flex gap-2">
                    <a th:href="@{/admin/dich-vu}" class="btn btn-outline-primary fw-bold">⚙️ <span th:text="#{dv.ds.nut_cau_hinh}">Cấu hình dịch vụ</span></a>
                    <a th:href="@{/admin/yeu-cau-dich-vu/don-dat/xuat-excel(tuKhoa=${tuKhoa}, trangThai=${trangThai})}" class="btn btn-success fw-bold">
                        <i class="fas fa-file-excel"></i> <span th:text="#{chung.xuat_excel}">Xuất Excel</span>
                    </a>
                </div>
            </div>

            <!-- Form Tìm kiếm & Lọc -->
            <form method="get" th:action="@{/admin/yeu-cau-dich-vu}" class="row g-3 mb-4 mt-2">
                <div class="col-md-5">
                    <input type="text" name="tuKhoa" class="form-control" th:value="${tuKhoa}"
                           th:placeholder="#{dv.ds.tim_kiem_placeholder}"
                           placeholder="Nhập tên cư dân, mã căn hộ, hoặc tên dịch vụ...">
                </div>
                <div class="col-md-4">
                    <select name="trangThai" class="form-select">
                        <option value="" th:text="#{duyet.ui.tat_ca_trang_thai}">-- Tất cả trạng thái --</option>
                        <option value="Chờ duyệt" th:selected="${trangThai == 'Chờ duyệt'}" th:text="#{dv.ds.cho_duyet}">Chờ duyệt</option>
                        <option value="Đã duyệt" th:selected="${trangThai == 'Đã duyệt'}" th:text="#{dv.ds.da_duyet}">Đã duyệt</option>
                        <option value="Từ chối" th:selected="${trangThai == 'Từ chối'}" th:text="#{dv.ds.tu_choi}">Từ chối</option>
                        <option value="Hủy duyệt" th:selected="${trangThai == 'Hủy duyệt'}" th:text="#{dv.ds.huy_duyet}">Hủy duyệt</option>
                        <option value="Đã sử dụng" th:selected="${trangThai == 'Đã sử dụng'}" th:text="#{dv.ds.da_su_dung}">Đã sử dụng</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="fas fa-search"></i> <span th:text="#{hdon.ds.nut_tim_kiem}">Tìm kiếm</span>
                    </button>
                </div>
            </form>

            <table class="table table-hover border mt-3 no-paging">
                <thead class="table-secondary">
                    <tr>
                        <th th:text="#{dv.ds.id_don}">ID đơn</th>
                        <th th:text="#{hd.form.cu_dan_label}">Cư dân</th>
                        <th th:text="#{hdon.form.can_ho}">Căn hộ</th>
                        <th th:text="#{dv.ds.dich_vu}">Dịch vụ</th>
                        <th th:text="#{dv.ds.ngay_dung}">Ngày dùng</th>
                        <th th:text="#{hdon.ds.bang_trang_thai}">Trạng thái</th>
                        <th th:text="#{dv.ds.thao_tac}">Thao tác</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="don : ${danhSachDonDat}">
                        <td th:text="${don.id}"></td>
                        <td th:text="${don.cuDan != null ? don.cuDan.hoTen : 'N/A'}"></td>
                        <td th:text="${don.cuDan != null &amp;&amp; don.cuDan.canHo != null ? don.cuDan.canHo.maCanHo : 'N/A'}"></td>
                        <td th:text="${don.dichVu != null ? don.dichVu.ten : 'N/A'}"></td>
                        <td th:text="${don.ngayDat != null ? #temporals.format(don.ngayDat, 'dd/MM/yyyy') : 'N/A'}"></td>
                        <td>
                            <span th:if="${don.trangThai == null || #strings.isEmpty(don.trangThai) || don.trangThai == 'Chờ duyệt' || don.trangThai == 'Đăng ký mới'}" class="badge bg-warning text-dark" th:text="#{dv.ds.cho_duyet}">Chờ duyệt</span>
                            <span th:if="${don.trangThai == 'Đã duyệt'}" class="badge bg-success" th:text="#{dv.ds.da_duyet}">Đã duyệt</span>
                            <span th:if="${don.trangThai == 'Từ chối'}" class="badge bg-danger" th:text="#{dv.ds.tu_choi}">Từ chối</span>
                            <span th:if="${don.trangThai == 'Hủy duyệt'}" class="badge bg-secondary" th:text="#{dv.ds.huy_duyet}">Hủy duyệt</span>
                            <span th:if="${don.trangThai == 'Đã sử dụng'}" class="badge bg-info" th:text="#{dv.ds.da_su_dung}">Đã sử dụng</span>
                            <span th:if="${don.trangThai != null &amp;&amp; don.trangThai != 'Chờ duyệt' &amp;&amp; don.trangThai != 'Đăng ký mới' &amp;&amp; don.trangThai != 'Đã duyệt' &amp;&amp; don.trangThai != 'Từ chối' &amp;&amp; don.trangThai != 'Hủy duyệt' &amp;&amp; don.trangThai != 'Đã sử dụng'}" class="badge bg-dark" th:text="${don.trangThai}">Trạng thái khác</span>
                        </td>
                        <td>
                            <a th:if="${don.trangThai == null || #strings.isEmpty(don.trangThai) || don.trangThai != 'Đã duyệt'}" th:href="@{/admin/yeu-cau-dich-vu/don-dat/duyet/{id}(id=${don.id})}" class="btn btn-sm btn-success" th:text="#{dv.ds.duyet}">Duyệt</a>
                            <a th:if="${don.trangThai == null || #strings.isEmpty(don.trangThai) || don.trangThai != 'Đã duyệt'}" th:href="@{/admin/yeu-cau-dich-vu/don-dat/tu-choi/{id}(id=${don.id})}" class="btn btn-sm btn-warning" th:onclick="|return confirm('#{dv.ds.xac_nhan_tu_choi}')|" th:text="#{dv.ds.tu_choi}">Từ chối</a>
                            <a th:if="${don.trangThai == 'Đã duyệt'}" th:href="@{/admin/yeu-cau-dich-vu/don-dat/huy-duyet/{id}(id=${don.id})}" class="btn btn-sm btn-secondary" th:onclick="|return confirm('#{dv.ds.xac_nhan_huy_duyet}')|" th:text="#{dv.ds.huy_duyet}">Hủy duyệt</a>
                            <a th:if="${don.trangThai == 'Đã duyệt' || don.trangThai == 'Từ chối' || don.trangThai == 'Hủy duyệt'}" th:href="@{/admin/yeu-cau-dich-vu/don-dat/sua/{id}(id=${don.id})}" class="btn btn-sm btn-primary" th:text="#{hdon.ds.nut_sua}">Sửa</a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(danhSachDonDat)}">
                        <td colspan="7" class="text-center text-muted" th:text="#{dv.ds.chua_co_dang_ky_dich}">Chưa có đăng ký dịch vụ nào.</td>
                    </tr>
                </tbody>
            </table>

            <div th:replace="~{fragments/pagination :: paging('/admin/yeu-cau-dich-vu', 'tuKhoa=' + (${tuKhoa} ?: '') + '&trangThai=' + (${trangThai} ?: ''))}"></div>

        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Dùng fragment Datatable chung -->
    <div th:replace="~{fragments/datatable :: scripts}"></div>
</body>

</html>
