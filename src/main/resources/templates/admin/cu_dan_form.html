<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Thêm mới cư dân</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div th:replace="~{fragments/sidebar :: menu-trai}"></div>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 th:text="${cuDan.id != null} ? 'Sửa thông tin Cư Dân' : 'Thêm mới Cư Dân'">Thêm mới Cư Dân</h2>
        <a th:href="@{/admin/cu-dan}" class="btn btn-secondary">Quay lại danh sách</a>
    </div>

    <form th:action="@{/admin/cu-dan/luu}" th:object="${cuDan}" method="post">
        <!-- Giữ lại ID khi sửa -->
        <input type="hidden" th:field="*{id}" th:if="${cuDan.id != null}">

        <h4 class="mb-3 text-primary">Thông tin cá nhân</h4>
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label">Họ Tên</label>
                <input type="text" th:field="*{hoTen}" class="form-control" required placeholder="Nguyễn Văn A">
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label">Số điện thoại</label>
                <input type="text" th:field="*{soDienThoai}" class="form-control" required placeholder="09xxxxxxxx">
            </div>
        </div>
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label">Tên đăng nhập (Tài khoản)</label>
                <input type="text" th:field="*{tenDangNhap}" class="form-control" required placeholder="user123">
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label">Email</label>
                <input type="email" th:field="*{email}" class="form-control" required placeholder="email@example.com">
            </div>
        </div>
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label">Ngày Sinh</label>
                <input type="date" th:field="*{ngaySinh}" class="form-control">
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label">CCCD / CMND</label>
                <input type="text" th:field="*{cccd}" class="form-control" maxlength="12" placeholder="012345678901">
            </div>
        </div>

        <h4 class="mb-3 mt-4 text-primary">Thông tin cư trú</h4>
        <div class="mb-3">
            <label class="form-label">Căn Hộ</label>
            <select th:field="*{canHo.id}" class="form-select" required>
                <option value="" disabled selected>-- Chọn căn hộ --</option>
                <option th:each="ch : ${danhSachCanHo}" th:value="${ch.id}" th:text="|Phòng ${ch.maCanHo}|"></option>
            </select>
        </div>

        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label">Mối Quan Hệ</label>
                <select th:field="*{moiQuanHe}" class="form-select" required>
                    <option value="Chủ Hộ">Chủ Hộ</option>
                    <option value="Vợ/Chồng">Vợ/Chồng</option>
                    <option value="Con cái">Con cái</option>
                    <option value="Người thân">Người thân</option>
                    <option value="Người thuê">Người thuê</option>
                </select>
            </div>

            <div class="col-md-6 mb-3">
                <label class="form-label">Trạng Thái</label>
                <select th:field="*{trangThai}" class="form-select" required>
                    <option value="Đang Ở">Đang Ở</option>
                    <option value="Chưa Đến">Chưa Đến</option>
                </select>
            </div>
        </div>

        <div class="mt-4">
            <button type="submit" class="btn btn-primary">Lưu cư dân & Tạo tài khoản</button>
        </div>
    </form>
</body>

</html>
