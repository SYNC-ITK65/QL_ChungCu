<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title th:text="#{cd.form.them_tieude}">Thêm mới cư dân</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>
    <div class="d-flex">
        <div th:replace="~{fragments/sidebar :: menu-trai}"></div>

        <div class="flex-grow-1 p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 th:text="${cuDan.id != null} ? #{cd.form.sua_tieude} : #{cd.form.them_tieude}">Thêm mới Cư Dân</h2>
                <a th:href="@{/admin/cu-dan}" class="btn btn-outline-secondary">
                    <i class="bi bi-arrow-left"></i> <span th:text="#{cd.form.quay_lai}">Quay lại danh sách</span>
                </a>
            </div>

            <form th:action="@{/admin/cu-dan/luu}" th:object="${cuDan}" method="post">
                <!-- Giữ lại ID khi sửa -->
                <input type="hidden" th:field="*{id}" th:if="${cuDan.id != null}">

                <!-- Card: Thông tin cá nhân -->
                <div class="card shadow-sm border-0 mb-4">
                    <div class="card-header bg-primary bg-gradient text-white">
                        <h5 class="mb-0">
                            <i class="bi bi-person-circle"></i>
                            <span th:text="#{cd.form.tt_ca_nhan}">Thông tin cá nhân</span>
                        </h5>
                    </div>
                    <div class="card-body p-4">
                        <div class="row g-4">
                            <div class="col-md-6">
                                <div class="form-floating">
                                    <input type="text" th:field="*{hoTen}" class="form-control" id="hoTen"
                                        th:classappend="${#fields.hasErrors('hoTen')} ? 'is-invalid' : ''"
                                        required th:placeholder="#{cd.form.ten_goi_y}">
                                    <label for="hoTen" th:text="#{cd.form.ten}">Họ Tên</label>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('hoTen')}" th:errors="*{hoTen}"></div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-floating">
                                    <input type="text" th:field="*{soDienThoai}" class="form-control" id="soDienThoai"
                                        th:classappend="${#fields.hasErrors('soDienThoai')} ? 'is-invalid' : ''"
                                        required th:placeholder="#{cd.form.sdt_goi_y}">
                                    <label for="soDienThoai" th:text="#{cd.form.sdt}">Số điện thoại</label>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('soDienThoai')}" th:errors="*{soDienThoai}"></div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-floating">
                                    <input type="text" th:field="*{tenDangNhap}" class="form-control" id="tenDangNhap"
                                        th:classappend="${#fields.hasErrors('tenDangNhap')} ? 'is-invalid' : ''"
                                        required th:placeholder="#{cd.form.tk_goi_y}">
                                    <label for="tenDangNhap" th:text="#{cd.form.tk}">Tên đăng nhập (Tài khoản)</label>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('tenDangNhap')}" th:errors="*{tenDangNhap}"></div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-floating">
                                    <input type="email" th:field="*{email}" class="form-control" id="email"
                                        th:classappend="${#fields.hasErrors('email')} ? 'is-invalid' : ''"
                                        required th:placeholder="#{cd.form.email_goi_y}">
                                    <label for="email" th:text="#{cd.form.email}">Email</label>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-floating">
                                    <input type="date" th:field="*{ngaySinh}" class="form-control" id="ngaySinh"
                                        th:classappend="${#fields.hasErrors('ngaySinh')} ? 'is-invalid' : ''">
                                    <label for="ngaySinh" th:text="#{cd.form.ngay_sinh}">Ngày Sinh</label>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('ngaySinh')}" th:errors="*{ngaySinh}"></div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-floating">
                                    <input type="text" th:field="*{cccd}" class="form-control" id="cccd" maxlength="12"
                                        th:classappend="${#fields.hasErrors('cccd')} ? 'is-invalid' : ''"
                                        th:placeholder="#{cd.form.cccd_goi_y}">
                                    <label for="cccd" th:text="#{cd.form.cccd}">CCCD / CMND</label>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('cccd')}" th:errors="*{cccd}"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Card: Thông tin cư trú -->
                <div class="card shadow-sm border-0 mb-4">
                    <div class="card-header bg-info bg-gradient text-white">
                        <h5 class="mb-0">
                            <i class="bi bi-house-heart"></i>
                            <span th:text="#{cd.form.tt_cu_tru}">Thông tin cư trú</span>
                        </h5>
                    </div>
                    <div class="card-body p-4">
                        <div class="row g-4">
                            <div class="col-md-12">
                                <div class="form-floating">
                                    <select th:field="*{canHo.id}" class="form-select" id="canHoId" required
                                        th:classappend="${#fields.hasErrors('canHo')} ? 'is-invalid' : ''">
                                        <option value="" disabled selected th:text="#{cd.form.can_ho_chon}">-- Chọn căn hộ --</option>
                                        <option th:each="ch : ${danhSachCanHo}" th:value="${ch.id}" th:text="|#{tb.ui.phong} ${ch.maCanHo}|"></option>
                                    </select>
                                    <label for="canHoId" th:text="#{cd.form.can_ho}">Căn Hộ</label>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('canHo')}" th:errors="*{canHo}"></div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-floating">
                                    <select th:field="*{moiQuanHe}" class="form-select" id="moiQuanHe" required
                                        th:classappend="${#fields.hasErrors('moiQuanHe')} ? 'is-invalid' : ''">
                                        <option value="Chủ Hộ" th:text="#{cd.qh.chu_ho}">Chủ Hộ</option>
                                        <option value="Vợ/Chồng" th:text="#{cd.qh.vo_chong}">Vợ/Chồng</option>
                                        <option value="Con cái" th:text="#{cd.qh.con}">Con cái</option>
                                        <option value="Người thân" th:text="#{cd.qh.nguoi_than}">Người thân</option>
                                        <option value="Người thuê" th:text="#{cd.qh.nguoi_thue}">Người thuê</option>
                                    </select>
                                    <label for="moiQuanHe" th:text="#{cd.form.qh}">Mối Quan Hệ</label>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('moiQuanHe')}" th:errors="*{moiQuanHe}"></div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-floating">
                                    <select th:field="*{trangThai}" class="form-select" id="trangThai" required
                                        th:classappend="${#fields.hasErrors('trangThai')} ? 'is-invalid' : ''">
                                        <option value="Đang Ở" th:text="#{cd.tt.dang_o}">Đang Ở</option>
                                        <option value="Chưa Đến" th:text="#{cd.tt.chua_den}">Chưa Đến</option>
                                    </select>
                                    <label for="trangThai" th:text="#{chung.trang_thai}">Trạng Thái</label>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('trangThai')}" th:errors="*{trangThai}"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary btn-lg">
                        <i class="bi bi-check-lg"></i> <span th:text="#{cd.form.nut_luu}">Lưu cư dân &amp; Tạo tài khoản</span>
                    </button>
                    <a th:href="@{/admin/cu-dan}" class="btn btn-outline-secondary btn-lg" th:text="#{cd.form.quay_lai}">Quay lại danh sách</a>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:inline="javascript">
        document.addEventListener('DOMContentLoaded', function () {
            var thongBaoThanhCong = /*[[${thongBaoThanhCong}]]*/ null;
            var thongBaoLoi = /*[[${thongBaoLoi}]]*/ null;
            var successMessage = /*[[${successMessage}]]*/ null;
            var errorMessage = /*[[${errorMessage}]]*/ null;

            if (thongBaoThanhCong) {
                Swal.fire({ icon: 'success', title: 'Thành công!', text: thongBaoThanhCong, toast: true, position: 'top-end', showConfirmButton: false, timer: 4000, timerProgressBar: true });
            }
            if (successMessage) {
                Swal.fire({ icon: 'success', title: 'Thành công!', text: successMessage, toast: true, position: 'top-end', showConfirmButton: false, timer: 4000, timerProgressBar: true });
            }
            if (thongBaoLoi) {
                Swal.fire({ icon: 'error', title: 'Lỗi!', text: thongBaoLoi, toast: true, position: 'top-end', showConfirmButton: false, timer: 5000, timerProgressBar: true });
            }
            if (errorMessage) {
                Swal.fire({ icon: 'error', title: 'Lỗi!', text: errorMessage, toast: true, position: 'top-end', showConfirmButton: false, timer: 5000, timerProgressBar: true });
            }
        });
    </script>
</body>

</html>
