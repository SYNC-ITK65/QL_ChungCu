<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title th:text="#{cd.form.them_tieude}">Thêm mới cư dân</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="d-flex">
        <div th:replace="~{fragments/sidebar :: menu-trai}"></div>

        <div class="flex-grow-1 p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 th:text="${cuDan.id != null} ? #{cd.form.sua_tieude} : #{cd.form.them_tieude}">Thêm mới Cư Dân</h2>
                <a th:href="@{/admin/cu-dan}" class="btn btn-secondary" th:text="#{cd.form.quay_lai}">Quay lại danh sách</a>
            </div>

            <form th:action="@{/admin/cu-dan/luu}" th:object="${cuDan}" method="post">
                <!-- Giữ lại ID khi sửa -->
                <input type="hidden" th:field="*{id}" th:if="${cuDan.id != null}">

                <h4 class="mb-3 text-primary" th:text="#{cd.form.tt_ca_nhan}">Thông tin cá nhân</h4>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label" th:text="#{cd.form.ten}">Họ Tên</label>
                        <input type="text" th:field="*{hoTen}" class="form-control" required th:placeholder="#{cd.form.ten_goi_y}">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label" th:text="#{cd.form.sdt}">Số điện thoại</label>
                        <input type="text" th:field="*{soDienThoai}" class="form-control" required th:placeholder="#{cd.form.sdt_goi_y}">
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label" th:text="#{cd.form.tk}">Tên đăng nhập (Tài khoản)</label>
                        <input type="text" th:field="*{tenDangNhap}" class="form-control" required th:placeholder="#{cd.form.tk_goi_y}">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label" th:text="#{cd.form.email}">Email</label>
                        <input type="email" th:field="*{email}" class="form-control" required th:placeholder="#{cd.form.email_goi_y}">
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label" th:text="#{cd.form.ngay_sinh}">Ngày Sinh</label>
                        <input type="date" th:field="*{ngaySinh}" class="form-control">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label" th:text="#{cd.form.cccd}">CCCD / CMND</label>
                        <input type="text" th:field="*{cccd}" class="form-control" maxlength="12" th:placeholder="#{cd.form.cccd_goi_y}">
                    </div>
                </div>

                <h4 class="mb-3 mt-4 text-primary" th:text="#{cd.form.tt_cu_tru}">Thông tin cư trú</h4>
                <div class="mb-3">
                    <label class="form-label" th:text="#{cd.form.can_ho}">Căn Hộ</label>
                    <select th:field="*{canHo.id}" class="form-select" required>
                        <option value="" disabled selected th:text="#{cd.form.can_ho_chon}">-- Chọn căn hộ --</option>
                        <option th:each="ch : ${danhSachCanHo}" th:value="${ch.id}" th:text="|#{tb.ui.phong} ${ch.maCanHo}|"></option>
                    </select>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label" th:text="#{cd.form.qh}">Mối Quan Hệ</label>
                        <select th:field="*{moiQuanHe}" class="form-select" required>
                            <option value="Chủ Hộ" th:text="#{cd.qh.chu_ho}">Chủ Hộ</option>
                            <option value="Vợ/Chồng" th:text="#{cd.qh.vo_chong}">Vợ/Chồng</option>
                            <option value="Con cái" th:text="#{cd.qh.con}">Con cái</option>
                            <option value="Người thân" th:text="#{cd.qh.nguoi_than}">Người thân</option>
                            <option value="Người thuê" th:text="#{cd.qh.nguoi_thue}">Người thuê</option>
                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label" th:text="#{chung.trang_thai}">Trạng Thái</label>
                        <select th:field="*{trangThai}" class="form-select" required>
                            <option value="Đang Ở" th:text="#{cd.tt.dang_o}">Đang Ở</option>
                            <option value="Chưa Đến" th:text="#{cd.tt.chua_den}">Chưa Đến</option>
                        </select>
                    </div>
                </div>

                <div class="mt-4">
                    <button type="submit" class="btn btn-primary" th:text="#{cd.form.nut_luu}">Lưu cư dân & Tạo tài khoản</button>
                </div>
            </form>
        </div>
    </div>
</body>

</html>
