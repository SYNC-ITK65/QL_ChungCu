<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Test Độc Lập - Quản Lý Xe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body class="p-5 bg-light">

<div class="container bg-white p-4 shadow rounded">
    <h2 class="text-primary border-bottom pb-3 mb-4">Phòng Thí Nghiệm: Quản Lý Bãi Xe (Standalone)</h2>

    <div class="row">
        <div class="col-md-5 border-end">
            <h4>Đăng ký xe mới</h4>
            <div class="mb-3">
                <label class="form-label">Biển số xe:</label>
                <input type="text" id="bienSo" class="form-control" placeholder="VD: 77L1-12345">
            </div>
            <div class="mb-3">
                <label class="form-label">Loại xe:</label>
                <select id="loaiXe" class="form-select">
                    <option value="Xe máy">Xe máy</option>
                    <option value="Ô tô">Ô tô</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Màu xe:</label>
                <input type="text" id="mauXe" class="form-control" placeholder="Xanh, đỏ, tím, vàng...">
            </div>
            <button id="btnThem" class="btn btn-primary w-100">Bấm để Thêm Xe</button>
        </div>

        <div class="col-md-7">
            <h4>Danh sách xe hiện tại</h4>
            <table class="table table-striped mt-3">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Biển Số</th>
                    <th>Loại Xe</th>
                    <th>Thao tác</th>
                </tr>
                </thead>
                <tbody id="bangXe">
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const API_URL = '/api/phuong-tien';

    // Hàm lấy danh sách từ Backend
    function loadData() {
        $.get(API_URL + '/danh-sach', function(data) {
            let rows = '';
            data.forEach(xe => {
                rows += `<tr>
                    <td>${xe.id}</td>
                    <td>${xe.bienSoXe}</td>
                    <td>${xe.loaiXe}</td>
                    <td><button onclick="xoaXe(${xe.id})" class="btn btn-sm btn-danger">Xóa</button></td>
                </tr>`;
            });
            $('#bangXe').html(rows);
        });
    }

    // Hàm gửi dữ liệu lên Backend
    $('#btnThem').click(function() {
        let data = {
            bienSoXe: $('#bienSo').val(),
            loaiXe: $('#loaiXe').val(),
            mauXe: $('#mauXe').val()
        };

        $.ajax({
            url: API_URL + '/dang-ky',
            type: 'POST',
            contentType: 'application/json',
            data: JSON.stringify(data),
            success: function() {
                alert("Thêm thành công!");
                loadData(); // Cập nhật lại bảng
            },
            error: function(xhr) {
                alert("Lỗi: " + xhr.responseText);
            }
        });
    });

    // Hàm xóa
    function xoaXe(id) {
        $.ajax({
            url: API_URL + '/huy/' + id,
            type: 'DELETE',
            success: function() {
                loadData();
            }
        });
    }

    // Vừa mở trang là load dữ liệu ngay
    $(document).ready(loadData);
</script>
</body>
</html>
