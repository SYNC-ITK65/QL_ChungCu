<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title th:text="#{pa.ds.danh_sach_phan_anh}">Danh sách Phản ánh</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="d-flex">
        <div th:replace="~{fragments/sidebar :: menu-trai}"></div>

        <div class="container-fluid p-4">
            <div class="d-flex justify-content-between align-items-center mb-4 mt-2">
                <h2 th:text="#{pa.ds.danh_sach_cu_dan_pha}" class="mb-0">Danh sách Cư dân Phản ánh / Yêu cầu sửa chữa</h2>
                <a th:href="@{/admin/phan-anh/xuat-excel(tuKhoa=${tuKhoa}, trangThai=${trangThai})}" class="btn btn-success fw-bold">
                    <i class="fas fa-file-excel"></i> <span th:text="#{chung.xuat_excel}">Xuất Excel</span>
                </a>
            </div>
            <form method="get" action="/admin/phan-anh" class="row g-3 mb-4">
                <div class="col-md-5">
                    <input type="text" name="tuKhoa" class="form-control" th:value="${tuKhoa}"
                           th:placeholder="#{pa.ds.tim_kiem_goi_y}" placeholder="Nhập tiêu đề hoặc mã căn hộ (VD: A1-05)...">
                </div>
                <div class="col-md-4">
                    <select name="trangThai" class="form-select">
                        <option value="" th:text="#{duyet.ui.tat_ca_trang_thai}">-- Tất cả trạng thái --</option>
                        <option value="Chờ xử lý" th:selected="${trangThai == 'Chờ xử lý'}" th:text="#{pa.form.cho_xu_ly}">Chờ xử lý</option>
                        <option value="Đang xử lý" th:selected="${trangThai == 'Đang xử lý'}" th:text="#{pa.form.dang_xu_ly}">Đang xử lý</option>
                        <option value="Đã xong" th:selected="${trangThai == 'Đã xong'}" th:text="#{pa.form.da_xong}">Đã xong</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="fas fa-search"></i> <span th:text="#{hdon.ds.nut_tim_kiem}" th:remove="tag">Tìm kiếm</span>
                    </button>
                </div>
            </form>
            <table class="table table-bordered table-striped mt-3 no-paging">
                <thead class="table-dark">
                    <tr>
                        <th th:text="#{chung.id}">ID</th>
                        <th th:text="#{hdon.form.can_ho}">Căn hộ</th>
                        <th th:text="#{tb.form.tieude}">Tiêu đề</th>
                        <th th:text="#{pa.ds.ngay_gui}">Ngày gửi</th>
                        <th th:text="#{hdon.ds.bang_trang_thai}">Trạng thái</th>
                        <th th:text="#{hdon.ds.bang_hanh_dong}">Hành động</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="pa : ${phanAnhs}">
                        <td th:text="${pa.id}"></td>
                        <td th:text="${pa.canHo != null} ? ${pa.canHo.maCanHo} : #{chung.n_a}"></td>
                        <td th:text="${pa.tieuDe}"></td>
                        <td th:text="${#temporals.format(pa.ngayGui, 'dd/MM/yyyy HH:mm')}"></td>
                        <td>
                            <span th:class="'badge ' + ${pa.trangThai == 'Đã xong' ? 'bg-success' : (pa.trangThai == 'Đang xử lý' ? 'bg-warning text-dark' : 'bg-secondary')}">
                                <th:block th:if="${pa.trangThai == 'Chờ xử lý'}" th:text="#{pa.form.cho_xu_ly}">Chờ xử lý</th:block>
                                <th:block th:if="${pa.trangThai == 'Đang xử lý'}" th:text="#{pa.form.dang_xu_ly}">Đang xử lý</th:block>
                                <th:block th:if="${pa.trangThai == 'Đã xong'}" th:text="#{pa.form.da_xong}">Đã xong</th:block>
                            </span>
                        </td>
                        <td>
                            <a th:href="@{/admin/phan-anh/edit/{id}(id=${pa.id})}" class="btn btn-sm btn-info" th:text="#{pa.ds.xem_xu_ly}">Xem &amp; Xử
                                lý</a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(phanAnhs)}">
                        <td colspan="6" class="text-center text-muted" th:text="#{pa.ds.chua_co_phan_anh_nao}">Chưa có phản ánh nào từ cư dân!</td>
                    </tr>
                </tbody>
            </table>
            <div th:replace="~{fragments/pagination :: paging('/admin/phan-anh', ${queryString})}"></div>
        </div>
    </div>

    <!-- Dùng fragment Datatable chung -->
    <div th:replace="~{fragments/datatable :: scripts}"></div>
</body>

</html>
