<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Danh sách Phản ánh</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="d-flex">
        <div th:replace="~{fragments/sidebar :: menu-trai}"></div>

        <div class="container-fluid p-4">
            <h2>Danh sách Cư dân Phản ánh / Yêu cầu sửa chữa</h2>
            <table class="table table-bordered table-striped mt-3 no-paging">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Căn hộ</th>
                        <th>Tiêu đề</th>
                        <th>Ngày gửi</th>
                        <th>Trạng thái</th>
                        <th>Hành động</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="pa : ${phanAnhs}">
                        <td th:text="${pa.id}"></td>
                        <td th:text="${pa.canHo != null ? pa.canHo.maCanHo : 'N/A'}"></td>
                        <td th:text="${pa.tieuDe}"></td>
                        <td th:text="${#temporals.format(pa.ngayGui, 'dd/MM/yyyy HH:mm')}"></td>
                        <td>
                            <span th:text="${pa.trangThai}"
                                th:classappend="${pa.trangThai == 'Đã xong' ? 'badge bg-success' : (pa.trangThai == 'Đang xử lý' ? 'badge bg-warning text-dark' : 'badge bg-secondary')}">
                            </span>
                        </td>
                        <td>
                            <a th:href="@{/admin/phan-anh/edit/{id}(id=${pa.id})}" class="btn btn-sm btn-info">Xem & Xử
                                lý</a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(phanAnhs)}">
                        <td colspan="6" class="text-center text-muted">Chưa có phản ánh nào từ cư dân!</td>
                    </tr>
                </tbody>
            </table>
            <div th:replace="~{fragments/pagination :: paging('/admin/phan-anh', '')}"></div>
        </div>
    </div>

    <!-- Dùng fragment Datatable chung -->
    <div th:replace="~{fragments/datatable :: scripts}"></div>
</body>

</html>
