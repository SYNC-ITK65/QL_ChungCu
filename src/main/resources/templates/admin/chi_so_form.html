<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title th:text="#{cs.form.ghi_nhan_chi_so_moi}">Ghi nhận Chỉ số mới</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const today = new Date();
            const day = String(today.getDate()).padStart(2, '0');
            const month = String(today.getMonth() + 1).padStart(2, '0');
            const year = today.getFullYear();
            
            // Định dạng dd/MM/yyyy để hiển thị
            const displayDate = day + '/' + month + '/' + year;
            // Định dạng yyyy-MM-dd để gửi về server
            const serverDate = year + '-' + month + '-' + day;
            
            const displayInput = document.getElementById('ngayGhiNhanDisplay');
            const hiddenInput = document.getElementById('ngayGhiNhanHidden');
            
            if (displayInput) {
                displayInput.value = displayDate;
            }
            if (hiddenInput) {
                hiddenInput.value = serverDate;
            }
        });
    </script>
</head>

<body>
    <div class="d-flex">
        <div th:replace="~{fragments/sidebar :: menu-trai}"></div>

        <div class="container-fluid p-4">
            <h2 th:text="#{cs.form.ghi_nhan_chi_so_dien}">Ghi Nhận Chỉ Số Điện Nước Hàng Tháng</h2>
            <hr>

            <form th:action="@{/admin/chi-so/luu}" th:object="${chiSo}" method="post" style="max-width: 600px;">
                <div class="mb-3">
                    <label class="form-label" th:text="#{cs.form.ngay_ghi_nhan_chot_s}">Ngày Ghi Nhận (Chốt số)</label>
                    <input type="text" class="form-control" id="ngayGhiNhanDisplay" readonly style="background-color: white;">
                    <input type="hidden" th:field="*{ngayGhiNhan}" id="ngayGhiNhanHidden">
                </div>

                <div class="mb-3">
                    <label class="form-label" th:text="#{hdon.form.can_ho}">Căn Hộ</label>
                    <select class="form-select" name="canHoId" required>
                        <option value="" disabled selected th:text="#{hdon.form.can_ho_chon}">-- Chọn căn hộ --</option>
                        <option th:each="ch : ${danhSachCanHo}" th:value="${ch.id}" th:text="${ch.maCanHo} + ' (' + ${ch.trangThaiHienThi} + ')'">
                        </option>
                    </select>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label" th:text="#{cs.form.so_dien_kwh}">Số Điện (kWh)</label>
                        <input type="number" step="0.1" class="form-control" th:field="*{dienTieuThu}" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label" th:text="#{cs.form.so_nuoc_m3}">Số Nước (m3)</label>
                        <input type="number" step="0.1" class="form-control" th:field="*{nuocTieuThu}" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary" th:text="#{cs.form.luu_chi_so}">Lưu Chỉ Số</button>
                <a th:href="@{/admin/chi-so}" class="btn btn-secondary" th:text="#{hdon.form.nut_huy}">Hủy</a>
            </form>
        </div>
    </div>
</body>

</html>
