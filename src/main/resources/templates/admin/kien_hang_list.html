<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title th:text="#{kh.ds.tieude}">Quản lý Kiện hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            display: flex;
            min-height: 100vh;
            background-color: #f8f9fa;
        }
        .main-content {
            flex-grow: 1;
            padding: 20px;
        }
        .status-badge {
            font-size: 0.85rem;
            padding: 0.4em 0.8em;
        }
    </style>
</head>

<body>
    <div th:replace="~{fragments/sidebar :: menu-trai}"></div>

    <div class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="text-primary"><i class="bi bi-box-seam"></i> <span th:text="#{kh.ds.tieude}">Quản lý Kiện hàng / Bưu phẩm</span></h2>
            <a th:href="@{/admin/kien-hang/them}" class="btn btn-primary shadow-sm" th:text="#{kh.ds.nut_them}">+ Ghi nhận kiện hàng mới</a>
        </div>

        <div th:if="${thongBaoThanhCong}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${thongBaoThanhCong}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="card shadow-sm border-0">
            <div class="card-body p-0">
                <table class="table table-hover mb-0 no-paging">
                    <thead class="table-dark">
                        <tr>
                            <th th:text="#{chung.id}">ID</th>
                            <th th:text="#{kh.ds.bang_can}">Căn hộ</th>
                            <th th:text="#{kh.ds.bang_nguoi_gui}">Người gửi (Vận chuyển)</th>
                            <th th:text="#{kh.ds.bang_nguoi_nhan}">Người nhận (Cư dân)</th>
                            <th th:text="#{kh.ds.bang_ngay_nhan}">Ngày nhận</th>
                            <th th:text="#{chung.trang_thai}">Trạng thái</th>
                            <th th:text="#{chung.hanh_dong}">Hành động</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="kh : ${danhSachKienHang}">
                            <td th:text="${kh.id}">1</td>
                            <td>
                                <span class="fw-bold" th:text="${kh.canHo != null ? kh.canHo.maCanHo : 'N/A'}"></span>
                            </td>
                            <td th:text="${kh.nguoiGui}">Shopee</td>
                            <td th:text="${kh.nguoiNhan}">Nguyễn Văn A</td>
                            <td th:text="${kh.ngayNhan}">2024-03-20</td>
                            <td>
                                <span class="badge status-badge" 
                                      th:classappend="${kh.trangThai != null && (kh.trangThai.contains('Đã') || kh.trangThai.contains('nhận') && !kh.trangThai.contains('Chờ')) ? 'bg-success' : 'bg-warning text-dark'}"
                                      th:text="${kh.trangThai}">
                                    Chờ nhận
                                </span>
                            </td>
                            <td>
                                <a th:if="${kh.trangThai != null && (kh.trangThai.contains('Chờ') || !kh.trangThai.contains('Đã'))}" 
                                   th:href="@{/admin/kien-hang/xac-nhan/{id}(id=${kh.id})}" 
                                   class="btn btn-sm btn-outline-success" th:text="#{kh.ds.xac_nhan_lay}">
                                    Xác nhận đã lấy
                                </a>
                                <span th:if="${kh.trangThai != null && kh.trangThai.contains('Đã')}" class="text-muted small" th:text="#{kh.ds.da_xong}">Quy trình kết thúc</span>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(danhSachKienHang)}">
                             <td colspan="7" class="text-center py-4 text-muted" th:text="#{kh.ds.trong}">Không có kiện hàng nào trong kho.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <div th:replace="~{fragments/pagination :: paging('/admin/kien-hang', '')}"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Dùng fragment Datatable chung -->
    <div th:replace="~{fragments/datatable :: scripts}"></div>
</body>

</html>
