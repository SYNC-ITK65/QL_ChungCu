<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title th:text="#{kh.ds.tieude}">Quản lý Kiện hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body {
            display: flex;
            min-height: 100vh;
            background-color: #f8f9fa;
        }
        .main-content {
            flex-grow: 1;
            padding: 20px;
        }
        .status-badge {
            font-size: 0.85rem;
            padding: 0.4em 0.8em;
        }
    </style>
</head>

<body>
    <div th:replace="~{fragments/sidebar :: menu-trai}"></div>

    <div class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="text-primary"><i class="bi bi-box-seam"></i> <span th:text="#{kh.ds.tieude}">Quản lý Kiện hàng / Bưu phẩm</span></h2>
            <a th:href="@{/admin/kien-hang/them}" class="btn btn-primary shadow-sm" th:text="#{kh.ds.nut_them}">+ Ghi nhận kiện hàng mới</a>
        </div>

        <!-- Form Tìm kiếm & Lọc -->
        <div class="card mb-4 shadow-sm">
            <div class="card-body">
                <form th:action="@{/admin/kien-hang}" method="GET" class="row g-3">
                    <div class="col-md-5">
                        <label class="form-label fw-bold" th:text="#{hdon.ds.loc_ma_can}">Mã căn hộ</label>
                        <input type="text" name="maCanHo" class="form-control" th:value="${maCanHo}" placeholder="Nhập mã căn hộ (vd: A-101)..." th:placeholder="#{kh.ds.nhap_ma_can_ho_vd_a}">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold" th:text="#{hdon.ds.bang_trang_thai}">Trạng thái</label>
                        <select name="trangThai" class="form-select">
                            <option value="" th:text="#{duyet.ui.tat_ca_trang_thai}">-- Tất cả trạng thái --</option>
                            <option value="Chờ nhận" th:selected="${trangThai == 'Chờ nhận'}" th:text="#{kh.ds.cho_nhan}">Chờ nhận</option>
                            <option value="Đã nhận" th:selected="${trangThai == 'Đã nhận'}" th:text="#{kh.ds.da_nhan}">Đã nhận</option>
                        </select>
                    </div>
                    <div class="col-md-3 d-flex align-items-end">
                        <button type="submit" class="btn btn-primary w-100">
                            <i class="bi bi-search"></i><span th:text="#{kh.ds.loc_kien_hang}" th:remove="tag"> Lọc kiện hàng
                        </span></button>
                    </div>
                </form>
            </div>
        </div>

        <div th:if="${thongBaoThanhCong}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${thongBaoThanhCong}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        <div th:if="${thongBaoLoi}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${thongBaoLoi}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="card shadow-sm border-0">
            <div class="card-body p-0">
                <table class="table table-hover mb-0 no-paging">
                    <thead class="table-dark">
                        <tr>
                            <th th:text="#{chung.id}">ID</th>
                            <th th:text="#{kh.ds.bang_can}">Căn hộ</th>
                            <th th:text="#{kh.ds.bang_nguoi_gui}">Người gửi (Vận chuyển)</th>
                            <th th:text="#{kh.ds.bang_nguoi_nhan}">Người nhận (Cư dân)</th>
                            <th th:text="#{kh.ds.bang_ngay_nhan}">Ngày nhận</th>
                            <th th:text="#{chung.trang_thai}">Trạng thái</th>
                            <th th:text="#{chung.hanh_dong}">Hành động</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="kh : ${danhSachKienHang}">
                            <td th:text="${kh.id}">1</td>
                            <td>
                                <span class="fw-bold" th:text="${kh.canHo != null ? kh.canHo.maCanHo : 'N/A'}"></span>
                            </td>
                            <td th:text="${kh.nguoiGui}">Shopee</td>
                            <td th:text="${kh.nguoiNhan}">Nguyễn Văn A</td>
                            <td th:text="${kh.ngayNhan}">2024-03-20</td>
                            <td>
                                <span class="badge status-badge" th:classappend="${kh.trangThai != null &amp;&amp; (kh.trangThai.contains('Đã') || kh.trangThai.contains('nhận') &amp;&amp; !kh.trangThai.contains('Chờ')) ? 'bg-success' : 'bg-warning text-dark'}" th:text="${kh.trangThai}">
                                    Chờ nhận
                                </span>
                            </td>
                            <td>
                                <!-- Nút Xác nhận đã lấy: Chỉ hiện khi chưa nhận -->
                                <a th:if="${kh.trangThai != null &amp;&amp; (kh.trangThai.contains('Chờ') || !kh.trangThai.contains('Đã'))}" th:href="@{/admin/kien-hang/xac-nhan/{id}(id=${kh.id})}" class="btn btn-sm btn-outline-success" th:text="#{kh.ds.xac_nhan_lay}">
                                    Xác nhận đã lấy
                                </a>
                                <!-- Nút Sửa/Xóa: Chỉ cho phép khi trạng thái KHÔNG phải "Đã nhận" -->
                                <th:block th:if="${kh.trangThai == null || !kh.trangThai.contains('Đã')}">
                                    <a th:href="@{/admin/kien-hang/sua/{id}(id=${kh.id})}" class="btn btn-sm btn-warning" th:text="#{hdon.ds.nut_sua}">Sửa</a>
                                    <a th:href="@{/admin/kien-hang/xoa/{id}(id=${kh.id})}" class="btn btn-sm btn-danger" th:onclick="|return confirm('#{chung.xac_nhan_xoa}')|" th:text="#{hd.ds.nut_xoa}">Xóa</a>
                                </th:block>
                                <!-- Đã nhận: Hiển thị trạng thái kết thúc -->
                                <span th:if="${kh.trangThai != null &amp;&amp; kh.trangThai.contains('Đã')}" class="text-muted small" th:text="#{kh.ds.da_xong}">Quy trình kết thúc</span>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(danhSachKienHang)}">
                             <td colspan="7" class="text-center py-4 text-muted" th:text="#{kh.ds.trong}">Không có kiện hàng nào trong kho.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <div th:replace="~{fragments/pagination :: paging('/admin/kien-hang', 'maCanHo=' + (${maCanHo} ?: '') + '&amp;trangThai=' + (${trangThai} ?: ''))}"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Dùng fragment Datatable chung -->
    <div th:replace="~{fragments/datatable :: scripts}"></div>
</body>

</html>
