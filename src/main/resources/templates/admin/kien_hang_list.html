<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{kh.ds.tieude}">Quản lý đơn thư</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts - Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            700: '#0369a1',
                            900: '#0c4a6e',
                        },
                        darkbg: '#0B0F17',
                        darkcard: '#161B26',
                        darkborder: '#242B3D'
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0B0F17;
            color: #E2E8F0;
            font-family: 'Inter', sans-serif;
        }
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #111827;
        }
        ::-webkit-scrollbar-thumb {
            background: #374151;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #4B5563;
        }
        select.custom-select {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 0.75rem center;
            background-repeat: no-repeat;
            background-size: 1.5em 1.5em;
        }
    </style>
</head>
<body class="min-h-screen flex bg-darkbg text-slate-200 antialiased font-sans">

    <!-- Global Sidebar -->
    <div th:replace="~{fragments/sidebar :: menu-trai}"></div>

    <!-- Main Content -->
    <main class="flex-grow min-w-0 p-6 md:p-8 overflow-y-auto max-w-7xl mx-auto w-full">
            
            <!-- Page Header -->
            <div class="flex flex-col md:flex-row md:items-center justify-between mb-6 gap-4">
                <div>
                    <h2 class="text-xl md:text-2xl font-bold text-white flex items-center gap-2">
                        <i data-lucide="package" class="w-6 h-6 text-brand-500"></i>
                        <span th:text="#{kh.ds.tieude}">Quản lý đơn thư</span>
                    </h2>
                    <p class="text-xs text-slate-400 mt-1" th:text="#{admin.kienhang.list.subtitle}">Ghi nhận và quản lý bưu phẩm, kiện hàng của cư dân</p>
                </div>
                <div class="flex gap-2">
                    <a th:href="@{/admin/kien-hang/them}" class="px-4 py-2.5 bg-brand-500 hover:bg-brand-600 text-white rounded-xl text-sm font-bold transition shadow-lg shadow-brand-500/25 flex items-center gap-2">
                        <i data-lucide="plus-circle" class="w-4.5 h-4.5"></i> <span th:text="#{kh.ds.nut_them}">+ Ghi nhận đơn thư mới</span>
                    </a>
                </div>
            </div>

            <!-- Notifications -->
            <div th:if="${thongBaoThanhCong}" class="mb-6 flex items-center justify-between p-4 bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 rounded-xl text-sm font-medium shadow-lg shadow-black/20">
                <div class="flex items-center gap-2">
                    <i data-lucide="check-circle" class="w-5 h-5"></i>
                    <strong th:text="${thongBaoThanhCong}"></strong>
                </div>
                <button onclick="this.parentElement.remove()" class="text-emerald-400 hover:text-emerald-300"><i data-lucide="x" class="w-4 h-4"></i></button>
            </div>
            
            <div th:if="${thongBaoLoi}" class="mb-6 flex items-center justify-between p-4 bg-red-500/10 border border-red-500/20 text-red-400 rounded-xl text-sm font-medium shadow-lg shadow-black/20">
                <div class="flex items-center gap-2">
                    <i data-lucide="alert-circle" class="w-5 h-5"></i>
                    <strong th:text="${thongBaoLoi}"></strong>
                </div>
                <button onclick="this.parentElement.remove()" class="text-red-400 hover:text-red-300"><i data-lucide="x" class="w-4 h-4"></i></button>
            </div>

            <!-- Search and Filter Form -->
            <div class="bg-darkcard p-5 rounded-2xl border border-darkborder mb-6 shadow-lg shadow-black/20">
                <form th:action="@{/admin/kien-hang}" method="GET" class="grid grid-cols-1 md:grid-cols-12 gap-4">
                    <div class="md:col-span-5 space-y-1.5">
                        <label class="text-xs font-semibold text-slate-300" th:text="#{hdon.ds.loc_ma_can}">Mã căn hộ</label>
                        <div class="relative">
                            <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-500"><i data-lucide="home" class="w-4 h-4"></i></span>
                            <input type="text" name="maCanHo" th:value="${maCanHo}" th:placeholder="#{kh.ds.nhap_ma_can_ho_vd_a}" placeholder="Nhập mã căn hộ (vd: A-101)..." class="w-full bg-darkbg border border-darkborder rounded-xl py-2.5 pl-10 pr-4 text-xs text-white placeholder-slate-600 focus:outline-none focus:border-brand-500 transition">
                        </div>
                    </div>
                    <div class="md:col-span-4 space-y-1.5">
                        <label class="text-xs font-semibold text-slate-300" th:text="#{hdon.ds.bang_trang_thai}">Trạng thái</label>
                        <select name="trangThai" class="w-full bg-darkbg border border-darkborder rounded-xl py-2.5 px-3.5 text-xs text-white focus:outline-none focus:border-brand-500 transition appearance-none cursor-pointer custom-select">
                            <option value="" th:text="#{duyet.ui.tat_ca_trang_thai}">-- Tất cả trạng thái --</option>
                            <option value="Chờ nhận" th:selected="${trangThai == 'Chờ nhận'}" th:text="#{kh.ds.cho_nhan}">Chờ nhận</option>
                            <option value="Đã nhận" th:selected="${trangThai == 'Đã nhận'}" th:text="#{kh.ds.da_nhan}">Đã nhận</option>
                        </select>
                    </div>
                    <div class="md:col-span-3 flex items-end gap-2">
                        <button type="submit" class="flex-1 py-2.5 bg-brand-500 hover:bg-brand-600 text-white rounded-xl text-xs font-medium transition shadow-lg shadow-brand-500/25 flex items-center justify-center gap-2">
                            <i data-lucide="filter" class="w-4 h-4"></i> <span th:text="#{kh.ds.loc_kien_hang}">Lọc đơn thư</span>
                        </button>
                    </div>
                </form>
            </div>

            <!-- Table Card -->
            <div class="bg-darkcard rounded-2xl border border-darkborder overflow-hidden flex-grow flex flex-col shadow-lg shadow-black/20 mb-32">
                <div class="p-4 border-b border-darkborder flex items-center justify-between bg-[#111622]">
                    <h3 class="text-sm font-bold text-white flex items-center gap-2">
                        <i data-lucide="list" class="w-4.5 h-4.5 text-brand-400"></i>
                        <span>Danh sách đơn thư</span>
                    </h3>
                </div>
                
                <div class="overflow-x-auto flex-grow">
                    <table class="w-full text-left text-xs whitespace-nowrap">
                        <thead class="bg-[#111622] text-slate-400 border-b border-darkborder uppercase tracking-wider text-[10px] font-semibold">
                            <tr>
                                <th class="px-5 py-3" th:text="#{chung.id}">ID</th>
                                <th class="px-4 py-3" th:text="#{kh.ds.bang_can}">Căn hộ</th>
                                <th class="px-4 py-3" th:text="#{kh.ds.bang_nguoi_gui}">Người gửi (Vận chuyển)</th>
                                <th class="px-4 py-3" th:text="#{kh.ds.bang_nguoi_nhan}">Người nhận (Cư dân)</th>
                                <th class="px-4 py-3" th:text="#{kh.ds.bang_ngay_nhan}">Ngày nhận</th>
                                <th class="px-4 py-3" th:text="#{chung.trang_thai}">Trạng thái</th>
                                <th class="px-5 py-3 text-right" th:text="#{chung.hanh_dong}">Hành động</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-darkborder text-slate-300">
                            <tr th:each="kh : ${danhSachKienHang}" class="hover:bg-slate-800/30 transition">
                                <td class="px-5 py-3 text-slate-500 font-mono" th:text="${kh.id}"></td>
                                <td class="px-4 py-3 font-bold text-white" th:text="${kh.canHo != null ? kh.canHo.maCanHo : 'N/A'}"></td>
                                <td class="px-4 py-3 font-medium text-slate-300" th:text="${kh.nguoiGui}"></td>
                                <td class="px-4 py-3 font-bold text-brand-400" th:text="${kh.nguoiNhan}"></td>
                                <td class="px-4 py-3 text-slate-400" th:text="${kh.ngayNhan}"></td>
                                <td class="px-4 py-3">
                                    <span th:classappend="${kh.trangThai != null &amp;&amp; (kh.trangThai.contains('Đã') || kh.trangThai.contains('nhận') &amp;&amp; !kh.trangThai.contains('Chờ')) ? 'bg-emerald-500/10 text-emerald-400 border-emerald-500/20' : 'bg-amber-500/10 text-amber-400 border-amber-500/20'}" class="px-2.5 py-1 rounded-md text-[10px] font-bold border">
                                        <th:block th:if="${kh.trangThai == 'Chờ nhận'}" th:text="#{kh.ds.cho_nhan}">Chờ nhận</th:block>
                                        <th:block th:if="${kh.trangThai == 'Đã nhận'}" th:text="#{kh.ds.da_nhan}">Đã nhận</th:block>
                                    </span>
                                </td>
                                <td class="px-5 py-3 text-right">
                                    <div class="flex items-center justify-end gap-1.5">
                                        <!-- Xác nhận đã lấy -->
                                        <a th:if="${kh.trangThai != null &amp;&amp; (kh.trangThai.contains('Chờ') || !kh.trangThai.contains('Đã'))}" th:href="@{/admin/kien-hang/xac-nhan/{id}(id=${kh.id})}" class="inline-flex items-center gap-1 px-2.5 py-1.5 bg-emerald-500/10 hover:bg-emerald-500/20 text-emerald-400 border border-emerald-500/20 rounded-lg text-xs font-semibold transition" th:title="#{kh.ds.xac_nhan_lay}">
                                            <i data-lucide="check-square" class="w-3.5 h-3.5"></i>
                                            <span class="hidden sm:inline">Đã lấy</span>
                                        </a>

                                        <!-- Sửa / Xóa -->
                                        <th:block th:if="${kh.trangThai == null || !kh.trangThai.contains('Đã')}">
                                            <a th:href="@{/admin/kien-hang/sua/{id}(id=${kh.id})}" class="inline-flex items-center justify-center w-7 h-7 bg-amber-500/10 hover:bg-amber-500/20 text-amber-400 border border-amber-500/20 rounded-lg transition" th:title="#{hdon.ds.nut_sua}">
                                                <i data-lucide="edit" class="w-3.5 h-3.5"></i>
                                            </a>
                                            <a th:href="@{/admin/kien-hang/xoa/{id}(id=${kh.id})}" th:onclick="|return confirm('#{chung.xac_nhan_xoa}')|" class="inline-flex items-center justify-center w-7 h-7 bg-rose-500/10 hover:bg-rose-500/20 text-rose-400 border border-rose-500/20 rounded-lg transition" th:title="#{hd.ds.nut_xoa}">
                                                <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
                                            </a>
                                        </th:block>
                                        
                                        <!-- Đã nhận -->
                                        <span th:if="${kh.trangThai != null &amp;&amp; kh.trangThai.contains('Đã')}" class="inline-flex items-center gap-1 text-[11px] text-slate-500 font-medium px-2 py-1 bg-slate-800/50 rounded-lg border border-slate-700/50">
                                            <i data-lucide="check-circle" class="w-3 h-3 text-emerald-500/70"></i> <span th:text="#{kh.ds.da_xong}">Quy trình kết thúc</span>
                                        </span>
                                    </div>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(danhSachKienHang)}">
                                <td colspan="7" class="px-5 py-8 text-center text-slate-500">
                                    <div class="flex flex-col items-center justify-center gap-2">
                                        <i data-lucide="package-open" class="w-8 h-8 text-slate-600 mb-1 opacity-50"></i>
                                        <span th:text="#{kh.ds.trong}">Không có đơn thư nào trong kho.</span>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                
                <div class="p-4 border-t border-darkborder bg-[#111622]">
                    <div th:replace="~{fragments/pagination :: paging('/admin/kien-hang', 'maCanHo=' + (${maCanHo} ?: '') + '&amp;trangThai=' + (${trangThai} ?: ''))}"></div>
                </div>
            </div>
            
        </main>

    <!-- Script chung -->
    <div th:replace="~{fragments/datatable :: scripts}"></div>
    
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            if (typeof lucide !== 'undefined') {
                lucide.createIcons();
            }
        });
    </script>
</body>
</html>
