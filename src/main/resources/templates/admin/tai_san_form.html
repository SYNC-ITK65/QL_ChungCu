<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{ts.form.them_tieude}">Thông tin Tài Sản</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="d-flex">
        <div th:replace="~{fragments/sidebar :: menu-trai}"></div>
        <div class="flex-grow-1 p-4">
            <h2 class="mb-4" th:text="${taiSan.id == null} ? #{ts.form.them_tieude} : #{ts.form.sua_tieude}">Thông tin
                Tài Sản</h2>

            <div th:if="${errorMessage}" class="alert alert-danger" role="alert">
                <span th:text="${errorMessage}"></span>
            </div>

            <form th:action="@{/admin/tai-san/save}" th:object="${taiSan}" method="post">
                <input type="hidden" th:field="*{id}">

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label" th:text="#{ts.form.ten}">Tên Tài Sản</label>
                        <input type="text" class="form-control" th:field="*{tenTaiSan}" required>
                        <div class="text-danger mt-1" th:if="${#fields.hasErrors('tenTaiSan')}"
                            th:errors="*{tenTaiSan}"></div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label" th:text="#{ts.form.ma}">Mã Tài Sản</label>
                        <input type="text" class="form-control" th:field="*{maTaiSan}" required>
                        <div class="text-danger mt-1" th:if="${#fields.hasErrors('maTaiSan')}" th:errors="*{maTaiSan}">
                        </div>
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label" th:text="#{ts.form.vt}">Vị Trí</label>
                        <input type="text" class="form-control" th:field="*{viTri}">
                        <div class="text-danger mt-1" th:if="${#fields.hasErrors('viTri')}" th:errors="*{viTri}"></div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label" th:text="#{ts.form.ngay_mua}">Ngày Mua</label>
                        <input type="date" class="form-control" th:field="*{ngayMua}">
                        <div class="text-danger mt-1" th:if="${#fields.hasErrors('ngayMua')}" th:errors="*{ngayMua}">
                        </div>
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-4">
                        <label class="form-label" th:text="#{ts.form.trang_thai}">Trạng Thái</label>
                        <select class="form-select" th:field="*{tinhTrang}">
                            <option value="Hoạt động tốt" th:text="#{ts.tt.tot}">Hoạt động tốt</option>
                            <option value="Đang hỏng" th:text="#{ts.tt.hong}">Đang hỏng</option>
                            <option value="Chờ thanh lý" th:text="#{ts.tt.thanh_ly}">Chờ thanh lý</option>
                        </select>
                        <div class="text-danger mt-1" th:if="${#fields.hasErrors('tinhTrang')}"
                            th:errors="*{tinhTrang}"></div>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label" th:text="#{ts.form.chu_ky}">Chu Kỳ Bảo Trì (Tháng)</label>
                        <input type="number" class="form-control" th:field="*{chuKyBaoTri}">
                        <div class="text-danger mt-1" th:if="${#fields.hasErrors('chuKyBaoTri')}"
                            th:errors="*{chuKyBaoTri}"></div>
                    </div>
                </div>

                <div class="mt-4">
                    <button type="submit" class="btn btn-success px-4" th:text="#{chung.luu}">Lưu</button>
                    <a th:href="@{/admin/tai-san}" class="btn btn-secondary px-4 ms-2" th:text="#{chung.huy}">Hủy</a>
                </div>
            </form>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
