<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thông tin Tài Sản</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="d-flex">
        <div th:replace="~{fragments/sidebar :: menu-trai}"></div>
        <div class="flex-grow-1 p-4">
            <h2 class="mb-4" th:text="${taiSan.id == null ? '+ Thêm Tài Sản Mới' : '✏️ Sửa Thông Tin Tài Sản'}">Thông
                tin Tài Sản</h2>
            <form th:action="@{/admin/tai-san/save}" th:object="${taiSan}" method="post">
                <input type="hidden" th:field="*{id}">

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Tên Tài Sản</label>
                        <input type="text" class="form-control" th:field="*{tenTaiSan}" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Mã Tài Sản</label>
                        <input type="text" class="form-control" th:field="*{maTaiSan}" required>
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Vị Trí</label>
                        <input type="text" class="form-control" th:field="*{viTri}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Ngày Mua</label>
                        <input type="date" class="form-control" th:field="*{ngayMua}">
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-4">
                        <label class="form-label">Trạng Thái</label>
                        <select class="form-select" th:field="*{tinhTrang}">
                            <option value="Hoạt động tốt">Hoạt động tốt</option>
                            <option value="Đang hỏng">Đang hỏng</option>
                            <option value="Chờ thanh lý">Chờ thanh lý</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Chu Kỳ Bảo Trì (Tháng)</label>
                        <input type="number" class="form-control" th:field="*{chuKyBaoTri}">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Bảo Trì Tiếp Theo</label>
                        <input type="date" class="form-control" th:field="*{ngayBaoTriTiepTheo}">
                        <small class="text-muted">Để trống nếu muốn tự động tính.</small>
                    </div>
                </div>

                <div class="mt-4">
                    <button type="submit" class="btn btn-success px-4">Lưu</button>
                    <a th:href="@{/admin/tai-san}" class="btn btn-secondary px-4 ms-2">Hủy</a>
                </div>
            </form>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
