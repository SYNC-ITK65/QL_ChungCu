<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{bt.form.tieude}">Ghi nhận Bảo Trì</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = { darkMode:'class', theme:{ extend:{ fontFamily:{sans:['Inter','sans-serif']}, colors:{brand:{500:'#0ea5e9',400:'#38bdf8',600:'#0284c7'},darkbg:'#0B0F17',darkcard:'#161B26',darkborder:'#242B3D'} } } }
    </script>
    <style>body{background-color:#0B0F17;color:#E2E8F0;font-family:'Inter',sans-serif;}</style>
</head>
<body class="min-h-screen flex bg-darkbg text-slate-200 antialiased font-sans">
    <div th:replace="fragments/sidebar :: menu-trai"></div>
    <main class="flex-grow p-6 md:p-8 overflow-y-auto w-full flex flex-col items-center">
        <!-- Header -->
        <div class="w-full max-w-2xl flex items-center justify-between gap-4 mb-8">
            <div>
                <h1 class="text-2xl font-bold text-white tracking-tight">
                    <span th:text="#{bt.form.tieude}">Ghi nhận Bảo Trì cho:</span>
                    <span class="text-brand-400" th:text="${taiSan.tenTaiSan}">Tên tài sản</span>
                </h1>
                <p class="text-sm text-slate-400 mt-1" th:text="#{admin.baotri.form.subtitle}">Ghi lại thông tin lần bảo trì / sửa chữa</p>
            </div>
            <a th:href="@{/admin/tai-san/{id}/bao-tri(id=${taiSan.id})}"
               class="px-4 py-2 bg-slate-800 hover:bg-slate-700 text-slate-300 text-xs font-semibold rounded-xl transition flex items-center gap-1.5">
                <i data-lucide="arrow-left" class="w-4 h-4"></i>
                <span th:text="#{chung.quay_lai}">Quay lại</span>
            </a>
        </div>

        <!-- Tài sản info -->
        <div class="w-full max-w-2xl mb-6 p-4 bg-brand-500/5 border border-brand-500/20 rounded-xl flex items-center gap-3 text-xs">
            <i data-lucide="wrench" class="w-4 h-4 text-brand-400 flex-shrink-0"></i>
            <div class="flex gap-4">
                <span class="text-slate-400">Mã: <strong class="text-white" th:text="${taiSan.maTaiSan}">TS01</strong></span>
                <span class="text-slate-400">Vị trí: <strong class="text-white" th:text="${taiSan.viTri}">Hầm B1</strong></span>
            </div>
        </div>

        <!-- Form Card -->
        <div class="w-full max-w-2xl bg-darkcard border border-darkborder rounded-2xl p-6 md:p-8 shadow-xl">
            <form th:action="@{/admin/tai-san/{id}/bao-tri/save(id=${taiSan.id})}"
                  th:object="${history}" method="post" class="space-y-6">

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- Ngày bảo trì -->
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2" th:text="#{bt.form.ngay}">Ngày Thực Hiện</label>
                        <input type="date" th:field="*{ngayBaoTri}" required
                               class="w-full bg-darkbg border border-darkborder rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-brand-500 transition">
                    </div>
                    <!-- Chi phí -->
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2" th:text="#{bt.form.phi}">Chi Phí (VNĐ)</label>
                        <input type="number" th:field="*{chiPhi}" min="0"
                               class="w-full bg-darkbg border border-darkborder rounded-xl px-4 py-3 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-brand-500 transition">
                    </div>
                </div>

                <!-- Người thực hiện -->
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2" th:text="#{bt.form.nguoi_thuc_hien}">Người Thực Hiện</label>
                    <input type="text" th:field="*{nguoiThucHien}"
                           class="w-full bg-darkbg border border-darkborder rounded-xl px-4 py-3 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-brand-500 transition">
                </div>

                <!-- Nội dung -->
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2" th:text="#{bt.form.noi_dung}">Nội Dung Bảo Trì</label>
                    <textarea th:field="*{noiDung}" rows="4"
                              class="w-full bg-darkbg border border-darkborder rounded-xl px-4 py-3 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-brand-500 transition resize-none"></textarea>
                </div>

                <!-- Buttons -->
                <div class="flex items-center gap-3 pt-4 border-t border-darkborder justify-end">
                    <a th:href="@{/admin/tai-san/{id}/bao-tri(id=${taiSan.id})}"
                       class="px-6 py-3 bg-slate-800 hover:bg-slate-700 text-slate-300 text-xs font-semibold rounded-xl transition" th:text="#{chung.huy}">Hủy</a>
                    <button type="submit"
                            class="px-6 py-3 bg-brand-500 hover:bg-brand-400 text-white text-xs font-bold rounded-xl transition flex items-center gap-2 shadow-lg shadow-brand-500/10">
                        <i data-lucide="save" class="w-4 h-4"></i>
                        <span th:text="#{chung.luu}">Lưu</span>
                    </button>
                </div>
            </form>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>document.addEventListener('DOMContentLoaded', function () { lucide.createIcons(); });</script>
</body>
</html>
