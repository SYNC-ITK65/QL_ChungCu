<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title th:text="#{dv.ds.quan_ly_dich_vu}">Quản lý Dịch vụ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="d-flex">
        <div th:replace="~{fragments/sidebar :: menu-trai}"></div>

        <div class="flex-grow-1 p-4">
            <div th:if="${thongBaoThanhCong}" class="alert alert-success alert-dismissible fade show" role="alert">
                <span th:text="${thongBaoThanhCong}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${thongBaoLoi}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <span th:text="${thongBaoLoi}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 th:text="#{dv.ds.danh_sach_dich_vu}">Danh sách Dịch vụ</h2>
                <a th:href="@{/admin/dich-vu/tao-moi}" class="btn btn-primary" th:text="#{dv.ds.them_dich_vu_moi}">+
                    Thêm Dịch vụ mới</a>
            </div>

            <table class="table table-striped table-hover border no-paging">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th th:text="#{dv.form.ten_dich_vu}">Tên Dịch vụ</th>
                        <th th:text="#{hd.ds.bang_loai}">Loại</th>
                        <th th:text="#{dv.form.don_gia}">Đơn Giá</th>
                        <th th:text="#{dv.form.don_vi_tinh}">Đơn Vị Tính</th>
                        <th th:text="#{dv.ds.mo_ta}">Mô Tả</th>
                        <th th:text="#{hdon.ds.bang_hanh_dong}">Hành Động</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="dv : ${danhSachDichVu}">
                        <td th:text="${dv.id}">1</td>
                        <td th:text="${dv.ten}">Tiền Điện</td>
                        <td th:text="${dv.loai}">Điện</td>
                        <td
                            th:text="|${#numbers.formatDecimal(dv.donGia, 0, 'COMMA', 0, 'POINT')} #{chung.don_vi_vnd}|">
                        </td>
                        <td th:text="${dv.donViTinh}">kWh</td>
                        <td th:text="${dv.moTa}">Điện sinh hoạt bậc 1</td>
                        <td>
                            <a th:href="@{/admin/dich-vu/sua/{id}(id=${dv.id})}" class="btn btn-sm btn-warning"
                                th:text="#{hdon.ds.nut_sua}">Sửa</a>
                            <a th:href="@{/admin/dich-vu/xoa/{id}(id=${dv.id})}" class="btn btn-sm btn-danger"
                                th:onclick="|return confirm('#{chung.xac_nhan_xoa}')|"
                                th:text="#{hd.ds.nut_xoa}">Xóa</a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(danhSachDichVu)}">
                        <td colspan="7" class="text-center" th:text="#{dv.ds.chua_co_dich_vu_nao}">Chưa có dịch vụ nào
                            được tạo.</td>
                    </tr>
                </tbody>
            </table>

        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Dùng fragment Datatable chung -->
    <div th:replace="~{fragments/datatable :: scripts}"></div>
</body>

</html>
