<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{dv.ds.quan_ly_dich_vu}">Quản lý Dịch vụ</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts - Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            700: '#0369a1',
                            900: '#0c4a6e',
                        },
                        darkbg: '#0B0F17',
                        darkcard: '#161B26',
                        darkborder: '#242B3D'
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0B0F17;
            color: #E2E8F0;
            font-family: 'Inter', sans-serif;
        }
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #111827;
        }
        ::-webkit-scrollbar-thumb {
            background: #374151;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #4B5563;
        }
    </style>
</head>
<body class="min-h-screen flex bg-darkbg text-slate-200 antialiased font-sans">

    <!-- Global Sidebar -->
    <div th:replace="~{fragments/sidebar :: menu-trai}"></div>

    <!-- Main Content -->
    <main class="flex-grow min-w-0 p-6 md:p-8 overflow-y-auto max-w-7xl mx-auto w-full">
            
            <!-- Notifications -->
            <div th:if="${thongBaoThanhCong}" class="mb-6 flex items-center justify-between p-4 bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 rounded-xl text-sm font-medium">
                <div class="flex items-center gap-2">
                    <i data-lucide="check-circle" class="w-5 h-5"></i>
                    <span th:text="${thongBaoThanhCong}"></span>
                </div>
                <button onclick="this.parentElement.remove()" class="text-emerald-400 hover:text-emerald-300"><i data-lucide="x" class="w-4 h-4"></i></button>
            </div>
            
            <div th:if="${thongBaoLoi}" class="mb-6 flex items-center justify-between p-4 bg-red-500/10 border border-red-500/20 text-red-400 rounded-xl text-sm font-medium">
                <div class="flex items-center gap-2">
                    <i data-lucide="alert-circle" class="w-5 h-5"></i>
                    <span th:text="${thongBaoLoi}"></span>
                </div>
                <button onclick="this.parentElement.remove()" class="text-red-400 hover:text-red-300"><i data-lucide="x" class="w-4 h-4"></i></button>
            </div>

            <!-- Page Header -->
            <div class="flex flex-col md:flex-row md:items-center justify-between mb-6 gap-4">
                <div>
                    <h2 class="text-xl md:text-2xl font-bold text-white flex items-center gap-2">
                        <i data-lucide="settings-2" class="w-6 h-6 text-brand-500"></i>
                        <span th:text="#{dv.ds.danh_sach_dich_vu}">Danh sách Dịch vụ</span>
                    </h2>
                    <p class="text-xs text-slate-400 mt-1" th:text="#{admin.dichvu.list.subtitle}">Quản lý các loại dịch vụ nội khu</p>
                </div>
                <div class="flex gap-2">
                    <a th:href="@{/admin/yeu-cau-dich-vu}" class="px-4 py-2 bg-transparent hover:bg-slate-800 text-slate-300 border border-slate-700 rounded-xl text-xs font-medium transition flex items-center gap-2">
                        <i data-lucide="corner-up-left" class="w-4 h-4"></i> <span th:text="#{dv.ds.quay_lai}">Quay lại</span>
                    </a>
                    <a th:href="@{/admin/dich-vu/tao-moi}" class="px-4 py-2 bg-brand-500 hover:bg-brand-600 text-white rounded-xl text-xs font-medium transition shadow-lg shadow-brand-500/20 flex items-center gap-2">
                        <i data-lucide="plus" class="w-4 h-4"></i> <span th:text="#{dv.ds.them_dich_vu_moi}">Thêm Dịch vụ mới</span>
                    </a>
                </div>
            </div>

            <!-- Table Card -->
            <div class="bg-darkcard rounded-2xl border border-darkborder overflow-hidden flex-grow flex flex-col shadow-lg shadow-black/20">
                <div class="p-4 border-b border-darkborder flex items-center justify-between bg-[#111622]">
                    <h3 class="text-sm font-bold text-white flex items-center gap-2">
                        <i data-lucide="list" class="w-4.5 h-4.5 text-brand-400"></i>
                        <span th:text="#{dv.ds.quan_ly_dich_vu}">Cấu hình Dịch vụ</span>
                    </h3>
                </div>
                
                <div class="overflow-x-auto flex-grow">
                    <table class="w-full text-left text-xs whitespace-nowrap">
                        <thead class="bg-[#111622] text-slate-400 border-b border-darkborder uppercase tracking-wider text-[10px] font-semibold">
                            <tr>
                                <th class="px-4 py-3">ID</th>
                                <th class="px-4 py-3" th:text="#{dv.form.ten_dich_vu}">Tên Dịch vụ</th>
                                <th class="px-4 py-3" th:text="#{hd.ds.bang_loai}">Loại</th>
                                <th class="px-4 py-3" th:text="#{dv.form.don_gia}">Đơn Giá</th>
                                <th class="px-4 py-3" th:text="#{dv.form.don_vi_tinh}">Đơn Vị Tính</th>
                                <th class="px-4 py-3" th:text="#{dv.ds.mo_ta}">Mô Tả</th>
                                <th class="px-4 py-3 text-center" th:text="#{hdon.ds.bang_hanh_dong}">Hành Động</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-darkborder text-slate-300">
                            <tr th:each="dv : ${danhSachDichVu}" class="hover:bg-slate-800/30 transition">
                                <td class="px-4 py-3 font-mono text-slate-400" th:text="${dv.id}">1</td>
                                <td class="px-4 py-3 font-medium text-white" th:text="${dv.ten}">Tiền Điện</td>
                                <td class="px-4 py-3">
                                    <span class="px-2.5 py-1 rounded-md text-[10px] font-bold bg-slate-800 text-slate-300 border border-slate-700" th:text="${dv.loai}">Điện</span>
                                </td>
                                <td class="px-4 py-3 text-emerald-400 font-medium" th:text="|${#numbers.formatDecimal(dv.donGia, 0, 'COMMA', 0, 'POINT')} #{chung.don_vi_vnd}|"></td>
                                <td class="px-4 py-3 text-slate-400" th:text="${dv.donViTinh}">kWh</td>
                                <td class="px-4 py-3 text-slate-400 max-w-[200px] truncate" th:text="${dv.moTa}" th:title="${dv.moTa}">Điện sinh hoạt bậc 1</td>
                                <td class="px-4 py-3 text-center">
                                    <div class="flex items-center justify-center gap-1.5 flex-wrap">
                                        <a th:href="@{/admin/dich-vu/sua/{id}(id=${dv.id})}" class="px-2.5 py-1.5 bg-amber-500/10 hover:bg-amber-500/20 text-amber-500 border border-amber-500/20 rounded-lg text-xs font-semibold transition flex items-center gap-1" th:title="#{hdon.ds.nut_sua}">
                                            <i data-lucide="edit" class="w-3.5 h-3.5"></i> <span th:text="#{hdon.ds.nut_sua}" class="hidden xl:inline">Sửa</span>
                                        </a>
                                        <a th:href="@{/admin/dich-vu/xoa/{id}(id=${dv.id})}" th:onclick="|return confirm('#{chung.xac_nhan_xoa}')|" class="px-2.5 py-1.5 bg-red-500/10 hover:bg-red-500/20 text-red-400 border border-red-500/20 rounded-lg text-xs font-semibold transition flex items-center gap-1" th:title="#{hd.ds.nut_xoa}">
                                            <i data-lucide="trash-2" class="w-3.5 h-3.5"></i> <span th:text="#{hd.ds.nut_xoa}" class="hidden xl:inline">Xóa</span>
                                        </a>
                                    </div>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(danhSachDichVu)}">
                                <td colspan="7" class="px-4 py-8 text-center text-slate-500">
                                    <div class="flex flex-col items-center justify-center gap-2">
                                        <i data-lucide="package-x" class="w-8 h-8 text-slate-600 mb-1"></i>
                                        <span th:text="#{dv.ds.chua_co_dich_vu_nao}">Chưa có dịch vụ nào được tạo.</span>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            
        </main>

    <!-- Script chung -->
    <div th:replace="~{fragments/datatable :: scripts}"></div>
    
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            if (typeof lucide !== 'undefined') {
                lucide.createIcons();
            }
        });
    </script>
</body>
</html>
