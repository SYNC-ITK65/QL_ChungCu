<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Dịch vụ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="d-flex">
    <div th:replace="~{fragments/sidebar :: menu-trai}"></div>

    <div class="container-fluid p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Danh sách Dịch vụ</h2>
            <a th:href="@{/admin/dich-vu/tao-moi}" class="btn btn-primary">+ Thêm Dịch vụ mới</a>
        </div>

        <table class="table table-striped table-hover border">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Tên Dịch vụ</th>
                <th>Loại</th>
                <th>Đơn Giá</th>
                <th>Đơn Vị Tính</th>
                <th>Mô Tả</th>
                <th>Hành Động</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="dv : ${danhSachDichVu}">
                <td th:text="${dv.id}">1</td>
                <td th:text="${dv.ten}">Tiền Điện</td>
                <td th:text="${dv.loai}">Điện</td>
                <td th:text="${#numbers.formatDecimal(dv.donGia, 0, 'COMMA', 0, 'POINT') + ' VNĐ'}">3,500 VNĐ</td>
                <td th:text="${dv.donViTinh}">kWh</td>
                <td th:text="${dv.moTa}">Điện sinh hoạt bậc 1</td>
                <td>
                    <a th:href="@{/admin/dich-vu/sua/{id}(id=${dv.id})}" class="btn btn-sm btn-warning">Sửa</a>
                    <a th:href="@{/admin/dich-vu/xoa/{id}(id=${dv.id})}"
                       class="btn btn-sm btn-danger"
                       onclick="return confirm('Bạn có chắc chắn muốn xóa dịch vụ này?')">Xóa</a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(danhSachDichVu)}">
                <td colspan="7" class="text-center">Chưa có dịch vụ nào được tạo.</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
