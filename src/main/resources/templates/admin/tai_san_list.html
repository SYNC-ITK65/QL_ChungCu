<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{ts.ds.tieude}">Quản lý Tài Sản</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="d-flex">
        <div th:replace="~{fragments/sidebar :: menu-trai}"></div>
        <div class="flex-grow-1 p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 th:text="${isAlert != null} ? #{ts.ds.tieude_canh_bao} : #{ts.ds.tieude}">
                    Danh sách Tài Sản</h2>
                <div>
                    <a th:if="${isAlert == null}" th:href="@{/admin/tai-san/canh-bao}" class="btn btn-warning" th:text="#{ts.ds.nut_canh_bao}">⚠️ Xem
                        Cảnh Báo</a>
                    <a th:if="${isAlert != null}" th:href="@{/admin/tai-san}" class="btn btn-secondary" th:text="#{ts.ds.nut_tat_ca}">📋 Xem Tất
                        Cả</a>
                    <a th:href="${isAlert != null} ? @{/admin/tai-san/xuat-excel(canhBao=true)} : @{/admin/tai-san/xuat-excel}"
                        class="btn btn-success" th:text="#{chung.xuat_excel}">Xuất Excel</a>
                    <a th:href="@{/admin/tai-san/add}" class="btn btn-primary" th:text="#{ts.ds.nut_them}">+ Thêm tài sản</a>
                </div>
            </div>

            <table class="table table-striped table-hover border no-paging">
                <thead class="table-dark">
                    <tr>
                        <th th:text="#{ts.ds.bang_ma}">Mã</th>
                        <th th:text="#{ts.ds.bang_ten}">Tên Tài Sản</th>
                        <th th:text="#{ts.ds.bang_vt}">Vị Trí</th>
                        <th th:text="#{ts.ds.bang_ngay_mua}">Ngày Mua</th>
                        <th th:text="#{chung.trang_thai}">Trạng Thái</th>
                        <th th:text="#{ts.ds.bang_bao_tri_toi}">Bảo Trì Tiếp Theo</th>
                        <th th:text="#{chung.hanh_dong}">Hành Động</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="ts : ${listTaiSan}"
                        th:classappend="${ts.ngayBaoTriTiepTheo != null && ts.ngayBaoTriTiepTheo.isBefore(T(java.time.LocalDate).now().plusDays(7)) || ts.tinhTrang == 'Đang hỏng'} ? 'table-danger' : ''">
                        <td th:text="${ts.maTaiSan}">TS01</td>
                        <td th:text="${ts.tenTaiSan}">Máy bơm</td>
                        <td th:text="${ts.viTri}">Hầm B1</td>
                        <td th:text="${ts.ngayMua}">2023-01-01</td>
                        <td>
                            <span th:if="${ts.tinhTrang == 'Hoạt động tốt'}" class="badge bg-success" th:text="#{ts.tt.tot}">Hoạt động tốt</span>
                            <span th:if="${ts.tinhTrang == 'Đang hỏng'}" class="badge bg-danger" th:text="#{ts.tt.hong}">Đang hỏng</span>
                            <span th:if="${ts.tinhTrang == 'Chờ thanh lý'}" class="badge bg-secondary" th:text="#{ts.tt.thanh_ly}">Chờ thanh lý</span>
                            <!-- Fallback if status doesn't match exactly -->
                            <span th:if="${ts.tinhTrang != 'Hoạt động tốt' && ts.tinhTrang != 'Đang hỏng' && ts.tinhTrang != 'Chờ thanh lý'}" 
                                  th:text="${ts.tinhTrang}" class="badge bg-info text-dark"></span>
                        </td>
                        <td th:text="${ts.ngayBaoTriTiepTheo}">2024-01-01</td>
                        <td>
                            <a th:href="@{/admin/tai-san/{id}/bao-tri(id=${ts.id})}"
                                class="btn btn-sm btn-info text-dark" th:text="#{chung.lich_su}">Lịch sử</a>
                            <a th:href="@{/admin/tai-san/edit/{id}(id=${ts.id})}" class="btn btn-sm btn-warning" th:text="#{chung.sua}">Sửa</a>
                            <a th:href="@{/admin/tai-san/delete/{id}(id=${ts.id})}" class="btn btn-sm btn-danger"
                                th:onclick="|return confirm('#{ts.ds.xac_nhan_xoa}')|" th:text="#{chung.xoa}">Xóa</a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(listTaiSan)}">
                        <td colspan="7" class="text-center text-muted" th:text="#{ts.ds.trong}">Chưa có tài sản nào!</td>
                    </tr>
                </tbody>
            </table>
            <div th:replace="~{fragments/pagination :: paging(${isAlert != null ? '/admin/tai-san/canh-bao' : '/admin/tai-san'}, '')}"></div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Dùng fragment Datatable chung -->
    <div th:replace="~{fragments/datatable :: scripts}"></div>
</body>

</html>
