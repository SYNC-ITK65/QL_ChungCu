<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Tài Sản</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="d-flex">
        <div th:replace="~{fragments/sidebar :: menu-trai}"></div>
        <div class="flex-grow-1 p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 th:text="${isAlert != null} ? '📢 Tài sản cần bảo trì / hỏng' : '🛠️ Quản lý Tài Sản / Thiết Bị'">
                    Danh sách Tài Sản</h2>
                <div>
                    <a th:if="${isAlert == null}" th:href="@{/admin/tai-san/canh-bao}" class="btn btn-warning">⚠️ Xem
                        Cảnh Báo</a>
                    <a th:if="${isAlert != null}" th:href="@{/admin/tai-san}" class="btn btn-secondary">📋 Xem Tất
                        Cả</a>
                    <a th:href="${isAlert != null} ? @{/admin/tai-san/xuat-excel(canhBao=true)} : @{/admin/tai-san/xuat-excel}"
                        class="btn btn-success">Xuất Excel</a>
                    <a th:href="@{/admin/tai-san/add}" class="btn btn-primary">+ Thêm tài sản</a>
                </div>
            </div>

            <table class="table table-striped table-hover border">
                <thead class="table-dark">
                    <tr>
                        <th>Mã</th>
                        <th>Tên Tài Sản</th>
                        <th>Vị Trí</th>
                        <th>Ngày Mua</th>
                        <th>Trạng Thái</th>
                        <th>Bảo Trì Tiếp Theo</th>
                        <th>Hành Động</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="ts : ${listTaiSan}"
                        th:classappend="${ts.ngayBaoTriTiepTheo != null && ts.ngayBaoTriTiepTheo.isBefore(T(java.time.LocalDate).now().plusDays(7)) || ts.tinhTrang == 'Đang hỏng'} ? 'table-danger' : ''">
                        <td th:text="${ts.maTaiSan}">TS01</td>
                        <td th:text="${ts.tenTaiSan}">Máy bơm</td>
                        <td th:text="${ts.viTri}">Hầm B1</td>
                        <td th:text="${ts.ngayMua}">2023-01-01</td>
                        <td>
                            <span th:if="${ts.tinhTrang == 'Hoạt động tốt'}" class="badge bg-success">Hoạt động tốt</span>
                            <span th:if="${ts.tinhTrang == 'Đang hỏng'}" class="badge bg-danger">Đang hỏng</span>
                            <span th:if="${ts.tinhTrang == 'Chờ thanh lý'}" class="badge bg-secondary">Chờ thanh lý</span>
                            <!-- Fallback if status doesn't match exactly -->
                            <span th:if="${ts.tinhTrang != 'Hoạt động tốt' && ts.tinhTrang != 'Đang hỏng' && ts.tinhTrang != 'Chờ thanh lý'}" 
                                  th:text="${ts.tinhTrang}" class="badge bg-info text-dark"></span>
                        </td>
                        <td th:text="${ts.ngayBaoTriTiepTheo}">2024-01-01</td>
                        <td>
                            <a th:href="@{/admin/tai-san/{id}/bao-tri(id=${ts.id})}"
                                class="btn btn-sm btn-info text-dark">Lịch sử</a>
                            <a th:href="@{/admin/tai-san/edit/{id}(id=${ts.id})}" class="btn btn-sm btn-warning">Sửa</a>
                            <a th:href="@{/admin/tai-san/delete/{id}(id=${ts.id})}" class="btn btn-sm btn-danger"
                                onclick="return confirm('Xóa tài sản này?');">Xóa</a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(listTaiSan)}">
                        <td colspan="7" class="text-center text-muted">Chưa có tài sản nào!</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
