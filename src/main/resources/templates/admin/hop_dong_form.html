<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Tạo hợp đồng mới</title>
    <link href="https://cdn.jsdelivr.net/bootstrap@5.3.0/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="d-flex">
    <div th:replace="~{fragments/sidebar :: menu-trai}"></div>

    <div class="container-fluid p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Tạo Hợp đồng mới</h2>
            <a th:href="@{/admin/hop-dong}" class="btn btn-secondary">Quay lại</a>
        </div>

        <div th:if="${thongBaoLoi}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${thongBaoLoi}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="card shadow border-0">
            <div class="card-body">
                <form th:action="@{/admin/hop-dong/luu}" th:object="${hopDong}" method="post">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Bên cho thuê</label>
                            <input type="text" class="form-control" th:field="*{benChoThue}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Tiền thuê (VNĐ)</label>
                            <input type="number" min="0" class="form-control" th:field="*{tienThue}" required>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Ngày bắt đầu</label>
                            <input type="date" class="form-control" th:field="*{ngayBatDau}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Ngày kết thúc</label>
                            <input type="date" class="form-control" th:field="*{ngayKetThuc}">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Căn hộ</label>
                        <select class="form-select" name="canHoId" required>
                            <option value="" selected disabled>-- Chọn căn hộ --</option>
                            <option th:each="canHo : ${danhSachCanHo}"
                                    th:value="${canHo.id}"
                                    th:text="${canHo.maCanHo} + ' (' + ${canHo.trangThai} + ')'"></option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Cư dân</label>
                        <select class="form-select" name="cuDanId" required>
                            <option value="" selected disabled>-- Chọn cư dân --</option>
                            <option th:each="cuDan : ${danhSachCuDan}"
                                    th:value="${cuDan.id}"
                                    th:text="${cuDan.hoTen} + ' - ' + ${cuDan.soDienThoai}"></option>
                        </select>
                    </div>

                    <button type="submit" class="btn btn-success">Lưu hợp đồng</button>
                    <a th:href="@{/admin/hop-dong}" class="btn btn-secondary">Hủy</a>
                </form>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
