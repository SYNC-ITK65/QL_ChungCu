<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${isEdit} ? #{hd.form.sua_tieude} : #{hd.form.them_tieude}">Tạo hợp đồng mới</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = { darkMode:'class', theme:{ extend:{ fontFamily:{sans:['Inter','sans-serif']}, colors:{brand:{500:'#0ea5e9',400:'#38bdf8',600:'#0284c7'},darkbg:'#0B0F17',darkcard:'#161B26',darkborder:'#242B3D'} } } }
    </script>
    <style>body{background-color:#0B0F17;color:#E2E8F0;font-family:'Inter',sans-serif;}</style>
</head>
<body class="min-h-screen flex bg-darkbg text-slate-200 antialiased font-sans">
    <div th:replace="fragments/sidebar :: menu-trai"></div>
    <main class="flex-grow p-6 md:p-8 overflow-y-auto w-full flex flex-col items-center">
        <!-- Header -->
        <div class="w-full max-w-3xl flex items-center justify-between gap-4 mb-8">
            <div>
                <h1 class="text-2xl font-bold text-white tracking-tight"
                    th:text="${isEdit} ? #{hd.form.sua_tieude} : #{hd.form.them_tieude}">Tạo hợp đồng mới</h1>
                <p class="text-sm text-slate-400 mt-1" th:text="#{admin.hopdong.form.subtitle}">Quản lý thông tin hợp đồng thuê căn hộ</p>
            </div>
            <a th:href="@{/admin/hop-dong}" class="px-4 py-2 bg-slate-800 hover:bg-slate-700 text-slate-300 text-xs font-semibold rounded-xl transition flex items-center gap-1.5">
                <i data-lucide="arrow-left" class="w-4 h-4"></i>
                <span th:text="#{hd.form.quay_lai}">Quay lại</span>
            </a>
        </div>

        <div th:if="${thongBaoLoi}" class="w-full max-w-3xl mb-4 p-4 bg-rose-500/10 border border-rose-500/20 text-rose-400 rounded-xl text-sm" th:text="${thongBaoLoi}"></div>

        <div class="w-full max-w-3xl bg-darkcard border border-darkborder rounded-2xl p-6 md:p-8 shadow-xl">
            <form th:action="${isEdit} ? @{/admin/hop-dong/cap-nhat/{id}(id=${hopDong.id})} : @{/admin/hop-dong/luu}"
                  th:object="${hopDong}" method="post" id="hopDongForm" class="space-y-6">
                <input type="hidden" th:field="*{id}" th:if="${isEdit}">
                <!-- Loại hợp đồng -->
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">
                        <span th:text="#{hd.form.loai_hop_dong}">Loại hợp đồng</span> <span class="text-rose-400">*</span>
                    </label>
                    <select th:field="*{loaiHopDong}" id="loaiHopDong" required
                            class="w-full bg-darkbg border border-darkborder rounded-xl px-3 py-3 text-sm text-white focus:outline-none focus:border-brand-500 transition cursor-pointer">
                        <option value="Thue" th:text="#{hd.form.loai_thue}">Hợp đồng Thuê</option>
                        <option value="Mua" th:text="#{hd.form.loai_mua}">Hợp đồng Mua</option>
                    </select>
                </div>

                <!-- Thông tin các bên -->
                <div>
                    <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-4 flex items-center gap-2">
                        <i data-lucide="users" class="w-3.5 h-3.5"></i>
                        <span th:text="#{hd.form.thong_tin_ben}">Thông tin các bên</span>
                    </h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">
                                <span th:text="#{hd.ds.bang_ben_cho_thue}">Bên cho thuê</span> <span class="text-rose-400">*</span>
                            </label>
                            <input type="text" th:field="*{benChoThue}" readonly
                                   class="w-full bg-darkbg/50 border border-darkborder rounded-xl px-4 py-3 text-sm text-slate-400 cursor-not-allowed">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Người thuê</label>
                            <input type="text" id="benThueDisplay" readonly th:placeholder="#{hd.form.ben_thue_placeholder}"
                                   class="w-full bg-darkbg/50 border border-darkborder rounded-xl px-4 py-3 text-sm text-slate-400 cursor-not-allowed">
                        </div>
                    </div>
                </div>

                <!-- Căn hộ & Cư dân -->
                <div>
                    <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-4 flex items-center gap-2">
                        <i data-lucide="building" class="w-3.5 h-3.5"></i>
                        Căn hộ &amp; Cư dân
                    </h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">
                                <span th:text="#{hdon.form.can_ho}">Căn hộ</span> <span class="text-rose-400">*</span>
                            </label>
                            <select name="canHoId" id="canHoId" required th:with="currentCanHoId=${hopDong.canHo != null ? hopDong.canHo.id : ''}"
                                    class="w-full bg-darkbg border border-darkborder rounded-xl px-3 py-3 text-sm text-white focus:outline-none focus:border-brand-500 transition cursor-pointer">
                                <option value="" disabled th:text="#{hdon.form.can_ho_chon}">-- Chọn căn hộ --</option>
                                <option th:each="canHo : ${danhSachCanHo}" th:value="${canHo.id}"
                                        th:data-trangthai="${canHo.trangThaiHienThi}"
                                        th:selected="${currentCanHoId == canHo.id}"
                                        th:text="${canHo.maCanHo} + ' (' + (${canHo.trangThaiHienThi != null ? #messages.msg(canHo.trangThaiHienThi) : canHo.trangThai}) + ')'"></option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">
                                <span th:text="#{hd.form.cu_dan_label}">Cư dân</span> <span class="text-rose-400">*</span>
                            </label>
                            <input type="hidden" name="cuDanId" id="cuDanIdHidden" th:value="${hopDong.cuDan != null ? hopDong.cuDan.id : ''}">
                            <select id="cuDanIdSelect" disabled th:with="currentCuDanId=${hopDong.cuDan != null ? hopDong.cuDan.id : ''}"
                                    class="w-full bg-darkbg/50 border border-darkborder rounded-xl px-3 py-3 text-sm text-slate-400 cursor-not-allowed">
                                <option value="" th:text="#{hd.form.cu_dan_chon}">-- Chọn cư dân --</option>
                                <option th:each="cuDan : ${danhSachCuDan}" th:value="${cuDan.id}"
                                        th:data-canho="${cuDan.canHo != null ? cuDan.canHo.id : ''}"
                                        th:data-hoten="${cuDan.hoTen}"
                                        th:data-moiquanhe="${cuDan.moiQuanHe}"
                                        th:selected="${currentCuDanId == cuDan.id}"
                                        th:text="${cuDan.hoTen} + ' - ' + ${cuDan.soDienThoai} + ' (' + ${cuDan.canHo != null ? cuDan.canHo.maCanHo : 'Chưa có căn hộ'} + ')'"></option>
                            </select>
                            <p class="hidden text-xs text-rose-400 mt-1 flex items-center gap-1" id="cuDanWarning">
                                <i data-lucide="alert-circle" class="w-3.5 h-3.5"></i>
                                <span th:text="#{hd.form.cu_dan_warning}">⚠️ Cư dân này không thuộc căn hộ đã chọn</span>
                            </p>
                        </div>
                    </div>
                </div>

                <!-- Tài chính -->
                <div>
                    <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-4 flex items-center gap-2">
                        <i data-lucide="credit-card" class="w-3.5 h-3.5"></i>
                        <span th:text="#{hd.chitiet.thong_tin_tai_chinh}">Thông tin tài chính</span>
                    </h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">
                                <span id="tienThueLabel" th:text="#{hd.form.tien_thue}">Tiền thuê (VNĐ)</span> <span class="text-rose-400">*</span>
                            </label>
                            <input type="number" min="1" th:field="*{tienThue}" required th:placeholder="#{hd.form.tien_thue_goi_y}"
                                   class="w-full bg-darkbg border border-darkborder rounded-xl px-4 py-3 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-brand-500 transition">
                        </div>
                        <div id="tienCocContainer">
                            <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2" th:text="#{hd.form.tien_coc}">Tiền cọc (VNĐ)</label>
                            <input type="number" min="0" th:field="*{tienCoc}" th:placeholder="#{hd.form.tien_coc_placeholder}"
                                   class="w-full bg-darkbg border border-darkborder rounded-xl px-4 py-3 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-brand-500 transition">
                            <p class="text-xs text-slate-500 mt-1" th:text="#{hd.form.tien_coc_hint}">Để trống = mặc định bằng tiền thuê</p>
                        </div>
                    </div>
                </div>

                <!-- Thời hạn -->
                <div>
                    <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-4 flex items-center gap-2">
                        <i data-lucide="calendar" class="w-3.5 h-3.5"></i>
                        <span th:text="#{hd.form.thoi_han_hop_dong}">Thời hạn hợp đồng</span>
                    </h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">
                                <span th:text="#{hd.form.ngay_bat_dau}">Ngày bắt đầu</span> <span class="text-rose-400">*</span>
                            </label>
                            <input type="date" th:field="*{ngayBatDau}" required
                                   class="w-full bg-darkbg border border-darkborder rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-brand-500 transition">
                        </div>
                        <div id="thoiHanContainer">
                            <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Thời hạn <span class="text-rose-400">*</span></label>
                            <select name="thoiHan" id="thoiHan" required
                                    class="w-full bg-darkbg border border-darkborder rounded-xl px-3 py-3 text-sm text-white focus:outline-none focus:border-brand-500 transition cursor-pointer">
                                <option value="1">1 tháng</option>
                                <option value="6">6 tháng</option>
                                <option value="12" selected>12 tháng</option>
                            </select>
                            <p class="text-xs text-slate-500 mt-1">Ngày kết thúc sẽ tự động tính từ ngày bắt đầu + thời hạn</p>
                        </div>
                    </div>
                </div>

                <!-- Buttons -->
                <div class="flex items-center gap-3 pt-4 border-t border-darkborder justify-end">
                    <a th:href="@{/admin/hop-dong}" class="px-6 py-3 bg-slate-800 hover:bg-slate-700 text-slate-300 text-xs font-semibold rounded-xl transition" th:text="#{hdon.form.nut_huy}">Hủy</a>
                    <button type="submit" class="px-6 py-3 bg-brand-500 hover:bg-brand-400 text-white text-xs font-bold rounded-xl transition flex items-center gap-2 shadow-lg shadow-brand-500/10">
                        <i data-lucide="check" class="w-4 h-4"></i>
                        <span th:text="#{hd.form.nut_luu}">Lưu hợp đồng</span>
                    </button>
                </div>
            </form>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            lucide.createIcons();
            const cuDanIdSelect = document.getElementById('cuDanIdSelect');
            const cuDanIdHidden = document.getElementById('cuDanIdHidden');
            const benThueDisplay = document.getElementById('benThueDisplay');
            const canHoId = document.getElementById('canHoId');
            const cuDanWarning = document.getElementById('cuDanWarning');
            const hopDongForm = document.getElementById('hopDongForm');
            const loaiHopDong = document.getElementById('loaiHopDong');
            const tienCocContainer = document.getElementById('tienCocContainer');
            const thoiHanContainer = document.getElementById('thoiHanContainer');
            const tienThueLabel = document.getElementById('tienThueLabel');

            function updateFormType() {
                const isThue = loaiHopDong.value === 'Thue';
                if (isThue) {
                    tienCocContainer.classList.remove('hidden');
                    tienCocContainer.querySelector('input').disabled = false;
                    thoiHanContainer.classList.remove('hidden');
                    thoiHanContainer.querySelector('select').disabled = false;
                    tienThueLabel.textContent = 'Tiền thuê (VNĐ)';
                } else {
                    tienCocContainer.classList.add('hidden');
                    tienCocContainer.querySelector('input').disabled = true;
                    thoiHanContainer.classList.add('hidden');
                    thoiHanContainer.querySelector('select').disabled = true;
                    tienThueLabel.textContent = 'Giá trị hợp đồng (VNĐ)';
                }
            }

            function updateCuDanInfo() {
                const selCanHo = canHoId.value;
                if (!selCanHo) {
                    cuDanIdSelect.value = '';
                    cuDanIdHidden.value = '';
                    benThueDisplay.value = '';
                    cuDanWarning.classList.add('hidden');
                    return;
                }

                // Tìm cư dân là Chủ hộ của căn hộ đã chọn
                let foundChuHo = false;
                for (let i = 0; i < cuDanIdSelect.options.length; i++) {
                    const opt = cuDanIdSelect.options[i];
                    const cdCanHo = opt.getAttribute('data-canho');
                    const cdMoiQuanHe = opt.getAttribute('data-moiquanhe') || '';
                    if (cdCanHo === selCanHo && (cdMoiQuanHe.toLowerCase() === 'chủ hộ' || cdMoiQuanHe.toLowerCase() === 'chủ hộ')) {
                        cuDanIdSelect.selectedIndex = i;
                        cuDanIdHidden.value = opt.value;
                        benThueDisplay.value = opt.getAttribute('data-hoten') || '';
                        foundChuHo = true;
                        break;
                    }
                }

                if (foundChuHo) {
                    cuDanWarning.classList.add('hidden');
                } else {
                    cuDanIdSelect.value = '';
                    cuDanIdHidden.value = '';
                    benThueDisplay.value = '';
                    // Hiển thị thông báo căn hộ chưa có chủ hộ
                    cuDanWarning.textContent = '⚠️ Căn hộ này chưa có Chủ hộ hoặc Chủ hộ chưa có thông tin!';
                    cuDanWarning.classList.remove('hidden');
                }
            }

            canHoId.addEventListener('change', updateCuDanInfo);
            loaiHopDong.addEventListener('change', updateFormType);
            
            // Run initially if values are pre-selected
            updateFormType();
            if (canHoId.value) {
                const initialCuDanId = cuDanIdHidden.value;
                if (initialCuDanId) {
                    cuDanIdSelect.value = initialCuDanId;
                    const opt = cuDanIdSelect.options[cuDanIdSelect.selectedIndex];
                    if (opt) {
                        benThueDisplay.value = opt.getAttribute('data-hoten') || '';
                    }
                } else {
                    updateCuDanInfo();
                }
            }

            hopDongForm.addEventListener('submit', function(e) {
                if (!cuDanIdHidden.value) {
                    e.preventDefault();
                    alert('Không thể lưu hợp đồng do chưa xác định được Chủ hộ của căn hộ này!');
                }
            });
        });
    </script>
</body>
</html>
