<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title th:text="#{ks.ds.quan_ly_khao_sat}">Quản lý Khảo sát</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
<div class="d-flex">
  <div th:replace="~{fragments/sidebar :: menu-trai}"></div>

  <div class="content p-4 w-100">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2 class="text-primary fw-bold"><i class="fas fa-tasks"></i><span th:text="#{ks.ds.quan_ly_khao_sat}" th:remove="tag"> Quản lý Khảo Sát</span></h2>
      <div>
        <a th:href="@{/admin/khao-sat/xuat-excel(tuKhoa=${tuKhoa}, trangThai=${trangThai})}" class="btn btn-success">
          <i class="fas fa-file-excel"></i> Xuất Excel
        </a>
        <a th:href="@{/admin/khao-sat/tao-moi}" class="btn btn-primary">
          <i class="fas fa-plus"></i><span th:text="#{ks.ds.tao_khao_sat_moi}" th:remove="tag"> Tạo khảo sát mới
        </span></a>
      </div>
    </div>

    <div th:if="${msg}" class="alert alert-success fw-bold" th:text="${msg}"></div>
    <div th:if="${err}" class="alert alert-danger fw-bold" th:text="${err}"></div>

    <div class="card shadow-sm border-0">
      <div class="card-body p-0">
        <!-- BỘ LỌC TÌM KIẾM KHẢO SÁT -->
        <form th:action="@{/admin/khao-sat}" method="get" class="row g-2 mb-3 bg-light p-3 rounded border">
          <div class="col-md-5">
            <input type="text" name="tuKhoa" th:value="${tuKhoa}" class="form-control" th:placeholder="#{ks.ds.tim_kiem_goi_y}" placeholder="🔍 Nhập tiêu đề bài khảo sát cần tìm...">
          </div>
          <div class="col-md-4">
            <select name="trangThai" class="form-select">
              <option value="" th:text="#{duyet.ui.tat_ca_trang_thai}">-- Tất cả trạng thái --</option>
              <option value="1" th:selected="${trangThai == 1}" th:text="#{ks.ds.chua_bat_dau}">Chưa bắt đầu</option>
              <option value="2" th:selected="${trangThai == 2}" th:text="#{ks.ds.dang_vote}">Đang mở (Đang Vote)</option>
              <option value="3" th:selected="${trangThai == 3}" th:text="#{ks.ds.da_dong}">Đã đóng</option>
            </select>
          </div>
          <div class="col-md-3 d-flex gap-2">
            <button type="submit" class="btn btn-primary fw-bold w-100"><i class="fas fa-search"></i> <span th:text="#{hdon.ds.nut_tim_kiem}" th:remove="tag">Tìm kiếm</span></button>
            <a th:href="@{/admin/khao-sat}" class="btn btn-secondary text-nowrap" th:title="#{ks.ds.bo_loc}"><i class="fas fa-sync"></i></a>
          </div>
        </form>
        <table class="table table-hover align-middle mb-0">
          <thead class="table-primary">
          <tr>
            <th class="ps-4" th:text="#{tb.form.tieude}">Tiêu đề</th>
            <th th:text="#{ks.ds.thoi_gian_bat_dau}">Thời gian bắt đầu</th>
            <th th:text="#{ks.ds.thoi_gian_ket_thuc}">Thời gian kết thúc</th>
            <th th:text="#{hdon.ds.bang_trang_thai}">Trạng thái</th>
            <th th:text="#{ks.ds.luot_vote}">Lượt Vote</th>
            <th class="text-center" th:text="#{dv.ds.thao_tac}">Thao tác</th>
          </tr>
          </thead>
          <tbody>
          <tr th:each="ks : ${listKhaoSat}">
            <td class="ps-4 fw-bold" th:text="${ks.tieuDe}"></td>
            <td th:text="${#temporals.format(ks.thoiGianBatDau, 'dd/MM/yyyy HH:mm')}"></td>
            <td th:text="${#temporals.format(ks.thoiGianKetThuc, 'dd/MM/yyyy HH:mm')}"></td>
            <td>
              <span th:if="${ks.trangThaiHienTai == 'ĐANG MỞ'}" class="badge bg-success" th:text="#{ks.ds.dang_mo}">ĐANG MỞ</span>
              <span th:if="${ks.trangThaiHienTai == 'SẮP MỞ'}" class="badge bg-warning text-dark" th:text="#{ks.ds.sap_mo}">SẮP MỞ</span>
              <span th:if="${ks.trangThaiHienTai == 'ĐÃ ĐÓNG'}" class="badge bg-secondary" th:text="#{ks.ds.da_ket_thuc}">ĐÃ KẾT THÚC</span>
            </td>
            <td><strong class="text-primary" th:text="${ks.tongSoVote}"></strong></td>
            <td class="text-center">
              <a th:href="@{/admin/khao-sat/chi-tiet/{id}(id=${ks.id})}" class="btn btn-sm btn-outline-primary">
                <i class="fas fa-cog"></i><span th:text="#{ks.ds.quan_ly}" th:remove="tag"> Quản lý
              </span></a>
            </td>
          </tr>
          </tbody>
        </table>
        <!-- THANH PHÂN TRANG -->
        <div class="mt-3">
          <div th:replace="~{fragments/pagination :: paging('/cudan/khao-sat', '')}"></div>
        </div>
      </div>
    </div>
    
    <!-- Fragment Phân trang -->
    <div th:replace="~{fragments/pagination :: paging('/admin/khao-sat', '')}"></div>

  </div>
</div>
</body>
</html>
