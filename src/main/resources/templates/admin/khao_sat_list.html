<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Quản lý Khảo sát</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
<div class="d-flex">
  <div th:replace="~{fragments/sidebar :: menu-trai}"></div>

  <div class="content p-4 w-100">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2 class="text-primary fw-bold"><i class="fas fa-tasks"></i> Quản lý Khảo Sát</h2>
      <a th:href="@{/admin/khao-sat/tao-moi}" class="btn btn-success">
        <i class="fas fa-plus"></i> Tạo khảo sát mới
      </a>
    </div>

    <div th:if="${msg}" class="alert alert-success fw-bold" th:text="${msg}"></div>
    <div th:if="${err}" class="alert alert-danger fw-bold" th:text="${err}"></div>

    <div class="card shadow-sm border-0">
      <div class="card-body p-0">
        <table class="table table-hover align-middle mb-0">
          <thead class="table-primary">
          <tr>
            <th class="ps-4">Tiêu đề</th>
            <th>Thời gian bắt đầu</th>
            <th>Thời gian kết thúc</th>
            <th>Trạng thái</th>
            <th>Lượt Vote</th>
            <th class="text-center">Thao tác</th>
          </tr>
          </thead>
          <tbody>
          <tr th:each="ks : ${listKhaoSat}">
            <td class="ps-4 fw-bold" th:text="${ks.tieuDe}"></td>
            <td th:text="${#temporals.format(ks.thoiGianBatDau, 'dd/MM/yyyy HH:mm')}"></td>
            <td th:text="${#temporals.format(ks.thoiGianKetThuc, 'dd/MM/yyyy HH:mm')}"></td>
            <td>
              <span th:if="${ks.trangThaiHienTai == 'ĐANG MỞ'}" class="badge bg-success">ĐANG MỞ</span>
              <span th:if="${ks.trangThaiHienTai == 'SẮP MỞ'}" class="badge bg-warning text-dark">SẮP MỞ</span>
              <span th:if="${ks.trangThaiHienTai == 'ĐÃ ĐÓNG'}" class="badge bg-secondary">ĐÃ KẾT THÚC</span>
            </td>
            <td><strong class="text-primary" th:text="${ks.tongSoVote}"></strong></td>
            <td class="text-center">
              <a th:href="@{/admin/khao-sat/chi-tiet/{id}(id=${ks.id})}" class="btn btn-sm btn-outline-primary">
                <i class="fas fa-cog"></i> Quản lý
              </a>
            </td>
          </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
</body>
</html>
