<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{hd.detail.tieu_de}">Chi tiết Hợp đồng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="d-flex overflow-hidden" style="height: 100vh;">
    <div th:replace="~{fragments/sidebar :: menu-trai}"></div>

    <div class="flex-grow-1 p-4 overflow-auto">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-file-text me-2"></i><span th:text="#{hd.detail.tieu_de}" th:remove="tag">Chi tiết Hợp đồng</span></h2>
            <div class="d-flex gap-2">
                <a th:href="@{/admin/hop-dong/sua/{id}(id=${hopDong.id})}" class="btn btn-warning">
                    <i class="bi bi-pencil me-1"></i><span th:text="#{hdon.ds.nut_sua}" th:remove="tag">Sửa
                </span></a>
                <a th:href="@{/admin/hop-dong}" class="btn btn-secondary">
                    <i class="bi bi-arrow-left me-1"></i><span th:text="#{hd.form.quay_lai}" th:remove="tag">Quay lại
                </span></a>
            </div>
        </div>

        <!-- Thông tin chính -->
        <div class="row">
            <div class="col-md-8">
                <div class="card shadow border-0 mb-4">
                    <div class="card-header bg-primary text-white py-3">
                        <h5 class="mb-0">
                            <span th:if="${hopDong.loaiHopDong == 'Mua'}" th:text="#{hd.chitiet.hop_dong_mua_can_ho}">🏢 Hợp đồng Mua căn hộ</span>
                            <span th:if="${hopDong.loaiHopDong == 'Thue'}" th:text="#{hd.chitiet.hop_dong_thue_can_h}">🏠 Hợp đồng Thuê căn hộ</span>
                            <span th:if="${hopDong.loaiHopDong != 'Mua' and hopDong.loaiHopDong != 'Thue'}" th:text="${hopDong.loaiHopDong}"></span>
                        </h5>
                    </div>
                    <div class="card-body p-4">
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="text-muted small" th:text="#{hd.chitiet.ma_hop_dong}">Mã hợp đồng</label>
                                <p class="fw-bold fs-5" th:text="'HD-' + ${hopDong.id}">HD-1</p>
                            </div>
                            <div class="col-md-6">
                                <label class="text-muted small" th:text="#{hdon.ds.bang_trang_thai}">Trạng thái</label>
                                <p>
                                    <span th:if="${hopDong.trangThai == 'ACTIVE'}" class="badge bg-success fs-6">ACTIVE</span>
                                    <span th:if="${hopDong.trangThai == 'EXPIRED'}" class="badge bg-secondary fs-6">EXPIRED</span>
                                    <span th:if="${hopDong.trangThai == 'TERMINATED'}" class="badge bg-danger fs-6">TERMINATED</span>
                                    <span th:if="${hopDong.trangThai == 'DRAFT'}" class="badge bg-warning fs-6">DRAFT</span>
                                </p>
                            </div>
                        </div>

                        <hr>

                        <h6 class="text-primary mb-3" th:text="#{hd.chitiet.thong_tin_cac_ben}">👥 Thông tin các bên</h6>
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="text-muted small" th:text="${hopDong.loaiHopDong == 'Mua'} ? #{hd.chitiet.ben_ban} : #{hd.chitiet.ben_cho_thue}">Bên cho thuê</label>
                                <p class="fw-bold" th:text="${hopDong.benChoThue}">-</p>
                            </div>
                            <div class="col-md-6">
                                <label class="text-muted small" th:text="${hopDong.loaiHopDong == 'Mua'} ? #{hd.chitiet.ben_mua} : #{hd.chitiet.ben_thue}">Bên thuê</label>
                                <p class="fw-bold" th:text="${hopDong.benThue}">-</p>
                            </div>
                        </div>

                        <h6 class="text-primary mb-3" th:text="#{hd.chitiet.thong_tin_can_ho}">🏢 Thông tin căn hộ</h6>
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="text-muted small" th:text="#{hdon.form.can_ho}">Căn hộ</label>
                                <p class="fw-bold" th:text="${hopDong.canHo != null ? hopDong.canHo.maCanHo : '-'}">-</p>
                            </div>
                            <div class="col-md-6">
                                <label class="text-muted small" th:text="#{hd.form.cu_dan_label}">Cư dân</label>
                                <p class="fw-bold" th:text="${hopDong.cuDan != null ? hopDong.cuDan.hoTen : '-'}">-</p>
                            </div>
                        </div>

                        <h6 class="text-primary mb-3" th:text="#{hd.chitiet.thong_tin_tai_chinh}">💰 Thông tin tài chính</h6>
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="text-muted small" th:text="${hopDong.loaiHopDong == 'Mua'} ? #{hd.chitiet.gia_tri_hop_dong} : #{hd.chitiet.tien_thue}">Tiền thuê</label>
                                <p class="fw-bold text-success fs-5" th:text="${hopDong.tienThue != null} ? |${#numbers.formatDecimal(hopDong.tienThue, 0, 'COMMA', 0, 'POINT')} #{chung.don_vi_vnd_symbol}| : |0 #{chung.don_vi_vnd_symbol}|">0 VNĐ</p>
                            </div>
                            <div class="col-md-6" th:if="${hopDong.loaiHopDong != 'Mua'}">
                                <label class="text-muted small" th:text="#{hd.chitiet.tien_coc}">Tiền cọc</label>
                                <p class="fw-bold text-info" th:text="${hopDong.tienCoc != null} ? |${#numbers.formatDecimal(hopDong.tienCoc, 0, 'COMMA', 0, 'POINT')} #{chung.don_vi_vnd_symbol}| : |0 #{chung.don_vi_vnd_symbol}|">0 VNĐ</p>
                            </div>
                        </div>

                        <h6 class="text-primary mb-3" th:text="#{hd.chitiet.thoi_han}">📅 Thời hạn</h6>
                        <div class="row">
                            <div class="col-md-6">
                                <label class="text-muted small" th:text="#{hd.form.ngay_bat_dau}">Ngày bắt đầu</label>
                                <p class="fw-bold" th:text="${hopDong.ngayBatDau != null ? #temporals.format(hopDong.ngayBatDau, 'dd/MM/yyyy') : '-'}">-</p>
                            </div>
                            <div class="col-md-6">
                                <label class="text-muted small" th:text="#{hd.form.ngay_ket_thuc}">Ngày kết thúc</label>
                                <p class="fw-bold" th:text="${hopDong.ngayKetThuc != null ? #temporals.format(hopDong.ngayKetThuc, 'dd/MM/yyyy') : #{hd.chitiet.khong_co_hop_dong_mua}}">-</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Sidebar actions -->
            <div class="col-md-4">
                <div class="card shadow border-0 mb-4">
                    <div class="card-header bg-light py-3">
                        <h6 class="mb-0" th:text="#{hd.chitiet.thao_tac_nhanh}">⚡ Thao tác nhanh</h6>
                    </div>
                    <div class="card-body">
                        <div class="d-grid gap-2">
                            <a th:href="@{/admin/hop-dong/xuat-pdf/{id}(id=${hopDong.id})}" class="btn btn-outline-primary">
                                <i class="bi bi-file-pdf me-1"></i><span th:text="#{hd.chitiet.xuat_pdf}" th:remove="tag">Xuất PDF
                            </span></a>
                            <a th:if="${hopDong.trangThai == 'ACTIVE'}" th:href="@{/admin/hop-dong/cap-nhat-trang-thai/{id}(id=${hopDong.id},trangThai='TERMINATED')}" class="btn btn-outline-danger" th:onclick="|return confirm('#{hd.chitiet.xac_nhan_thanh_ly}')|">
                                <i class="bi bi-x-octagon me-1"></i><span th:text="#{hd.ds.nut_thanh_ly}" th:remove="tag">Thanh lý
                            </span></a>
                            <a th:if="${hopDong.trangThai == 'TERMINATED' or hopDong.trangThai == 'EXPIRED'}" th:href="@{/admin/hop-dong/cap-nhat-trang-thai/{id}(id=${hopDong.id},trangThai='ACTIVE')}" class="btn btn-outline-success" th:onclick="|return confirm('#{hd.chitiet.xac_nhan_kich_hoat}')|">
                                <i class="bi bi-check-circle me-1"></i><span th:text="#{hd.chitiet.kich_hoat_lai}" th:remove="tag">Kích hoạt lại
                            </span></a>
                        </div>
                    </div>
                </div>

                <div class="card shadow border-0">
                    <div class="card-header bg-light py-3">
                        <h6 class="mb-0" th:text="#{hd.chitiet.thong_ke}">📊 Thống kê</h6>
                    </div>
                    <div class="card-body">
                        <div class="d-flex justify-content-between mb-2">
                            <span class="text-muted" th:text="#{hd.chitiet.gia_tri}">Giá trị:</span>
                            <span class="fw-bold" th:text="${hopDong.giaTriHopDong != null} ? |${#numbers.formatDecimal(hopDong.giaTriHopDong, 0, 'COMMA', 0, 'POINT')} #{chung.don_vi_vnd_symbol}| : |0 #{chung.don_vi_vnd_symbol}|">0 VNĐ</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
