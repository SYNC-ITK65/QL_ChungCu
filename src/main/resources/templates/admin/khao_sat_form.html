?<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{ks.form.sua_khao_sat}">Sửa Khảo Sát</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts - Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            700: '#0369a1',
                            900: '#0c4a6e',
                        },
                        darkbg: '#0B0F17',
                        darkcard: '#161B26',
                        darkborder: '#242B3D'
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0B0F17;
            color: #E2E8F0;
            font-family: 'Inter', sans-serif;
        }
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #111827;
        }
        ::-webkit-scrollbar-thumb {
            background: #374151;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #4B5563;
        }
        /* Custom date picker icon styling for dark mode */
        input[type="datetime-local"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
        }
    </style>
</head>
<body class="min-h-screen flex bg-darkbg text-slate-200 antialiased font-sans">

    <!-- Global Sidebar -->
    <div th:replace="~{fragments/sidebar :: menu-trai}"></div>

    <!-- Main Content -->
    <main class="flex-grow min-w-0 p-6 md:p-8 overflow-y-auto max-w-7xl mx-auto w-full">
            
            <!-- Page Header -->
            <div class="flex flex-col md:flex-row md:items-center justify-between mb-6 gap-4">
                <div>
                    <h2 class="text-xl md:text-2xl font-bold text-white flex items-center gap-2">
                        <i data-lucide="edit-3" class="w-6 h-6 text-brand-500"></i>
                        <span th:text="${khaoSat.id == null} ? #{ks.form.them_tieude} : #{ks.form.sua_tieude}">Thêm / Sửa Khảo Sát</span>
                    </h2>
                    <p class="text-xs text-slate-400 mt-1" th:text="#{admin.khaosat.form.subtitle}">Thiết lập thông tin và các phương án khảo sát</p>
                </div>
                <div class="flex gap-2">
                    <a th:href="@{/admin/khao-sat}" class="px-4 py-2 bg-transparent hover:bg-slate-800 text-slate-300 border border-slate-700 rounded-xl text-xs font-medium transition flex items-center gap-2">
                        <i data-lucide="corner-up-left" class="w-4 h-4"></i> <span th:text="#{hdon.form.nut_huy}">Hủy</span>
                    </a>
                </div>
            </div>

            <!-- Notifications -->
            <div th:if="${globalError}" class="mb-6 flex items-center justify-between p-4 bg-red-500/10 border border-red-500/20 text-red-400 rounded-xl text-sm font-medium shadow-lg shadow-black/20">
                <div class="flex items-center gap-2">
                    <i data-lucide="alert-circle" class="w-5 h-5"></i>
                    <strong th:text="${globalError}"></strong>
                </div>
                <button onclick="this.parentElement.remove()" class="text-red-400 hover:text-red-300"><i data-lucide="x" class="w-4 h-4"></i></button>
            </div>
            
            <div th:if="${khaoSat.id != null and khaoSat.tongSoVote > 0}" class="mb-6 flex items-center justify-between p-4 bg-amber-500/10 border border-amber-500/20 text-amber-400 rounded-xl text-sm font-medium shadow-lg shadow-black/20">
                <div class="flex items-start gap-3">
                    <i data-lucide="shield-alert" class="w-5 h-5 mt-0.5"></i>
                    <div>
                        <span th:text="#{ks.form.khao_sat_nay_da_co}" th:remove="tag">Khảo sát này đã có </span>
                        <strong><span th:text="${khaoSat.tongSoVote}" th:remove="tag"></span> <span th:text="#{ks.chitiet.luot}" th:remove="tag">lượt</span></strong>
                        <span th:text="#{ks.form.he_thong_da_khoa_ch}" th:remove="tag">. Hệ thống đã khóa chức năng chỉnh sửa các phương án để bảo vệ dữ liệu!</span>
                    </div>
                </div>
            </div>

            <!-- Form Card -->
            <div class="bg-darkcard rounded-3xl border border-darkborder overflow-hidden shadow-lg shadow-black/20">
                <div class="p-6 md:p-8">
                    <form th:action="@{/admin/khao-sat/save}" th:object="${khaoSat}" method="POST" class="space-y-6" onsubmit="this.querySelector('button[type=submit]').disabled = true;">
                        <input type="hidden" th:field="*{id}">

                        <!-- Title -->
                        <div class="space-y-2">
                            <label class="text-sm font-semibold text-slate-300 flex items-center gap-1.5">
                                <i data-lucide="type" class="w-4 h-4 text-brand-400"></i> <span th:text="#{ks.form.tieu_de_khao_sat}">Tiêu đề khảo sát *</span>
                            </label>
                            <input type="text" th:field="*{tieuDe}" class="w-full bg-darkbg border rounded-xl py-3 px-4 text-sm text-white placeholder-slate-600 focus:outline-none transition"
                                   th:classappend="${#fields.hasErrors('tieuDe')} ? 'border-red-500 focus:border-red-500 shadow-[0_0_0_1px_rgba(239,68,68,0.2)]' : 'border-darkborder focus:border-brand-500 focus:shadow-[0_0_0_1px_rgba(14,165,233,0.2)]'">
                            <div class="text-xs text-red-400 font-medium flex items-center gap-1 mt-1" th:if="${#fields.hasErrors('tieuDe')}">
                                <i data-lucide="alert-triangle" class="w-3.5 h-3.5"></i> <span th:errors="*{tieuDe}"></span>
                            </div>
                        </div>

                        <!-- Description -->
                        <div class="space-y-2">
                            <label class="text-sm font-semibold text-slate-300 flex items-center gap-1.5">
                                <i data-lucide="align-left" class="w-4 h-4 text-brand-400"></i> <span th:text="#{dv.ds.mo_ta}">Mô tả</span>
                            </label>
                            <textarea th:field="*{moTa}" rows="3" class="w-full bg-darkbg border rounded-xl py-3 px-4 text-sm text-white placeholder-slate-600 focus:outline-none transition resize-none"
                                      th:classappend="${#fields.hasErrors('moTa')} ? 'border-red-500 focus:border-red-500 shadow-[0_0_0_1px_rgba(239,68,68,0.2)]' : 'border-darkborder focus:border-brand-500 focus:shadow-[0_0_0_1px_rgba(14,165,233,0.2)]'"></textarea>
                            <div class="text-xs text-red-400 font-medium flex items-center gap-1 mt-1" th:if="${#fields.hasErrors('moTa')}">
                                <i data-lucide="alert-triangle" class="w-3.5 h-3.5"></i> <span th:errors="*{moTa}"></span>
                            </div>
                        </div>

                        <!-- Date/Time -->
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="space-y-2">
                                <label class="text-sm font-semibold text-slate-300 flex items-center gap-1.5">
                                    <i data-lucide="calendar-plus" class="w-4 h-4 text-emerald-400"></i> <span th:text="#{ks.form.thoi_gian_bat_dau}">Thời gian bắt đầu *</span>
                                </label>
                                <input type="datetime-local" th:field="*{thoiGianBatDau}" th:readonly="${khaoSat.id != null}" 
                                       class="w-full bg-darkbg border rounded-xl py-3 px-4 text-sm text-white focus:outline-none transition"
                                       th:classappend="${#fields.hasErrors('thoiGianBatDau')} ? 'border-red-500 focus:border-red-500 shadow-[0_0_0_1px_rgba(239,68,68,0.2)]' : (${khaoSat.id != null} ? 'border-slate-800 bg-slate-900/50 text-slate-400 cursor-not-allowed' : 'border-darkborder focus:border-brand-500 focus:shadow-[0_0_0_1px_rgba(14,165,233,0.2)]')">
                                <div class="text-xs text-red-400 font-medium flex items-center gap-1 mt-1" th:if="${#fields.hasErrors('thoiGianBatDau')}">
                                    <i data-lucide="alert-triangle" class="w-3.5 h-3.5"></i> <span th:errors="*{thoiGianBatDau}"></span>
                                </div>
                            </div>
                            <div class="space-y-2">
                                <label class="text-sm font-semibold text-slate-300 flex items-center gap-1.5">
                                    <i data-lucide="calendar-off" class="w-4 h-4 text-rose-400"></i> <span th:text="#{ks.form.thoi_gian_ket_thuc}">Thời gian kết thúc *</span>
                                </label>
                                <input type="datetime-local" th:field="*{thoiGianKetThuc}" 
                                       class="w-full bg-darkbg border rounded-xl py-3 px-4 text-sm text-white focus:outline-none transition"
                                       th:classappend="${#fields.hasErrors('thoiGianKetThuc')} ? 'border-red-500 focus:border-red-500 shadow-[0_0_0_1px_rgba(239,68,68,0.2)]' : 'border-darkborder focus:border-brand-500 focus:shadow-[0_0_0_1px_rgba(14,165,233,0.2)]'">
                                <div class="text-xs text-red-400 font-medium flex items-center gap-1 mt-1" th:if="${#fields.hasErrors('thoiGianKetThuc')}">
                                    <i data-lucide="alert-triangle" class="w-3.5 h-3.5"></i> <span th:errors="*{thoiGianKetThuc}"></span>
                                </div>
                            </div>
                        </div>

                        <hr class="border-darkborder my-6">
                        
                        <div class="flex items-center justify-between mb-4">
                            <h5 class="text-sm font-bold text-white flex items-center gap-2">
                                <i data-lucide="list-checks" class="w-4.5 h-4.5 text-brand-400"></i>
                                <span th:text="#{ks.form.cac_phuong_an_binh_c}">Các phương án bình chọn</span>
                            </h5>
                        </div>

                        <!-- Options Container -->
                        <div id="phuongAnContainer" class="space-y-3">
                            <div th:each="lc, stat : *{danhSachLuaChon}" class="phuong-an-item">
                                <div class="flex gap-2 items-start">
                                    <input type="hidden" th:field="*{danhSachLuaChon[__${stat.index}__].id}">
                                    <input type="hidden" th:field="*{danhSachLuaChon[__${stat.index}__].soLuotBinhChon}">

                                    <div class="flex-grow">
                                        <input type="text" 
                                            th:field="*{danhSachLuaChon[__${stat.index}__].noiDungLuaChon}"
                                            th:readonly="${khaoSat.id != null and khaoSat.tongSoVote > 0}"
                                            class="w-full bg-darkbg border rounded-xl py-2.5 px-4 text-sm text-white focus:outline-none transition"
                                            th:classappend="${#fields.hasErrors('danhSachLuaChon[__${stat.index}__].noiDungLuaChon')} ? 'border-red-500 focus:border-red-500 shadow-[0_0_0_1px_rgba(239,68,68,0.2)]' : (${khaoSat.id != null and khaoSat.tongSoVote > 0} ? 'border-slate-800 bg-slate-900/50 text-slate-400 cursor-not-allowed' : 'border-darkborder focus:border-brand-500 focus:shadow-[0_0_0_1px_rgba(14,165,233,0.2)]')"
                                            th:placeholder="#{ks.form.nhap_ten_phuong_an}">
                                        <div class="text-xs text-red-400 font-medium flex items-center gap-1 mt-1" th:if="${#fields.hasErrors('danhSachLuaChon[__${stat.index}__].noiDungLuaChon')}">
                                            <i data-lucide="alert-triangle" class="w-3 h-3"></i> <span th:errors="*{danhSachLuaChon[__${stat.index}__].noiDungLuaChon}"></span>
                                        </div>
                                    </div>

                                    <button th:if="${khaoSat.tongSoVote == 0}" type="button" class="py-2.5 px-3 bg-red-500/10 hover:bg-red-500/20 text-red-400 border border-red-500/20 rounded-xl transition flex items-center justify-center shrink-0" onclick="xoaPhuongAn(this)" th:title="#{hd.ds.nut_xoa}">
                                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                                    </button>
                                </div>
                            </div>
                        </div>

                        <div class="pt-2">
                            <button th:if="${khaoSat.tongSoVote == 0}" type="button" class="py-2.5 px-4 bg-emerald-500/10 hover:bg-emerald-500/20 text-emerald-400 border border-emerald-500/20 rounded-xl text-xs font-bold transition flex items-center gap-2 border-dashed" onclick="themPhuongAn()">
                                <i data-lucide="plus" class="w-4 h-4"></i> <span th:text="#{ks.form.them_phuong_an}">Thêm phương án</span>
                            </button>
                        </div>

                        <div class="pt-8 border-t border-darkborder flex flex-col sm:flex-row justify-end gap-3">
                            <a th:href="@{/admin/khao-sat}" class="py-3 px-6 bg-transparent hover:bg-slate-800 text-slate-300 border border-slate-700 rounded-xl text-sm font-bold transition text-center flex items-center justify-center">
                                <span th:text="#{hdon.form.nut_huy}">Hủy</span>
                            </a>
                            <button type="submit" class="py-3 px-8 bg-brand-500 hover:bg-brand-600 text-white rounded-xl text-sm font-bold transition shadow-lg shadow-brand-500/25 flex items-center justify-center gap-2 group">
                                <i data-lucide="save" class="w-5 h-5 group-hover:scale-110 transition-transform"></i>
                                <span th:text="#{ks.form.luu_du_lieu}">Lưu Dữ Liệu</span>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
            
        </main>

    <script th:inline="javascript">
        document.addEventListener("DOMContentLoaded", function () {
            if (typeof lucide !== 'undefined') {
                lucide.createIcons();
            }
        });

        // Lấy số lượng phương án hiện tại để đánh index cho đúng (giúp Spring Boot map được dữ liệu)
        let luaChonIndex = /*[[${khaoSat.danhSachLuaChon != null ? khaoSat.danhSachLuaChon.size() : 0}]]*/ 0;

        function themPhuongAn() {
            const container = document.getElementById('phuongAnContainer');
            const placeholderText = /*[[#{ks.form.nhap_ten_phuong_an}]]*/ 'Nhập tên phương án';
            const html = `
                <div class="phuong-an-item">
                    <div class="flex gap-2 items-start">
                        <input type="hidden" name="danhSachLuaChon[${luaChonIndex}].soLuotBinhChon" value="0">
                        <div class="flex-grow">
                            <input type="text" name="danhSachLuaChon[${luaChonIndex}].noiDungLuaChon" placeholder="${placeholderText}" required
                                class="w-full bg-darkbg border border-darkborder focus:border-brand-500 focus:shadow-[0_0_0_1px_rgba(14,165,233,0.2)] rounded-xl py-2.5 px-4 text-sm text-white focus:outline-none transition">
                        </div>
                        <button type="button" class="py-2.5 px-3 bg-red-500/10 hover:bg-red-500/20 text-red-400 border border-red-500/20 rounded-xl transition flex items-center justify-center shrink-0" onclick="xoaPhuongAn(this)">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                    </div>
                </div>
            `;
            container.insertAdjacentHTML('beforeend', html);
            if (typeof lucide !== 'undefined') {
                lucide.createIcons();
            }
            luaChonIndex++;
        }

        function xoaPhuongAn(btn) {
            // Yêu cầu ít nhất 2 phương án
            if (document.querySelectorAll('.phuong-an-item').length > 2) {
                btn.closest('.phuong-an-item').remove();
            } else {
                alert(/*[[#{ks.form.it_nhat_2_phuong_an}]]*/ "Khảo sát phải có ít nhất 2 phương án");
            }
        }
    </script>
</body>
</html>
