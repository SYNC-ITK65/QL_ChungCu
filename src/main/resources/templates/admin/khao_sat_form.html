<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Sửa Khảo Sát</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
<div class="d-flex">
  <div th:replace="~{fragments/sidebar :: menu-trai}"></div>

  <div class="content p-4 w-100">
    <div class="card shadow border-0">
      <div class="card-header bg-primary text-white">
        <h4 class="mb-0" th:text="${khaoSat.id == null ? 'TẠO KHẢO SÁT MỚI' : 'CHỈNH SỬA KHẢO SÁT'}"></h4>
      </div>

      <div class="card-body p-4">
        <div th:if="${khaoSat.id != null and khaoSat.tongSoVote > 0}" class="alert alert-warning">
          <i class="fas fa-exclamation-triangle"></i>
          Khảo sát này đã có <strong>[[${khaoSat.tongSoVote}]] lượt vote</strong>. Hệ thống đã khóa chức năng chỉnh sửa các phương án để bảo vệ dữ liệu!
        </div>

        <form th:action="@{/admin/khao-sat/save}" th:object="${khaoSat}" method="POST">
          <input type="hidden" th:field="*{id}">

          <div class="mb-3">
            <label class="form-label fw-bold">Tiêu đề khảo sát *</label>
            <input type="text" class="form-control" th:field="*{tieuDe}" required>
          </div>

          <div class="mb-3">
            <label class="form-label fw-bold">Mô tả</label>
            <textarea class="form-control" th:field="*{moTa}" rows="3"></textarea>
          </div>

          <div class="row mb-4">
            <div class="col-md-6">
              <label class="form-label fw-bold">Thời gian bắt đầu *</label>
              <input type="datetime-local" class="form-control" th:field="*{thoiGianBatDau}"
                     th:readonly="${khaoSat.id != null}" required>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-bold">Thời gian kết thúc *</label>
              <input type="datetime-local" class="form-control" th:field="*{thoiGianKetThuc}" required>
            </div>
          </div>

          <hr>
          <h5 class="fw-bold mb-3">Các phương án bình chọn</h5>

          <div id="phuongAnContainer">
            <div th:each="lc, stat : *{danhSachLuaChon}" class="input-group mb-2 phuong-an-item">
              <input type="hidden" th:field="*{danhSachLuaChon[__${stat.index}__].id}">
              <input type="hidden" th:field="*{danhSachLuaChon[__${stat.index}__].soLuotBinhChon}">

              <input type="text" class="form-control" placeholder="Nhập tên phương án..."
                     th:field="*{danhSachLuaChon[__${stat.index}__].noiDungLuaChon}"
                     th:readonly="${khaoSat.id != null and khaoSat.tongSoVote > 0}" required>

              <button th:if="${khaoSat.tongSoVote == 0}" type="button" class="btn btn-outline-danger btn-xoa" onclick="xoaPhuongAn(this)">Xóa</button>
            </div>
          </div>

          <button th:if="${khaoSat.tongSoVote == 0}" type="button" class="btn btn-sm btn-success mt-2" onclick="themPhuongAn()">
            + Thêm phương án
          </button>

          <div class="mt-5 text-end">
            <a th:href="@{/admin/khao-sat}" class="btn btn-secondary me-2">Hủy</a>
            <button type="submit" class="btn btn-primary px-4">Lưu Dữ Liệu</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<script th:inline="javascript">
  // Lấy số lượng phương án hiện tại để đánh index cho đúng (giúp Spring Boot map được dữ liệu)
  let luaChonIndex = /*[[${khaoSat.danhSachLuaChon != null ? khaoSat.danhSachLuaChon.size() : 0}]]*/ 0;

  function themPhuongAn() {
      const container = document.getElementById('phuongAnContainer');
      const html = `
          <div class="input-group mb-2 phuong-an-item">
              <input type="hidden" name="danhSachLuaChon[${luaChonIndex}].soLuotBinhChon" value="0">
              <input type="text" class="form-control" name="danhSachLuaChon[${luaChonIndex}].noiDungLuaChon" placeholder="Nhập tên phương án..." required>
              <button type="button" class="btn btn-outline-danger btn-xoa" onclick="xoaPhuongAn(this)">Xóa</button>
          </div>
      `;
      container.insertAdjacentHTML('beforeend', html);
      luaChonIndex++;
  }

  function xoaPhuongAn(btn) {
      // Yêu cầu ít nhất 2 phương án
      if (document.querySelectorAll('.phuong-an-item').length > 2) {
          btn.parentElement.remove();
      } else {
          alert('Khảo sát phải có ít nhất 2 phương án bình chọn!');
      }
  }
</script>
</body>
</html>
