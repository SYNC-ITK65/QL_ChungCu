<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Hóa Đơn</title>
    <link href="https://cdn.jsdelivr.net/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="d-flex">8
    <div th:replace="~{fragments/sidebar :: menu-trai}"></div>

    <div class="container-fluid p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Danh sách Hóa Đơn</h2>
            <button class="btn btn-primary">+ Tạo Hóa Đơn Mới</button>
        </div>

        <table class="table table-striped table-hover border">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Tháng/Năm</th>
                <th>Căn Hộ</th>
                <th>Tổng Tiền</th>
                <th>Trạng Thái</th>
                <th>Hành Động</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="hd : ${danhSachHoaDon}">
                <td th:text="${hd.id}">1</td>
                <td th:text="${hd.thangNam}">10/2026</td>
                <td th:text="${hd.canHo != null ? hd.canHo.maCanHo : 'Chưa gắn'}">A1-01</td>
                <td th:text="${hd.tongTien + ' VNĐ'}">500000 VNĐ</td>
                <td>
                    <span th:if="${hd.trangThaiThanhToan == 'Đã đóng'}" class="badge bg-success">Đã đóng</span>
                    <span th:if="${hd.trangThaiThanhToan == 'Chưa đóng'}" class="badge bg-danger">Chưa đóng</span>
                </td>
                <td>
                    <button class="btn btn-sm btn-info text-white">Xem</button>
                    <button class="btn btn-sm btn-warning">Sửa</button>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(danhSachHoaDon)}">
                <td colspan="6" class="text-center text-muted">Chưa có hóa đơn nào trong hệ thống!</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
