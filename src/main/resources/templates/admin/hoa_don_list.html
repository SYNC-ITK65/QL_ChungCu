<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>Quản lý Hóa Đơn</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
    </style>
</head>
<body>
<div class="d-flex">
    <div th:replace="~{fragments/sidebar :: menu-trai}"></div>

    <div class="container-fluid p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Danh sách Hóa Đơn</h2>
            <a th:href="@{/admin/hoa-don/tao-moi}" class="btn btn-primary">+ Tạo Hóa Đơn Mới</a>
        </div>

        <!-- Form tìm kiếm -->
        <div class="card mb-4">
            <div class="card-header bg-light">
                <h6 class="mb-0">🔍 Tìm kiếm hóa đơn</h6>
            </div>
            <div class="card-body">
                <form th:action="@{/admin/hoa-don}" method="get" class="row g-3">
                    <div class="col-md-3">
                        <label class="form-label">Mã căn hộ</label>
                        <input type="text" class="form-control" name="maCanHo" th:value="${maCanHo}" placeholder="Nhập mã căn hộ...">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Trạng thái</label>
                        <select class="form-select" name="trangThai">
                            <option value="">-- Tất cả --</option>
                            <option value="Chưa đóng" th:selected="${trangThai == 'Chưa đóng'}">Chưa đóng</option>
                            <option value="Đã đóng" th:selected="${trangThai == 'Đã đóng'}">Đã đóng</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Tháng</label>
                        <input type="number" class="form-control" name="thang" th:value="${thang}" min="1" max="12" placeholder="1-12">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Năm</label>
                        <input type="number" class="form-control" name="nam" th:value="${nam}" placeholder="2024">
                    </div>
                    <div class="col-md-2 d-flex align-items-end">
                        <button type="submit" class="btn btn-primary w-100">Tìm kiếm</button>
                    </div>
                </form>
                <div class="mt-2">
                    <a th:href="@{/admin/hoa-don}" class="btn btn-sm btn-secondary">↻ Xóa bộ lọc</a>
                </div>
            </div>
        </div>

        <table class="table table-striped table-hover border">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Ngày Phát Hành</th>
                <th>Ngày Đến Hạn</th>
                <th>Căn Hộ</th>
                <th>Tổng Tiền</th>
                <th>Trạng Thái</th>
                <th>Hành Động</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="hd : ${danhSachHoaDon}">
                <td th:text="${hd.id}">1</td>

                <td th:text="${hd.ngayPhatHanh != null ? #temporals.format(hd.ngayPhatHanh, 'dd/MM/yyyy') : ''}">01/10/2026</td>
                <td th:text="${hd.ngayDenHan != null ? #temporals.format(hd.ngayDenHan, 'dd/MM/yyyy') : ''}">15/10/2026</td>

                <td th:text="${hd.canHo?.maCanHo ?: 'Chưa gắn'}">A1-01</td>

                <td th:text="${hd.tongTien != null ? #numbers.formatDecimal(hd.tongTien, 0, 'COMMA', 0, 'POINT') + ' VNĐ' : '0 VNĐ'}">500,000 VNĐ</td>

                <td>
                    <span th:if="${hd.trangThaiThanhToan == 'Đã đóng'}" class="badge bg-success">Đã đóng</span>

                    <span th:if="${hd.trangThaiThanhToan == 'Chưa đóng' or hd.trangThaiThanhToan == null}" class="badge bg-danger">Chưa đóng</span>
                </td>

                <td>
                    <a th:if="${hd.trangThaiThanhToan == 'Chưa đóng' or hd.trangThaiThanhToan == null}"
                       th:href="@{/admin/thanh-toan/xac-nhan/{id}(id=${hd.id})}"
                       class="btn btn-sm btn-success">Thanh toán</a>

                    <a th:href="@{/admin/hoa-don/xem/{id}(id=${hd.id})}"
                       class="btn btn-sm btn-info text-white">Xem</a>
                    <a th:href="@{/admin/hoa-don/sua/{id}(id=${hd.id})}"
                       class="btn btn-sm btn-warning">Sửa</a>
                    <a th:href="@{/admin/hoa-don/xoa/{id}(id=${hd.id})}"
                       onclick="return confirm('Bạn có chắc chắn muốn xóa hóa đơn này? Hành động này không thể hoàn tác.')"
                       class="btn btn-sm btn-danger">Xóa</a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(danhSachHoaDon)}">
                <td colspan="7" class="text-center text-muted">Chưa có hóa đơn nào trong hệ thống!</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
