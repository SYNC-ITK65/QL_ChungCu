<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title th:text="#{hdon.ds.tieude}">Quản lý Hóa Đơn</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
    </style>
</head>
<body>
<div class="d-flex">
    <div th:replace="~{fragments/sidebar :: menu-trai}"></div>

    <div class="container-fluid p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 th:text="#{hdon.ds.tieude}">Danh sách Hóa Đơn</h2>
            <a th:href="@{/admin/hoa-don/tao-moi}" class="btn btn-primary" th:text="#{hdon.ds.nut_them}">+ Tạo Hóa Đơn Mới</a>
        </div>

        <!-- Form tìm kiếm -->
        <div class="card mb-4">
            <div class="card-header bg-light">
                <h6 class="mb-0">🔍 <span th:text="#{chung.tim}">Tìm kiếm</span></h6>
            </div>
            <div class="card-body">
                <form th:action="@{/admin/hoa-don}" method="get" class="row g-3">
                    <div class="col-md-3">
                        <label class="form-label" th:text="#{hdon.ds.loc_ma_can}">Mã căn hộ</label>
                        <input type="text" class="form-control" name="maCanHo" th:value="${maCanHo}" th:placeholder="#{hdon.ds.loc_ma_can_goi_y}" placeholder="Nhập mã căn hộ...">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label" th:text="#{hdon.ds.loc_trang_thai}">Trạng thái</label>
                        <select class="form-select" name="trangThai">
                            <option value="" th:text="#{hdon.ds.loc_trang_thai_tat_ca}">-- Tất cả --</option>
                            <option value="Chưa đóng" th:selected="${trangThai == 'Chưa đóng'}" th:text="#{hdon.ds.trang_thai_chua_dong}">Chưa đóng</option>
                            <option value="Đã đóng" th:selected="${trangThai == 'Đã đóng'}" th:text="#{hdon.ds.trang_thai_da_dong}">Đã đóng</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label" th:text="#{hdon.ds.loc_thang}">Tháng</label>
                        <input type="number" class="form-control" name="thang" th:value="${thang}" min="1" max="12" th:placeholder="#{hdon.ds.loc_thang_goi_y}" placeholder="1-12">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label" th:text="#{hdon.ds.loc_nam}">Năm</label>
                        <input type="number" class="form-control" name="nam" th:value="${nam}" th:placeholder="#{hdon.ds.loc_nam_goi_y}" placeholder="2024">
                    </div>
                    <div class="col-md-2 d-flex align-items-end">
                        <button type="submit" class="btn btn-primary w-100" th:text="#{hdon.ds.nut_tim_kiem}">Tìm kiếm</button>
                    </div>
                </form>
                <div class="mt-2">
                    <a th:href="@{/admin/hoa-don}" class="btn btn-sm btn-secondary" th:text="#{hdon.ds.nut_xoa_loc}">↻ Xóa bộ lọc</a>
                </div>
            </div>
        </div>

        <table class="table table-striped table-hover border no-paging">
            <thead class="table-dark">
            <tr>
                <th th:text="#{hdon.ds.bang_id}">ID</th>
                <th th:text="#{hdon.ds.bang_ngay_phat_hanh}">Ngày Phát Hành</th>
                <th th:text="#{hdon.ds.bang_ngay_den_han}">Ngày Đến Hạn</th>
                <th th:text="#{hdon.ds.bang_can_ho}">Căn Hộ</th>
                <th th:text="#{hdon.ds.bang_tong_tien}">Tổng Tiền</th>
                <th th:text="#{hdon.ds.bang_trang_thai}">Trạng Thái</th>
                <th th:text="#{hdon.ds.bang_hanh_dong}">Hành Động</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="hd : ${danhSachHoaDon}">
                <td th:text="${hd.id}">1</td>

                <td th:text="${hd.ngayPhatHanh != null ? #temporals.format(hd.ngayPhatHanh, 'dd/MM/yyyy') : ''}">01/10/2026</td>
                <td th:text="${hd.ngayDenHan != null ? #temporals.format(hd.ngayDenHan, 'dd/MM/yyyy') : ''}">15/10/2026</td>

                <td th:text="${hd.canHo?.maCanHo ?: '---'}">A1-01</td>

                <td th:text="${hd.tongTien != null ? #numbers.formatDecimal(hd.tongTien, 0, 'COMMA', 0, 'POINT') + ' VNĐ' : '0 VNĐ'}">500,000 VNĐ</td>

                <td>
                    <span th:if="${hd.trangThaiThanhToan == 'Đã đóng'}" class="badge bg-success" th:text="#{hdon.ds.trang_thai_da_dong}">Đã đóng</span>

                    <span th:if="${hd.trangThaiThanhToan == 'Chưa đóng' or hd.trangThaiThanhToan == null}" class="badge bg-danger" th:text="#{hdon.ds.trang_thai_chua_dong}">Chưa đóng</span>

                    <span th:if="${hd.trangThaiThanhToan == 'Chờ duyệt'}" class="badge bg-warning text-dark">Chờ duyệt</span>
                </td>

                <td>
                    <a th:if="${hd.trangThaiThanhToan == 'Chưa đóng' or hd.trangThaiThanhToan == null}"
                       th:href="@{/admin/thanh-toan/xac-nhan/{id}(id=${hd.id})}"
                       class="btn btn-sm btn-success" th:text="#{hdon.ds.nut_thanh_toan}">Thanh toán</a>

                    <a th:if="${hd.trangThaiThanhToan == 'Chờ duyệt'}"
                       th:href="@{/admin/thanh-toan/xac-nhan/{id}(id=${hd.id})}"
                       class="btn btn-sm btn-warning">Duyệt</a>

                    <a th:href="@{/admin/hoa-don/xem/{id}(id=${hd.id})}"
                       class="btn btn-sm btn-info text-white" th:text="#{hdon.ds.nut_xem}">Xem</a>
                    <a th:href="@{/admin/hoa-don/sua/{id}(id=${hd.id})}"
                       class="btn btn-sm btn-warning" th:text="#{hdon.ds.nut_sua}">Sửa</a>
                    <a th:href="@{/admin/hoa-don/xoa/{id}(id=${hd.id})}"
                       th:onclick="return confirm([[#{chung.xac_nhan_xoa}]])"
                       class="btn btn-sm btn-danger" th:text="#{chung.xoa}">Xóa</a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(danhSachHoaDon)}">
                <td colspan="7" class="text-center text-muted" th:text="#{hdon.ds.trong}">Chưa có hóa đơn nào trong hệ thống!</td>
            </tr>
            </tbody>
        </table>
        <div th:replace="~{fragments/pagination :: paging('/admin/hoa-don', '')}"></div>
    </div>
</div>

    <!-- Dùng fragment Datatable chung -->
    <div th:replace="~{fragments/datatable :: scripts}"></div>
</body>
</html>
