<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>Quản lý Hóa Đơn</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    </style>
</head>
<body>
<div class="d-flex">
    <div th:replace="~{fragments/sidebar :: menu-trai}"></div>

    <div class="container-fluid p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Danh sách Hóa Đơn</h2>
            <a th:href="@{/admin/hoa-don/tao-moi}" class="btn btn-primary">+ Tạo Hóa Đơn Mới</a>
        </div>

        <!-- Form tìm kiếm -->
        <div class="card mb-4">
            <div class="card-header bg-light">
                <h6 class="mb-0">🔍 Tìm kiếm hóa đơn</h6>
            </div>
            <div class="card-body">
                <form th:action="@{/admin/hoa-don}" method="get" class="row g-3">
                    <div class="col-md-3">
                        <label class="form-label">Mã căn hộ</label>
                        <input type="text" class="form-control" name="maCanHo" th:value="${maCanHo}" placeholder="Nhập mã căn hộ...">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Trạng thái</label>
                        <select class="form-select" name="trangThai">
                            <option value="">-- Tất cả --</option>
                            <option value="Chưa đóng" th:selected="${trangThai == 'Chưa đóng'}">Chưa đóng</option>
                            <option value="Đã đóng" th:selected="${trangThai == 'Đã đóng'}">Đã đóng</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Tháng</label>
                        <input type="number" class="form-control" name="thang" th:value="${thang}" min="1" max="12" placeholder="1-12">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Năm</label>
                        <input type="number" class="form-control" name="nam" th:value="${nam}" placeholder="2024">
                    </div>
                    <div class="col-md-2 d-flex align-items-end">
                        <button type="submit" class="btn btn-primary w-100">Tìm kiếm</button>
                    </div>
                </form>
                <div class="mt-2">
                    <a th:href="@{/admin/hoa-don}" class="btn btn-sm btn-secondary">↻ Xóa bộ lọc</a>
                </div>
            </div>
        </div>

        <table class="table table-striped table-hover border">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Ngày Phát Hành</th>
                <th>Ngày Đến Hạn</th>
                <th>Căn Hộ</th>
                <th>Tổng Tiền</th>
                <th>Trạng Thái</th>
                <th>Hành Động</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="hd : ${danhSachHoaDon}">
                <td th:text="${hd.id}"></td>
                <td th:text="${#temporals.format(hd.ngayPhatHanh, 'dd/MM/yyyy')}"></td>
                <td th:text="${#temporals.format(hd.ngayDenHan, 'dd/MM/yyyy')}"></td>
                <td th:text="${hd.canHo.maCanHo}"></td>
                <td th:text="${#numbers.formatDecimal(hd.tongTien, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'"></td>
                <td>
                    <span th:class="${hd.trangThai == 'Đã đóng' ? 'badge bg-success' : 'badge bg-warning text-dark'}"
                          th:text="${hd.trangThai}"></span>
                </td>
                <td>
                    <a th:if="${hd.trangThaiThanhToan == 'Chưa đóng' or hd.trangThaiThanhToan == null}"
                       th:href="@{/admin/thanh-toan/xac-nhan/{id}(id=${hd.id})}"
                       class="btn btn-sm btn-success">Thanh toán</a>

                    <a th:href="@{/admin/hoa-don/xem/{id}(id=${hd.id})}"
                       class="btn btn-sm btn-info text-white">Xem</a>
                    <a th:href="@{/admin/hoa-don/sua/{id}(id=${hd.id})}"
                       class="btn btn-sm btn-warning">Sửa</a>
                    <a th:href="@{/admin/hoa-don/xoa/{id}(id=${hd.id})}"
                       onclick="return confirm('Bạn có chắc chắn muốn xóa hóa đơn này? Hành động này không thể hoàn tác.')"
                       class="btn btn-sm btn-danger">Xóa</a>
                </td>
            </tr>
            </tbody>
        </table>

        <nav th:if="${totalPages > 1}" aria-label="Page navigation">
            <ul class="pagination justify-content-center">
                <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                    <a class="page-link" th:href="@{/admin/hoa-don(page=${currentPage - 1}, size=${size}, maCanHo=${maCanHo}, trangThai=${trangThai}, thang=${thang}, nam=${nam})}">Trước</a>
                </li>
                
                <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}" 
                    th:classappend="${currentPage == i} ? 'active'">
                    <a class="page-link" th:href="@{/admin/hoa-don(page=${i}, size=${size}, maCanHo=${maCanHo}, trangThai=${trangThai}, thang=${thang}, nam=${nam})}" th:text="${i + 1}"></a>
                </li>

                <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                    <a class="page-link" th:href="@{/admin/hoa-don(page=${currentPage + 1}, size=${size}, maCanHo=${maCanHo}, trangThai=${trangThai}, thang=${thang}, nam=${nam})}">Sau</a>
                </li>
            </ul>
        </nav>
    </div>
</div>
</body>
</html>
