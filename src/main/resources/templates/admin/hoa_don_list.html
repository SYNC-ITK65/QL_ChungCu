<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Hóa Đơn</title>
    <link href="https://cdn.jsdelivr.net/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="d-flex">
    <div th:replace="~{fragments/sidebar :: menu-trai}"></div>

    <div class="container-fluid p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Danh sách Hóa Đơn</h2>
            <a th:href="@{/admin/hoa-don/tao-moi}" class="btn btn-primary">+ Tạo Hóa Đơn Mới</a>
        </div>

        <table class="table table-striped table-hover border">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Ngày Phát Hành</th>
                <th>Ngày Đến Hạn</th>
                <th>Căn Hộ</th>
                <th>Tổng Tiền</th>
                <th>Trạng Thái</th>
                <th>Hành Động</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="hd : ${danhSachHoaDon}">
                <td th:text="${hd.id}">1</td>

                <td th:text="${hd.ngayPhatHanh != null ? #temporals.format(hd.ngayPhatHanh, 'dd/MM/yyyy') : ''}">01/10/2026</td>
                <td th:text="${hd.ngayDenHan != null ? #temporals.format(hd.ngayDenHan, 'dd/MM/yyyy') : ''}">15/10/2026</td>

                <td th:text="${hd.canHo?.maCanHo ?: 'Chưa gắn'}">A1-01</td>

                <td th:text="${hd.tongTien != null ? #numbers.formatDecimal(hd.tongTien, 0, 'COMMA', 0, 'POINT') + ' VNĐ' : '0 VNĐ'}">500,000 VNĐ</td>

                <td>
                    <span th:if="${hd.trangThaiThanhToan == 'Đã đóng'}" class="badge bg-success">Đã đóng</span>

                    <span th:if="${hd.trangThaiThanhToan == 'Chưa đóng' or hd.trangThaiThanhToan == null}" class="badge bg-danger">Chưa đóng</span>
                </td>

                <td>
                    <a th:if="${hd.trangThaiThanhToan == 'Chưa đóng' or hd.trangThaiThanhToan == null}"
                       th:href="@{/admin/hoa-don/thanh-toan/{id}(id=${hd.id})}"
                       class="btn btn-sm btn-success"
                       onclick="return confirm('Xác nhận thu tiền hóa đơn này?');">Thanh toán</a>

                    <button class="btn btn-sm btn-info text-white">Xem</button>
                    <button class="btn btn-sm btn-warning">Sửa</button>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(danhSachHoaDon)}">
                <td colspan="7" class="text-center text-muted">Chưa có hóa đơn nào trong hệ thống!</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
