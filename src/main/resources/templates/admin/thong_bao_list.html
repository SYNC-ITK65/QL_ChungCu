<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title th:text="#{tb.ds.tieude}">Danh sách Thông báo &amp; Cẩm nang</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>

<body>
    <div class="d-flex">
        <div th:replace="~{fragments/sidebar :: menu-trai}"></div>

        <div class="flex-grow-1 p-4">
            <div class="d-flex justify-content-between align-items-center mb-4 mt-3">
                <h2 th:text="#{tb.ds.tieude}">Quản lý Thông báo &amp; Cẩm nang</h2>
                <a th:href="@{/admin/thong-bao/tao-moi}" class="btn btn-primary" th:text="#{chung.them}">+ Tạo mới</a>
            </div>

            <!-- Form Tìm kiếm & Lọc -->
            <div class="card mb-4 shadow-sm">
                <div class="card-body">
                    <form th:action="@{/admin/thong-bao}" method="GET" class="row g-3">
                        <div class="col-md-5">
                            <label class="form-label fw-bold" th:text="#{tb.ds.tieu_de_thong_bao}">Tiêu đề thông báo</label>
                            <input type="text" name="tuKhoa" class="form-control" th:value="${tuKhoa}" placeholder="Nhập tiêu đề cần tìm..." th:placeholder="#{tb.ds.nhap_tieu_de_can_tim}">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-bold" th:text="#{tb.ds.phan_loai}">Phân loại</label>
                            <select name="loai" class="form-select">
                                <option value="" th:text="#{tb.ds.tat_ca_loai}">-- Tất cả loại --</option>
                                <option value="1" th:selected="${loai == 1}" th:text="#{tb.loai.tin_tuc}">Bảng tin chung</option>
                                <option value="2" th:selected="${loai == 2}" th:text="#{tb.ds.cam_nang_cu_dan}">Cẩm nang cư dân</option>
                            </select>
                        </div>
                        <div class="col-md-3 d-flex align-items-end">
                            <button type="submit" class="btn btn-primary w-100">
                                <i class="bi bi-search"></i><span th:text="#{tb.ds.loc_thong_bao}" th:remove="tag"> Lọc thông báo
                            </span></button>
                        </div>
                    </form>
                </div>
            </div>

            <table class="table table-striped table-hover border no-paging">
                <thead class="table-dark">
                    <tr>
                        <th style="width: 5%" th:text="#{chung.id}">ID</th>
                        <th style="width: 40%" th:text="#{tb.ds.bang_tieude}">Tiêu đề</th>
                        <th style="width: 15%" th:text="#{tb.ds.bang_loai}">Loại</th>
                        <th style="width: 20%" th:text="#{tb.ds.bang_ngay}">Ngày đăng</th>
                        <th style="width: 20%" th:text="#{chung.hanh_dong}">Hành động</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="tb : ${danhSachThongBao}">
                        <td th:text="${tb.id}"></td>
                        <td th:text="${tb.tieuDe}"></td>
                        <td>
                            <span th:if="${tb.loai == 1}" class="badge bg-info text-dark" th:text="#{tb.loai.tin_tuc}">Bảng tin chung</span>
                            <span th:if="${tb.loai == 2}" class="badge bg-success" th:text="#{tb.loai.cam_nang}">Cẩm nang</span>
                        </td>
                        <td th:text="${#temporals.format(tb.ngayDang, 'dd/MM/yyyy HH:mm')}"></td>
                        <td>
                            <a th:href="@{/admin/thong-bao/sua/{id}(id=${tb.id})}" class="btn btn-sm btn-warning" th:text="#{chung.sua}">Sửa</a>
                            <a th:href="@{/admin/thong-bao/xoa/{id}(id=${tb.id})}" class="btn btn-sm btn-danger" th:onclick="|return confirm('#{chung.xac_nhan_xoa}')|" th:text="#{chung.xoa}">Xóa</a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(danhSachThongBao)}">
                        <td colspan="5" class="text-center text-muted" th:text="#{tb.ds.trong}">Chưa có thông báo nào phù hợp!</td>
                    </tr>
                </tbody>
            </table>

            <div th:replace="~{fragments/pagination :: paging('/admin/thong-bao', 'tuKhoa=' + (${tuKhoa} ?: '') + '&amp;loai=' + (${loai} ?: ''))}"></div>

            <!-- Dùng fragment Datatable chung -->
            <div th:replace="~{fragments/datatable :: scripts}"></div>
        </div>
    </div>
</body>

</html>
