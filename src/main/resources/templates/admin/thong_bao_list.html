<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Danh sách Thông báo & Cẩm nang</title>
</head>

<body>
    <div th:replace="~{fragments/sidebar :: menu-trai}"></div>

    <div class="d-flex justify-content-between align-items-center mb-4 mt-3">
        <h2>Quản lý Thông báo & Cẩm nang</h2>
        <a th:href="@{/admin/thong-bao/tao-moi}" class="btn btn-primary">+ Tạo mới</a>
    </div>

    <table class="table table-striped table-hover border">
        <thead class="table-dark">
            <tr>
                <th style="width: 5%">ID</th>
                <th style="width: 40%">Tiêu đề</th>
                <th style="width: 15%">Loại</th>
                <th style="width: 20%">Ngày đăng</th>
                <th style="width: 20%">Hành động</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="tb : ${danhSachThongBao}">
                <td th:text="${tb.id}"></td>
                <td th:text="${tb.tieuDe}"></td>
                <td>
                    <span th:if="${tb.loai == 1}" class="badge bg-info text-dark">Bảng tin chung</span>
                    <span th:if="${tb.loai == 2}" class="badge bg-success">Cẩm nang</span>
                </td>
                <td th:text="${#temporals.format(tb.ngayDang, 'dd/MM/yyyy HH:mm')}"></td>
                <td>
                    <a th:href="@{/admin/thong-bao/sua/{id}(id=${tb.id})}" class="btn btn-sm btn-warning">Sửa</a>
                    <a th:href="@{/admin/thong-bao/xoa/{id}(id=${tb.id})}" class="btn btn-sm btn-danger"
                        onclick="return confirm('Xóa bài này? Thao tác không thể hoàn tác!');">Xóa</a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(danhSachThongBao)}">
                <td colspan="5" class="text-center text-muted">Chưa có thông báo nào!</td>
            </tr>
        </tbody>
    </table>

</body>

</html>
