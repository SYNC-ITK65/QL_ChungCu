<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Ghi nhận kiện hàng mới</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            display: flex;
            min-height: 100vh;
            background-color: #f8f9fa;
        }
        .main-content {
            flex-grow: 1;
            padding: 40px;
        }
        .form-card {
            max-width: 600px;
            margin: auto;
            border: none;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }
    </style>
</head>

<body>
    <div th:replace="~{fragments/sidebar :: menu-trai}"></div>

    <div class="main-content">
        <div class="card form-card">
            <div class="card-header bg-primary text-white text-center py-3">
                <h4 class="mb-0">📦 Ghi nhận bưu phẩm mới</h4>
            </div>
            <div class="card-body p-4">
                <form th:action="@{/admin/kien-hang/luu}" th:object="${kienHang}" method="POST">
                    
                    <div class="mb-4">
                        <label class="form-label fw-bold">1. Chọn Căn hộ nhận</label>
                        <select class="form-select" th:field="*{canHo.id}" required>
                            <option value="">-- Chọn mã căn hộ --</option>
                            <option th:each="ch : ${danhSachCanHo}" 
                                    th:value="${ch.id}" 
                                    th:text="${ch.maCanHo}"></option>
                        </select>
                        <div class="form-text">Bưu phẩm sẽ được thông báo đến cư dân thuộc căn hộ này.</div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">2. Người gửi / Đơn vị giao</label>
                        <input type="text" class="form-control" th:field="*{nguoiGui}" 
                               placeholder="VD: Shopee, Tiki, Giao Hàng Nhanh, Nguyễn Văn A..." required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">3. Tên người nhận trên gói hàng</label>
                        <input type="text" class="form-control" th:field="*{nguoiNhan}" 
                               placeholder="Tên cư dân ghi trên bưu phẩm" required>
                    </div>

                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-primary btn-lg shadow">
                            <i class="bi bi-save"></i> Lưu thông tin
                        </button>
                        <a th:href="@{/admin/kien-hang}" class="btn btn-light">Hủy bỏ</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
