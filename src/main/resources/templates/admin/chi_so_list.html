<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{cs.ds.quan_ly_chi_so_hang}">Quản lý Chỉ Số Hàng Tháng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body>
<div class="d-flex">
    <div th:replace="~{fragments/sidebar :: menu-trai}"></div>

    <div class="container-fluid p-4">
        <!-- Nút tạo mới -->
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4 class="mb-0" th:text="#{cs.ds.quan_ly_chi_so_dien}">📊 Quản lý Chỉ số Điện Nước</h4>
            <a th:href="@{/admin/chi-so/tao-moi}" class="btn btn-success">
                <i class="bi bi-plus-circle"></i><span th:text="#{cs.form.ghi_nhan_chi_so_moi}" th:remove="tag"> Ghi nhận Chỉ số mới
            </span></a>
        </div>

        <!-- Form tìm kiếm -->
        <div class="card mb-4">
            <div class="card-header bg-light">
                <h6 class="mb-0" th:text="#{cs.ds.tim_kiem_chi_so}">🔍 Tìm kiếm chỉ số</h6>
            </div>
            <div class="card-body">
                <form th:action="@{/admin/chi-so}" method="get" class="row g-3">
                    <div class="col-md-3">
                        <label class="form-label" th:text="#{hdon.ds.loc_ma_can}">Mã căn hộ</label>
                        <input type="text" class="form-control" name="maCanHo" th:value="${maCanHo}" placeholder="Nhập mã căn hộ..." th:placeholder="#{hdon.ds.loc_ma_can_goi_y}">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label" th:text="#{hdon.form.can_ho}">Căn hộ</label>
                        <select class="form-select" name="canHoId">
                            <option value="" th:text="#{cs.ds.tat_ca_can_ho}">-- Tất cả căn hộ --</option>
                            <option th:each="ch : ${danhSachCanHo}" th:value="${ch.id}" th:text="|${ch.maCanHo} (${ch.trangThai})|" th:selected="${canHoId != null and canHoId == ch.id}">
                            </option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label" th:text="#{hdon.ds.loc_thang}">Tháng</label>
                        <input type="number" class="form-control" name="thang" th:value="${thang}" min="1" max="12" placeholder="1-12" th:placeholder="#{hdon.ds.loc_thang_goi_y}">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label" th:text="#{hdon.ds.loc_nam}">Năm</label>
                        <input type="number" class="form-control" name="nam" th:value="${nam}" placeholder="2024" th:placeholder="#{hdon.ds.loc_nam_goi_y}">
                    </div>
                    <div class="col-md-2 d-flex align-items-end">
                        <button type="submit" class="btn btn-primary w-100" th:text="#{hdon.ds.nut_tim_kiem}">Tìm kiếm</button>
                    </div>
                </form>
                <div class="mt-2">
                    <a th:href="@{/admin/chi-so}" class="btn btn-sm btn-secondary" th:text="#{hd.ds.nut_xoa_loc}">↻ Xóa bộ lọc</a>
                </div>
            </div>
        </div>

        <table class="table table-striped table-hover border no-paging">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th th:text="#{cs.ds.ngay_ghi_nhan}">Ngày Ghi Nhận</th>
                <th th:text="#{hdon.form.can_ho}">Căn Hộ</th>
                <th th:text="#{cs.form.so_dien_kwh}">Số Điện (kWh)</th>
                <th th:text="#{cs.form.so_nuoc_m3}">Số Nước (m3)</th>
                <th th:text="#{hdon.ds.bang_hanh_dong}">Hành Động</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="cs : ${danhSachChiSo}">
                <td th:text="${cs.id}">1</td>
                <td th:text="${cs.ngayGhiNhan != null ? #temporals.format(cs.ngayGhiNhan, 'dd/MM/yyyy') : ''}">01/10/2026</td>
                <td th:text="${cs.canHo != null} ? ${cs.canHo.maCanHo} : #{chung.chua_gan}"></td>
                <td th:text="${cs.dienTieuThu}">100</td>
                <td th:text="${cs.nuocTieuThu}">10</td>
                <td>
                    <a th:href="@{/admin/chi-so/xoa/{id}(id=${cs.id})}" th:onclick="|return confirm('#{cs.ds.xac_nhan_xoa}')|" class="btn btn-sm btn-danger" th:text="#{hd.ds.nut_xoa}">Xóa</a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(danhSachChiSo)}">
                <td colspan="6" class="text-center text-muted" th:text="#{cs.ds.chua_co_chi_so_nao_d}">Chưa có chỉ số nào được ghi nhận!</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Dùng fragment Datatable chung -->
<div th:replace="~{fragments/datatable :: scripts}"></div>
</body>
</html>
