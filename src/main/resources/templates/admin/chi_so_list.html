<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Chỉ Số Hàng Tháng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="d-flex">
    <div th:replace="~{fragments/sidebar :: menu-trai}"></div>

    <div class="container-fluid p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Danh sách Chỉ số Điện Nước</h2>
            <a th:href="@{/admin/chi-so/tao-moi}" class="btn btn-primary">+ Ghi nhận Chỉ số mới</a>
        </div>

        <table class="table table-striped table-hover border no-paging">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Ngày Ghi Nhận</th>
                <th>Căn Hộ</th>
                <th>Số Điện (kWh)</th>
                <th>Số Nước (m3)</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="cs : ${danhSachChiSo}">
                <td th:text="${cs.id}">1</td>
                <td th:text="${cs.ngayGhiNhan != null ? #temporals.format(cs.ngayGhiNhan, 'dd/MM/yyyy') : ''}">01/10/2026</td>
                <td th:text="${cs.canHo?.maCanHo ?: 'Chưa gắn'}">A1-01</td>
                <td th:text="${cs.dienTieuThu}">100</td>
                <td th:text="${cs.nuocTieuThu}">10</td>
            </tr>
            <tr th:if="${#lists.isEmpty(danhSachChiSo)}">
                <td colspan="5" class="text-center text-muted">Chưa có chỉ số nào được ghi nhận!</td>
            </tr>
            </tbody>
        </table>
        <div th:replace="~{fragments/pagination :: paging('/admin/chi-so', '')}"></div>
    </div>
</div>

    <!-- Dùng fragment Datatable chung -->
    <div th:replace="~{fragments/datatable :: scripts}"></div>
</body>
</html>
