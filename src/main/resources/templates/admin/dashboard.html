<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Chủ Admin</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="d-flex">
        <!-- Sidebar -->
        <div th:replace="fragments/sidebar :: menu-trai"></div>

        <!-- Main Content -->
        <div class="flex-grow-1 p-4">
            <h2 class="mb-4">📊 Tổng Quan Hệ Thống</h2>

            <div class="row g-4">

                <!-- Căn hộ -->
                <div class="col-md-6 col-lg-3">
                    <div class="card h-100 text-white bg-primary">
                        <div class="card-body">
                            <h6 class="text-uppercase">Căn Hộ</h6>
                            <h3 th:text="${totalCanHo}">0</h3>
                            <p>Đang trống: <strong th:text="${vacantCanHo}">0</strong></p>
                        </div>
                    </div>
                </div>

                <!-- Cư dân -->
                <div class="col-md-6 col-lg-3">
                    <div class="card h-100 text-white bg-success">
                        <div class="card-body">
                            <h6 class="text-uppercase">Cư Dân Cư Trú</h6>
                            <h3 th:text="${residentResiding}">0</h3>
                            <p>Đang sinh sống tại tòa nhà</p>
                        </div>
                    </div>
                </div>

                <!-- Doanh thu -->
                <div class="col-md-6 col-lg-3">
                    <div class="card h-100 text-white bg-warning">
                        <div class="card-body">
                            <h6 class="text-uppercase">Hóa Đơn (Tháng Này)</h6>
                            <h3 th:text="${#numbers.formatDecimal(sumRevenue, 0, 'COMMA', 0, 'POINT')} + ' đ'">0 đ</h3>
                            <p>Tổng tiền các hóa đơn trong tháng</p>
                        </div>
                    </div>
                </div>

                <!-- Phản ánh -->
                <div class="col-md-6 col-lg-3">
                    <div class="card h-100 text-white bg-secondary">
                        <div class="card-body">
                            <h6 class="text-uppercase">Ticket Chờ Xử Lý</h6>
                            <h3 th:text="${phanAnhChoXuLy}">0</h3>
                            <p>Tính năng đang phát triển</p>
                        </div>
                    </div>
                </div>

            </div>

            <div class="mt-5 text-center text-muted">
                <p>Hệ thống Quản lý Chung Cư &copy; 2026</p>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
