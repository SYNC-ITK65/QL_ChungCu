# Policies Section
index.policy.badge=Огромные скидки в этом месяце
index.policy.title=Политика продаж <br /> и график платежей
index.policy.desc=Владение квартирой в SmartApt никогда не было таким простым благодаря отличным финансовым рычагам и гибкому графику платежей, снижающему нагрузку на покупателей.
index.policy.1.title=Скидка до 8%
index.policy.1.desc=Применяется к клиентам, которые оплачивают 95% стоимости квартиры при подписании договора купли-продажи.
index.policy.2.title=Банковская поддержка кредитования до 70%
index.policy.2.desc=Льготный период по основному долгу и 0% процентная ставка в течение 24 месяцев до момента получения квартиры.
index.policy.3.title=Подарочный пакет интерьера Smart Home
index.policy.3.desc=Бесплатная интеллектуальная система управления стоимостью 100 миллионов донгов для первых 50 забронировавших клиентов.

