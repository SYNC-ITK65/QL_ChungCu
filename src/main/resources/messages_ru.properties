# Features Section
index.feature.badge=Привилегии для жителей
index.feature.title=Система удобств высшего класса <br />Стандарт 5-звездочного курорта
index.feature.desc=Каждый шаг — это совершенный жизненный опыт. SmartApt полностью удовлетворяет все потребности в жизни, работе и отдыхе прямо у порога вашего дома.
index.feature.1.title=Панорамный бассейн на крыше
index.feature.1.desc=Наслаждайтесь великолепным панорамным видом на город из бассейна Sky Pool олимпийского стандарта, а также специальной детской зоной для плавания.
index.feature.2.title=Эко-парк площадью 2 га
index.feature.2.desc=Зеленое пространство, тенистые прогулочные дорожки и искусственное ландшафтное озеро обеспечивают абсолютное расслабление на лоне природы.
index.feature.3.title=Тренажерный зал и спа-центр премиум-класса
index.feature.3.desc=Тренажерный зал с самым современным оборудованием в мире, студия йоги с панорамным видом и специализированная спа-зона для восстановления энергии.
index.feature.4.title=Многоуровневый торговый центр
index.feature.4.desc=4-этажный подиум объединяет сотни торговых брендов, супермаркеты, рестораны азиатской и европейской кухни, а также оживленные развлекательные зоны.
index.feature.5.title=Многоуровневая система безопасности 24/7
index.feature.5.desc=Система видеонаблюдения с ИИ, магнитные карты для доступа на этажи и круглосуточное патрулирование охраны обеспечивают абсолютную безопасность вашей семьи.
index.feature.6.title=Приложение для управления Smart Home
index.feature.6.desc=Управляйте электроприборами, оплачивайте счета и бронируйте услуги (барбекю, теннис) прямо в эксклюзивном приложении здания.

