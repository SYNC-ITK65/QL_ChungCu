# Policies Section
index.policy.badge=Pinakamalaking alok ngayong buwan
index.policy.title=Patakaran sa Pagbebenta <br /> & Iskedyul ng Pagbabayad
index.policy.desc=Hindi kailanman naging mas madali ang pagmamay-ari ng apartment sa SmartApt na may mahusay na tulong pinansyal at pinahabang iskedyul ng pagbabayad, na nagpapababa ng presyur sa mga mamimili.
index.policy.1.title=Diskwento hanggang 8%
index.policy.1.desc=Nalalapat para sa mga customer na maagang magbabayad ng 95% ng halaga ng apartment sa pagpirma ng Kontrata sa Pagbebenta.
index.policy.2.title=Suporta ng bangko para sa 70% na pautang
index.policy.2.desc=Grace period sa principal at 0% interes sa loob ng 24 buwan hanggang sa matanggap ang bahay.
index.policy.3.title=Regalong Smart Home interior package
index.policy.3.desc=Kasama ang smart control system package na nagkakahalaga ng 100 milyong VND para sa unang 50 na magbu-booking.

