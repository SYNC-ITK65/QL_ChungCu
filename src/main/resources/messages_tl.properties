# Features Section
index.feature.badge=Mga Pribilehiyo ng Residente
index.feature.title=Sistemang Pasilidad na Napakahusay <br />Standard na 5-Star Resort
index.feature.desc=Ang bawat hakbang ay isang perpektong karanasan sa pamumuhay. Ganap na natutugunan ng SmartApt ang bawat pangangailangan sa pamumuhay, trabaho, at libangan sa mismong pintuan mo.
index.feature.1.title=Infinity Pool sa Itaas
index.feature.1.desc=Masiyahan sa napakagandang panoramikong tanawin ng lungsod mula sa Sky Pool na may standard na Olympic, kasama ang nakatalagang swimming pool para sa mga bata.
index.feature.2.title=2ha na Ecological Park
index.feature.2.desc=Preskong luntiang espasyo, mga lalakaran na may malalabay na puno, at artipisyal na lawa na nagbibigay ng ganap na pagpapahinga sa gitna ng kalikasan.
index.feature.3.title=Mataas na Kalidad na Gym at Spa
index.feature.3.desc=Gym na may pinaka-abanteng kagamitan sa mundo, Yoga room na may tanawing Panorama, at espesyal na Spa area para sa pagpapanumbalik ng enerhiya.
index.feature.4.title=Multi-level na Shopping Center
index.feature.4.desc=Ang 4 na palapag na podium ay nagtitipon ng daan-daang brand para sa pamimili, mga supermarket, mga restawran ng pagkaing Asyano at Europeo, at mataong lugar para sa libangan.
index.feature.5.title=24/7 na Multi-layer na Seguridad
index.feature.5.desc=Sistema ng AI surveillance camera, key card para sa access sa bawat palapag ng elevator, at tuluy-tuloy na pagpapatrolya ng gwardya upang matiyak ang lubos na kaligtasan ng iyong pamilya.
index.feature.6.title=Smart Home Management App
index.feature.6.desc=Kontrolin ang mga de-kuryenteng kagamitan, bayaran ang mga singil, at mag-book ng mga pasilidad (BBQ, Tennis) mismo sa eksklusibong App ng gusali.

