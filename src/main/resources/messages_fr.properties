# Features Section
index.feature.badge=Privilèges des Résidents
index.feature.title=Système d'Équipements de Pointe <br />Standard Resort 5 Étoiles
index.feature.desc=Chaque pas est une expérience de vie parfaite. SmartApt répond pleinement à tous les besoins de vie, de travail et de divertissement au pas de votre porte.
index.feature.1.title=Piscine à Débordement Suspendue
index.feature.1.desc=Profitez d'une vue panoramique imprenable sur la ville depuis la Sky Pool aux normes olympiques, ainsi qu'une zone de baignade dédiée aux enfants.
index.feature.2.title=Parc Écologique de 2 ha
index.feature.2.desc=Espaces verts luxuriants, sentiers ombragés et lacs paysagers offrent une détente absolue au cœur de la nature.
index.feature.3.title=Gym & Spa Haut de Gamme
index.feature.3.desc=Salle de fitness avec les équipements les plus récents au monde, salle de yoga avec vue panoramique et espace spa spécialisé pour la récupération d'énergie.
index.feature.4.title=Centre Commercial Multiniveaux
index.feature.4.desc=Le socle de 4 étages regroupe des centaines de marques de shopping, supermarchés, restaurants de cuisine asiatique-européenne et zones de divertissement animées.
index.feature.5.title=Sécurité Multiniveau 24/7
index.feature.5.desc=Le système de caméras de surveillance IA, les badges d'accès aux étages de l'ascenseur et les patrouilles de sécurité continues garantissent une sécurité absolue pour votre famille.
index.feature.6.title=Application de Gestion Smart Home
index.feature.6.desc=Contrôlez les appareils électriques, payez vos factures et réservez des équipements (BBQ, Tennis) directement sur l'application exclusive du bâtiment.

